<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AgroCore — Sin conexión</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:'Inter','Segoe UI',sans-serif;background:linear-gradient(135deg,#14532d 0%,#15803d 50%,#b45309 100%);color:#fff;}
  .card{background:rgba(255,255,255,.08);backdrop-filter:blur(6px);border-radius:16px;padding:32px;max-width:440px;text-align:center;}
  h1{margin:0 0 12px;font-size:28px;}
  p{opacity:.85;line-height:1.5;}
  button{margin-top:20px;background:#22c55e;color:#052e16;border:0;border-radius:10px;padding:10px 20px;font-weight:600;cursor:pointer;}
  button:hover{background:#16a34a;color:white;}
</style>
</head>
<body>
  <div class="card">
    <div style="font-size:52px;margin-bottom:6px;">🌾</div>
    <h1>Sin conexión</h1>
    <p>Estás trabajando offline. Los cambios que hagas se guardarán localmente y se sincronizarán automáticamente cuando vuelva la señal.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
