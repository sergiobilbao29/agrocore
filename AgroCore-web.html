function hacMovTipoChange() {
  const t = $('#h-tipo').value;
  $('#h-campodest-wrap').style.display = t==='traslado'?'':'none';
  $('#h-ajuste-hint').style.display    = t==='ajuste'?'':'none';
  $('#h-campo-lbl').textContent        = t==='traslado'?'Campo origen *':'Campo *';
}
async function hacMovSave() {
  const tipo = $('#h-tipo').value;
  const data = {
    campoId: $('#h-campo').value,
    categoria: $('#h-cat').value.trim(),
    fecha: new Date($('#h-fec').value).toISOString(),
    tipo,
    cantidad: Number($('#h-cant').value||0),
    campoDestino: tipo==='traslado' ? $('#h-campodest').value : null,
    observaciones: $('#h-obs').value.trim()||null,
  };
  if (!data.campoId)   return toast('Elegí el campo','warn');
  if (!data.categoria) return toast('Categoría requerida','warn');
  if (!data.fecha)     return toast('Fecha requerida','warn');
  if (tipo==='traslado' && (!data.campoDestino || data.campoDestino===data.campoId))
    return toast('Elegí un campo destino distinto del origen','warn');
  if (!data.cantidad)                          return toast('Cantidad requerida','warn');
  if (tipo!=='ajuste' && data.cantidad<=0)     return toast('La cantidad debe ser positiva','warn');
  try {
    await api('/api/hacienda-movimientos',{method:'POST',body:JSON.stringify(data)});
    toast('Movimiento registrado','success'); closeModal();
    delete state.cache.haciendaResumen; delete state.cache.haciendaMovs;
    pages.hacienda();
  } catch(e) { toast(e.message,'error'); }
}
async function hacMovDel(id) {
  if (!confirm('¿Borrar este movimiento de hacienda? El stock real se va a recalcular.')) return;
  try {
    await api('/api/hacienda-movimientos/'+id,{method:'DELETE'});
    toast('Borrado','success');
    delete state.cache.haciendaResumen; delete state.cache.haciendaMovs;
    pages.hacienda();
  } catch(e) { toast(e.message,'error'); }
}

/* =========================================================
 * CUENTAS CORRIENTES
 * ========================================================= */
pages.ctasCtes = async function() {
  setHeader('Cuentas corrientes', 'Saldos a cobrar y a pagar');
  if (!can('finanzas:read')) { $('#page-body').innerHTML = stubPage('ctasCtes','Ctas Ctes'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let rows=[], clis=[], provs=[];
  try {
    const [r, c, p] = await Promise.all([api('/api/ctas-ctes'), api('/api/clientes'), api('/api/proveedores')]);
    rows = r.data||[]; clis = c.data||[]; provs = p.data||[];
    state.cache.ctasCtes = rows; state.cache.clientes = clis; state.cache.proveedores = provs;
  } catch (e) { return toast(e.message,'error'); }

  state.ccTab = state.ccTab || 'cobrar';

  // Agrupa los movimientos por contacto y calcula el saldo de cada uno.
  const agrupar = (tipo, lista) => lista.map(contacto => {
    const movs = rows.filter(m => m.contactoTipo===tipo && m.contactoId===contacto.id);
    const debe = movs.reduce((a,m)=>a+Number(m.debe||0),0);
    const haber = movs.reduce((a,m)=>a+Number(m.haber||0),0);
    return { contacto, movs, debe, haber, saldo: debe-haber };
  }).filter(g => g.movs.length > 0).sort((a,b)=>b.saldo-a.saldo);

  const clientesCC = agrupar('cliente', clis);
  const proveedoresCC = agrupar('proveedor', provs);
  const libres = rows.filter(m => m.contactoTipo==='libre' || (!m.contactoTipo));
  const totalCobrar = clientesCC.reduce((a,g)=>a+g.saldo,0);
  const totalPagar  = proveedoresCC.reduce((a,g)=>a+g.saldo,0);

  // Guardado en state para que los modales (movimientos, cobro/pago) lo lean.
  state._ccData = { clientesCC, proveedoresCC, libres };

  const tab = state.ccTab;
  const grupos = tab==='cobrar' ? clientesCC : tab==='pagar' ? proveedoresCC : [];
  const tipoActual = tab==='cobrar' ? 'cliente' : 'proveedor';
  const accionLabel = tab==='cobrar' ? 'Registrar cobro' : 'Registrar pago';

  const tabBtn = (id, label, activo) =>
    `<button onclick="ccSwitchTab('${id}')" class="px-4 py-2 rounded-lg text-sm font-semibold transition ${activo?'bg-green-700 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200'}">${label}</button>`;

  $('#page-body').innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
      <div class="kpi" style="background:linear-gradient(135deg,#dcfce7 0%,#f0fdf4 100%)">
        <div class="text-xs text-slate-500">💰 Total a cobrar (clientes)</div>
        <div class="text-2xl font-bold mt-1 text-emerald-700">${fmt$(totalCobrar)}</div>
      </div>
      <div class="kpi" style="background:linear-gradient(135deg,#fee2e2 0%,#fef2f2 100%)">
        <div class="text-xs text-slate-500">📤 Total a pagar (proveedores)</div>
        <div class="text-2xl font-bold mt-1 text-red-600">${fmt$(totalPagar)}</div>
      </div>
    </div>
    <div class="flex items-center justify-between flex-wrap gap-2 mb-3">
      <div class="flex gap-2">
        ${tabBtn('cobrar', '💰 A cobrar', tab==='cobrar')}
        ${tabBtn('pagar', '📤 A pagar', tab==='pagar')}
        ${tabBtn('otros', '📋 Otros / Manuales', tab==='otros')}
      </div>
      ${can('finanzas:create') ? `<button class="btn btn-secondary" onclick="ccForm()">+ Movimiento manual</button>`:''}
    </div>
    <div id="cc-body"></div>`;

  const body = $('#cc-body');
  if (tab === 'otros') {
    // Los "manuales / libres" tienen sus PROPIOS totales: alquileres, impuestos,
    // servicios, etc. NO se mezclan con clientes ni proveedores.
    const cats = ['Arrendamiento','Servicio','Impuesto','Otro'];
    state.ccLibreFilter = state.ccLibreFilter || { categoria:'', estado:'pendientes', direccion:'' };
    const lf = state.ccLibreFilter;

    const pendientesCobrar = libres.filter(m=>!m.pagado && Number(m.debe||0)>0);
    const pendientesPagar  = libres.filter(m=>!m.pagado && Number(m.haber||0)>0);
    const totalCobrarLibres = pendientesCobrar.reduce((a,m)=>a+Number(m.debe||0),0);
    const totalPagarLibres  = pendientesPagar.reduce((a,m)=>a+Number(m.haber||0),0);

    // Próximos a vencer (15 días) y vencidos: solo pendientes con vencimiento.
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const en15 = new Date(hoy.getTime() + 15*86400000);
    const proximos = libres.filter(m=>!m.pagado && m.vencimiento && new Date(m.vencimiento) <= en15);
    const vencidos = proximos.filter(m=>new Date(m.vencimiento) < hoy);

    // Filtros activos:
    let filtrados = libres.slice();
    if (lf.categoria) filtrados = filtrados.filter(m=>m.categoria===lf.categoria);
    if (lf.estado==='pendientes') filtrados = filtrados.filter(m=>!m.pagado);
    if (lf.estado==='pagados') filtrados = filtrados.filter(m=>m.pagado);
    if (lf.direccion==='cobrar') filtrados = filtrados.filter(m=>Number(m.debe||0)>0);
    if (lf.direccion==='pagar')  filtrados = filtrados.filter(m=>Number(m.haber||0)>0);
    // Orden: pendientes con vencimiento primero (más cercano arriba), luego sin vencimiento, luego pagados.
    filtrados.sort((a,b)=>{
      if (!!a.pagado !== !!b.pagado) return a.pagado?1:-1;
      const va = a.vencimiento?new Date(a.vencimiento).getTime():Infinity;
      const vb = b.vencimiento?new Date(b.vencimiento).getTime():Infinity;
      return va-vb;
    });

    body.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <div class="kpi" style="background:linear-gradient(135deg,#dcfce7,#f0fdf4)">
          <div class="text-xs text-slate-500">📥 A cobrar — manuales</div>
          <div class="text-2xl font-bold mt-1 text-emerald-700">${fmt$(totalCobrarLibres)}</div>
          <div class="text-xs text-slate-400 mt-1">${pendientesCobrar.length} pendiente${pendientesCobrar.length===1?'':'s'}</div>
        </div>
        <div class="kpi" style="background:linear-gradient(135deg,#fee2e2,#fef2f2)">
          <div class="text-xs text-slate-500">📤 A pagar — manuales</div>
          <div class="text-2xl font-bold mt-1 text-red-600">${fmt$(totalPagarLibres)}</div>
          <div class="text-xs text-slate-400 mt-1">${pendientesPagar.length} pendiente${pendientesPagar.length===1?'':'s'}</div>
        </div>
        <div class="kpi" style="background:linear-gradient(135deg,#fef3c7,#fffbeb)">
          <div class="text-xs text-slate-500">⏰ Vencen en 15 días</div>
          <div class="text-2xl font-bold mt-1 ${vencidos.length?'text-red-600':'text-amber-700'}">${proximos.length}</div>
          <div class="text-xs text-slate-400 mt-1">${vencidos.length} vencido${vencidos.length===1?'':'s'}</div>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 items-end mb-3">
        <div>
          <label class="label">Categoría</label>
          <select class="input" onchange="ccLibreFilter('categoria',this.value)">
            <option value="">Todas</option>
            ${cats.map(c=>`<option value="${c}" ${lf.categoria===c?'selected':''}>${c}</option>`).join('')}
            ${Array.from(new Set(libres.map(m=>m.categoria).filter(c=>c&&!cats.includes(c)))).map(c=>`<option value="${esc(c)}" ${lf.categoria===c?'selected':''}>${esc(c)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">Estado</label>
          <select class="input" onchange="ccLibreFilter('estado',this.value)">
            <option value="todos" ${lf.estado==='todos'?'selected':''}>Todos</option>
            <option value="pendientes" ${lf.estado==='pendientes'?'selected':''}>Pendientes</option>
            <option value="pagados" ${lf.estado==='pagados'?'selected':''}>Pagados / cobrados</option>
          </select>
        </div>
        <div>
          <label class="label">Dirección</label>
          <select class="input" onchange="ccLibreFilter('direccion',this.value)">
            <option value="">Todas</option>
            <option value="cobrar" ${lf.direccion==='cobrar'?'selected':''}>A cobrar</option>
            <option value="pagar" ${lf.direccion==='pagar'?'selected':''}>A pagar</option>
          </select>
        </div>
      </div>
      <div class="kpi p-0 overflow-hidden">
        <table class="data">
          <thead><tr>
            <th>Fecha</th>
            <th>Vencimiento</th>
            <th>Categoría</th>
            <th>Nombre</th>
            <th>Detalle</th>
            <th class="text-right">A cobrar</th>
            <th class="text-right">A pagar</th>
            <th>Estado</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${filtrados.map(m => {
              const venc = m.vencimiento ? new Date(m.vencimiento) : null;
              const diasDif = venc ? Math.floor((venc.getTime() - hoy.getTime()) / 86400000) : null;
              let vencBadge = '<span class="text-slate-400">—</span>';
              if (venc) {
                const fStr = fmtDate(m.vencimiento);
                if (m.pagado) vencBadge = `<span class="text-slate-400">${fStr}</span>`;
                else if (diasDif < 0)  vencBadge = `${fStr} <span class="badge badge-red">Vencido ${-diasDif}d</span>`;
                else if (diasDif <= 15) vencBadge = `${fStr} <span class="badge badge-yellow">en ${diasDif}d</span>`;
                else vencBadge = `<span class="text-slate-600">${fStr}</span>`;
              }
              return `<tr class="table-row ${m.pagado?'opacity-60':''}">
                <td>${fmtDate(m.fecha)}</td>
                <td>${vencBadge}</td>
                <td>${m.categoria?`<span class="badge badge-gray">${esc(m.categoria)}</span>`:'—'}</td>
                <td>${esc(m.nombreLibre||'—')}</td>
                <td>${esc(m.detalle||'—')}${m.referencia?` <span class="text-[10px] text-slate-400">(${esc(m.referencia)})</span>`:''}</td>
                <td class="text-right text-emerald-700">${m.debe?fmt$(m.debe):'—'}</td>
                <td class="text-right text-red-600">${m.haber?fmt$(m.haber):'—'}</td>
                <td>${m.pagado?'<span class="badge badge-green">Pagado</span>':'<span class="badge badge-gray">Pendiente</span>'}</td>
                <td class="text-right whitespace-nowrap">
                  ${can('finanzas:update')?`<button class="btn btn-ghost text-xs" onclick='ccTogglePagado(${JSON.stringify(m.id)},${!m.pagado})'>${m.pagado?'Desmarcar':'Marcar pagado'}</button>`:''}
                  ${can('finanzas:update')?`<button class="btn btn-ghost text-xs" onclick='ccForm(${JSON.stringify(m.id)})'>✏️</button>`:''}
                  ${can('finanzas:delete')?`<button class="btn btn-ghost text-xs text-red-600" onclick='ccDel(${JSON.stringify(m.id)})'>🗑️</button>`:''}
                </td>
              </tr>`;
            }).join('') || '<tr><td colspan="9" class="text-center text-slate-400 py-8">No hay movimientos manuales con esos filtros</td></tr>'}
          </tbody>
        </table>
      </div>
      <p class="text-xs text-slate-500 mt-2">💡 Los totales de manuales son <b>independientes</b> de los de clientes y proveedores.</p>`;
  } else {
    body.innerHTML = `
      <div class="kpi p-0 overflow-hidden">
        <table class="data">
          <thead><tr>
            <th>${tab==='cobrar'?'Cliente':'Proveedor'}</th>
            <th class="text-center">Movimientos</th>
            <th class="text-right">Facturado (debe)</th>
            <th class="text-right">${tab==='cobrar'?'Cobrado':'Pagado'} (haber)</th>
            <th class="text-right">Saldo</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${grupos.map(g => `
              <tr class="table-row">
                <td><b>${esc(g.contacto.razonSocial)}</b></td>
                <td class="text-center text-slate-500">${g.movs.length}</td>
                <td class="text-right">${fmt$(g.debe)}</td>
                <td class="text-right text-emerald-700">${fmt$(g.haber)}</td>
                <td class="text-right font-bold ${g.saldo>0?(tab==='cobrar'?'text-amber-600':'text-red-600'):'text-slate-400'}">${fmt$(g.saldo)}</td>
                <td class="text-right whitespace-nowrap">
                  <button class="btn btn-ghost text-xs" onclick="ccVerMovimientos('${tipoActual}','${g.contacto.id}')">Ver movimientos</button>
                  ${can('finanzas:create') && g.saldo>0 ? `<button class="btn btn-primary text-xs" onclick="ccCobroPagoForm('${tipoActual}','${g.contacto.id}')">${accionLabel}</button>`:''}
                </td>
              </tr>`).join('') || `<tr><td colspan="6" class="text-center text-slate-400 py-8">Sin ${tab==='cobrar'?'clientes con saldo':'proveedores con saldo'}</td></tr>`}
          </tbody>
        </table>
      </div>
      <div class="mt-2 text-xs text-slate-500">💡 El saldo se alimenta automáticamente de las facturas. Registrá cobros/pagos para descontarlo.</div>`;
  }
};
function ccSwitchTab(t) { state.ccTab = t; pages.ctasCtes(); }

// Modal con el detalle de movimientos de un contacto, con saldo corriente.
function ccVerMovimientos(tipo, contactoId) {
  const data = state._ccData || {};
  const grupos = tipo==='cliente' ? (data.clientesCC||[]) : (data.proveedoresCC||[]);
  const g = grupos.find(x => x.contacto.id === contactoId);
  if (!g) return;
  const movs = g.movs.slice().sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  let saldoAc = 0;
  openModal({
    title: `Cuenta corriente — ${g.contacto.razonSocial}`,
    size: 'max-w-3xl',
    body: `
      <div class="mb-3 grid grid-cols-3 gap-2 text-center">
        <div class="bg-slate-50 rounded p-2"><div class="text-[11px] text-slate-500">Facturado</div><div class="font-bold">${fmt$(g.debe)}</div></div>
        <div class="bg-emerald-50 rounded p-2"><div class="text-[11px] text-slate-500">Cobrado/Pagado</div><div class="font-bold text-emerald-700">${fmt$(g.haber)}</div></div>
        <div class="bg-amber-50 rounded p-2"><div class="text-[11px] text-slate-500">Saldo</div><div class="font-bold ${g.saldo>0?'text-amber-600':'text-slate-400'}">${fmt$(g.saldo)}</div></div>
      </div>
      <table class="data">
        <thead><tr><th>Fecha</th><th>Detalle</th><th class="text-right">Debe</th><th class="text-right">Haber</th><th class="text-right">Saldo</th></tr></thead>
        <tbody>
          ${movs.map(m => {
            saldoAc += Number(m.debe||0) - Number(m.haber||0);
            return `<tr class="table-row">
              <td>${fmtDate(m.fecha)}</td>
              <td>${esc(m.detalle||'—')}${m.referencia?` <span class="text-[10px] text-slate-400">(${esc(m.referencia)})</span>`:''}</td>
              <td class="text-right">${m.debe?fmt$(m.debe):'—'}</td>
              <td class="text-right text-emerald-700">${m.haber?fmt$(m.haber):'—'}</td>
              <td class="text-right font-semibold">${fmt$(saldoAc)}</td>
            </tr>`;
          }).join('') || '<tr><td colspan="5" class="text-center text-slate-400 py-6">Sin movimientos</td></tr>'}
        </tbody>
      </table>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
             ${can('finanzas:create') && g.saldo>0 ? `<button class="btn btn-primary" onclick="closeModal();ccCobroPagoForm('${tipo}','${contactoId}')">${tipo==='cliente'?'Registrar cobro':'Registrar pago'}</button>`:''}`
  });
}

// Formulario para registrar un cobro (de cliente) o pago (a proveedor).
function ccCobroPagoForm(tipo, contactoId) {
  const data = state._ccData || {};
  const grupos = tipo==='cliente' ? (data.clientesCC||[]) : (data.proveedoresCC||[]);
  const g = grupos.find(x => x.contacto.id === contactoId);
  if (!g) return;
  const esCobro = tipo==='cliente';
  openModal({
    title: esCobro ? `Registrar cobro — ${g.contacto.razonSocial}` : `Registrar pago — ${g.contacto.razonSocial}`,
    body: `
      <div class="mb-3 p-3 bg-amber-50 rounded-lg text-sm">
        Saldo actual: <b class="text-amber-700">${fmt$(g.saldo)}</b>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Fecha *</label><input id="f-cpfec" type="date" class="input" value="${new Date().toISOString().slice(0,10)}"/></div>
        <div><label class="label">Importe *</label><input id="f-cpmon" type="number" step="0.01" class="input" value="${g.saldo>0?g.saldo:''}"/></div>
        <div class="col-span-2"><label class="label">Medio / Detalle</label><input id="f-cpdet" class="input" placeholder="${esCobro?'Ej: transferencia, efectivo, cheque...':'Ej: transferencia, cheque propio...'}"/></div>
        <div class="col-span-2"><label class="label">Referencia</label><input id="f-cpref" class="input" placeholder="Nº recibo / comprobante (opcional)"/></div>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick="ccCobroPagoSave('${tipo}','${contactoId}')">${esCobro?'Registrar cobro':'Registrar pago'}</button>`
  });
}
async function ccCobroPagoSave(tipo, contactoId) {
  const monto = Number($('#f-cpmon').value || 0);
  if (!monto || monto <= 0) return toast('Importe requerido','warn');
  const esCobro = tipo==='cliente';
  const detalleUsuario = $('#f-cpdet').value.trim();
  const data = {
    contactoTipo: tipo,
    contactoId,
    fecha: new Date($('#f-cpfec').value).toISOString(),
    detalle: (esCobro ? 'Cobro recibido' : 'Pago realizado') + (detalleUsuario ? ' · ' + detalleUsuario : ''),
    debe: 0,
    haber: monto,   // un cobro/pago descuenta el saldo
    referencia: $('#f-cpref').value.trim() || null,
  };
  try {
    await api('/api/ctas-ctes', { method:'POST', body: JSON.stringify(data) });
    toast(esCobro ? 'Cobro registrado' : 'Pago registrado', 'success');
    closeModal(); delete state.cache.ctasCtes;
    // Si era un pago a proveedor y le saldamos la cuenta, marcamos como
    // pagados los viajes facturados de ese proveedor (best-effort).
    if (!esCobro) {
      try {
        const r = await api('/api/viajes/auto-settle', { method:'POST', body: JSON.stringify({ proveedorId: contactoId }) });
        if (r.updated > 0) { delete state.cache.viajes; toast(`${r.updated} viaje${r.updated===1?'':'s'} pasaron a pagado`, 'success'); }
      } catch {} // si el usuario no tiene logistica:update, ignoramos silenciosamente
    }
    pages.ctasCtes();
  } catch (e) { toast(e.message,'error'); }
}
function ccLibreFilter(k,v){ state.ccLibreFilter = state.ccLibreFilter || { categoria:'', estado:'pendientes', direccion:'' }; state.ccLibreFilter[k]=v; pages.ctasCtes(); }

function ccForm(id=null) {
  const it = id ? ((state.cache.ctasCtes||[]).find(x=>x.id===id)||{}) : {};
  if (id && it.contactoTipo && it.contactoTipo !== 'libre') {
    return toast('Los movimientos generados por facturas no se editan acá. Registrá un cobro/pago en su lugar.','warn');
  }
  const clis = state.cache.clientes || [];
  const provs = state.cache.proveedores || [];
  const cats = ['Arrendamiento','Servicio','Impuesto','Otro'];
  const tipo = it.contactoTipo || 'libre';
  const direccion = (Number(it.debe||0)>0) ? 'cobrar' : 'pagar';
  const fechaStr = it.fecha ? String(it.fecha).slice(0,10) : new Date().toISOString().slice(0,10);
  const vencStr  = it.vencimiento ? String(it.vencimiento).slice(0,10) : '';
  const initialList = tipo==='proveedor' ? provs : clis;
  openModal({
    title: id?'Editar movimiento manual':'Nuevo movimiento en Cta Cte',
    body: `
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Tipo *</label>
          <select id="f-ct" class="input" onchange="ccTipoChange()" ${id?'disabled':''}>

function ccTipoChange() {
  const t = $('#f-ct').value;
  const esLibre = t==='libre';
  const show = (id, v) => { const el=$('#'+id); if(el) el.classList.toggle('hidden', !v); };
  show('f-wrap-contacto', !esLibre);
  show('f-wrap-libre', esLibre);
  show('f-wrap-libreExtra', esLibre);
  show('f-wrap-monto', esLibre);
  show('f-wrap-debe', !esLibre);
  show('f-wrap-haber', !esLibre);
  if (!esLibre) {
    const wc = $('#f-wrap-contacto');
    const label = wc.querySelector('.label');
    if (label) label.textContent = t==='cliente' ? 'Cliente' : 'Proveedor';
    const lst = t==='cliente' ? (state.cache.clientes||[]) : (state.cache.proveedores||[]);
    $('#f-contacto').innerHTML = lst.map(c=>`<option value="${c.id}">${esc(c.razonSocial)}</option>`).join('');
  }
}
async function ccSave(id) {
  const tipo = $('#f-ct').value;
  let data;
  if (tipo === 'libre') {
    const dir = $('#f-dir').value;
    const monto = Number($('#f-mon').value || 0);
    if (!monto || monto<=0) return toast('Ingresá un monto mayor a cero','warn');
    data = {
      contactoTipo: 'libre',
      contactoId: null,
      nombreLibre: $('#f-libre').value.trim() || null,
      fecha: new Date($('#f-fec').value).toISOString(),
      vencimiento: $('#f-venc').value ? new Date($('#f-venc').value).toISOString() : null,
      detalle: $('#f-det').value.trim(),
      categoria: $('#f-cat').value.trim() || null,
      debe:  dir==='cobrar' ? monto : 0,
      haber: dir==='pagar'  ? monto : 0,
      pagado: $('#f-pag').checked,
      referencia: $('#f-ref').value.trim() || null,
    };
  } else {
    data = {
      contactoTipo: tipo,
      contactoId: $('#f-contacto').value,
      nombreLibre: null,
      fecha: new Date($('#f-fec').value).toISOString(),
      detalle: $('#f-det').value.trim(),
      debe:  $('#f-deb').value ? Number($('#f-deb').value) : 0,
      haber: $('#f-hab').value ? Number($('#f-hab').value) : 0,
      referencia: $('#f-ref').value.trim() || null,
    };
  }
  if (!data.detalle) return toast('Detalle requerido','warn');
  try {
    await api('/api/ctas-ctes'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(data)});
    toast(id?'Actualizado':'Movimiento creado','success'); closeModal();
    delete state.cache.ctasCtes; pages.ctasCtes();
  } catch (e) { toast(e.message,'error'); }
}
async function ccTogglePagado(id, nuevo) {
  try {
    await api('/api/ctas-ctes/'+id,{method:'PUT', body: JSON.stringify({pagado: nuevo})});
    toast(nuevo?'Marcado como pagado':'Vuelve a pendiente','success');
    delete state.cache.ctasCtes; pages.ctasCtes();
  } catch (e) { toast(e.message,'error'); }
}
async function ccDel(id) {
  if (!confirm('¿Borrar este movimiento?')) return;
  try { await api('/api/ctas-ctes/'+id,{method:'DELETE'}); toast('Borrado','success'); delete state.cache.ctasCtes; pages.ctasCtes(); }
  catch (e) { toast(e.message,'error'); }
}

pages.flujoCaja = async function() {
  setHeader('Flujo de caja', 'Ingresos y egresos proyectados/reales');
  if (!can('finanzas:read')) { $('#page-body').innerHTML = stubPage('flujoCaja','Flujo de caja'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  destroyCharts();
  let rows=[];
  try { rows = await crudList('flujo-caja','flujoCaja'); } catch (e) { return toast(e.message,'error'); }
  const ordered = [...rows].sort((a,b)=> new Date(a.fecha) - new Date(b.fecha));
  let acc = 0;
  ordered.forEach(r => { acc += Number(r.monto||0); r._saldo = acc; });
  const entradas = rows.filter(r => Number(r.monto||0) > 0).reduce((a,r)=>a+Number(r.monto),0);
  const salidas = rows.filter(r => Number(r.monto||0) < 0).reduce((a,r)=>a+Number(r.monto),0);

  // Agrupar por mes (últimos 6)
  const hoy = new Date();
  const meses = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth()-i, 1);
    meses.push({ key: d.toISOString().slice(0,7), label: d.toLocaleDateString('es-AR',{month:'short', year:'2-digit'}) });
  }
  const ingXMes = meses.map(m => rows.filter(r => (r.fecha||'').slice(0,7)===m.key && Number(r.monto)>0).reduce((a,r)=>a+Number(r.monto),0));
  const egrXMes = meses.map(m => rows.filter(r => (r.fecha||'').slice(0,7)===m.key && Number(r.monto)<0).reduce((a,r)=>a+Math.abs(Number(r.monto)),0));
  // Línea acumulada: saldo al final de cada mes
  const acumXMes = [];
  let a2 = 0;
  meses.forEach(m => {
    const delta = rows.filter(r => (r.fecha||'').slice(0,7) <= m.key).reduce((a,r)=>a+Number(r.monto||0), 0);
    acumXMes.push(delta);
  });

  $('#page-body').innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Entradas</div><div class="text-2xl font-bold mt-1 text-emerald-600">${fmt$(entradas)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Salidas</div><div class="text-2xl font-bold mt-1 text-red-600">${fmt$(Math.abs(salidas))}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Saldo acumulado</div><div class="text-2xl font-bold mt-1 ${acc>=0?'text-emerald-700':'text-red-700'}">${fmt$(acc)}</div></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-2">Ingresos vs Egresos por mes</h3>
        <div style="position:relative;height:240px"><canvas id="chart-fc-bar"></canvas></div>
      </div>
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-2">Saldo acumulado</h3>
        <div style="position:relative;height:240px"><canvas id="chart-fc-acum"></canvas></div>
      </div>
    </div>

    <div class="kpi mb-3">
      <div class="grid grid-cols-1 md:grid-cols-5 gap-2 items-end">
        <div><label class="label">Desde</label><input id="fc-desde" type="date" class="input"/></div>
        <div><label class="label">Hasta</label><input id="fc-hasta" type="date" class="input"/></div>
        <div><label class="label">Categoría</label>
          <select id="fc-cat" class="input">
            <option value="">Todas</option>
            ${[...new Set(rows.map(r=>r.categoria).filter(Boolean))].sort().map(c=>`<option>${esc(c)}</option>`).join('')}
          </select>
        </div>
        <div><label class="label">Tipo</label>
          <select id="fc-tipo" class="input">
            <option value="">Todos</option>
            <option value="ingreso">Ingreso</option>
            <option value="egreso">Egreso</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-secondary flex-1" onclick="fcFiltrosLimpiar()">Limpiar</button>
          ${can('finanzas:create') ? `<button class="btn btn-primary flex-1" onclick="fcForm()">+ Nuevo</button>`:''}
        </div>
      </div>
    </div>

    <div class="kpi p-0 overflow-hidden">
      <div id="fc-table"></div>
    </div>`;

  const renderFc = () => {
    const f = state.fcFilter || {};
    let list = ordered.slice();
    if (f.desde) list = list.filter(r => (r.fecha||'') >= f.desde);
    if (f.hasta) list = list.filter(r => (r.fecha||'') <= f.hasta+'T23:59:59');
    if (f.cat)   list = list.filter(r => r.categoria === f.cat);
    if (f.tipo === 'ingreso') list = list.filter(r => Number(r.monto||0) > 0);
    if (f.tipo === 'egreso')  list = list.filter(r => Number(r.monto||0) < 0);
    $('#fc-table').innerHTML = `
      <table class="data">
        <thead><tr><th>Fecha</th><th>Concepto</th><th>Categoría</th><th class="text-right">Monto</th><th class="text-right">Saldo acum.</th><th></th></tr></thead>
        <tbody>
          ${list.reverse().map(m => `
            <tr class="table-row">
              <td>${fmtDate(m.fecha)}</td>
              <td>${esc(m.concepto)}</td>
              <td>${m.categoria?`<span class="badge badge-blue">${esc(m.categoria)}</span>`:'—'}</td>
              <td class="text-right font-semibold ${Number(m.monto)>=0?'text-emerald-700':'text-red-700'}">${fmt$(m.monto)}</td>
              <td class="text-right font-bold">${fmt$(m._saldo)}</td>
              <td class="text-right">
                ${can('finanzas:delete')?`<button class="btn btn-ghost text-xs text-red-600" onclick='fcDel(${JSON.stringify(m.id)})'>🗑️</button>`:''}
              </td>
            </tr>`).join('') || '<tr><td colspan="6" class="text-center text-slate-400 py-8">Sin movimientos</td></tr>'}
        </tbody>
      </table>`;
  };
  state.fcFilter = state.fcFilter || { desde:'', hasta:'', cat:'', tipo:'' };
  ['desde','hasta','cat','tipo'].forEach(k => {
    const el = $('#fc-'+k); if (!el) return;
    const evt = (el.tagName==='SELECT' || el.type==='date') ? 'change' : 'input';
    el.addEventListener(evt, e => { state.fcFilter[k] = e.target.value; renderFc(); });
  });
  renderFc();

  if (window.Chart) {
    state.charts.fcBar = new Chart($('#chart-fc-bar').getContext('2d'), {
      type:'bar',
      data:{ labels: meses.map(m=>m.label),
        datasets:[
          { label:'Ingresos', backgroundColor:'#16a34a', data: ingXMes },
          { label:'Egresos',  backgroundColor:'#dc2626', data: egrXMes },
        ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom' } },
        scales:{ y:{ beginAtZero:true, ticks:{ callback: v => '$'+v.toLocaleString('es-AR') } } } }
    });
    state.charts.fcAcum = new Chart($('#chart-fc-acum').getContext('2d'), {
      type:'line',
      data:{ labels: meses.map(m=>m.label),
        datasets:[{ label:'Acumulado', data: acumXMes,
          borderColor:'#14532d', backgroundColor:'rgba(22,163,74,0.2)',
          fill:true, tension:0.3 }]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom' } },
        scales:{ y:{ ticks:{ callback: v => '$'+v.toLocaleString('es-AR') } } } }
    });
  }
};

                  ${canU?`<button class="btn btn-ghost text-xs" title="Editar" onclick='viajeForm(${JSON.stringify(v.id)})'>✏️</button>`:''}
                  ${canU?`<button class="btn btn-ghost text-xs" title="Vincular factura del transporte" onclick='viajeVincularForm(${JSON.stringify(v.id)})'>🔗</button>`:''}
                  ${v.destinoTipo==='cerealera' && v.depositoDestinoId && can('stock:entrega_cerealera:create')?`<button class="btn btn-ghost text-xs" title="Cargar entrega del cereal a la cerealera" onclick='viajeEntregaCereal(${JSON.stringify(v.id)})'>📤</button>`:''}
                  ${v.destinoTipo==='venta_directa' && can('finanzas:liquidacion_cereal:create')?`<button class="btn btn-ghost text-xs" title="Cargar liquidación de venta del cereal" onclick='viajeLiquidacion(${JSON.stringify(v.id)})'>🧾</button>`:''}
                  ${canU && v.estado!=='pagado'?`<button class="btn btn-ghost text-xs text-emerald-700" title="Marcar como pagado" onclick='viajeMarcarPagado(${JSON.stringify(v.id)})'>💵</button>`:''}
                  ${canD?`<button class="btn btn-ghost text-xs text-red-600" title="Borrar" onclick='viajeDel(${JSON.stringify(v.id)})'>🗑️</button>`:''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`}`;
};

      <div class="grid grid-cols-4 gap-3">
        <div><label class="label">Estado</label>
          <select id="f-estado" class="input">
            ${Object.entries(VIAJE_ESTADOS).map(([k,v])=>`<option value="${k}" ${k===estadoActual?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
        <div class="col-span-3 text-xs text-slate-500 pt-6">El estado se sugiere solo: <i>cargado</i> al ingresar kg de carga, <i>descargado</i> al ingresar kg descargados, <i>facturado</i> al vincular la factura, <i>pagado</i> al saldar la cuenta del transporte.</div>

      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick='viajeSave(${JSON.stringify(id)})'>${id?'Guardar':'Crear'}</button>`
  });
  // Recalcular total de gastos en vivo
  const inputsTotal = ['f-comb','f-pea','f-com','f-var'];
  const recalc = () => {
    const sum = inputsTotal.reduce((a,i)=>a + (Number($('#'+i)?.value)||0), 0);
    const t = $('#f-total'); if (t) t.value = '$ '+sum.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
  };
  inputsTotal.forEach(i => { const el = $('#'+i); if (el) el.oninput = recalc; });
  recalc();
  viajeRecalcDif();
  // Cargar cerealeras en el select de destino (sólo las activas y de tipo cerealera)
  (async () => {
    try {
      const r = await api('/api/depositos');
      const cere = (r.data||[]).filter(x => x.activo && x.tipo === 'cerealera');
      state.cache.depositos = r.data || [];
      const sel = $('#f-ddep');
      if (sel) {
        sel.innerHTML = `<option value="">— Elegí la cerealera —</option>` +
          cere.map(d => `<option value="${d.id}" ${it.depositoDestinoId===d.id?'selected':''}>🏭 ${esc(d.nombre)}${d.localidad?` · ${esc(d.localidad)}`:''}</option>`).join('');
      }
    } catch {}
  })();
}
function viajeDestTipo() {
  const t = $('#f-dtipo').value;
  const wrap = $('#f-ddep-wrap');
  const hint = $('#f-dhint');
  if (wrap) wrap.style.display = (t === 'cerealera') ? '' : 'none';
  if (hint) {
    if (t === 'cerealera') hint.textContent = '💡 Al guardar el viaje, el cereal se descontará del campo y entrará al stock de la cerealera elegida (movimiento de entrega).';
    else if (t === 'venta_directa') hint.textContent = '💡 Después de guardar, podés cargar la liquidación de cereal desde la lista de viajes (botón 🧾).';
    else hint.textContent = '';
  }
}
function viajeRecalcDif() {
  const kg  = Number($('#f-kg')?.value||0);
  const kgd = Number($('#f-kgd')?.value||0);
  const el  = $('#f-dif');
  if (!el) return;
  if (!kg && !kgd) { el.textContent='—'; el.className='input bg-slate-50 font-semibold flex items-center text-slate-400'; return; }
  const dif = kg - kgd;
  el.textContent = (dif>=0?'':'+') + fmtN(Math.abs(dif)) + ' kg' + (dif>0?' menos':(dif<0?' más':''));
  el.className = 'input bg-slate-50 font-semibold flex items-center ' + (dif===0?'text-slate-500':(Math.abs(dif)>500?'text-red-600':'text-amber-700'));
}
async function viajeSave(id) {
  const comb = Number($('#f-comb').value||0);
  const pea  = Number($('#f-pea').value ||0);
  const com  = Number($('#f-com').value ||0);
  const var_ = Number($('#f-var').value ||0);
  const data = {
    fecha:           new Date($('#f-fec').value).toISOString(),
    origen:          $('#f-ori').value.trim() || null,
    destino:         $('#f-des').value.trim() || null,
    producto:        $('#f-prod').value.trim() || null,
    cantidad:        $('#f-kg').value  ? Number($('#f-kg').value)  : null,
    kgDescarga:      $('#f-kgd').value ? Number($('#f-kgd').value) : null,
    unidad:          $('#f-uni').value.trim() || null,
    cartaPorte:      $('#f-cp').value.trim() || null,
    ctg:             $('#f-ctg').value.trim() || null,
    cdp:             $('#f-cdp').value.trim() || null,
    km:              $('#f-km').value ? Number($('#f-km').value) : null,
    tarifa:          $('#f-tarifa').value ? Number($('#f-tarifa').value) : null,
    transportista:   $('#f-tr').value.trim() || null,
    transporteCuit:  $('#f-trcuit').value.trim() || null,
    chofer:          $('#f-ch').value.trim() || null,
    choferCuit:      $('#f-chcuit').value.trim() || null,
    tipoCamion:      $('#f-tipoc').value.trim() || null,
    patente:         $('#f-pat').value.trim() || null,
    patenteAcoplado: $('#f-pata').value.trim() || null,
    combustible:     comb||null,
    peajes:          pea ||null,
    comida:          com ||null,
    varios:          var_||null,
    total:           (comb+pea+com+var_)||null,
    estado:          $('#f-estado').value,
    observaciones:   $('#f-obs').value.trim() || null,
    destinoTipo:        $('#f-dtipo')?.value || null,
    depositoDestinoId:  $('#f-dtipo')?.value === 'cerealera' ? ($('#f-ddep')?.value || null) : null,
  };
  try {
    await api('/api/viajes'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(data)});
    toast(id?'Actualizado':'Creado','success'); closeModal(); delete state.cache.viajes; pages.viajes();
  } catch (e) { toast(e.message,'error'); }
}
async function viajeDel(id) {
  if (!confirm('¿Borrar este viaje?')) return;
  try { await api('/api/viajes/'+id,{method:'DELETE'}); toast('Borrado','success'); delete state.cache.viajes; pages.viajes(); }
  catch (e) { toast(e.message,'error'); }
}
async function viajeMarcarPagado(id) {
  if (!confirm('¿Marcar este viaje como pagado?')) return;
  try {
    await api('/api/viajes/'+id+'/estado',{method:'POST',body:JSON.stringify({estado:'pagado'})});
    toast('Viaje marcado como pagado','success'); delete state.cache.viajes; pages.viajes();
  } catch (e) { toast(e.message,'error'); }
}

// Atajo desde Viajes: abre el modal de entrega de cereal pre-cargado con
// los datos del viaje (cerealera destino, cantidad descargada, fecha, remito).
async function viajeEntregaCereal(viajeId) {
  const v = (state.cache.viajes||[]).find(x => x.id === viajeId);
  if (!v) return toast('Viaje no encontrado','error');
  if (!v.depositoDestinoId) return toast('Este viaje no tiene cerealera destino cargada','warn');
  await entregaCerealForm();
  // Pre-cargar con los datos del viaje
  setTimeout(() => {
    const productos = state.cache.productos || [];
    const prod = productos.find(p => (p.nombre||'').toLowerCase() === (v.producto||'').toLowerCase());
    if (prod) $('#ec-prod').value = prod.id;
    const cant = v.kgDescarga || v.cantidad || 0;
    if (cant) $('#ec-cant').value = prod?.unidad === 'tn' ? (cant / 1000) : cant;
    $('#ec-dest').value = v.depositoDestinoId;
    $('#ec-fec').value = String(v.fecha).slice(0, 10);
    $('#ec-rem').value = v.cartaPorte || '';
    $('#ec-obs').value = `Desde viaje ${v.ctg ? 'CTG ' + v.ctg : ''} · CP ${v.cartaPorte || ''}`.trim();
  }, 50);
}

// Atajo desde Viajes: abre el modal de liquidación de cereal pre-cargado.
async function viajeLiquidacion(viajeId) {
  const v = (state.cache.viajes||[]).find(x => x.id === viajeId);
  if (!v) return toast('Viaje no encontrado','error');
  await liqForm();
  setTimeout(() => {
    const productos = state.cache.productos || [];
    const prod = productos.find(p => (p.nombre||'').toLowerCase() === (v.producto||'').toLowerCase());
    if (prod) { const sel = $('#lq-prod'); if (sel && [...sel.options].some(o=>o.value===prod.id)) sel.value = prod.id; }
    const kg = v.kgDescarga || v.cantidad || 0;
    if (kg) { $('#lq-brut').value = kg; }
    $('#lq-fec').value = String(v.fecha).slice(0, 10);
    $('#lq-nro').value = v.cartaPorte || '';
    if (v.depositoDestinoId) { const sd = $('#lq-dep'); if (sd && [...sd.options].some(o=>o.value===v.depositoDestinoId)) sd.value = v.depositoDestinoId; }
    $('#lq-obs').value = `Desde viaje ${v.ctg ? 'CTG ' + v.ctg : ''}`.trim();
    if (typeof liqRecalc === 'function') liqRecalc();
  }, 50);
}

// ---- Verificar CTGs en ARCA ----
// Abre un modal con los viajes "cargado" que tienen CTG y permite consultar
// individualmente o todos juntos. Al consultar, se llena el kg descargado con
// lo que devuelve ARCA. Al guardar, el viaje pasa a "descargado".
async function verificarCtgsForm() {
  if (!state.companyId) return toast('Sin empresa seleccionada','warn');
  let rows = [];
  try { rows = await crudList('viajes'); }
  catch (e) { return toast(e.message,'error'); }
  const viajesCtg = rows.filter(v => v.estado === 'cargado' && (v.ctg || v.cartaPorte));

  let arca = {};
  try { arca = (await api('/api/empresas/'+state.companyId+'/arca/estado')).data || {}; }
  catch {}
  state._arcaEstado = arca;
  state._ctgViajes  = viajesCtg;

  const cabezera = viajesCtg.length
    ? `${viajesCtg.length} viaje${viajesCtg.length===1?'':'s'} en estado <b>Cargado</b> con CTG. Los kg pre-llenados son los actuales en el sistema.`
    : 'No hay viajes en estado "Cargado" con CTG para verificar.';

  openModal({
    title: '🔍 Verificar CTGs en ARCA',
    size: 'max-w-5xl',
    body: `
      ${!arca.configurado ? `
        <div class="kpi mb-3" style="background:#fef3c7;border-color:#fbbf24">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-xl">⚠️</span>
            <div class="flex-1 text-sm text-amber-900">ARCA no está configurado. Cargá el certificado y la clave privada en <b>Configuración → ARCA</b> antes de consultar.</div>
            <button class="btn btn-primary text-xs" onclick="closeModal();state.configTab='arca';go('configuracion');">⚙️ Ir a configuración</button>
          </div>
        </div>` : ''}

      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <p class="text-sm text-slate-600">${cabezera}</p>
        ${arca.configurado ? `<button class="btn btn-ghost text-xs text-slate-500" onclick="closeModal();state.configTab='arca';go('configuracion');" title="Editar configuración ARCA">⚙️ Editar configuración</button>` : ''}
      </div>

      ${viajesCtg.length ? `
        <button class="btn btn-primary mb-3" onclick="ctgConsultarTodos()">🔁 Consultar todos en ARCA (automático)</button>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm" id="ctg-tbl">
            <thead class="bg-slate-50 text-slate-600"><tr>
              <th class="text-left px-3 py-2">Fecha</th>
              <th class="text-left px-3 py-2">Ruta</th>
              <th class="text-left px-3 py-2">Producto</th>
              <th class="text-left px-3 py-2">CTG · Estado ARCA</th>
              <th class="text-right px-3 py-2">Kg Carga</th>
              <th class="text-left px-3 py-2">Kg Descarga</th>
              <th class="px-3 py-2">Acción</th>
            </tr></thead>
            <tbody class="divide-y divide-slate-200">
              ${viajesCtg.map(v => {
                const ctg = v.ctg || v.cartaPorte || '';
                return `<tr id="ctg-row-${v.id}">
                  <td class="px-3 py-2 whitespace-nowrap">${fmtDate(v.fecha)}</td>
                  <td class="px-3 py-2">${esc(v.origen||'—')} <span class="text-slate-400">→</span> <b>${esc(v.destino||'—')}</b></td>
                  <td class="px-3 py-2 text-slate-600">${esc(v.producto||'—')}</td>
                  <td class="px-3 py-2 font-mono whitespace-nowrap">
                    <button class="text-emerald-700 hover:underline" onclick='ctgConsultarUno(${JSON.stringify(v.id)})' title="Consultar este CTG en ARCA">${esc(ctg)} 📋</button>
                    <span id="ctg-est-${v.id}" class="ml-1"></span>
                  </td>
                  <td class="px-3 py-2 text-right whitespace-nowrap text-slate-600">${v.cantidad?fmtN(v.cantidad)+' kg':'—'}</td>
                  <td class="px-3 py-2"><input id="ctg-kgd-${v.id}" type="number" step="0.01" class="input text-sm" style="width:130px" placeholder="Kg desc." value="${v.kgDescarga||''}"/></td>
                  <td class="px-3 py-2 text-right whitespace-nowrap">
                    <button class="btn btn-primary text-xs" onclick='ctgGuardar(${JSON.stringify(v.id)})'>✓ Guardar</button>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>` : '<div class="stub-card">No hay viajes en estado "Cargado" con CTG cargado. Cargá el CTG en cada viaje desde "Editar viaje".</div>'}`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`
  });
}

// Si ARCA no está configurado, ofrecemos ir a configurarlo en vez de fallar mudo.
function _arcaCheckOConfig() {
  if (state._arcaEstado?.configurado) return true;
  if (confirm('ARCA no está configurado para esta empresa.\n\n¿Querés ir a Configuración → ARCA para cargar el certificado ahora?')) {
    closeModal();
    state.configTab = 'arca';
    go('configuracion');
  }
  return false;
}
async function ctgConsultarUno(viajeId) {
  if (!_arcaCheckOConfig()) return;
  try {
    const r = await api('/api/empresas/'+state.companyId+'/arca/consultar-ctg', { method:'POST', body: JSON.stringify({ viajeIds: [viajeId] }) });
    const res = (r.data || [])[0];
    if (!res) return toast('Sin respuesta de ARCA','warn');
    _ctgAplicar(res);
    if (res.error)            toast('ARCA: ' + res.error, 'error');
    else if (res.kgRecibidos) toast(`CTG ${res.ctg}: ${fmtN(res.kgRecibidos)} kg recibidos`, 'success');
    else                      toast(`CTG ${res.ctg}: ${res.estadoDescripcion || 'consultado'} (ARCA no devolvió kg)`, 'warn');
  } catch (e) { toast(e.message,'error'); }
}
async function ctgConsultarTodos() {
  const viajes = state._ctgViajes || [];
  if (!viajes.length) return;
  if (!_arcaCheckOConfig()) return;
  try {
    toast('Consultando '+viajes.length+' CTG'+(viajes.length===1?'':'s')+' en ARCA…','info');
    const r = await api('/api/empresas/'+state.companyId+'/arca/consultar-ctg', { method:'POST', body: JSON.stringify({ viajeIds: viajes.map(v=>v.id) }) });
    const list = r.data || [];
    list.forEach(_ctgAplicar);
    const ok = list.filter(x => !x.error).length;
    const er = list.length - ok;
    toast(`Consulta terminada: ${ok} OK${er?` · ${er} con error (mirá el badge rojo)`:''}.`, er?'warn':'success');
  } catch (e) { toast(e.message,'error'); }
}
function _ctgAplicar(res) {
  const kgEl  = $('#ctg-kgd-'+res.viajeId);
  const estEl = $('#ctg-est-'+res.viajeId);
  if (res.error) {
    if (estEl) estEl.innerHTML = `<span class="badge badge-red text-[10px]" title="${esc(res.error)}">⚠ Error</span>`;
    return;
  }
  if (kgEl && res.kgRecibidos) kgEl.value = res.kgRecibidos;
  if (estEl) {
    const cls = (res.estado === 'AC' || /aceptad/i.test(res.estadoDescripcion||'')) ? 'badge-green'
              : (res.estado === 'RE' || /rechaz/i.test(res.estadoDescripcion||'')) ? 'badge-red'
              : 'badge-yellow';
    estEl.innerHTML = `<span class="badge ${cls} text-[10px]">${esc(res.estadoDescripcion || res.estado || 'OK')}</span>`;
  }
}
async function ctgGuardar(viajeId) {
  const kgd = Number(($('#ctg-kgd-'+viajeId)?.value) || 0);
  if (!kgd || kgd <= 0) return toast('Ingresá los kg descargados','warn');
  try {
    await api('/api/viajes/'+viajeId, { method:'PUT', body: JSON.stringify({ kgDescarga: kgd, estado: 'descargado' }) });
    toast('Viaje marcado como descargado','success');
    const row = $('#ctg-row-'+viajeId);
    if (row) row.remove();
    delete state.cache.viajes;
  } catch (e) { toast(e.message,'error'); }
}

// Emoji por producto (default 🌾 para todo lo demás).
function _emojiProducto(p) {
  const x = String(p || '').toLowerCase();
  if (x.includes('maíz') || x.includes('maiz')) return '🌽';
  if (x.includes('girasol'))                    return '🌻';
  if (x.includes('soja'))                       return '🫘';
  if (x.includes('trigo') || x.includes('sorgo') || x.includes('cebada') || x.includes('avena')) return '🌾';
  return '🌾';
}

function solicitarCamionEnviar() {
  const get = (id) => ($('#'+id)?.value || '').trim();
  const fmtMonto = (v) => '$ ' + Number(v).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const prod = get('sc-prod');
  const ori  = get('sc-ori');
  const des  = get('sc-des');
  const dis  = get('sc-dis');
  const tar  = get('sc-tar');
  const fec  = get('sc-fec');
  const cant = get('sc-cant');
  const cupo = get('sc-cupo');
  const tipo = get('sc-tipo');
  const extra= get('sc-extra');

  // Si no completó nada, avisamos.
  if (![prod,ori,des,dis,tar,fec,cant,cupo,tipo,extra].some(v=>v)) {
    return toast('Completá al menos un campo','warn');
  }

  const lineas = [];
  // 🔴 Necesito camiones para Maíz 🌽
  if (prod) lineas.push(`🔴 Necesito camiones para *${prod}* ${_emojiProducto(prod)}`);
  // 📍 Zona Juan Llerena → Rosario
  if (ori && des)      lineas.push(`📍 ${ori} → ${des}`);
  else if (ori)        lineas.push(`📍 Origen: ${ori}`);
  else if (des)        lineas.push(`📍 Destino: ${des}`);
  if (dis)             lineas.push(`📏 Distancia: ${dis} km`);
  if (tar)             lineas.push(`💲 Tarifa ${fmtMonto(tar)} / ton`);
  if (fec)             lineas.push(`📅 Fecha de carga: ${fmtDate(fec)}`);
  if (cant)            lineas.push(`🔢 Cantidad: ${cant} camion${cant=='1'?'':'es'}`);
  if (cupo)            lineas.push(`📆 Fecha de cupo: ${fmtDate(cupo)}`);
  if (tipo)            lineas.push(`🚛 Camión: ${tipo}`);
  if (extra)           lineas.push(`ℹ️ ${extra}`);

  const empresa = nombreEmpresaActiva();
  const mensaje = lineas.join('\n') + `\n\n— Solicitado por *${empresa}* (vía AgroCore). Gracias!`;
  const s = state.settings || {};
  openWhatsApp(s.logisticaTelefono, mensaje);
  closeModal();
}

  if (!f) return;
  if (f.size > 2 * 1024 * 1024) return toast('Foto muy grande (máx 2 MB)','warn');
  const reader = new FileReader();
  reader.onload = e => {
    $('#f-fotoUrl').value = e.target.result;
    $('#f-foto-preview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover"/>`;
  };
  reader.readAsDataURL(f);
}

const EMP_MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function empMesLabel(p){ if(!p) return ''; const [y,m]=String(p).split('-'); return `${EMP_MESES[Number(m)-1]||m} ${y}`; }
function empPeriodoHoy(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

// Abre la ficha de un empleado: trae sus movimientos y liquidaciones y la dibuja.
// push=true cuando es una navegación real (clic en un empleado): empuja una
// entrada al historial del navegador para que el botón Atrás vuelva a la nómina.
// push=false para los re-render internos (después de guardar) y para el popstate.
async function empleAbrir(id, push=true) {
  state.empFichaId = id;
  if (push) {
    history.pushState({ page:'empleados', empFichaId:id }, '', '#/empleados');
  }
  setHeader('Planilla de empleado', 'Gastos, ganancias y liquidación de sueldo');
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando planilla…</div>`;
  let emp, movs=[], liqs=[];
  try {
    if (!state.cache.empleados) await crudList('empleados');
    emp = (state.cache.empleados||[]).find(x=>x.id===id);
    if (!emp) { await crudList('empleados'); emp=(state.cache.empleados||[]).find(x=>x.id===id); }
    if (!emp) { toast('Empleado no encontrado','error'); return pages.empleados(); }
    movs = (await api('/api/empleados/'+id+'/movimientos')).data || [];
    liqs = (await api('/api/empleados/'+id+'/liquidaciones')).data || [];
  } catch (e) { return toast(e.message,'error'); }
  state.empFicha = { emp, movs, liqs };
  // Al abrir la ficha (navegación real) arrancamos en el mes más reciente con
  // datos; en los re-render internos respetamos el mes que el usuario eligió.
  if (push) {
    const periodos = [...movs.map(m=>m.periodo), ...liqs.map(l=>l.periodo), empPeriodoHoy()].filter(Boolean);
    state.empMes = periodos.sort().reverse()[0];
  }
  empFichaRender();
}
function empleVolver(){ history.back(); }
function empSetMes(p){ state.empMes = p || empPeriodoHoy(); empFichaRender(); }

function empFichaRender() {
  if (!state.empFicha) return;
  const { emp, movs, liqs } = state.empFicha;
  const empId = emp.id;

  if (!state.empMes) state.empMes = empPeriodoHoy();
  const mes = state.empMes;

  const movsMes = movs.filter(m=>m.periodo===mes)
                      .sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const liq = liqs.find(l=>l.periodo===mes) || null;

  // Sueldo base automático del mes (salvo que ya haya un movimiento "sueldo").
  const haySueldoMov = movsMes.some(m=>m.categoria==='sueldo');
  const sueldoBase = (!haySueldoMov && Number(emp.sueldo||0)>0) ? Number(emp.sueldo) : 0;

  const gananciasMov = movsMes.filter(m=>m.tipo==='ganancia').reduce((a,m)=>a+Number(m.monto||0),0);
  const gastos       = movsMes.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+Number(m.monto||0),0);
  const ganancias    = gananciasMov + sueldoBase;
  const neto         = ganancias - gastos;

  const canC = can('rrhh:create')||can('finanzas:create');
  const canU = can('rrhh:update')||can('finanzas:update');
  const canD = can('rrhh:delete')||can('finanzas:delete');

  const iniciales = `${(emp.apellido||'?').slice(0,1)}${(emp.nombre||'?').slice(0,1)}`.toUpperCase();

  // --- Filas de la planilla del mes ---
  let filas = '';
  if (sueldoBase>0) {
    filas += `<tr class="bg-emerald-50/60">
      <td class="px-3 py-2 text-slate-400 text-xs whitespace-nowrap">—</td>
      <td class="px-3 py-2"><span class="badge badge-green">Ganancia</span></td>
      <td class="px-3 py-2 text-slate-600">Sueldo</td>
      <td class="px-3 py-2 font-semibold text-slate-800">Sueldo base <span class="text-[11px] text-slate-400 font-normal">(automático)</span></td>
      <td class="px-3 py-2 text-right whitespace-nowrap text-emerald-600 font-semibold">+${fmt$(sueldoBase)}</td>
      <td class="px-3 py-2 text-right text-[11px] text-slate-400">de la ficha</td>
    </tr>`;
  }
  filas += movsMes.map(m=>{
    const esGan = m.tipo==='ganancia';
    const montoCell = esGan
      ? `<span class="text-emerald-600 font-semibold">+${fmt$(m.monto)}</span>`
      : `<span class="text-red-600 font-semibold">-${fmt$(m.monto)}</span>`;
    const detHoras = (m.categoria==='horas' && m.horas)
      ? `<span class="text-[11px] text-slate-400 font-normal"> · ${m.horas} h × ${fmt$(m.valorHora||0)}</span>` : '';
    return `<tr class="hover:bg-slate-50">
      <td class="px-3 py-2 whitespace-nowrap text-slate-600">${m.fecha?fmtDate(m.fecha):'—'}</td>
      <td class="px-3 py-2">${esGan?'<span class="badge badge-green">Ganancia</span>':'<span class="badge badge-red">Gasto</span>'}</td>
      <td class="px-3 py-2 text-slate-600">${esc(empCatLabel(m.categoria))}</td>
      <td class="px-3 py-2 font-semibold text-slate-800">${esc(m.concepto||'')}${detHoras}${m.observaciones?`<br><span class="text-[11px] text-slate-400 font-normal">${esc(m.observaciones)}</span>`:''}</td>
      <td class="px-3 py-2 text-right whitespace-nowrap">${montoCell}</td>
      <td class="px-3 py-2 text-right whitespace-nowrap">
        ${canU?`<button class="btn btn-ghost text-xs" onclick='empMovForm(${JSON.stringify(m.id)})'>✏️</button>`:''}
        ${canD?`<button class="btn btn-ghost text-xs text-red-600" onclick='empMovDel(${JSON.stringify(m.id)})'>🗑️</button>`:''}
      </td>
    </tr>`;
  }).join('');
  if (!filas) filas = `<tr><td colspan="6" class="text-center text-slate-400 py-8">Sin movimientos en ${empMesLabel(mes)}. Agregá adelantos, horas, compras…</td></tr>`;

  // --- Caja de liquidación del mes seleccionado ---
  let cajaLiq;
  if (liq) {
    const detalle = liq.medioPago==='efectivo' ? `Efectivo · caja ${esc(liq.caja||'—')}`
      : liq.medioPago==='cheque' ? `Cheque propio N° ${esc(liq.nroCheque||'—')}${liq.banco?` · ${esc(liq.banco)}`:''}`
      : `Transferencia${liq.banco?` · ${esc(liq.banco)}`:''}${liq.referencia?` · ${esc(liq.referencia)}`:''}`;
    cajaLiq = `<div class="kpi" style="background:linear-gradient(135deg,#047857,#065f46);border:none;">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <div class="text-xs uppercase tracking-wider" style="color:#a7f3d0">✅ Sueldo liquidado · ${empMesLabel(mes)}</div>
          <div class="text-2xl font-extrabold text-white mt-0.5">${fmt$(liq.neto)}</div>
          <div class="text-xs mt-1" style="color:#d1fae5">${detalle} · ${liq.fecha?fmtDate(liq.fecha):''}</div>
        </div>
        ${canD?`<button class="btn btn-secondary text-xs" onclick='empLiqAnular(${JSON.stringify(liq.id)})'>Anular liquidación</button>`:''}
      </div>
    </div>`;
  } else {
    cajaLiq = `<div class="kpi">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <div class="text-xs text-slate-500">Neto a liquidar · ${empMesLabel(mes)}</div>
          <div class="text-2xl font-extrabold mt-0.5 ${neto>=0?'text-emerald-700':'text-red-600'}">${fmt$(neto)}</div>
          <div class="text-xs text-slate-400 mt-1">Ganancias ${fmt$(ganancias)} − Gastos ${fmt$(gastos)}</div>
        </div>
        ${canC?`<button class="btn btn-primary" onclick='empLiqForm(${JSON.stringify(mes)})'>💵 Liquidar sueldo</button>`:''}
      </div>
    </div>`;
  }

  // --- Historial de liquidaciones ---
  const histLiq = liqs.slice().sort((a,b)=>b.periodo.localeCompare(a.periodo));
  const histHtml = histLiq.length ? `
    <div class="mt-6">
      <h3 class="font-semibold text-slate-800 mb-2">Historial de liquidaciones</h3>
      <div class="overflow-x-auto border border-slate-200 rounded-lg">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 text-slate-600"><tr>
            <th class="text-left px-3 py-2">Mes</th>
            <th class="text-left px-3 py-2">Fecha pago</th>
            <th class="text-left px-3 py-2">Medio</th>
            <th class="text-right px-3 py-2">Ganancias</th>
            <th class="text-right px-3 py-2">Gastos</th>
            <th class="text-right px-3 py-2">Neto pagado</th>
            <th class="px-3 py-2"></th>
          </tr></thead>
          <tbody class="divide-y divide-slate-200">
            ${histLiq.map(l=>`<tr class="hover:bg-slate-50 cursor-pointer" onclick='empSetMes(${JSON.stringify(l.periodo)})'>
              <td class="px-3 py-2 font-semibold text-slate-800">${empMesLabel(l.periodo)}</td>
              <td class="px-3 py-2 text-slate-600">${l.fecha?fmtDate(l.fecha):'—'}</td>
              <td class="px-3 py-2 text-slate-600 capitalize">${esc(l.medioPago||'')}</td>
              <td class="px-3 py-2 text-right text-emerald-700">${fmt$(l.totalGanancias)}</td>
              <td class="px-3 py-2 text-right text-red-600">${fmt$(l.totalGastos)}</td>
              <td class="px-3 py-2 text-right font-bold text-slate-800">${fmt$(l.neto)}</td>
              <td class="px-3 py-2 text-right">${canD?`<button class="btn btn-ghost text-xs text-red-600" onclick='event.stopPropagation();empLiqAnular(${JSON.stringify(l.id)})'>Anular</button>`:''}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>` : '';

  // --- Resumen anual (año del mes seleccionado) ---
  const anio = String(mes).slice(0,4);
  const liqsAnio = liqs.filter(l=>String(l.periodo).startsWith(anio+'-'));
  const totalLiqAnio   = liqsAnio.reduce((a,l)=>a+Number(l.neto||0),0);
  const totalGanAnio   = liqsAnio.reduce((a,l)=>a+Number(l.totalGanancias||0),0);
  const totalGastoAnio = liqsAnio.reduce((a,l)=>a+Number(l.totalGastos||0),0);
  const promedioAnio   = liqsAnio.length ? totalLiqAnio/liqsAnio.length : 0;
  const resumenAnioHtml = `
    <div class="mt-6">
      <h3 class="font-semibold text-slate-800 mb-2">Resumen anual ${anio}</h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
        <div class="kpi"><div class="text-xs text-slate-500">Total liquidado ${anio}</div><div class="text-xl font-bold mt-1 text-emerald-700">${fmt$(totalLiqAnio)}</div></div>
        <div class="kpi"><div class="text-xs text-slate-500">Meses liquidados</div><div class="text-xl font-bold mt-1">${liqsAnio.length} / 12</div></div>
        <div class="kpi"><div class="text-xs text-slate-500">Promedio mensual</div><div class="text-xl font-bold mt-1">${fmt$(promedioAnio)}</div></div>
        <div class="kpi"><div class="text-xs text-slate-500">Ganancias / Gastos del año</div><div class="text-sm font-bold mt-1.5"><span class="text-emerald-700">${fmt$(totalGanAnio)}</span> <span class="text-slate-400">/</span> <span class="text-red-600">${fmt$(totalGastoAnio)}</span></div></div>
      </div>
      <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
        ${Array.from({length:12},(_,i)=>{
          const p = anio+'-'+String(i+1).padStart(2,'0');
          const l = liqsAnio.find(x=>x.periodo===p);
          return `<button class="kpi text-left ${p===mes?'ring-2 ring-green-600':''}" style="cursor:pointer" onclick='empSetMes(${JSON.stringify(p)})'>
            <div class="text-xs text-slate-500">${EMP_MESES[i].slice(0,3)}</div>
            <div class="text-sm font-bold mt-0.5 ${l?'text-emerald-700':'text-slate-300'}">${l?fmt$(l.neto):'—'}</div>
          </button>`;
        }).join('')}
      </div>
    </div>`;

  $('#page-body').innerHTML = `
    <button class="btn btn-ghost text-sm mb-3" onclick="empleVolver()">← Volver a la nómina</button>

    <div class="kpi mb-4">
      <div class="flex items-center gap-4 flex-wrap">
        ${emp.fotoUrl
          ? `<img src="${esc(emp.fotoUrl)}" class="w-16 h-16 rounded-full object-cover border border-slate-200"/>`
          : `<div class="w-16 h-16 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600 text-xl">${esc(iniciales)}</div>`}
        <div class="flex-1 min-w-[180px]">
          <div class="text-lg font-bold text-slate-800">${esc(emp.apellido)}, ${esc(emp.nombre)}</div>
          <div class="text-sm text-slate-500">${esc(emp.puesto||'Sin puesto')}${emp.dni?` · DNI ${esc(emp.dni)}`:''}</div>
        </div>
        <div class="text-right">
          <div class="text-xs text-slate-500">Sueldo base</div>
          <div class="text-lg font-bold text-slate-800">${emp.sueldo?fmt$(emp.sueldo):'— sin cargar —'}</div>
        </div>
        ${canU?`<button class="btn btn-secondary text-xs" onclick='empleForm(${JSON.stringify(empId)})'>Editar datos</button>`:''}
      </div>
    </div>

    <div class="flex items-end gap-3 flex-wrap mb-3">
      <div>
        <label class="label">Mes / año</label>
        <input type="month" class="input" value="${mes}" onchange="empSetMes(this.value)"/>
      </div>
      <div class="text-xs text-slate-400 pb-2">${empMesLabel(mes)}</div>
      <div class="flex-1"></div>
      <button class="btn btn-secondary" onclick="empExportXLSX()" title="Descargar la planilla del mes en Excel">📊 Excel</button>
      <button class="btn btn-secondary" onclick="empReciboPDF()" title="Recibo imprimible para entregar al empleado">🖨️ Recibo PDF</button>
      ${canC?`<button class="btn btn-primary" onclick="empMovForm()">+ Agregar movimiento</button>`:''}
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Ganancias del mes</div><div class="text-xl font-bold mt-1 text-emerald-700">${fmt$(ganancias)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Gastos del mes</div><div class="text-xl font-bold mt-1 text-red-600">${fmt$(gastos)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Neto</div><div class="text-xl font-bold mt-1 ${neto>=0?'text-slate-800':'text-red-600'}">${fmt$(neto)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Estado</div><div class="mt-1.5">${liq?'<span class="badge badge-green">Liquidado</span>':'<span class="badge badge-gray">Pendiente</span>'}</div></div>
    </div>

    <div class="overflow-x-auto border border-slate-200 rounded-lg mb-4">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-50 text-slate-600"><tr>
          <th class="text-left px-3 py-2">Fecha</th>
          <th class="text-left px-3 py-2">Tipo</th>
          <th class="text-left px-3 py-2">Categoría</th>
          <th class="text-left px-3 py-2">Concepto</th>
          <th class="text-right px-3 py-2">Monto</th>
          <th class="px-3 py-2"></th>
        </tr></thead>
        <tbody class="divide-y divide-slate-200">${filas}</tbody>
      </table>
    </div>

    ${cajaLiq}
    ${liq?`<p class="text-xs text-slate-400 mt-2">La liquidación es una foto del momento en que se hizo. Si cargás más movimientos en este mes, anulá y volvé a liquidar para reflejarlos.</p>`:''}
    ${resumenAnioHtml}
    ${histHtml}`;
}

// Opciones de categoría según el tipo de movimiento.
function empMovCatOptions(tipo, sel){
  const opts = tipo==='gasto'
    ? [['adelanto','Adelanto de dinero'],['compra','Compra / cosa personal'],['descuento','Descuento'],['otro','Otro gasto']]
    : [['horas','Horas trabajadas'],['sueldo','Sueldo'],['premio','Premio / bono'],['otro','Otro ingreso']];
  return opts.map(([v,l])=>`<option value="${v}" ${v===sel?'selected':''}>${l}</option>`).join('');
}

function empMovForm(movId=null){
  const movs = (state.empFicha&&state.empFicha.movs)||[];
  const it = movId ? (movs.find(m=>m.id===movId)||{}) : {};
  const tipo = it.tipo || 'gasto';
  const cat  = it.categoria || (tipo==='gasto'?'adelanto':'horas');
  let fechaStr;
  if (it.fecha) fechaStr = new Date(it.fecha).toISOString().slice(0,10);
  else {
    const hoy = new Date().toISOString().slice(0,10);
    fechaStr = (hoy.slice(0,7)===state.empMes) ? hoy : (state.empMes+'-01');
  }
  openModal({
    title: movId?'Editar movimiento':'Agregar movimiento a la planilla',
    body: `
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Fecha *</label><input id="m-fecha" class="input" type="date" value="${fechaStr}"/></div>
        <div><label class="label">Tipo *</label>
          <select id="m-tipo" class="input" onchange="empMovTipoChange()">
            <option value="ganancia" ${tipo==='ganancia'?'selected':''}>Ganancia (le suma al sueldo)</option>
            <option value="gasto" ${tipo==='gasto'?'selected':''}>Gasto (le resta al sueldo)</option>
          </select>
        </div>
        <div><label class="label">Categoría *</label>
          <select id="m-cat" class="input" onchange="empMovCatChange()">${empMovCatOptions(tipo,cat)}</select>
        </div>
        <div id="m-monto-wrap"><label class="label">Monto *</label><input id="m-monto" class="input" type="number" step="0.01" min="0" value="${it.monto||''}"/></div>
        <div id="m-horas-wrap" class="col-span-2 grid grid-cols-3 gap-3" style="display:none">
          <div><label class="label">Horas *</label><input id="m-horas" class="input" type="number" step="0.5" min="0" value="${it.horas||''}" oninput="empMovCalcHoras()"/></div>
          <div><label class="label">Valor por hora *</label><input id="m-vh" class="input" type="number" step="0.01" min="0" value="${it.valorHora||''}" oninput="empMovCalcHoras()"/></div>
          <div><label class="label">Total</label><div id="m-montoCalc" class="input bg-slate-50 font-semibold flex items-center">${fmt$((it.horas||0)*(it.valorHora||0))}</div></div>
        </div>
        <div class="col-span-2"><label class="label">Concepto *</label><input id="m-con" class="input" value="${esc(it.concepto||'')}" placeholder="Ej: adelanto quincena, horas extra cosecha, zapatillas…"/></div>
        <div class="col-span-2"><label class="label">Observaciones</label><textarea id="m-obs" class="input" rows="2">${esc(it.observaciones||'')}</textarea></div>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick='empMovSave(${JSON.stringify(movId)})'>${movId?'Guardar':'Agregar'}</button>`
  });
  empMovCatChange();
}
function empMovTipoChange(){
  const tipo=$('#m-tipo').value;
  $('#m-cat').innerHTML = empMovCatOptions(tipo,'');
  empMovCatChange();
}
function empMovCatChange(){
  const esHoras = $('#m-cat').value==='horas';
  $('#m-horas-wrap').style.display = esHoras?'grid':'none';
  $('#m-monto-wrap').style.display = esHoras?'none':'';
  if (esHoras) empMovCalcHoras();
}
function empMovCalcHoras(){
  const h=Number($('#m-horas').value||0), v=Number($('#m-vh').value||0);
  const t=h*v;
  $('#m-monto').value = t||'';
  if($('#m-montoCalc')) $('#m-montoCalc').textContent = fmt$(t);
}
async function empMovSave(movId){
  const empId = state.empFichaId;
  const tipo = $('#m-tipo').value;
  const cat  = $('#m-cat').value;
  const data = {
    fecha: $('#m-fecha').value,
    tipo,
    categoria: cat||null,
    concepto: $('#m-con').value.trim(),
    monto: Number($('#m-monto').value||0),
    horas: cat==='horas' ? Number($('#m-horas').value||0) : null,
    valorHora: cat==='horas' ? Number($('#m-vh').value||0) : null,
    observaciones: $('#m-obs').value.trim()||null,
  };
  if (!data.fecha)    return toast('Fecha requerida','warn');
  if (!data.concepto) return toast('Concepto requerido','warn');
  if (!data.monto || data.monto<=0) return toast('Ingresá un monto mayor a cero','warn');
  try {
    await api('/api/empleados/'+empId+'/movimientos'+(movId?'/'+movId:''),
      {method:movId?'PUT':'POST',body:JSON.stringify(data)});
    toast(movId?'Actualizado':'Agregado','success'); closeModal();
    state.empMes = (data.fecha||'').slice(0,7) || state.empMes;
    await empleAbrir(empId);
  } catch (e) { toast(e.message,'error'); }
}
async function empMovDel(movId){
  if(!confirm('¿Borrar este movimiento de la planilla?')) return;
  const empId=state.empFichaId;
  try{
    await api('/api/empleados/'+empId+'/movimientos/'+movId,{method:'DELETE'});
    toast('Borrado','success'); await empleAbrir(empId);
  }catch(e){ toast(e.message,'error'); }
}

function empLiqForm(periodo){
  const {emp,movs}=state.empFicha;
  const movsMes=movs.filter(m=>m.periodo===periodo);
  const haySueldoMov=movsMes.some(m=>m.categoria==='sueldo');
  const sueldoBase=(!haySueldoMov&&Number(emp.sueldo||0)>0)?Number(emp.sueldo):0;
  const ganMov=movsMes.filter(m=>m.tipo==='ganancia').reduce((a,m)=>a+Number(m.monto||0),0);
  const gastos=movsMes.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+Number(m.monto||0),0);
  const ganancias=ganMov+sueldoBase;
  const neto=ganancias-gastos;
  const hoy=new Date().toISOString().slice(0,10);
  openModal({
    title:'Liquidar sueldo · '+empMesLabel(periodo),
    body:`
      <div class="kpi mb-3" style="background:linear-gradient(135deg,#047857,#065f46);border:none;">
        <div class="text-xs uppercase tracking-wider" style="color:#a7f3d0">Neto a pagar</div>
        <div class="text-3xl font-extrabold text-white mt-0.5">${fmt$(neto)}</div>
        <div class="text-xs mt-1" style="color:#d1fae5">Ganancias ${fmt$(ganancias)}${sueldoBase>0?` (incluye sueldo base ${fmt$(sueldoBase)})`:''} − Gastos ${fmt$(gastos)}</div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Fecha de pago *</label><input id="lq-fecha" class="input" type="date" value="${hoy}"/></div>
        <div><label class="label">Medio de pago *</label>
          <select id="lq-medio" class="input" onchange="empLiqMedioChange()">
            <option value="efectivo">Efectivo en caja</option>
            <option value="cheque">Cheque propio</option>
            <option value="transferencia">Transferencia bancaria</option>
          </select>
        </div>
        <div id="lq-caja-wrap"><label class="label">Caja *</label>${catSelect('lq-caja','Caja','',{placeholder:'— Elegir caja —'})}</div>
        <div id="lq-banco-wrap"><label class="label">Banco</label><input id="lq-banco" class="input" placeholder="Ej: Banco Nación"/></div>
        <div id="lq-cheque-wrap"><label class="label">N° de cheque *</label><input id="lq-cheque" class="input"/></div>
        <div id="lq-ref-wrap"><label class="label">N° operación / comprobante</label><input id="lq-ref" class="input"/></div>
        <div class="col-span-2"><label class="label">Observaciones</label><textarea id="lq-obs" class="input" rows="2"></textarea></div>
      </div>

    footer:`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick='empLiqSave(${JSON.stringify(periodo)})'>Confirmar liquidación</button>`
  });
