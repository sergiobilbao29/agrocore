<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#15803d" />
<link rel="icon" type="image/png" sizes="32x32" href="/web/img/favicon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/web/img/apple-touch-icon.png" />
<!-- PWA: instalable y con soporte offline -->
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AgroCore" />
<title>AgroCore Argentina — El corazón del negocio agrícola</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- SheetJS (Excel export) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- jsPDF + autoTable (PDF export con tablas) -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --green-900:#14532d; --green-700:#15803d; --green-600:#16a34a;
    --green-500:#22c55e; --green-100:#dcfce7; --green-50:#f0fdf4;
    --earth-700:#78350f; --earth-500:#b45309;
  }
  html,body{height:100%;margin:0;overflow:hidden;}
  /* Dynamic viewport height para mobile: respeta la barra del navegador que aparece/desaparece */
  #view-app{ height: 100vh; height: 100dvh; }
  body{font-family:'Inter','Segoe UI',sans-serif; background:#f8fafc;}
  .sidebar-scroll::-webkit-scrollbar{width:6px;}
  .sidebar-scroll::-webkit-scrollbar-track{background:transparent;}
  .sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px;}
  .sidebar-scroll::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.32);}
  .sidebar-scroll{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.25) transparent;}
  #page-scroll::-webkit-scrollbar{width:10px;}
  #page-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:5px;}
  #page-scroll::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
  #page-scroll{scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent;}
  .brand-grad{background:linear-gradient(135deg,#14532d 0%,#15803d 50%,#b45309 100%);}
  .sidebar-link{transition:all .15s ease;}
  .sidebar-link:hover{background:rgba(255,255,255,.08);}
  .sidebar-link.active{background:rgba(255,255,255,.18); border-left:4px solid var(--company-color, #22c55e);}
  .table-row:hover{background:#f0fdf4;}
  .modal-backdrop{background:rgba(15,23,42,.5);}
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;}
  .badge-green{background:#dcfce7;color:#14532d;}
  .badge-red{background:#fee2e2;color:#991b1b;}
  .badge-yellow{background:#fef3c7;color:#92400e;}
  .badge-blue{background:#dbeafe;color:#1e40af;}
  .badge-gray{background:#e5e7eb;color:#374151;}
  .kpi{
    background:white; border-radius:12px; padding:16px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
    border-top:3px solid var(--company-tint-2, transparent);
  }
  input,select,textarea{outline:none;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-weight:600;font-size:14px;transition:all .15s;cursor:pointer;border:none;}
  .btn-primary{background:#15803d;color:white;} .btn-primary:hover{background:#14532d;}
  .btn-secondary{background:#e5e7eb;color:#374151;} .btn-secondary:hover{background:#d1d5db;}
  .btn-danger{background:#dc2626;color:white;} .btn-danger:hover{background:#991b1b;}
  .btn-ghost{background:transparent;color:#374151;} .btn-ghost:hover{background:#f3f4f6;}
  .fade-in{animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  #company-selector{ color:#fff; background-color:rgba(255,255,255,.10); }
  #company-selector option{ background:#fff; color:#0f172a; font-weight:500; }
  #company-selector option:checked{ background:#15803d; color:#fff; font-weight:700; }

  /* Banner cotizaciones BCR */
  #cot-banner{
    background:linear-gradient(90deg,#14532d 0%,#0f3f23 100%);
    color:#ecfdf5; border-bottom:1px solid #0b2e18;
    display:flex; align-items:stretch; overflow:hidden;
  }
  #cot-banner .cot-ticker{
    flex:1 1 auto; min-width:0; overflow:hidden; position:relative;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 32px, #000 calc(100% - 32px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 32px, #000 calc(100% - 32px), transparent 100%);
  }
  #cot-banner .cot-track{
    display:inline-flex; gap:22px; padding:4px 0; align-items:center;
    font-size:12px; white-space:nowrap; will-change:transform;
    animation: cot-scroll 60s linear infinite;
  }
  #cot-banner:hover .cot-track{ animation-play-state: paused; }
  @keyframes cot-scroll{ from{transform:translate3d(0,0,0);} to{transform:translate3d(-50%,0,0);} }
  #cot-banner .cot-item{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;padding-left:14px;}
  #cot-banner .cot-item .ico{font-size:13px;opacity:.9;}
  #cot-banner .cot-item .lbl{font-weight:700;letter-spacing:.3px;}
  #cot-banner .cot-item .val{font-variant-numeric:tabular-nums;color:#f8fafc;}
  #cot-banner .cot-item .trend{font-size:11px;margin-left:1px;font-weight:700;line-height:1;}
  #cot-banner .trend.up{color:#86efac;}   /* verde: subió respecto al anterior */
  #cot-banner .trend.down{color:#fca5a5;} /* rojo: bajó respecto al anterior */
  #cot-banner .trend.flat{color:#cbd5e1;} /* gris: sin cambio */
  #cot-banner .cot-meta{
    flex:0 0 auto; display:flex; align-items:center; gap:8px;
    padding:2px 10px 2px 12px; border-left:1px solid rgba(255,255,255,.18);
    background:#0f3f23; font-size:9.5px; line-height:1.15; color:#bbf7d0;
  }
  #cot-banner .cot-meta .src{font-weight:700; color:#fde68a; letter-spacing:.3px;}
  @media (max-width: 767px){
    #cot-banner .cot-track{font-size:10px; gap:14px;}
    #cot-banner .cot-item{padding-left:8px;}
    #cot-banner .cot-meta{padding:2px 6px 2px 8px; font-size:8.5px;}
    #cot-banner .cot-meta .cot-refresh{width:18px;height:18px;font-size:9px;}
  }
  #cot-banner .cot-refresh{
    background:transparent; border:1px solid rgba(255,255,255,.22);
    color:#fde68a; font-size:11px; width:22px; height:22px;
    border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .15s ease;
  }
  #cot-banner .cot-refresh:hover{ background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.4); }
  #cot-banner .cot-refresh.loading{ animation: cot-spin .9s linear infinite; }
  @keyframes cot-spin { to { transform: rotate(360deg); } }
  /* Botón Asesor — pill verde WhatsApp con icono */
  #cot-banner .cot-asesor-btn{
    display:inline-flex; align-items:center; gap:4px; height:22px;
    padding:0 9px 0 7px; border:none; border-radius:999px;
    background:linear-gradient(135deg,#25d366 0%,#128c7e 100%);
    color:#fff; font-size:10.5px; font-weight:700; letter-spacing:.2px;
    line-height:1; cursor:pointer; white-space:nowrap;
    box-shadow:0 1px 3px rgba(0,0,0,.25);
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
  }
  #cot-banner .cot-asesor-btn:hover{ transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.35); filter:brightness(1.08); }
  #cot-banner .cot-asesor-btn:active{ transform:translateY(0); }
  #cot-banner .cot-asesor-btn svg{ flex-shrink:0; }
  @media (max-width: 767px){
    #cot-banner .cot-asesor-btn{ height:18px; font-size:9.5px; padding:0 7px 0 6px; }
    #cot-banner .cot-asesor-btn svg{ width:10px; height:10px; }
  }

  /* Tinte de empresa */
  #page-scroll{
    background:
      radial-gradient(ellipse 100% 80% at 0% 0%,    var(--company-tint-2, transparent) 0%, transparent 70%),
      radial-gradient(ellipse  90% 75% at 100% 25%, var(--company-tint-3, transparent) 0%, transparent 70%),
      radial-gradient(ellipse 110% 90% at 40% 110%, var(--company-tint-1, transparent) 0%, transparent 70%),
      radial-gradient(ellipse  70% 60% at 100% 100%,var(--company-tint-4, transparent) 0%, transparent 70%),
      var(--company-tint-bg, #f8fafc);
    transition: background-color .3s ease;
  }
  .company-topbar{
    height:5px; flex-shrink:0;
    background: linear-gradient(90deg,
      var(--company-color, #15803d) 0%,
      color-mix(in srgb, var(--company-color, #15803d) 70%, black) 50%,
      var(--company-color, #15803d) 100%);
    box-shadow: 0 1px 4px rgba(0,0,0,.10);
    transition: all .3s ease;
  }
  /* Header superior con color corporativo intenso, matcheando el tono oscuro del hero */
  #view-app main > header{
    background: linear-gradient(135deg,
      color-mix(in srgb, var(--company-color, #15803d) 42%, #ffffff) 0%,
      color-mix(in srgb, var(--company-color, #15803d) 30%, #ffffff) 55%,
      color-mix(in srgb, var(--company-color, #15803d) 50%, #ffffff) 100%) !important;
    border-bottom: 2px solid color-mix(in srgb, var(--company-color, #15803d) 90%, black) !important;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.45),
      0 2px 8px rgba(15,23,42,.08);
    position: relative;
  }
  #view-app main > header::after{
    content: ""; position: absolute; left: 0; bottom: -2px; height: 4px; width: 120px;
    background: color-mix(in srgb, var(--company-color, #15803d) 75%, black);
    border-radius: 0 3px 3px 0;
  }
  #view-app main > header h2#page-title{
    color: #0f172a;
    letter-spacing: -0.01em; font-weight: 700;
  }
  #view-app main > header #page-sub{
    color: #334155; opacity: .85; font-weight: 500;
  }
  /* Ícono casita e iconos del header con un poco más de oscuridad para contrastar */
  #view-app main > header button{ color: color-mix(in srgb, var(--company-color, #15803d) 70%, black); }
  #view-app main > header input#global-search{
    background: rgba(255,255,255,.75);
    border-color: color-mix(in srgb, var(--company-color, #15803d) 35%, #ffffff);
  }
  #view-app main > header input#global-search:focus{
    background:#fff; border-color: var(--company-color,#15803d);
    outline: 2px solid color-mix(in srgb, var(--company-color, #15803d) 25%, transparent);
  }
  #company-watermark{
    position:fixed; right:18px; bottom:14px; pointer-events:none; z-index:5;
    font-family:'Inter','Segoe UI',sans-serif;
    font-weight:800; letter-spacing:.4px; text-transform:uppercase;
    font-size:11px; padding:4px 10px; border-radius:9999px;
    color: var(--company-color, #15803d);
    background: var(--company-tint-3, rgba(21,128,61,.08));
    border:1px solid var(--company-tint-2, rgba(21,128,61,.25));
    box-shadow:0 2px 8px rgba(0,0,0,.04);
    opacity:.85; display:flex; align-items:center; gap:6px;
  }
  #company-watermark.hidden{display:none;}
  @media (max-width: 767px){ #company-watermark{display:none;} }
  #company-watermark .dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--company-color, #15803d);
    box-shadow:0 0 0 3px var(--company-tint-3, rgba(21,128,61,.18));
  }
  .informal-badge{
    display:inline-flex; align-items:center; gap:4px;
    padding:2px 8px; border-radius:6px;
    font-size:10px; font-weight:700; letter-spacing:.4px;
    background:#fff1f2; color:#9f1239; border:1px solid #fecdd3;
  }
  table.data{width:100%;border-collapse:collapse;}
  @media (max-width: 1023px){
    /* Padding-bottom extra para que el último registro nunca quede pegado al borde de pantalla */
    #page-scroll{ padding-bottom: 80px; }
    .kpi { padding: 12px !important; }
    /* En mobile/tablet convertir los wrappers con overflow-hidden en scroll horizontal
       (así la tabla NO queda cortada sino que se puede arrastrar). */
    .kpi.overflow-hidden,
    .kpi.p-0.overflow-hidden,
    div.kpi[class*="overflow-hidden"] {
      overflow-x: auto !important;
      overflow-y: visible !important;
      -webkit-overflow-scrolling: touch;
    }
    table.data { font-size: 11.5px; min-width: max-content; }
    table.data th, table.data td { padding: 6px 8px !important; white-space: nowrap; }
    table.data td.wrap, table.data th.wrap { white-space: normal; }
    .modal-backdrop .bg-white { max-height: 95vh; margin: 4px; }
    .modal-backdrop .grid-cols-2 { grid-template-columns: 1fr !important; }
    .modal-backdrop .grid-cols-3 { grid-template-columns: 1fr !important; }
    .modal-backdrop .grid-cols-4 { grid-template-columns: repeat(2, 1fr) !important; }
    .modal-backdrop .col-span-2,
    .modal-backdrop .col-span-3,
    .modal-backdrop .col-span-4 { grid-column: span 1 / span 1 !important; }
  }
  table.data th{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#64748b;font-weight:600;}
  table.data td{padding:10px;border-bottom:1px solid #f1f5f9;font-size:13px;}
  .input{border:1px solid #cbd5e1;border-radius:8px;padding:8px 12px;font-size:14px;width:100%;}
  .input:focus{border-color:#15803d;box-shadow:0 0 0 3px rgba(21,128,61,.1);}
  .label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em;}
  .stub-card{background:white;border:2px dashed #cbd5e1;border-radius:12px;padding:32px;text-align:center;}
</style>
</head>
<body class="text-slate-800">

<!-- ========= LOGIN ========= -->
<div id="view-login" class="min-h-screen flex items-center justify-center brand-grad p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
    <div class="flex items-center gap-3 mb-6">
      <img src="/web/img/logo-icon-128.png" srcset="/web/img/logo-icon-128.png 1x, /web/img/logo-icon-256.png 2x" alt="AgroCore Argentina" class="w-14 h-14 object-contain"/>
      <div>
        <div class="flex items-baseline gap-1.5">
          <h1 class="text-2xl font-bold text-slate-900 leading-none">AgroCore</h1>
          <span class="text-[10px] font-bold text-amber-600 uppercase tracking-wider leading-none">Argentina</span>
        </div>
        <p class="text-xs text-slate-500 mt-1">El corazón del negocio agrícola</p>
      </div>
    </div>
    <h2 class="text-lg font-semibold mb-4">Iniciar sesión</h2>
    <div class="space-y-3">
      <div>
        <label class="label">Usuario</label>
        <input id="login-email" type="text" value="" autocomplete="username" placeholder="alias, nombre o email"
               class="input" onkeydown="if(event.key==='Enter') handleLogin()" />
        <div class="text-[10px] text-slate-400 mt-1">Podés ingresar con tu alias (ej. <code class="font-mono">sergio</code>), tu nombre o tu email.</div>
      </div>
      <div>
        <label class="label">Contraseña</label>
        <input id="login-pwd" type="password" value="" autocomplete="current-password"
               class="input" onkeydown="if(event.key==='Enter') handleLogin()" />
      </div>
      <label class="flex items-center gap-2 text-xs text-slate-600 select-none cursor-pointer">
        <input id="login-remember" type="checkbox" class="rounded border-slate-300" />
        Recordarme en este equipo
        <span class="text-[10px] text-slate-400">(si no, la sesión se cierra al cerrar el navegador)</span>
      </label>
      <div id="login-err" class="hidden text-xs text-red-600 bg-red-50 border border-red-200 rounded p-2"></div>
      <button onclick="handleLogin()" id="login-btn" class="w-full btn btn-primary justify-center mt-2">Ingresar →</button>
      <p id="login-demo-hint" class="text-[11px] text-slate-500 text-center mt-4 leading-relaxed hidden">
        <b>Usuarios de prueba:</b><br/>
        <span id="login-demo-admin" class="hidden"><span class="font-mono text-slate-700">Admin</span> / <span class="font-mono text-slate-700">admin123</span> (admin empresa)<br/></span>
        <span id="login-demo-super" class="hidden"><span class="font-mono text-slate-700">Super</span> / <span class="font-mono text-slate-700">super123</span> (super admin)</span>
      </p>
    </div>
  </div>
</div>

<!-- ========= APP ========= -->
<div id="company-watermark" class="hidden"><span class="dot"></span><span id="company-watermark-name">Empresa</span></div>
<div id="view-app" class="hidden h-screen flex overflow-hidden">

  <!-- Backdrop para cerrar sidebar en mobile/tablet -->
  <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden" onclick="toggleSidebar(false)"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 brand-grad text-white flex flex-col h-full flex-shrink-0 fixed lg:static inset-y-0 left-0 z-40 -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <div class="px-3 pt-3 pb-2 border-b border-white/10 flex-shrink-0">
      <div class="flex items-center gap-2 mb-2">
        <button type="button" onclick="go('inicio'); toggleSidebar(false)" title="Volver a Inicio"
                class="flex-1 flex items-center gap-2 hover:bg-white/10 rounded-md px-1 py-0.5 -mx-1 transition cursor-pointer min-w-0">
          <img src="/web/img/logo-white-96.png" srcset="/web/img/logo-white-96.png 1x, /web/img/logo-white-192.png 2x" alt="AgroCore Argentina" class="w-7 h-7 object-contain flex-shrink-0"/>
          <div class="text-left min-w-0 leading-tight">
            <div class="flex items-baseline gap-1">
              <div class="font-bold text-sm">AgroCore</div>
              <div class="text-[8px] font-bold text-amber-300 uppercase tracking-wider">AR</div>
            </div>
            <div class="text-[9px] opacity-60" id="brand-version">v0.2 · API</div>
          </div>
        </button>
        <button type="button" onclick="toggleSidebar(false)" class="lg:hidden text-white/80 hover:text-white p-1 rounded hover:bg-white/10" title="Cerrar menú">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <select id="company-selector" onchange="switchCompany(this.value)"
              title="Empresa activa"
              class="w-full bg-white/10 border border-white/20 rounded-md px-2 py-1 text-xs"></select>
    </div>
    <nav id="nav" class="flex-1 overflow-y-auto pb-2 text-sm sidebar-scroll"></nav>
    <div class="relative p-3 border-t border-white/10 flex-shrink-0">
      <button type="button" onclick="toggleUserMenu()"
              class="w-full flex items-center gap-2 text-left hover:bg-white/10 rounded-lg p-1 transition" title="Cuenta y sesión">
        <div id="user-avatar" class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold"></div>
        <div class="flex-1 min-w-0">
          <div id="user-name" class="text-sm font-medium truncate"></div>
          <div id="user-role" class="text-[10px] opacity-70"></div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-70 flex-shrink-0"><path d="m6 9 6-6 6 6"/><path d="m6 15 6 6 6-6"/></svg>
      </button>
      <div id="user-menu" class="hidden absolute left-3 right-3 bottom-[calc(100%-8px)] bg-white text-slate-800 rounded-lg shadow-2xl border border-slate-200 overflow-hidden z-40 text-sm">
        <button onclick="openMiCuenta()" class="w-full text-left px-3 py-2 hover:bg-slate-50 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Mi cuenta</span>
        </button>
        <button onclick="openCambiarEmpresa()" class="w-full text-left px-3 py-2 hover:bg-slate-50 flex items-center gap-2 border-t border-slate-100">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
          <span>Cambiar empresa</span>
        </button>
        <button onclick="cambiarUsuario()" class="w-full text-left px-3 py-2 hover:bg-slate-50 flex items-center gap-2 border-t border-slate-100">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
          <span>Cambiar de usuario</span>

<script>
/* =========================================================
 * AgroCore Web Client · API-native
 * Backend: http://localhost:3100
 * ========================================================= */
// API_BASE: si el HTML lo sirve un servidor web (http://localhost:3100/app, por LAN,
// por Cloudflare Tunnel, etc.) la API vive en el MISMO origen (evita CORS y mixed-content).
// Si el HTML se abre con file:// (sin servidor), asumimos localhost:3100.
const API_BASE = (location.protocol === 'http:' || location.protocol === 'https:')
  ? location.origin
  : 'http://localhost:3100';

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

/* ============================================================
 * AuthStore — guarda el token según el flag "Recordarme".
 *   - Por defecto: sessionStorage (muere al cerrar el navegador)
 *   - Si el usuario tildó "Recordarme": localStorage (persiste)
 * Lee de los dos storages al arrancar para no perder sesiones
 * viejas que ya estaban en localStorage.
 * ============================================================ */
const AuthStore = {
  isRemember() { return localStorage.getItem('ac.remember') === '1'; },
  setRemember(v) {
    if (v) localStorage.setItem('ac.remember', '1');
    else   localStorage.removeItem('ac.remember');
  },
  _store() { return this.isRemember() ? localStorage : sessionStorage; },
  getToken() {
    return sessionStorage.getItem('ac.token') || localStorage.getItem('ac.token');
  },
  setToken(t) {
    const a = this._store(), b = (a === localStorage) ? sessionStorage : localStorage;
    a.setItem('ac.token', t);
    b.removeItem('ac.token');
  },
  removeToken() {
    sessionStorage.removeItem('ac.token');
    localStorage.removeItem('ac.token');
  },
  getUserRaw() {
    return sessionStorage.getItem('ac.user') || localStorage.getItem('ac.user');
  },
  setUser(u) {
    try {
      const a = this._store(), b = (a === localStorage) ? sessionStorage : localStorage;
      a.setItem('ac.user', JSON.stringify(u));
      b.removeItem('ac.user');
    } catch {}
  },
  removeUser() {
    sessionStorage.removeItem('ac.user');
    localStorage.removeItem('ac.user');
  },
};

const state = {
  token: AuthStore.getToken() || null,
  user: null,
  companyId: localStorage.getItem('ac.companyId') || null,
  currentPage: 'inicio',
  cache: {},
};

/* ============================================================
 * IdleLogout — cierra sesión automáticamente después de 30 min
 * sin actividad. Se resetea con mouse, teclado, click o touch.
 * ============================================================ */
const IdleLogout = (() => {
  const TIMEOUT_MS = 30 * 60 * 1000; // 30 minutos
  let timer = null;
  let lastActivity = Date.now();
  function check() {
    const elapsed = Date.now() - lastActivity;
    if (elapsed >= TIMEOUT_MS) {
      if (state.token) {
        try { toast('Sesión cerrada por inactividad (30 min sin uso)'); } catch {}
        setTimeout(() => { try { logout(true); } catch {} }, 600);
      }
    } else {
      timer = setTimeout(check, TIMEOUT_MS - elapsed);
    }
  }
  function reset() {
    lastActivity = Date.now();
    if (timer) clearTimeout(timer);
    timer = setTimeout(check, TIMEOUT_MS);
  }
  function start() {
    if (IdleLogout._started) return;
    IdleLogout._started = true;
    ['mousemove','keydown','click','touchstart','scroll'].forEach(ev => {
      document.addEventListener(ev, reset, { passive: true });
    });
    reset();
  }
  return { start, reset };
})();

/* ============================================================
 * MODO OFFLINE — capa de sincronización
 * ------------------------------------------------------------
 * Permite cargar datos de Producción (campos, lotes, campañas,
 * insumos y labores) sin conexión. Los cambios se guardan en
 * IndexedDB y se sincronizan solos cuando vuelve la señal.
 * ============================================================ */
const OfflineSync = (() => {
  const DB_NAME = 'agrocore-offline', DB_VER = 1;
  let db = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      const r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = () => {
        const d = r.result;
        if (!d.objectStoreNames.contains('outbox'))   d.createObjectStore('outbox',   { keyPath: 'id', autoIncrement: true });
        if (!d.objectStoreNames.contains('apicache')) d.createObjectStore('apicache', { keyPath: 'key' });
      };
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }
  async function ready() { if (!db) db = await openDB(); return db; }
  function store(name, mode) { return db.transaction(name, mode).objectStore(name); }
  function wait(req) { return new Promise((res, rej) => { req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error); }); }

  function tempId() {
    const rnd = (crypto.randomUUID && crypto.randomUUID()) ||
      'xxxxxxxxxxxx'.replace(/x/g, () => (Math.random() * 16 | 0).toString(16));
    return 'tmp_' + rnd;
  }

  // ---- Caché de respuestas GET ----
  async function cacheGet(key, data) {
    await ready();
    try { await wait(store('apicache', 'readwrite').put({ key, data, ts: Date.now() })); } catch {}
  }
  async function readGet(key) {
    await ready();
    try { const row = await wait(store('apicache', 'readonly').get(key)); return row ? row.data : null; }
    catch { return null; }
  }

  // ---- Cola de cambios (outbox) ----
  async function enqueue(item) {
    await ready();
    return await wait(store('outbox', 'readwrite').add({ ...item, ts: Date.now() }));
  }
  async function pending() {
    await ready();
    try { return (await wait(store('outbox', 'readonly').getAll())) || []; }
    catch { return []; }
  }
  async function dequeue(id) {
    await ready();
    try { await wait(store('outbox', 'readwrite').delete(id)); } catch {}
  }
  async function pendingCount() { return (await pending()).length; }

  return { ready, tempId, cacheGet, readGet, enqueue, pending, dequeue, pendingCount };
})();

// Endpoints cuyos GET conviene cachear para poder usarlos sin conexión.
const CACHEABLE_GET = ['/api/campos', '/api/lotes', '/api/campanas', '/api/catalogos', '/api/aplicaciones'];
// Endpoints cuyas mutaciones se pueden encolar offline (Producción).
const QUEUEABLE = ['/api/campos', '/api/lotes', '/api/campanas', '/api/aplicaciones'];

function cacheKeyFor(path) { return (state.companyId || 'nc') + '|' + path; }
function isCacheable(path) { return CACHEABLE_GET.some((p) => path === p || path.startsWith(p + '?')); }
function isQueueable(path) { return QUEUEABLE.some((p) => path === p || path.startsWith(p + '/')); }
// Un error de red: el navegador está offline o fetch lanzó TypeError.
function isNetworkError(e) { return !navigator.onLine || (e instanceof TypeError); }

/* ------------ API helper (offline-aware) ------------ */
async function api(path, opts = {}) {
  const method = (opts.method || 'GET').toUpperCase();
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  if (state.companyId && !headers['X-Company-Id']) headers['X-Company-Id'] = state.companyId;

  // ===================== GET =====================
  if (method === 'GET') {
    try {
      const res = await fetch(API_BASE + path, { ...opts, headers });
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) {
        const err = new Error((body && body.error) || res.statusText);
        err.status = res.status; err.body = body;
        if (res.status === 401 && state.token) logout(true);
        throw err;
      }
      // Guardar en caché para uso offline
      if (isCacheable(path)) OfflineSync.cacheGet(cacheKeyFor(path), body);
      return body;
    } catch (e) {
      // Sin red: devolver la última copia cacheada si existe
      if (isNetworkError(e) && isCacheable(path)) {
        const cached = await OfflineSync.readGet(cacheKeyFor(path));
        if (cached) return cached;
        // Cacheable pero todavía sin datos descargados: devolvemos vacío para
        // no dejar la pantalla colgada en "Cargando...".
        return { ok: true, data: [], _emptyOffline: true };
      }
      throw e;
    }
  }

  // ================ POST / PUT / DELETE ================
  try {
    const res = await fetch(API_BASE + path, { ...opts, headers });
    let body = null; try { body = await res.json(); } catch {}
    if (!res.ok) {
      const err = new Error((body && body.error) || res.statusText);
      err.status = res.status; err.body = body;
      if (res.status === 401 && state.token) logout(true);
      throw err;
    }
    return body;
  } catch (e) {
    // Sin red + endpoint de Producción: encolar para sincronizar después
    if (isNetworkError(e) && isQueueable(path)) {
      return await queueMutation(method, path, opts.body);
    }
    throw e;
  }
}

// Encola una mutación offline y devuelve una respuesta "optimista" para que
// la interfaz se actualice como si el guardado hubiera funcionado.
async function queueMutation(method, path, bodyStr) {
  const body = bodyStr ? JSON.parse(bodyStr) : null;
  let tmpId = null;
  if (method === 'POST') tmpId = OfflineSync.tempId();

  // DELETE de un ítem creado offline (todavía sin sincronizar): en vez de
  // encolar un DELETE, quitamos el POST pendiente. Así no se sincroniza nada.
  if (method === 'DELETE') {
    const m = path.match(/\/(tmp_[a-z0-9-]+)$/i);
    if (m) {
      const items = await OfflineSync.pending();
      const post = items.find((it) => it.tempId === m[1]);
      if (post) await OfflineSync.dequeue(post.id);
      await removeFromCachedList(path.replace(/\/tmp_[a-z0-9-]+$/i, ''), m[1]);
      updateOfflineBar();
      return { ok: true, _offline: true };
    }
  }

  await OfflineSync.enqueue({
    method, path, body, tempId: tmpId,
    companyId: state.companyId, token: state.token,
  });

  // Reflejar el cambio en la caché local para que se vea al instante.
  if (method === 'POST') {
    await injectIntoCachedList(path, { ...body, id: tmpId, _offline: true });
  }
  updateOfflineBar();

  if (method === 'POST') return { ok: true, data: { ...body, id: tmpId, _offline: true } };
  return { ok: true, _offline: true };
}

// Inyecta un ítem nuevo en la lista GET cacheada correspondiente.
async function injectIntoCachedList(listPath, item) {
  const key = cacheKeyFor(listPath);
  const cached = await OfflineSync.readGet(key);
  if (cached && Array.isArray(cached.data)) {
    cached.data.push(item);
    await OfflineSync.cacheGet(key, cached);
  } else {
    await OfflineSync.cacheGet(key, { ok: true, data: [item] });
  }
}
async function removeFromCachedList(listPath, id) {
  const key = cacheKeyFor(listPath);
  const cached = await OfflineSync.readGet(key);
  if (cached && Array.isArray(cached.data)) {
    cached.data = cached.data.filter((x) => x.id !== id);
    await OfflineSync.cacheGet(key, cached);
  }
}

// Reemplaza recursivamente los IDs temporales (tmp_*) por los reales.
function remapIds(value, idMap) {
  if (typeof value === 'string') return idMap[value] || value;
  if (Array.isArray(value)) return value.map((v) => remapIds(v, idMap));
  if (value && typeof value === 'object') {
    const out = {};
    for (const k in value) out[k] = remapIds(value[k], idMap);
    return out;
  }
  return value;
}
function remapPath(path, idMap) {
  let p = path;
  for (const tmp in idMap) p = p.split(tmp).join(idMap[tmp]);
  return p;
}

// Reproduce la cola de cambios contra el servidor (en orden FIFO).
let _syncing = false;
async function syncOutbox() {
  if (_syncing || !navigator.onLine) return;
  const items = (await OfflineSync.pending()).sort((a, b) => a.id - b.id);
  if (!items.length) { updateOfflineBar(); return; }
  _syncing = true;
  updateOfflineBar();
  const idMap = {};
  let okCount = 0, badCount = 0;

  for (const item of items) {
    const body = item.body ? remapIds(item.body, idMap) : null;
    const realPath = remapPath(item.path, idMap);
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (item.token) headers['Authorization'] = 'Bearer ' + item.token;
      if (item.companyId) headers['X-Company-Id'] = item.companyId;
      const res = await fetch(API_BASE + realPath, {
        method: item.method, headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      if (res.ok) {
        const resp = await res.json().catch(() => null);
        if (item.tempId && resp && resp.data && resp.data.id) {
          idMap[item.tempId] = resp.data.id;
        }
        await OfflineSync.dequeue(item.id);
        okCount++;
      } else if (res.status === 401 || res.status >= 500) {
        // Token vencido o error del servidor: cortar y reintentar más tarde.
        break;
      } else {
        // 400/403/404/409: el dato no se puede aplicar; lo descartamos para no trabar la cola.
        await OfflineSync.dequeue(item.id);
        badCount++;
      }
    } catch (e) {
      // Volvió a cortarse la red: abortar, reintentar en la próxima.
      break;
    }
  }

  _syncing = false;
  updateOfflineBar();
  if (okCount) {
    toast(`${okCount} cambio${okCount > 1 ? 's' : ''} sincronizado${okCount > 1 ? 's' : ''} ✓`, 'success');
    // Refrescar la vista actual con los datos ya sincronizados.
    state.cache = {};
    if (pages[state.currentPage]) { try { go(state.currentPage, true); } catch {} }
  }
  if (badCount) {
    toast(`${badCount} cambio${badCount > 1 ? 's' : ''} no se pudo${badCount > 1 ? 'ieron' : ''} sincronizar (revisá los datos)`, 'warn');
  }
}

// Barra inferior de estado offline / sincronización.
async function updateOfflineBar() {
  let count = 0;
  try { count = await OfflineSync.pendingCount(); } catch {}
  let bar = document.getElementById('offline-bar');
  const offline = !navigator.onLine;

  if (!offline && count === 0) { if (bar) bar.remove(); return; }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'offline-bar';
    bar.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:58;text-align:center;' +
      'padding:7px 12px;font-size:13px;font-weight:600;box-shadow:0 -2px 8px rgba(0,0,0,.15);';
    document.body.appendChild(bar);
  }
  if (offline) {
    bar.style.background = '#b45309'; bar.style.color = '#fff';
    bar.textContent = count > 0
      ? `📴 Sin conexión · ${count} cambio${count !== 1 ? 's' : ''} pendiente${count !== 1 ? 's' : ''} de sincronizar`
      : '📴 Sin conexión · podés seguir cargando, se sincroniza al volver la señal';
  } else {
    bar.style.background = '#0369a1'; bar.style.color = '#fff';
    bar.textContent = `🔄 Sincronizando ${count} cambio${count !== 1 ? 's' : ''}...`;
  }
}

// Descarga y cachea los datos de Producción para que estén disponibles offline,
// aunque el usuario no haya entrado manualmente a cada sección. Se llama al
// arrancar y cada vez que vuelve la conexión.
async function precacheOffline() {
  if (!navigator.onLine || !state.token || !state.companyId) return;
  for (const path of CACHEABLE_GET) {
    try { await api(path); } catch {}  // api() cachea solo los GET cacheables
  }
}

// --- Arranque del modo offline ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
window.addEventListener('online', async () => {
  updateOfflineBar();
  await syncOutbox();
  // Volvió la conexión: refrescar la vista actual (reemplaza el cartel offline
  // si lo había, o recarga datos frescos) y re-cachear para la próxima.
  if (state.user && pages[state.currentPage]) {
    try { state.cache = {}; go(state.currentPage, true); } catch {}
  }
  precacheOffline();
});
window.addEventListener('offline', () => { updateOfflineBar(); });
OfflineSync.ready().then(() => {
  updateOfflineBar();
  if (navigator.onLine) syncOutbox();
}).catch(() => {});

/* ------------ Utils ------------ */
const fmt$ = (n) => '$ ' + Number(n || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function toast(msg, type='info') {
  const colors = { info:'bg-slate-800', success:'bg-green-600', error:'bg-red-600', warn:'bg-amber-600' };
  const t = document.createElement('div');
  t.className = `fixed bottom-4 left-1/2 -translate-x-1/2 ${colors[type]||colors.info} text-white px-4 py-2 rounded-lg shadow-lg z-[60] text-sm fade-in`;
  t.textContent = msg;

function hexToRgb(hex) {
  const h = (hex || '').replace('#','');
  if (h.length !== 6) return { r:21, g:128, b:61 };
  return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
}

/* ------------ Permisos ------------ */
function currentMembership() {
  if (!state.user || !state.companyId) return null;
  return state.user.companies.find(c => c.id === state.companyId) || null;
}
function can(perm) {
  if (!state.user) return false;
  if (state.user.superAdmin) return true;
  const m = currentMembership();
  if (!m) return false;
  const perms = m.role?.permissions || [];
  if (perms.includes('*:*') || perms.includes('*')) return true;
  if (!perm) return true;
  if (perms.includes(perm)) return true;
  // ---- Sub-permisos opt-in ----
  // Si el perm pedido es un sub-permiso (3 niveles) y el rol tiene el "padre"
  // del área (area:action), lo dejamos pasar — salvo que el rol haya marcado
  // OTROS sub-permisos del mismo grupo (entonces es modo restrictivo).
  if (typeof SUB_PERM_INDEX !== 'undefined' && SUB_PERM_INDEX[perm]) {
    const grupo = SUB_PERM_INDEX[perm];
    const hayOptIn = grupo.items.some(it => perms.includes(it.key));
    if (!hayOptIn) {
      // Heredar del padre: si el rol tiene area:action o area:*, lo permite
      const partes = perm.split(':');
      const padre = partes[0] + ':' + partes[partes.length - 1];   // ej "produccion:create"
      if (perms.includes(padre)) return true;
      if (perms.includes(partes[0] + ':*')) return true;
    }
    return false;
  }
  if (perm.includes(':')) {
    const [area] = perm.split(':');
    if (perms.includes(area + ':*')) return true;
  }
  return false;
}

/* ------------ Login ------------ */
async function handleLogin() {
  const login = $('#login-email').value.trim();
  const pwd = $('#login-pwd').value;
  const err = $('#login-err');
  err.classList.add('hidden');
  if (!login || !pwd) { err.textContent='Completá usuario y contraseña'; err.classList.remove('hidden'); return; }
  const btn = $('#login-btn'); btn.disabled = true; btn.textContent = 'Ingresando…';
  try {
    // Guardar primero la preferencia de "Recordarme" porque AuthStore.setToken
    // decide en base a ese flag dónde escribir el token.
    const remember = !!$('#login-remember')?.checked;
    AuthStore.setRemember(remember);
    const r = await api('/api/auth/login', { method:'POST', body: JSON.stringify({ login, password: pwd }) });
    state.token = r.token;
    state.user = r.user;
    AuthStore.setToken(r.token);
    AuthStore.setUser(r.user);
    const comps = r.user.companies || [];
    const saved = state.companyId && comps.find(c => c.id === state.companyId);
    state.companyId = saved ? state.companyId : (comps[0]?.id || null);
    if (state.companyId) localStorage.setItem('ac.companyId', state.companyId);
    IdleLogout.start();
    await boot();
  } catch (e) {
    err.textContent = e.message || 'Error de acceso';
    err.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Ingresar →';
  }
}

function logout(silent=false) {
  AuthStore.removeToken();
  AuthStore.removeUser();
  state.token = null;
  state.user = null;
  $('#view-app').classList.add('hidden');
  $('#view-login').classList.remove('hidden');
  $('#login-pwd').value = '';
  // Reflejar el flag actual en el checkbox para que el usuario vea su preferencia
  const cb = document.getElementById('login-remember');
  if (cb) cb.checked = AuthStore.isRemember();
  if (!silent) toast('Sesión cerrada');
}

/* ------------ Boot ------------ */
async function boot() {
  if (!state.token) {
    $('#view-login').classList.remove('hidden'); $('#view-app').classList.add('hidden');
    // Mostrar el estado actual de "Recordarme" en el checkbox
    const cb = document.getElementById('login-remember');
    if (cb) cb.checked = AuthStore.isRemember();
    return;
  }
  if (!state.user) {
    try {
      const me = await api('/api/auth/me');
      state.user = me.user;
      AuthStore.setUser(me.user);
    } catch (e) {
      // Sin conexión: usar el último usuario conocido para poder trabajar
      // offline sin que el sistema cierre la sesión.
      let cached = null;
      try { cached = JSON.parse(AuthStore.getUserRaw() || 'null'); } catch {}
      if (isNetworkError(e) && cached) {
        state.user = cached;
      } else {
        logout(true); return;
      }
    }
  }
  const comps = state.user.companies || [];
  if (!state.companyId || !comps.find(c => c.id === state.companyId)) {
    state.companyId = comps[0]?.id || null;
    if (state.companyId) localStorage.setItem('ac.companyId', state.companyId);
    else localStorage.removeItem('ac.companyId');
  }
  $('#view-login').classList.add('hidden');
  $('#view-app').classList.remove('hidden');
  IdleLogout.start();   // arranca el watchdog de inactividad (30 min)
  renderUserChip();
  renderCompanySelector();
  await applyCompanyTheme();
  await preloadCatalogos();
  await loadSettings();
  renderNav();
  renderCotizaciones();
  loadSystemVersion();   // muestra "v0.7.0 · 2026-06-08" en el sidebar
  // Si la URL tiene un hash valido (ej: #/cheques) y existe el modulo, abrimos
  // esa pagina; si no, vamos a la guardada en state o a Inicio.
  const hashPage = readPageFromHash();
  const visible = hashPage && MODULES.find(m => m.id === hashPage);
  const initialPage = visible ? hashPage : (state.currentPage || 'inicio');
  go(initialPage);
  // Pre-cachear datos de Producción para que estén listos sin conexión.
  precacheOffline();
  // Cargar notificaciones al arrancar y refrescar cada 60 segundos
  refreshNotifsBadge();
  if (state._notifsInterval) clearInterval(state._notifsInterval);
  state._notifsInterval = setInterval(refreshNotifsBadge, 60000);
}

/* ----- Helpers de WhatsApp (Argentina) -----
 * - Con teléfono y desktop: web.whatsapp.com/send?phone=X&text=Y  → directo al chat sin prompt.
 * - Con teléfono y mobile:  wa.me/X?text=Y                        → abre la app nativa.
 * - Sin teléfono:           wa.me/?text=Y                          → muestra "Continuar en WhatsApp Web",
 *                                                                    al confirmar deja elegir el contacto
 *                                                                    con el mensaje ya pre-cargado.
 */
function _waNormalizarTel(telefono) {
  let d = String(telefono || '').replace(/\D/g, '');
  if (!d) return '';
  if (d.startsWith('549')) return d;
  if (d.startsWith('54'))  return '549' + d.slice(2);
  if (d.startsWith('0'))   return '549' + d.slice(1);
  return '549' + d;
}
function _esMobileBrowser() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
}
function waLink(telefono, mensaje) {
  const d = _waNormalizarTel(telefono);
  const textParam = mensaje ? 'text=' + encodeURIComponent(mensaje) : '';
  if (!d) {
    // Sin destinatario: wa.me ofrece elegir contacto y carga el texto solo.
    return 'https://wa.me/' + (textParam ? '?' + textParam : '');
  }
  if (_esMobileBrowser()) {
    return 'https://wa.me/' + d + (textParam ? '?' + textParam : '');
  }
  // Desktop con teléfono: directo a WhatsApp Web sin el prompt intermedio.
  const params = ['phone=' + d];
  if (textParam) params.push(textParam);
  return 'https://web.whatsapp.com/send?' + params.join('&');
}
function openWhatsApp(telefono, mensaje) {
  window.open(waLink(telefono, mensaje), '_blank', 'noopener');
}

function catByTipo(tipos) {
  const list = state.cache.catalogos || [];
  const arr = Array.isArray(tipos) ? tipos : [tipos];
  return list.filter(c => arr.includes(c.tipo) && c.activo !== false)
             .sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
}
// Genera un <select> poblado con items del catálogo. Parámetros opcionales:
//   - parent: filtra por descripcion == parent (jerarquía: Ciudad→Provincia→País)
//   - parentSelect: id del select padre; cuando ese select cambia, este se recarga
//     automáticamente mostrando solo los items cuyo descripcion == valor del padre.
function catSelect(id, tipos, selected='', opts={}) {
  const placeholder = opts.placeholder || '— Elegir —';
  const cls = opts.class || 'input';
  const extraAttr = opts.attr || '';
  const parent = opts.parent || '';
  const parentSelect = opts.parentSelect || '';
  const all = catByTipo(tipos);
  const filtered = parent
    ? all.filter(i => (i.descripcion||'').trim().toLowerCase() === parent.trim().toLowerCase())
    : all;
  const hasSel = selected && filtered.find(i => i.nombre === selected);
  const dataAttr = parentSelect
    ? ` data-cat-tipos="${esc(JSON.stringify(Array.isArray(tipos)?tipos:[tipos]))}" data-cat-parent-select="${parentSelect}" data-cat-selected="${esc(selected||'')}"`
    : '';
  return `<select id="${id}" class="${cls}" ${extraAttr}${dataAttr}>
    <option value="">${placeholder}</option>
    ${filtered.map(i => `<option value="${esc(i.nombre)}" ${i.nombre===selected?'selected':''}>${esc(i.nombre)}</option>`).join('')}
    ${(selected && !hasSel) ? `<option value="${esc(selected)}" selected>${esc(selected)} (legado)</option>` : ''}
  </select>`;
}

// Normaliza valores legacy de "Condición IVA" para que matcheen con el catálogo
// actual. Cubre los códigos viejos guardados por seeds antiguos (RI, Monotributo,
// ConsumidorFinal, CF, EX, NI, MON) y devuelve el nombre canónico del catálogo.
function normalizeCondIVA(v) {
  if (!v) return '';
  const key = String(v).toLowerCase().trim().replace(/\s+/g, ' ');
  const map = {
    'ri': 'Responsable Inscripto',
    'responsable inscripto': 'Responsable Inscripto',
    'monotributo': 'Monotributista',
    'monotributista': 'Monotributista',
    'mon': 'Monotributista',
    'consumidor final': 'Consumidor Final',
    'consumidorfinal': 'Consumidor Final',
    'cf': 'Consumidor Final',
    'exento': 'Exento',
    'ex': 'Exento',
    'no inscripto': 'No Inscripto',
    'noinscripto': 'No Inscripto',
    'ni': 'No Inscripto',
  };
  return map[key] || v;
}

// Listener global que, al cambiar un select padre, refresca los selects hijos
// (provincia depende de país, ciudad depende de provincia).
document.addEventListener('change', (e) => {
  const parentId = e.target?.id;
  if (!parentId) return;
  document.querySelectorAll(`select[data-cat-parent-select="${parentId}"]`).forEach(child => {
    const tipos = JSON.parse(child.getAttribute('data-cat-tipos') || '[]');
    const parentVal = e.target.value || '';
    const curSel = child.value || child.getAttribute('data-cat-selected') || '';
    const all = catByTipo(tipos);
    const filtered = parentVal
      ? all.filter(i => (i.descripcion||'').trim().toLowerCase() === parentVal.trim().toLowerCase())
      : all;
    const placeholder = child.options[0]?.text || '— Elegir —';
    const hasSel = curSel && filtered.find(i => i.nombre === curSel);
    child.innerHTML = `
      <option value="">${placeholder}</option>
      ${filtered.map(i => `<option value="${esc(i.nombre)}" ${i.nombre===curSel?'selected':''}>${esc(i.nombre)}</option>`).join('')}
      ${(curSel && !hasSel) ? `<option value="${esc(curSel)}" selected>${esc(curSel)} (legado)</option>` : ''}`;
    // Disparar cascada hacia los nietos (ej. país → provincia → ciudad)
    child.dispatchEvent(new Event('change', { bubbles: false }));
  });
});

  go(visibles.has(page) ? page : 'inicio');
  // Pre-cachear los datos de Producción de la empresa recién seleccionada.
  precacheOffline();
}

// Estado de plegado de las secciones del sidebar (se persiste en localStorage por usuario).
function _navCollapsedKey() { return 'ac.nav.collapsed.' + (state.user?.id || 'anon'); }
function _navGetCollapsed() {
  try { return JSON.parse(localStorage.getItem(_navCollapsedKey()) || '{}'); } catch { return {}; }
}
function _navSetCollapsed(map) {
  try { localStorage.setItem(_navCollapsedKey(), JSON.stringify(map)); } catch {}
}
function navToggleSection(sec) {
  const map = _navGetCollapsed();
  map[sec] = !map[sec];
  _navSetCollapsed(map);
  renderNav();
}
function navFilterChange(q) {
  state._navFilter = (q || '').trim().toLowerCase();
  renderNav();
}
function navExpandAll() {
  _navSetCollapsed({});
  renderNav();
}

function renderNav() {
  const nav = $('#nav');
  // Módulos ARCA (facturación legal + libros IVA) que se esconden si la empresa es "informal".
  const modulosARCA = new Set(['facturacion','libroIVA']);
  let items = MODULES.filter(m => {
    if (state.companyInformal && modulosARCA.has(m.id)) return false;
    if (m.perm === '*') return state.user.superAdmin || can('*:*') || can('usuarios:*') || can('roles:*') || can('empresas:*');
    if (!m.perm) return true;
    return can(m.perm);
  });
  // Aplicar buscador: si hay texto, filtra por nombre del módulo y abre todas las secciones que matchearon.
  const q = (state._navFilter || '').trim().toLowerCase();
  let collapsed = _navGetCollapsed();
  if (q) {
    items = items.filter(m => m.label.toLowerCase().includes(q) || m.section.toLowerCase().includes(q));
    collapsed = {}; // mostramos todo lo filtrado expandido
  }
  // Items sin sección (ej. Inicio) van arriba de todo, sin header.
  const itemsArriba = items.filter(i => !i.section);
  const itemsConSeccion = items.filter(i => !!i.section);
  // Agrupar manteniendo el orden de MENU_SECTIONS
  const bySec = {};
  itemsConSeccion.forEach(i => { (bySec[i.section] = bySec[i.section] || []).push(i); });
  const seccionesOrdenadas = MENU_SECTIONS.filter(s => bySec[s]?.length).concat(
    Object.keys(bySec).filter(s => !MENU_SECTIONS.includes(s))
  );

  const buscador = `
    <div class="px-3 pt-2 pb-1.5 sticky top-0 bg-inherit z-10 border-b border-white/5">
      <div class="relative">
        <input id="nav-search" class="w-full text-xs rounded bg-white/10 text-white placeholder:text-white/50 px-2 py-1 pl-6 outline-none focus:bg-white/20"
               placeholder="Buscar módulo..." value="${esc(state._navFilter||'')}" oninput="navFilterChange(this.value)"/>
        <span class="absolute left-1.5 top-1/2 -translate-y-1/2 text-[10px] opacity-50">🔍</span>
        ${state._navFilter?`<button class="absolute right-1 top-1/2 -translate-y-1/2 text-xs opacity-70 hover:opacity-100 px-1" onclick="navFilterChange('')" title="Limpiar">✕</button>`:''}
      </div>
    </div>`;

  const sections = seccionesOrdenadas.map(sec => {
    const ms = bySec[sec];
    const isCollapsed = !!collapsed[sec];
    const hasActive = ms.some(i => i.id === state.currentPage);
    return `
      <div class="${hasActive ? 'nav-section-active' : ''}">
        <button type="button" onclick="navToggleSection('${esc(sec)}')"
                class="w-full text-left px-3 pt-2 pb-0.5 text-[10px] uppercase tracking-wider opacity-70 hover:opacity-100 flex items-center gap-1 transition">
          <span class="inline-block w-3 text-center text-[10px]">${isCollapsed?'▸':'▾'}</span>
          <span>${esc(sec)}</span>
          <span class="ml-auto text-[9px] opacity-50">${ms.length}</span>
        </button>
        ${isCollapsed ? '' : ms.map(i => `
          <button type="button" onclick="go('${i.id}')"
                  class="sidebar-link w-full text-left pl-7 pr-4 py-1.5 flex items-center gap-2 ${state.currentPage===i.id?'active':''}">
            <span class="text-base w-5 text-center">${i.icon}</span>
            <span class="truncate">${esc(i.label)}</span>
          </button>`).join('')}
      </div>`;
  }).join('');

  // Render para items sin sección — botones simples al tope, sin tachón ni header.
  const topItems = itemsArriba.map(i => `
    <button type="button" onclick="go('${i.id}')"
            class="sidebar-link w-full text-left px-3 py-2 flex items-center gap-2 mt-1 ${state.currentPage===i.id?'active':''}">
      <span class="text-base w-5 text-center">${i.icon}</span>
      <span class="truncate font-medium">${esc(i.label)}</span>
    </button>`).join('');

  const vacio = !items.length && q
    ? `<div class="text-xs text-white/60 px-4 py-3 italic">Sin coincidencias para "${esc(q)}"</div>`
    : '';

  // Antes de redibujar, recordamos si el foco estaba en el buscador y dónde estaba el cursor.
  // Sin esto, cada tecla destruye el input y se pierde el foco — no podías seguir escribiendo.
  const prevFocus = document.activeElement;
  const eraBuscador = prevFocus && prevFocus.id === 'nav-search';
  const cursorPos = eraBuscador ? prevFocus.selectionStart : null;

  nav.innerHTML = buscador + topItems + sections + vacio;

  if (eraBuscador) {
    const nuevo = $('#nav-search');
    if (nuevo) {
      nuevo.focus();
      // Restauramos el cursor al final de lo que el usuario tipeó.
      const pos = (cursorPos != null) ? cursorPos : nuevo.value.length;
      try { nuevo.setSelectionRange(pos, pos); } catch {}
    }
  }
}

let _gsDebounce = null;
async function globalSearch(q) {
  clearTimeout(_gsDebounce);
  _gsDebounce = setTimeout(async () => {
    const query = (q || '').trim().toLowerCase();
    const box = $('#global-search-results');
    if (!box) return;
    if (query.length < 2) { box.classList.add('hidden'); return; }
    // Asegurar cache
    const needs = [];
    if (!state.cache.clientes)    needs.push(crudList('clientes').catch(()=>{}));
    if (!state.cache.proveedores) needs.push(crudList('proveedores').catch(()=>{}));
    if (!state.cache.productos)   needs.push(api('/api/productos').then(r=>state.cache.productos=r.data||[]).catch(()=>{}));
    if (!state.cache.empleados)   needs.push(crudList('empleados').catch(()=>{}));
    if (!state.cache.campos)      needs.push(crudList('campos').catch(()=>{}));
    if (needs.length) await Promise.all(needs);

    const match = s => (s||'').toString().toLowerCase().includes(query);
    const groups = [
      { label:'Clientes',    icon:'👥', go:'clientes',    items:(state.cache.clientes||[]).filter(c => match(c.razonSocial)||match(c.nombreFantasia)||match(c.cuit)||match(c.email)||match(c.telefono)||match(c.localidad)),
        text: c => `<b>${esc(c.razonSocial)}</b>${c.cuit?` · <span class="font-mono text-[11px] text-slate-500">${esc(c.cuit)}</span>`:''}${c.localidad?` · <span class="text-slate-500">${esc(c.localidad)}</span>`:''}` },
      { label:'Proveedores', icon:'🏬', go:'proveedores', items:(state.cache.proveedores||[]).filter(p => match(p.razonSocial)||match(p.cuit)||match(p.email)||match(p.rubro)||match(p.localidad)),
        text: p => `<b>${esc(p.razonSocial)}</b>${p.rubro?` · <span class="badge badge-blue text-[10px]">${esc(p.rubro)}</span>`:''}${p.cuit?` · <span class="font-mono text-[11px] text-slate-500">${esc(p.cuit)}</span>`:''}` },
      { label:'Productos',   icon:'📦', go:'stock',       items:(state.cache.productos||[]).filter(p => match(p.nombre)||match(p.codigo)||match(p.categoria)),
        text: p => `<b>${esc(p.nombre)}</b>${p.categoria?` · <span class="text-slate-500">${esc(p.categoria)}</span>`:''}${p.codigo?` · <span class="font-mono text-[11px] text-slate-400">${esc(p.codigo)}</span>`:''}` },
      { label:'Empleados',   icon:'👷', go:'empleados',   items:(state.cache.empleados||[]).filter(e => match(e.nombre)||match(e.apellido)||match(e.dni)||match(e.puesto)||match(e.email)),
        text: e => `<b>${esc(e.apellido)}, ${esc(e.nombre)}</b>${e.puesto?` · <span class="text-slate-500">${esc(e.puesto)}</span>`:''}${e.dni?` · <span class="font-mono text-[11px] text-slate-400">${esc(e.dni)}</span>`:''}` },
      { label:'Campos',      icon:'🗺️', go:'campos',      items:(state.cache.campos||[]).filter(c => match(c.nombre)||match(c.ubicacion)||match(c.localidad)||match(c.provincia)),
        text: c => `<b>${esc(c.nombre)}</b>${c.ubicacion?` · <span class="text-slate-500">${esc(c.ubicacion)}</span>`:''}${c.hectareas?` · <span class="text-[11px] text-slate-500">${fmtN(c.hectareas)} ha</span>`:''}` },
    ].filter(g => g.items.length > 0);

    const total = groups.reduce((a,g)=>a+g.items.length, 0);
    if (total === 0) {
      box.innerHTML = `<div class="p-4 text-sm text-slate-500 text-center">Sin resultados para "<b>${esc(query)}</b>"</div>`;
    } else {
      box.innerHTML = groups.map(g => `
        <div>
          <div class="px-3 py-1.5 bg-slate-50 text-[10px] uppercase tracking-wider text-slate-500 font-semibold sticky top-0">
            ${g.icon} ${g.label} <span class="text-slate-400">(${g.items.length})</span>

    box.classList.remove('hidden');
  }, 180);
}

/* ===================== NOTIFICACIONES / ALERTAS ===================== */
async function loadNotifs() {
  // Cargamos los datos necesarios y armamos la lista
  const alertas = [];
  const hoy = new Date();
  try {
    const cheques = (await api('/api/cheques')).data || [];
    const estadosPend = ['en cartera', 'emitido', 'depositado'];
    const pend = cheques.filter(c => estadosPend.includes((c.estado||'').toLowerCase()) && c.fechaPago);
    const venc = pend.filter(c => new Date(c.fechaPago) < hoy);
    const hoy15 = new Date(hoy.getTime() + 15 * 24 * 60 * 60 * 1000);
    const aVencer = pend.filter(c => { const f = new Date(c.fechaPago); return f >= hoy && f <= hoy15; });
    if (venc.length) alertas.push({ icon:'🔴', color:'text-red-600', titulo:`${venc.length} cheque${venc.length>1?'s':''} vencido${venc.length>1?'s':''}`, sub:'Sin cobrar — revisar', go:'cheques', ctr: venc.length });
    if (aVencer.length) alertas.push({ icon:'⏰', color:'text-amber-600', titulo:`${aVencer.length} cheque${aVencer.length>1?'s':''} a vencer en 15 días`, sub:'Anticipá la gestión de cobro', go:'cheques', ctr: aVencer.length });
  } catch {}
  try {
    const arr = (await api('/api/arrendamientos')).data || [];
    const pend = arr.filter(a => !a.pagado);
    const vencidos = pend.filter(a => a.vencimiento && new Date(a.vencimiento) < hoy);
    if (vencidos.length) alertas.push({ icon:'🏞️', color:'text-red-600', titulo:`${vencidos.length} arrendamiento${vencidos.length>1?'s':''} vencido${vencidos.length>1?'s':''}`, sub:'Pendiente de pago', go:'arrendamientos', ctr: vencidos.length });
    else if (pend.length) alertas.push({ icon:'🟡', color:'text-amber-600', titulo:`${pend.length} arrendamiento${pend.length>1?'s':''} sin pagar`, sub:'Próximos a vencer', go:'arrendamientos', ctr: pend.length });
  } catch {}
  try {
    const prods = (await api('/api/stock-actual')).data || [];
    const bajos = prods.filter(p => p.bajoMinimo);
    if (bajos.length) alertas.push({ icon:'📦', color:'text-amber-600', titulo:`${bajos.length} producto${bajos.length>1?'s':''} bajo mínimo`, sub:bajos.slice(0,3).map(p=>p.nombre).join(', ') + (bajos.length>3?'...':''), go:'stock', ctr: bajos.length });
  } catch {}
  try {
    const ccs = (await api('/api/ctas-ctes')).data || [];
    const porCobrar = ccs.filter(c => c.tipo === 'cliente').reduce((a,c)=>a+Number(c.saldo||0),0);
    if (porCobrar > 0) alertas.push({ icon:'💰', color:'text-amber-600', titulo:`Saldo por cobrar: ${fmt$(porCobrar)}`, sub:'Clientes con saldo pendiente', go:'ctasCtes', ctr: 1 });
  } catch {}
  return alertas;
}

async function refreshNotifsBadge() {
  if (!state.user) return;

    const alertas = await loadNotifs();
    const total = alertas.reduce((a,x)=>a+(x.ctr||1), 0);
    const b = $('#notifs-badge');

    if (total > 0) {

      b.classList.remove('hidden');
    } else {

    }
    state.cache._notifs = alertas;
  } catch {}
}

/* ------------ Cotizaciones en vivo ------------
 * Dólar: dolarapi.com (vía backend, cache 10 min).
 * Cereales: scraping BCR Rosario (vía backend, auto-refresh cada 6 hs).
 * Si no hay datos disponibles, el banner se oculta en vez de mostrar valores inventados.
 */
async function renderCotizaciones() {
  const datos = [];
  let info = null;
  try {
    const r = await fetch(API_BASE + '/api/cotizaciones');
    if (r.ok) info = await r.json();
  } catch (e) { console.warn('cotizaciones fetch falló:', e); }

  // Cargar valores previos para calcular tendencia (↑ subió, ↓ bajó, → igual).
  // Se guardan en localStorage la última vez que cada key se mostró.
  let prev = {};
  try { prev = JSON.parse(localStorage.getItem('ac.cot.prev') || '{}'); } catch { prev = {}; }
  const nuevos = {};
  const trendOf = (key, valor) => {
    nuevos[key] = valor;
    const anterior = prev[key];
    if (anterior == null || !Number.isFinite(anterior)) return { arrow: '', cls: 'flat' };
    if (valor > anterior) return { arrow: '▲', cls: 'up' };
    if (valor < anterior) return { arrow: '▼', cls: 'down' };
    return { arrow: '=', cls: 'flat' };
  };

  // 1) Dólar en vivo (dolarapi.com vía backend)
  if (info?.dolar) {
    const d = info.dolar;
    const pushD = (key, ico, lbl) => {
      if (d[key] && d[key].venta != null) {
        const v = Number(d[key].venta);
        const t = trendOf('dolar.' + key, v);
        datos.push({
          ico, lbl,
          val: '$ ' + v.toLocaleString('es-AR', { maximumFractionDigits: 0 }),
          arrow: t.arrow, cls: t.cls,
        });
      }
    };
    pushD('oficial', '💵', 'Oficial');
    pushD('blue',    '💵', 'Blue');
    pushD('mep',     '💵', 'MEP');
    pushD('contadoconliqui', '💵', 'CCL');
    pushD('cripto',  '₿', 'Cripto');
    pushD('tarjeta', '💳', 'Tarjeta');
  }

  // 2) Cereales: scraping BCR / ArgentinaDatos (vía backend, auto-refresh cada 6 hs).
  const icoMap = { soja:'🌱', maiz:'🌽', trigo:'🌾', sorgo:'🌿', girasol:'🌻', cebada:'🍺', centeno:'🌾', avena:'🥣' };
  const lblMap = { soja:'Soja', maiz:'Maíz', trigo:'Trigo', sorgo:'Sorgo', girasol:'Girasol', cebada:'Cebada', centeno:'Centeno', avena:'Avena' };
  if (info?.cereales?.items && Object.keys(info.cereales.items).length) {
    for (const [k, valRaw] of Object.entries(info.cereales.items)) {
      const v = Number(valRaw);
      const t = trendOf('cer.' + k, v);
      datos.push({
        ico: icoMap[k] || '🌾',
        lbl: lblMap[k] || k,
        val: '$ ' + v.toLocaleString('es-AR', { maximumFractionDigits: 0 }) + '/t',
        arrow: t.arrow, cls: t.cls,
      });
    }
  }

  // Guardar los nuevos valores como "previos" para la próxima comparación.
  // Sólo pisamos si efectivamente obtuvimos datos (sino se perdería la referencia).
  if (Object.keys(nuevos).length) {
    try { localStorage.setItem('ac.cot.prev', JSON.stringify(nuevos)); } catch {}
  }

  // Actualizar hora
  const tm = $('#cot-time');
  const ts = info?.actualizado?.dolar || info?.actualizado?.cereales;
  if (tm) {
    tm.textContent = ts
      ? new Date(ts).toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' })
      : new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
  }

  if (datos.length === 0) {
    $('#cot-track').innerHTML = '<span class="cot-item"><span class="lbl">Sin cotizaciones — tocá 🔄 para reintentar</span></span>';
    return;
  }
  const render = () => datos.map(d =>
    `<span class="cot-item"><span class="ico">${d.ico}</span><span class="lbl">${d.lbl}</span><span class="val">${d.val}</span>${d.arrow ? `<span class="trend ${d.cls}">${d.arrow}</span>` : ''}</span>`
  ).join('');
  $('#cot-track').innerHTML = render() + render();
}

/* Indicador de fuerza de contraseña — solo sugerencia, no bloquea. */
function scorePwd(pw) {
  let s = 0;
  if (!pw) return { score:0, label:'', color:'#e2e8f0', tips:[] };
  if (pw.length >= 8) s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[a-z]/.test(pw)) s++;
  if (/\d/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  const tips = [];
  if (pw.length < 8) tips.push('8+ caracteres');
  if (!/[A-Z]/.test(pw)) tips.push('una mayúscula');
  if (!/\d/.test(pw)) tips.push('un número');
  if (!/[^A-Za-z0-9]/.test(pw)) tips.push('un símbolo');
  const levels = [
    { label: 'Muy débil',  color: '#dc2626', pct: 10 },
    { label: 'Débil',      color: '#ea580c', pct: 30 },
    { label: 'Regular',    color: '#ca8a04', pct: 50 },
    { label: 'Buena',      color: '#65a30d', pct: 70 },
    { label: 'Fuerte',     color: '#16a34a', pct: 85 },
    { label: 'Muy fuerte', color: '#14532d', pct: 100 },
  ];
  return { score: s, ...(levels[Math.min(s, levels.length-1)] || levels[0]), tips };
}
function pwdStrength(pw) {
  const cont = $('#pw-strength'); if (!cont) return;
  if (!pw) { cont.innerHTML = ''; return; }
  const r = scorePwd(pw);
  cont.innerHTML = `
    <div style="height:5px;border-radius:3px;background:#e2e8f0;overflow:hidden">
      <div style="height:100%;background:${r.color};width:${r.pct}%;transition:.2s all"></div>
    </div>
    <div class="text-[11px] mt-1" style="color:${r.color}">
      <b>${r.label}</b>${r.tips.length ? ' · Sugerido: '+r.tips.join(', ') : ''}
    </div>`;
}

// Navega a una pagina. Si fromHistory=true, NO empuja al historial del navegador
// (se llama asi desde el popstate handler para no duplicar entradas).
function go(page, fromHistory = false) {
  state.currentPage = page;
  state.empFichaId = null;  // al navegar por el menú salimos de la ficha de empleado
  renderNav();
  autoCloseSidebarOnNav();
  // Sincronizar con la barra de URL para que back/forward del navegador funcionen.
  if (!fromHistory) {
    const url = '#/' + page;
    if (location.hash !== url) {
      history.pushState({ page }, '', url);
    } else if (!history.state) {
      history.replaceState({ page }, '', url);
    }
  }
  updateBackButton();

  // Modo offline: si no hay conexión y la sección necesita internet, mostramos
  // un cartel informativo en vez de dejar el "Cargando..." colgado o un error.
  if (!navigator.onLine && !OFFLINE_READY.includes(page)) {
    const label = MODULES.find(m => m.id === page)?.label || page;
    setHeader(label, 'Sin conexión');
    $('#page-body').innerHTML = offlineSectionCard(label);
    return;
  }

  const fn = pages[page];
  if (!fn) {
    setHeader(MODULES.find(m=>m.id===page)?.label || page, 'En construcción');
    $('#page-body').innerHTML = stubPage(page, MODULES.find(m=>m.id===page)?.label || page);
    return;
  }
  try { fn(); } catch (e) {
    console.error(e);
    $('#page-body').innerHTML = `<div class="text-red-600 bg-red-50 border border-red-200 rounded p-4 text-sm">Error: ${esc(e.message)}</div>`;
  }
}

// Páginas que funcionan completamente sin conexión (Producción + Inicio).

// Botón "← Volver" del header: usa el historial del navegador. Si no hay historial
// previo dentro de la app (recien abrio en una vista profunda), va a Inicio.
function goBack() {
  // Si hay state previo en la historia, dejamos que el navegador haga back.
  // Si no, fallback a Inicio.
  const hasPrev = (window.history.length > 1) && (history.state || location.hash);
  if (hasPrev) {
    history.back();
  } else {
    go('inicio');
  }
}

// Mostrar/ocultar el boton volver segun la pagina actual.
function updateBackButton() {
  const btn = document.getElementById('btn-back');
  if (!btn) return;
  btn.classList.toggle('hidden', state.currentPage === 'inicio');
}

// Lee la pagina del hash de la URL (formato: "#/cheques" -> "cheques").
function readPageFromHash() {
  const m = (location.hash || '').match(/^#\/([\w-]+)/);
  return m ? m[1] : null;
}

// Listener de back/forward del navegador (o del celular): navega sin volver a empujar.
window.addEventListener('popstate', (e) => {
  if (!state.user) return; // si no esta logueado, no interceptamos
  const st = e.state || {};
  const page = st.page || readPageFromHash() || 'inicio';
  // Ficha de empleado: es una sub-vista de "empleados" (lleva empFichaId en el state).
  if (page === 'empleados' && st.empFichaId) {
    state.currentPage = 'empleados';
    renderNav(); updateBackButton();
    empleAbrir(st.empFichaId, false);
    return;
  }
  // Volver a la nómina (desde la ficha de un empleado o desde otra sección).
  if (page === 'empleados') {
    state.empFichaId = null;
    state.currentPage = 'empleados';
    renderNav(); updateBackButton();
    pages.empleados();
    return;
  }
  state.empFichaId = null;
  if (page === state.currentPage) return;
  go(page, true);
});

}
