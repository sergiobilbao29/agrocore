function hacMovTipoChange() {
  const t = $('#h-tipo').value;
  $('#h-campodest-wrap').style.display = t==='traslado'?'':'none';
  $('#h-ajuste-hint').style.display    = t==='ajuste'?'':'none';
  $('#h-campo-lbl').textContent        = t==='traslado'?'Campo origen *':'Campo *';
}
async function hacMovSave() {
  const tipo = $('#h-tipo').value;
  const data = {
    campoId: $('#h-campo').value,
    categoria: $('#h-cat').value.trim(),
    fecha: new Date($('#h-fec').value).toISOString(),
    tipo,
    cantidad: Number($('#h-cant').value||0),
    campoDestino: tipo==='traslado' ? $('#h-campodest').value : null,
    observaciones: $('#h-obs').value.trim()||null,
  };
  if (!data.campoId)   return toast('Elegí el campo','warn');
  if (!data.categoria) return toast('Categoría requerida','warn');
  if (!data.fecha)     return toast('Fecha requerida','warn');
  if (tipo==='traslado' && (!data.campoDestino || data.campoDestino===data.campoId))
    return toast('Elegí un campo destino distinto del origen','warn');
  if (!data.cantidad)                          return toast('Cantidad requerida','warn');
  if (tipo!=='ajuste' && data.cantidad<=0)     return toast('La cantidad debe ser positiva','warn');
  try {
    await api('/api/hacienda-movimientos',{method:'POST',body:JSON.stringify(data)});
    toast('Movimiento registrado','success'); closeModal();
    delete state.cache.haciendaResumen; delete state.cache.haciendaMovs;
    pages.hacienda();
  } catch(e) { toast(e.message,'error'); }
}
async function hacMovDel(id) {
  if (!confirm('¿Borrar este movimiento de hacienda? El stock real se va a recalcular.')) return;
  try {
    await api('/api/hacienda-movimientos/'+id,{method:'DELETE'});
    toast('Borrado','success');
    delete state.cache.haciendaResumen; delete state.cache.haciendaMovs;
    pages.hacienda();
  } catch(e) { toast(e.message,'error'); }
}

/* =========================================================
 * CUENTAS CORRIENTES
 * ========================================================= */
// Aliases: las nuevas entradas del menú abren la misma página, solo pre-seleccionan
// el tab. Permiten un futuro split sin tener que reescribir el contenido ahora.
pages.ctasCobrar = async function() { state.ccTab = 'cobrar'; return pages.ctasCtes(); };
pages.ctasPagar  = async function() { state.ccTab = 'pagar';  return pages.ctasCtes(); };

pages.ctasCtes = async function() {
  setHeader(state.ccTab === 'pagar' ? 'Cuentas a pagar' : state.ccTab === 'cobrar' ? 'Cuentas a cobrar' : 'Cuentas corrientes', state.ccTab === 'pagar' ? 'Saldos pendientes con proveedores' : state.ccTab === 'cobrar' ? 'Saldos pendientes de clientes' : 'Saldos a cobrar y a pagar');
  if (!can('finanzas:read')) { $('#page-body').innerHTML = stubPage('ctasCtes','Ctas Ctes'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let rows=[], clis=[], provs=[];
  try {
    const [r, c, p] = await Promise.all([api('/api/ctas-ctes'), api('/api/clientes'), api('/api/proveedores')]);
    rows = r.data||[]; clis = c.data||[]; provs = p.data||[];
    state.cache.ctasCtes = rows; state.cache.clientes = clis; state.cache.proveedores = provs;
  } catch (e) { return toast(e.message,'error'); }

  state.ccTab = state.ccTab || 'cobrar';

  // Agrupa los movimientos por contacto y calcula el saldo de cada uno.
  const agrupar = (tipo, lista) => lista.map(contacto => {
    const movs = rows.filter(m => m.contactoTipo===tipo && m.contactoId===contacto.id);
    const debe = movs.reduce((a,m)=>a+Number(m.debe||0),0);
    const haber = movs.reduce((a,m)=>a+Number(m.haber||0),0);
    return { contacto, movs, debe, haber, saldo: debe-haber };
  }).filter(g => g.movs.length > 0).sort((a,b)=>b.saldo-a.saldo);

  const clientesCC = agrupar('cliente', clis);
  const proveedoresCC = agrupar('proveedor', provs);
  const libres = rows.filter(m => m.contactoTipo==='libre' || (!m.contactoTipo));
  const totalCobrar = clientesCC.reduce((a,g)=>a+g.saldo,0);
  const totalPagar  = proveedoresCC.reduce((a,g)=>a+g.saldo,0);

  // Guardado en state para que los modales (movimientos, cobro/pago) lo lean.
  state._ccData = { clientesCC, proveedoresCC, libres };

  const tab = state.ccTab;
  const grupos = tab==='cobrar' ? clientesCC : tab==='pagar' ? proveedoresCC : [];
  const tipoActual = tab==='cobrar' ? 'cliente' : 'proveedor';
  const accionLabel = tab==='cobrar' ? 'Registrar cobro' : 'Registrar pago';

  const tabBtn = (id, label, activo) =>
    `<button onclick="ccSwitchTab('${id}')" class="px-4 py-2 rounded-lg text-sm font-semibold transition ${activo?'bg-green-700 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200'}">${label}</button>`;

  $('#page-body').innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
      <div class="kpi" style="background:linear-gradient(135deg,#dcfce7 0%,#f0fdf4 100%)">
        <div class="text-xs text-slate-500">💰 Total a cobrar (clientes)</div>
        <div class="text-2xl font-bold mt-1 text-emerald-700">${fmt$(totalCobrar)}</div>
      </div>
      <div class="kpi" style="background:linear-gradient(135deg,#fee2e2 0%,#fef2f2 100%)">
        <div class="text-xs text-slate-500">📤 Total a pagar (proveedores)</div>
        <div class="text-2xl font-bold mt-1 text-red-600">${fmt$(totalPagar)}</div>
      </div>
    </div>
    <div class="flex items-center justify-between flex-wrap gap-2 mb-3">
      <div class="flex gap-2">
        ${tabBtn('cobrar', '💰 A cobrar', tab==='cobrar')}
        ${tabBtn('pagar', '📤 A pagar', tab==='pagar')}
        ${tabBtn('otros', '📋 Otros / Manuales', tab==='otros')}
      </div>
      <div class="flex gap-2 items-center flex-wrap">
        ${can('finanzas:create') && (tab==='cobrar') ? `<button class="btn btn-primary" onclick="pagoCobroAbrir('cobro')">💰 Cobrar (multi-comprobante)</button>` : ''}
        ${can('finanzas:create') && (tab==='pagar') ? `<button class="btn btn-primary" onclick="pagoCobroAbrir('pago')">💸 Pagar (multi-comprobante)</button>` : ''}
        ${can('finanzas:create') ? `<button class="btn btn-secondary" onclick="ccForm()">+ Movimiento manual</button>`:''}
      </div>
    </div>
    <div id="cc-body"></div>`;

  const body = $('#cc-body');
  if (tab === 'otros') {
    // Los "manuales / libres" tienen sus PROPIOS totales: alquileres, impuestos,
    // servicios, etc. NO se mezclan con clientes ni proveedores.
    const cats = ['Arrendamiento','Servicio','Impuesto','Otro'];
    state.ccLibreFilter = state.ccLibreFilter || { categoria:'', estado:'pendientes', direccion:'' };
    const lf = state.ccLibreFilter;

    const pendientesCobrar = libres.filter(m=>!m.pagado && Number(m.debe||0)>0);
    const pendientesPagar  = libres.filter(m=>!m.pagado && Number(m.haber||0)>0);
    const totalCobrarLibres = pendientesCobrar.reduce((a,m)=>a+Number(m.debe||0),0);
    const totalPagarLibres  = pendientesPagar.reduce((a,m)=>a+Number(m.haber||0),0);

    // Próximos a vencer (15 días) y vencidos: solo pendientes con vencimiento.
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const en15 = new Date(hoy.getTime() + 15*86400000);
    const proximos = libres.filter(m=>!m.pagado && m.vencimiento && new Date(m.vencimiento) <= en15);
    const vencidos = proximos.filter(m=>new Date(m.vencimiento) < hoy);

    // Filtros activos:
    let filtrados = libres.slice();
    if (lf.categoria) filtrados = filtrados.filter(m=>m.categoria===lf.categoria);
    if (lf.estado==='pendientes') filtrados = filtrados.filter(m=>!m.pagado);
    if (lf.estado==='pagados') filtrados = filtrados.filter(m=>m.pagado);
    if (lf.direccion==='cobrar') filtrados = filtrados.filter(m=>Number(m.debe||0)>0);
    if (lf.direccion==='pagar')  filtrados = filtrados.filter(m=>Number(m.haber||0)>0);
    // Orden: pendientes con vencimiento primero (más cercano arriba), luego sin vencimiento, luego pagados.
    filtrados.sort((a,b)=>{
      if (!!a.pagado !== !!b.pagado) return a.pagado?1:-1;
      const va = a.vencimiento?new Date(a.vencimiento).getTime():Infinity;
      const vb = b.vencimiento?new Date(b.vencimiento).getTime():Infinity;
      return va-vb;
    });

    body.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <div class="kpi" style="background:linear-gradient(135deg,#dcfce7,#f0fdf4)">
          <div class="text-xs text-slate-500">📥 A cobrar — manuales</div>
          <div class="text-2xl font-bold mt-1 text-emerald-700">${fmt$(totalCobrarLibres)}</div>
          <div class="text-xs text-slate-400 mt-1">${pendientesCobrar.length} pendiente${pendientesCobrar.length===1?'':'s'}</div>
        </div>
        <div class="kpi" style="background:linear-gradient(135deg,#fee2e2,#fef2f2)">
          <div class="text-xs text-slate-500">📤 A pagar — manuales</div>
          <div class="text-2xl font-bold mt-1 text-red-600">${fmt$(totalPagarLibres)}</div>
          <div class="text-xs text-slate-400 mt-1">${pendientesPagar.length} pendiente${pendientesPagar.length===1?'':'s'}</div>
        </div>
        <div class="kpi" style="background:linear-gradient(135deg,#fef3c7,#fffbeb)">
          <div class="text-xs text-slate-500">⏰ Vencen en 15 días</div>
          <div class="text-2xl font-bold mt-1 ${vencidos.length?'text-red-600':'text-amber-700'}">${proximos.length}</div>
          <div class="text-xs text-slate-400 mt-1">${vencidos.length} vencido${vencidos.length===1?'':'s'}</div>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 items-end mb-3">
        <div>
          <label class="label">Categoría</label>
          <select class="input" onchange="ccLibreFilter('categoria',this.value)">
            <option value="">Todas</option>
            ${cats.map(c=>`<option value="${c}" ${lf.categoria===c?'selected':''}>${c}</option>`).join('')}
            ${Array.from(new Set(libres.map(m=>m.categoria).filter(c=>c&&!cats.includes(c)))).map(c=>`<option value="${esc(c)}" ${lf.categoria===c?'selected':''}>${esc(c)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="label">Estado</label>
          <select class="input" onchange="ccLibreFilter('estado',this.value)">
            <option value="todos" ${lf.estado==='todos'?'selected':''}>Todos</option>
            <option value="pendientes" ${lf.estado==='pendientes'?'selected':''}>Pendientes</option>
            <option value="pagados" ${lf.estado==='pagados'?'selected':''}>Pagados / cobrados</option>
          </select>
        </div>
        <div>
          <label class="label">Dirección</label>
          <select class="input" onchange="ccLibreFilter('direccion',this.value)">
            <option value="">Todas</option>
            <option value="cobrar" ${lf.direccion==='cobrar'?'selected':''}>A cobrar</option>
            <option value="pagar" ${lf.direccion==='pagar'?'selected':''}>A pagar</option>
          </select>
        </div>
      </div>
      <div class="kpi p-0 overflow-hidden">
        <table class="data">
          <thead><tr>
            <th>Fecha</th>
            <th>Vencimiento</th>
            <th>Categoría</th>
            <th>Nombre</th>
            <th>Detalle</th>
            <th class="text-right">A cobrar</th>
            <th class="text-right">A pagar</th>
            <th>Estado</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${filtrados.map(m => {
              const venc = m.vencimiento ? new Date(m.vencimiento) : null;
              const diasDif = venc ? Math.floor((venc.getTime() - hoy.getTime()) / 86400000) : null;
              let vencBadge = '<span class="text-slate-400">—</span>';
              if (venc) {
                const fStr = fmtDate(m.vencimiento);
                if (m.pagado) vencBadge = `<span class="text-slate-400">${fStr}</span>`;
                else if (diasDif < 0)  vencBadge = `${fStr} <span class="badge badge-red">Vencido ${-diasDif}d</span>`;
                else if (diasDif <= 15) vencBadge = `${fStr} <span class="badge badge-yellow">en ${diasDif}d</span>`;
                else vencBadge = `<span class="text-slate-600">${fStr}</span>`;
              }
              return `<tr class="table-row ${m.pagado?'opacity-60':''}">
                <td>${fmtDate(m.fecha)}</td>
                <td>${vencBadge}</td>
                <td>${m.categoria?`<span class="badge badge-gray">${esc(m.categoria)}</span>`:'—'}</td>
                <td>${esc(m.nombreLibre||'—')}</td>
                <td>${esc(m.detalle||'—')}${m.referencia?` <span class="text-[10px] text-slate-400">(${esc(m.referencia)})</span>`:''}</td>
                <td class="text-right text-emerald-700">${m.debe?fmt$(m.debe):'—'}</td>
                <td class="text-right text-red-600">${m.haber?fmt$(m.haber):'—'}</td>
                <td>${m.pagado?'<span class="badge badge-green">Pagado</span>':'<span class="badge badge-gray">Pendiente</span>'}</td>
                <td class="text-right whitespace-nowrap">
                  ${can('finanzas:update')?`<button class="btn btn-ghost text-xs" onclick='ccTogglePagado(${JSON.stringify(m.id)},${!m.pagado})'>${m.pagado?'Desmarcar':'Marcar pagado'}</button>`:''}
                  ${can('finanzas:update')?`<button class="btn btn-ghost text-xs" onclick='ccForm(${JSON.stringify(m.id)})'>✏️</button>`:''}
                  ${can('finanzas:delete')?`<button class="btn btn-ghost text-xs text-red-600" onclick='ccDel(${JSON.stringify(m.id)})'>🗑️</button>`:''}
                </td>
              </tr>`;
            }).join('') || '<tr><td colspan="9" class="text-center text-slate-400 py-8">No hay movimientos manuales con esos filtros</td></tr>'}
          </tbody>
        </table>
      </div>
      <p class="text-xs text-slate-500 mt-2">💡 Los totales de manuales son <b>independientes</b> de los de clientes y proveedores.</p>`;
  } else {
    body.innerHTML = `
      <div class="kpi p-0 overflow-hidden">
        <table class="data">
          <thead><tr>
            <th>${tab==='cobrar'?'Cliente':'Proveedor'}</th>
            <th class="text-center">Movimientos</th>
            <th class="text-right">Facturado (debe)</th>
            <th class="text-right">${tab==='cobrar'?'Cobrado':'Pagado'} (haber)</th>
            <th class="text-right">Saldo</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${grupos.map(g => `
              <tr class="table-row">
                <td><b>${esc(g.contacto.razonSocial)}</b></td>
                <td class="text-center text-slate-500">${g.movs.length}</td>
                <td class="text-right">${fmt$(g.debe)}</td>
                <td class="text-right text-emerald-700">${fmt$(g.haber)}</td>
                <td class="text-right font-bold ${g.saldo>0?(tab==='cobrar'?'text-amber-600':'text-red-600'):'text-slate-400'}">${fmt$(g.saldo)}</td>
                <td class="text-right whitespace-nowrap">
                  <button class="btn btn-ghost text-xs" onclick="ccVerMovimientos('${tipoActual}','${g.contacto.id}')">Ver movimientos</button>
                  ${can('finanzas:create') && g.saldo>0 ? `<button class="btn btn-primary text-xs" onclick="ccCobroPagoForm('${tipoActual}','${g.contacto.id}')">${accionLabel}</button>`:''}
                </td>
              </tr>`).join('') || `<tr><td colspan="6" class="text-center text-slate-400 py-8">Sin ${tab==='cobrar'?'clientes con saldo':'proveedores con saldo'}</td></tr>`}
          </tbody>
        </table>
      </div>
      <div class="mt-2 text-xs text-slate-500">💡 El saldo se alimenta automáticamente de las facturas. Registrá cobros/pagos para descontarlo.</div>`;
  }
};
function ccSwitchTab(t) { state.ccTab = t; pages.ctasCtes(); }

// Modal con el detalle de movimientos de un contacto, con saldo corriente.
function ccVerMovimientos(tipo, contactoId) {
  const data = state._ccData || {};
  const grupos = tipo==='cliente' ? (data.clientesCC||[]) : (data.proveedoresCC||[]);
  const g = grupos.find(x => x.contacto.id === contactoId);
  if (!g) return;
  const movs = g.movs.slice().sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  let saldoAc = 0;
  openModal({
    title: `Cuenta corriente — ${g.contacto.razonSocial}`,
    size: 'max-w-3xl',
    body: `
      <div class="mb-3 grid grid-cols-3 gap-2 text-center">
        <div class="bg-slate-50 rounded p-2"><div class="text-[11px] text-slate-500">Facturado</div><div class="font-bold">${fmt$(g.debe)}</div></div>
        <div class="bg-emerald-50 rounded p-2"><div class="text-[11px] text-slate-500">Cobrado/Pagado</div><div class="font-bold text-emerald-700">${fmt$(g.haber)}</div></div>
        <div class="bg-amber-50 rounded p-2"><div class="text-[11px] text-slate-500">Saldo</div><div class="font-bold ${g.saldo>0?'text-amber-600':'text-slate-400'}">${fmt$(g.saldo)}</div></div>
      </div>
      <table class="data">
        <thead><tr><th>Fecha</th><th>Detalle</th><th class="text-right">Debe</th><th class="text-right">Haber</th><th class="text-right">Saldo</th></tr></thead>
        <tbody>
          ${movs.map(m => {
            saldoAc += Number(m.debe||0) - Number(m.haber||0);
            return `<tr class="table-row">
              <td>${fmtDate(m.fecha)}</td>
              <td>${esc(m.detalle||'—')}${m.referencia?` <span class="text-[10px] text-slate-400">(${esc(m.referencia)})</span>`:''}</td>
              <td class="text-right">${m.debe?fmt$(m.debe):'—'}</td>
              <td class="text-right text-emerald-700">${m.haber?fmt$(m.haber):'—'}</td>
              <td class="text-right font-semibold">${fmt$(saldoAc)}</td>
            </tr>`;
          }).join('') || '<tr><td colspan="5" class="text-center text-slate-400 py-6">Sin movimientos</td></tr>'}
        </tbody>
      </table>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
             ${can('finanzas:create') && g.saldo>0 ? `<button class="btn btn-primary" onclick="closeModal();ccCobroPagoForm('${tipo}','${contactoId}')">${tipo==='cliente'?'Registrar cobro':'Registrar pago'}</button>`:''}`
  });
}

// Formulario para registrar un cobro (de cliente) o pago (a proveedor).
function ccCobroPagoForm(tipo, contactoId) {
  const data = state._ccData || {};
  const grupos = tipo==='cliente' ? (data.clientesCC||[]) : (data.proveedoresCC||[]);

}
async function ccCobroPagoSave(tipo, contactoId) {
  const monto = Number($('#f-cpmon').value || 0);
  if (!monto || monto <= 0) return toast('Importe requerido','warn');
  const esCobro = tipo==='cliente';
  const detalleUsuario = $('#f-cpdet').value.trim();
  const data = {
    contactoTipo: tipo,
    contactoId,
    fecha: new Date($('#f-cpfec').value).toISOString(),
    detalle: (esCobro ? 'Cobro recibido' : 'Pago realizado') + (detalleUsuario ? ' · ' + detalleUsuario : ''),
    debe: 0,
    haber: monto,   // un cobro/pago descuenta el saldo
    referencia: $('#f-cpref').value.trim() || null,
  };
  try {
    await api('/api/ctas-ctes', { method:'POST', body: JSON.stringify(data) });
    toast(esCobro ? 'Cobro registrado' : 'Pago registrado', 'success');
    closeModal(); delete state.cache.ctasCtes;
    // Si era un pago a proveedor y le saldamos la cuenta, marcamos como
    // pagados los viajes facturados de ese proveedor (best-effort).
    if (!esCobro) {
      try {
        const r = await api('/api/viajes/auto-settle', { method:'POST', body: JSON.stringify({ proveedorId: contactoId }) });
        if (r.updated > 0) { delete state.cache.viajes; toast(`${r.updated} viaje${r.updated===1?'':'s'} pasaron a pagado`, 'success'); }
      } catch {} // si el usuario no tiene logistica:update, ignoramos silenciosamente
    }
    pages.ctasCtes();
  } catch (e) { toast(e.message,'error'); }
}

async function pagoCobroCargarComprobantes(modo) {
  const esPago = modo === 'pago';
  const contactoId = document.getElementById('pc-contacto').value;
  const cont = document.getElementById('pc-comprobantes');
  if (!contactoId) {
    cont.innerHTML = `<div class="text-sm text-slate-500 text-center py-6">Seleccioná un ${esPago?'proveedor':'cliente'} para ver sus comprobantes pendientes</div>`;
    state._pagoCobroData.comprobantes = [];
    state._pagoCobroData.tildados = {};
    pagoCobroRecalcular();
    return;
  }
  cont.innerHTML = `<div class="text-sm text-slate-500 text-center py-6">Cargando...</div>`;
  try {
    const tipo = esPago ? 'proveedor' : 'cliente';
    const r = await api(`/api/ctas-ctes/pendientes?tipo=${tipo}&contactoId=${contactoId}`);
    const items = (r.data || []).map(it => {
      const saldoPendiente = esPago ? Number(it.haber || 0) - Number(it.debe || 0) : Number(it.debe || 0) - Number(it.haber || 0);
      return { ...it, saldoPendiente };
    }).filter(i => i.saldoPendiente > 0.01);
    state._pagoCobroData.comprobantes = items;
    state._pagoCobroData.tildados = {};
    if (!items.length) {
      cont.innerHTML = `<div class="text-sm text-slate-500 text-center py-6">No hay comprobantes pendientes para este ${esPago?'proveedor':'cliente'}.</div>`;
      pagoCobroRecalcular();
      return;
    }
    cont.innerHTML = `
      <div class="text-xs text-slate-600 mb-2">${items.length} comprobante${items.length===1?'':'s'} pendiente${items.length===1?'':'s'}. Tildá los que estás pagando y ajustá el importe si es parcial.</div>
      <div class="space-y-1 max-h-64 overflow-y-auto">
        ${items.map((it, idx) => `
          <div class="flex items-center gap-2 text-sm bg-white border border-slate-200 rounded p-2">
            <input type="checkbox" class="pc-tilde" data-idx="${idx}" onchange="pagoCobroToggleTilde(${idx}, this.checked)"/>
            <div class="flex-1 min-w-0">
              <div class="font-medium truncate">${esc(it.detalle || 'Comprobante')}</div>
              <div class="text-[11px] text-slate-500">${fmtDate(it.fecha)}${it.referencia ? ' · '+esc(it.referencia) : ''}</div>
            </div>
            <div class="text-right">
              <div class="text-[11px] text-slate-500">Saldo:</div>
              <div class="font-bold">${fmt$(it.saldoPendiente)}</div>
            </div>
            <input type="number" class="input text-right w-28 py-0 text-sm pc-importe" data-idx="${idx}" value="${it.saldoPendiente.toFixed(2)}" oninput="pagoCobroRecalcular()" min="0" step="0.01"/>
          </div>`).join('')}
      </div>`;
    pagoCobroRecalcular();
  } catch (e) {
    cont.innerHTML = `<div class="text-sm text-red-600 text-center py-6">${esc(e.message)}</div>`;
  }
}

function pagoCobroToggleTilde(idx, checked) {
  state._pagoCobroData.tildados[idx] = checked;
  pagoCobroRecalcular();
}

function pagoCobroRecalcular() {
  const d = state._pagoCobroData;
  let totalTildado = 0;
  for (const idx in d.tildados) {
    if (!d.tildados[idx]) continue;
    const inp = document.querySelector(`.pc-importe[data-idx="${idx}"]`);
    if (inp) totalTildado += Number(inp.value || 0);
  }
  document.getElementById('pc-total-tildado').textContent = fmt$(totalTildado);
  // Si el usuario no tocó el total a pagar, lo emparejamos
  const inpTotal = document.getElementById('pc-total-pago');
  if (!inpTotal.dataset.touched) inpTotal.value = totalTildado.toFixed(2);
  const totalPago = Number(inpTotal.value || 0);
  const diffEl = document.getElementById('pc-diff');
  const diff = totalPago - totalTildado;
  if (Math.abs(diff) < 0.01) {
    diffEl.innerHTML = '<span class="text-emerald-700">✅ Total coincide con comprobantes tildados.</span>';
  } else if (diff > 0) {
    diffEl.innerHTML = `<span class="text-amber-700">⚠️ Estás pagando $${diff.toFixed(2)} más de lo tildado. Será una <b>entrega a cuenta</b> sin asignación específica (no implementado todavía — ajustá los comprobantes).</span>`;
  } else {
    diffEl.innerHTML = `<span class="text-red-700">❌ El total tildado supera al total a pagar por $${(-diff).toFixed(2)}. Bajá importes o destildá.</span>`;
  }
  inpTotal.addEventListener('input', () => { inpTotal.dataset.touched = '1'; pagoCobroRecalcular(); }, { once: true });
}

async function pagoCobroConfirmar(modo) {
  const esPago = modo === 'pago';
  const d = state._pagoCobroData;
  const contactoId = document.getElementById('pc-contacto').value;
  if (!contactoId) return toast('Elegí un ' + (esPago?'proveedor':'cliente'), 'warn');
  const fecha = document.getElementById('pc-fecha').value;
  const metodo = document.getElementById('pc-metodo').value;
  const obs = document.getElementById('pc-obs').value || null;
  // Armar comprobantes
  const comprobantes = [];
  for (const idx in d.tildados) {
    if (!d.tildados[idx]) continue;
    const inp = document.querySelector(`.pc-importe[data-idx="${idx}"]`);
    const importe = Number(inp?.value || 0);
    if (importe <= 0) continue;
    comprobantes.push({ ctaCteId: d.comprobantes[idx].id, importeAplicado: importe });
  }
  if (!comprobantes.length) return toast('Tildá al menos un comprobante', 'warn');
  const monto = Number(document.getElementById('pc-total-pago').value || 0);
  if (monto <= 0) return toast('El monto debe ser mayor a 0', 'warn');
  const sumaComp = comprobantes.reduce((a,c) => a+c.importeAplicado, 0);
  if (Math.abs(sumaComp - monto) > 0.01) return toast(`La suma de comprobantes (${fmt$(sumaComp)}) no coincide con el monto (${fmt$(monto)})`, 'error');

  const body = {
    [esPago ? 'proveedorId' : 'clienteId']: contactoId,
    comprobantes, metodo, monto, fecha, observaciones: obs,
  };
  if (metodo === 'efectivo') body.cajaOrigen = document.getElementById('pc-caja')?.value || null;
  if (metodo === 'transferencia') body.bancoCuentaId = document.getElementById('pc-banco')?.value || null;
  if (metodo === 'cheque') {
    // En COBRO: si el usuario está cargando un cheque nuevo (modo por defecto), lo creamos primero
    if (!esPago && document.getElementById('pc-cheque-nuevo') && !document.getElementById('pc-cheque-nuevo').classList.contains('hidden')) {
      const banco = document.getElementById('pc-chn-banco')?.value.trim();
      const numero = document.getElementById('pc-chn-numero')?.value.trim();
      const fechaPago = document.getElementById('pc-chn-fpago')?.value;
      const tipoCh = document.getElementById('pc-chn-tipo')?.value || 'fisico';
      const montoCh = Number(document.getElementById('pc-chn-monto')?.value) || monto;
      const cuit = document.getElementById('pc-chn-cuit')?.value.trim() || null;
      const librador = document.getElementById('pc-chn-librador')?.value.trim() || null;
      if (!banco)  return toast('Falta banco del cheque', 'warn');
      if (!numero) return toast('Falta número del cheque', 'warn');
      if (!fechaPago) return toast('Falta fecha de pago del cheque', 'warn');
      try {
        const cli = (state.cache.clientes || []).find(c => c.id === contactoId);
        const chRsp = await api('/api/cheques', { method: 'POST', body: JSON.stringify({
          tipo: tipoCh,
          origen: 'tercero',                  // recibido del cliente
          banco, numero,
          monto: montoCh,
          fechaPago: new Date(fechaPago).toISOString(),
          fechaEmision: new Date(fecha).toISOString(),
          librador: librador || (cli?.razonSocial || null),
          cuitLibrador: cuit,
          estado: 'en cartera',
          observaciones: 'Recibido de ' + (cli?.razonSocial || 'cliente') + ' por cobranza',
        })});
        body.chequeId = chRsp.data?.id;
        if (!body.chequeId) throw new Error('No se obtuvo el ID del cheque creado');
      } catch (chErr) {
        return toast('No pude crear el cheque: ' + chErr.message, 'error');
      }
    } else {
      body.chequeId = document.getElementById('pc-cheque')?.value || null;
    }
  }
  if (metodo === 'intercompany') {
    const otraEmp = document.getElementById('pc-empresa-inter')?.value;
    if (!otraEmp) return toast('Seleccioná la firma del grupo', 'warn');
    if (esPago) body.empresaOrigenId = otraEmp;
    else body.empresaDestinoId = otraEmp;
  }
  try {
    const url = esPago ? '/api/pagos-proveedores' : '/api/cobros-clientes';
    await api(url, { method: 'POST', body: JSON.stringify(body) });
    closeModal();
    toast((esPago ? '💸 Pago' : '💰 Cobro') + ` registrado por ${fmt$(monto)} (${comprobantes.length} comprobante${comprobantes.length===1?'':'s'})`, 'success');
    pages.ctasCtes();
  } catch (e) { toast(e.message || 'Error al registrar', 'error'); }
}

/* =========================================================
 * 🔄 CUENTAS INTERCOMPANY — matriz de saldos cruzados entre firmas
 * ========================================================= */
pages.intercompany = async function() {
  setHeader('Cuentas Intercompany', 'Saldos cruzados entre las firmas del grupo');
  if (!can('finanzas:read')) { $('#page-body').innerHTML = stubPage('intercompany','Intercompany'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando...</div>`;
  let r;
  try { r = await api('/api/intercompany/saldos'); }
  catch (e) { return toast(e.message,'error'); }
  const emps = r.empresas || [];
  if (emps.length < 2) {
    $('#page-body').innerHTML = `<div class="kpi text-center text-slate-500 py-8">Para usar Intercompany necesitás al menos 2 empresas activas con saldos cruzados.</div>`;
    return;
  }
  const matriz = r.matriz || {};
  // Calcular netos: saldoAB = matriz[A][B] − matriz[B][A]
  function neto(a, b) {
    return (matriz[a]?.[b] || 0) - (matriz[b]?.[a] || 0);
  }
  $('#page-body').innerHTML = `
    <div class="bg-indigo-50 border border-indigo-200 rounded-lg p-3 mb-4 text-xs text-indigo-900">
      💡 <b>Cómo leer la matriz:</b> cada celda muestra el saldo NETO entre las dos firmas. <b>Positivo</b> (verde) = la firma de la fila tiene saldo a favor contra la de la columna. <b>Negativo</b> (rojo) = la firma de la fila le debe a la de la columna.
    </div>
    <div class="kpi p-0 overflow-x-auto">
      <table class="data text-sm">
        <thead><tr>
          <th class="text-left">Desde \\ Hacia</th>
          ${emps.map(e => `<th class="text-right">${esc(e.name)}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${emps.map(a => `<tr class="table-row">
            <td class="font-semibold">${esc(a.name)}</td>
            ${emps.map(b => {
              if (a.id === b.id) return `<td class="text-center text-slate-300">—</td>`;
              const n = neto(a.id, b.id);
              if (Math.abs(n) < 0.01) return `<td class="text-right text-slate-400">$0</td>`;
              return `<td class="text-right cursor-pointer hover:bg-slate-100" onclick='intercoVerMovs(${JSON.stringify(a.id)}, ${JSON.stringify(b.id)}, ${JSON.stringify(a.name)}, ${JSON.stringify(b.name)})'>
                <span class="font-bold ${n>=0?'text-emerald-700':'text-red-700'}">${n>=0?'+':''}${fmt$(n)}</span>
              </td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <p class="text-[11px] text-slate-500 mt-3">Click en una celda con saldo para ver los movimientos detallados entre esas dos firmas.</p>`;
};

function ccTipoChange() {
  const t = $('#f-ct').value;
  const esLibre = t==='libre';
  const show = (id, v) => { const el=$('#'+id); if(el) el.classList.toggle('hidden', !v); };
  show('f-wrap-contacto', !esLibre);
  show('f-wrap-libre', esLibre);
  show('f-wrap-libreExtra', esLibre);
  show('f-wrap-monto', esLibre);
  show('f-wrap-debe', !esLibre);
  show('f-wrap-haber', !esLibre);
  if (!esLibre) {
    const wc = $('#f-wrap-contacto');
    const label = wc.querySelector('.label');
    if (label) label.textContent = t==='cliente' ? 'Cliente' : 'Proveedor';
    const lst = t==='cliente' ? (state.cache.clientes||[]) : (state.cache.proveedores||[]);
    $('#f-contacto').innerHTML = lst.map(c=>`<option value="${c.id}">${esc(c.razonSocial)}</option>`).join('');
  }
}
function ccTogglePagadoFields() {
  const pag = $('#f-pag')?.checked;
  const wrap = $('#f-wrap-metodo');
  if (wrap) wrap.classList.toggle('hidden', !pag);
  if (pag) ccMetodoCambio();
}
function ccMetodoCambio() {
  const met = $('#f-met')?.value || 'efectivo';
  const det = $('#f-met-det');
  if (!det) return;
  // Detectar dirección (cobro vs pago)
  const dir = $('#f-dir')?.value || (Number($('#f-deb')?.value||0) > 0 ? 'cobrar' : 'pagar');
  const esPago = dir === 'pagar';
  if (met === 'efectivo') {
    const cajas = state.cache.efectivoCajas || [];
    det.innerHTML = cajas.length
      ? `<label class="label">${esPago ? 'Caja de la que sale' : 'Caja donde ingresa'}</label>
         <select id="f-met-caja" class="input"><option value="">— Elegir —</option>${cajas.map(c => `<option>${esc(c)}</option>`).join('')}</select>`
      : `<label class="label">${esPago ? 'Caja' : 'Caja'}</label><input id="f-met-caja" class="input" placeholder="Nombre de caja"/>`;
  } else if (met === 'cheque') {
    const cheques = (state.cache.cheques || []).filter(c => /en cartera|emitido|depositado/i.test(c.estado || ''));
    det.innerHTML = cheques.length
      ? `<label class="label">${esPago ? 'Cheque a entregar' : 'Cheque recibido (ya cargado en Tesorería)'}</label>
         <select id="f-met-cheque" class="input"><option value="">— Elegir —</option>${cheques.map(c => `<option value="${esc(c.id)}">${esc(c.banco||'Banco')} #${esc(c.numero||'?')} · ${fmt$(c.monto)} · vto ${c.fechaPago?fmtDate(c.fechaPago):'sin fecha'}</option>`).join('')}</select>`
      : `<div class="text-xs text-amber-700">⚠️ No hay cheques disponibles. Cargá uno en Tesorería → Cheques.</div>`;
  } else if (met === 'transferencia') {
    const cuentas = (state.cache.bancoCuentas || []).filter(c => c.activo !== false);
    det.innerHTML = cuentas.length
      ? `<label class="label">${esPago ? 'Cuenta desde la que se transfiere' : 'Cuenta donde ingresa'}</label>
         <select id="f-met-banco" class="input"><option value="">— Elegir —</option>${cuentas.map(c => `<option value="${esc(c.id)}">${esc(c.banco)}${c.numero?' · '+esc(c.numero):''}</option>`).join('')}</select>`
      : `<div class="text-xs text-amber-700">⚠️ No hay cuentas bancarias. Cargá una en Tesorería → Bancos.</div>`;
  } else {
    det.innerHTML = '<div class="text-xs text-slate-500">No se registra movimiento de recurso (solo se marca el CtaCte como pagado).</div>';
  }
}
async function ccSave(id) {
  const tipo = $('#f-ct').value;
  let data;
  if (tipo === 'libre') {
    const dir = $('#f-dir').value;
    const monto = Number($('#f-mon').value || 0);
    if (!monto || monto<=0) return toast('Ingresá un monto mayor a cero','warn');
    data = {
      contactoTipo: 'libre',
      contactoId: null,
      nombreLibre: $('#f-libre').value.trim() || null,
      fecha: new Date($('#f-fec').value).toISOString(),
      vencimiento: $('#f-venc').value ? new Date($('#f-venc').value).toISOString() : null,
      detalle: $('#f-det').value.trim(),
      categoria: $('#f-cat').value.trim() || null,
      debe:  dir==='cobrar' ? monto : 0,
      haber: dir==='pagar'  ? monto : 0,
      pagado: $('#f-pag').checked,
      referencia: $('#f-ref').value.trim() || null,
    };
  } else {
    data = {
      contactoTipo: tipo,
      contactoId: $('#f-contacto').value,
      nombreLibre: null,
      fecha: new Date($('#f-fec').value).toISOString(),
      detalle: $('#f-det').value.trim(),
      debe:  $('#f-deb').value ? Number($('#f-deb').value) : 0,
      haber: $('#f-hab').value ? Number($('#f-hab').value) : 0,
      referencia: $('#f-ref').value.trim() || null,
    };
  }
  if (!data.detalle) return toast('Detalle requerido','warn');
  try {
    // 1) Crear/editar la CtaCte
    await api('/api/ctas-ctes'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(data)});

    // 2) Si es nuevo y se marcó como pagado/cobrado, registrar el movimiento del recurso
    const metodoEl = document.getElementById('f-met');
    const metodo = metodoEl ? metodoEl.value : 'ninguno';
    if (!id && data.pagado && metodo && metodo !== 'ninguno') {
      const esPago = (Number(data.haber || 0) > 0);
      const monto = Number(data.haber || data.debe || 0);
      const concepto = data.detalle + (data.nombreLibre ? ' — ' + data.nombreLibre : '');
      try {
        if (metodo === 'efectivo') {
          const caja = document.getElementById('f-met-caja')?.value?.trim() || null;
          await api('/api/efectivo', { method: 'POST', body: JSON.stringify({
            fecha: data.fecha,
            tipo: esPago ? 'egreso' : 'ingreso',
            concepto, monto, caja,
            clasificacion: 'empresa',
            observaciones: data.referencia || null,
          })});
        } else if (metodo === 'transferencia') {
          const cuentaId = document.getElementById('f-met-banco')?.value || null;
          if (cuentaId) {
            await api('/api/banco-movimientos', { method: 'POST', body: JSON.stringify({
              cuentaId, fecha: data.fecha,
              tipo: esPago ? 'transferencia_out' : 'transferencia_in',
              concepto, monto,
              contraparte: data.nombreLibre || null,
              referencia: data.referencia || null,
            })});
          }
        } else if (metodo === 'cheque') {
          // Para cheque marcamos el cheque elegido como endosado/depositado (best effort)
          const chequeId = document.getElementById('f-met-cheque')?.value || null;
          if (chequeId) {
            const nuevoEstado = esPago ? 'endosado' : 'depositado';
            await api('/api/cheques/' + chequeId, { method: 'PUT', body: JSON.stringify({ estado: nuevoEstado })});
          }
        }
      } catch (mErr) {
        // El CtaCte ya quedó creado; avisamos que el movimiento del recurso no se pudo registrar
        toast('CtaCte creada, pero hubo un problema registrando el movimiento de ' + metodo + ': ' + mErr.message, 'warn');
      }
    }

    toast(id?'Actualizado':'Movimiento creado','success'); closeModal();
    delete state.cache.ctasCtes; pages.ctasCtes();
  } catch (e) { toast(e.message,'error'); }
}
async function ccTogglePagado(id, nuevo) {
  try {
    await api('/api/ctas-ctes/'+id,{method:'PUT', body: JSON.stringify({pagado: nuevo})});
    toast(nuevo?'Marcado como pagado':'Vuelve a pendiente','success');
    delete state.cache.ctasCtes; pages.ctasCtes();
  } catch (e) { toast(e.message,'error'); }
}
async function ccDel(id) {
  if (!confirm('¿Borrar este movimiento?')) return;
  try { await api('/api/ctas-ctes/'+id,{method:'DELETE'}); toast('Borrado','success'); delete state.cache.ctasCtes; pages.ctasCtes(); }
  catch (e) { toast(e.message,'error'); }
}

/* =========================================================
 * FLUJO DE CAJA
 * ========================================================= */
pages.flujoCaja = async function() {
  setHeader('Flujo de caja', 'Movimientos reales de las cajas de efectivo (entradas, salidas, saldo acumulado)');
  if (!can('finanzas:read')) { $('#page-body').innerHTML = stubPage('flujoCaja','Flujo de caja'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  destroyCharts();
  // Lee directamente del Control de Efectivo (modelo Efectivo).
  // Las transferencias entre cajas NO afectan el saldo total (son neutras).
  let efRows = [];
  try { efRows = (await api('/api/efectivo')).data || []; } catch (e) { return toast(e.message,'error'); }
  // Convertir cada movimiento de Efectivo a una fila normalizada para esta vista
  const rows = efRows
    .filter(e => e.tipo === 'ingreso' || e.tipo === 'egreso')   // excluir transferencias
    .map(e => ({
      id: e.id,
      fecha: e.fecha,
      concepto: e.concepto || '',
      categoria: e.clasificacion === 'propio' ? 'Propio' : 'Empresa',
      caja: e.caja || '(sin caja)',
      monto: e.tipo === 'ingreso' ? Number(e.monto || 0) : -Number(e.monto || 0),
      observaciones: e.observaciones || null,
    }));

  const ordered = [...rows].sort((a,b)=> new Date(a.fecha) - new Date(b.fecha));
  let acc = 0;
  ordered.forEach(r => { acc += Number(r.monto||0); r._saldo = acc; });
  const entradas = rows.filter(r => Number(r.monto||0) > 0).reduce((a,r)=>a+Number(r.monto),0);
  const salidas = rows.filter(r => Number(r.monto||0) < 0).reduce((a,r)=>a+Number(r.monto),0);

  // Agrupar por mes (últimos 6)
  const hoy = new Date();
  const meses = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth()-i, 1);
    meses.push({ key: d.toISOString().slice(0,7), label: d.toLocaleDateString('es-AR',{month:'short', year:'2-digit'}) });
  }
  const ingXMes = meses.map(m => rows.filter(r => (r.fecha||'').slice(0,7)===m.key && Number(r.monto)>0).reduce((a,r)=>a+Number(r.monto),0));

// Exporta los viajes FILTRADOS a Excel usando SheetJS (XLSX está cargado por CDN para otros usos).
// Si XLSX no está disponible globalmente, hace fallback a CSV.
function viajesExportarExcel() {
  const rows = state.cache.viajes || [];
  // Reaplica los filtros con la lógica de pages.viajes
  const f = state.viajeFilter || {};
  const q = (f.q || '').toLowerCase();
  const filtered = rows.filter(v => {
    if (f.desde) { const d = (v.fecha || '').slice(0, 10); if (d < f.desde) return false; }
    if (f.hasta) { const d = (v.fecha || '').slice(0, 10); if (d > f.hasta) return false; }
    if (f.producto && (v.producto || '').trim() !== f.producto) return false;
    if (f.origen && (v.origen || '').trim() !== f.origen) return false;
    if (f.estado && v.estado !== f.estado) return false;
    if (q) {
      return [v.origen, v.destino, v.producto, v.transportista, v.patente, v.cartaPorte, v.ctg, v.chofer, v.pagadorFlete]
        .some(x => (x || '').toLowerCase().includes(q));
    }
    return true;
  });
  if (filtered.length === 0) {
    toast('No hay viajes que exportar con los filtros actuales', 'warn');
    return;
  }
  const aoa = [[
    'Fecha', 'Origen', 'Destino', 'Producto',
    'Kg carga', 'Kg descarga', 'Diferencia',
    'Tarifa $/t', 'Flete total',
    'Transportista', 'CUIT transporte', 'Chofer', 'Patente', 'Acoplado', 'Tipo camión',
    'Carta de porte', 'CTG', 'Pagador del flete',
    'Combustible', 'Peajes', 'Comida', 'Varios', 'Total gastos',
    'Estado', 'Factura compra', 'Observaciones',
  ]];
  for (const v of filtered) {
    const fact = v.facturaCompra
      ? `${v.facturaCompra.tipo} ${String(v.facturaCompra.puntoVenta).padStart(4,'0')}-${String(v.facturaCompra.numero).padStart(8,'0')}`
      : '';
    const dif = Number(v.cantidad||0) - Number(v.kgDescarga||0);
    aoa.push([
      v.fecha ? String(v.fecha).slice(0, 10) : '',
      v.origen || '', v.destino || '', v.producto || '',
      v.cantidad || 0, v.kgDescarga || 0, dif,
      v.tarifa || 0, v.flete || 0,
      v.transportista || '', v.transporteCuit || '', v.chofer || '', v.patente || '', v.patenteAcoplado || '', v.tipoCamion || '',
      v.cartaPorte || '', v.ctg || '', v.pagadorFlete || '',
      v.combustible || 0, v.peajes || 0, v.comida || 0, v.varios || 0, v.total || 0,
      v.estado || '', fact, v.observaciones || '',
    ]);
  }
  // Si XLSX está cargado, usar excel real; si no, fallback a CSV
  if (typeof XLSX !== 'undefined' && XLSX.utils) {
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = aoa[0].map(() => ({ wch: 18 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Viajes');
    const fecha = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `viajes-${fecha}.xlsx`);
  } else {
    // CSV fallback
    const csv = aoa.map(r => r.map(c => {
      const s = String(c == null ? '' : c);
      return /[",\n;]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(';')).join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `viajes-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
  toast(`Se exportaron ${filtered.length} viajes`, 'success');
}

function viajeDestTipo() {
  const t = $('#f-dtipo').value;
  const wrap = $('#f-ddep-wrap');
  const hint = $('#f-dhint');
  if (wrap) wrap.style.display = (t === 'cerealera') ? '' : 'none';
  if (hint) {
    if (t === 'cerealera') hint.textContent = '💡 Al guardar el viaje, el cereal se descontará del campo y entrará al stock de la cerealera elegida (movimiento de entrega).';
    else if (t === 'venta_directa') hint.textContent = '💡 Después de guardar, podés cargar la liquidación de cereal desde la lista de viajes (botón 🧾).';
    else hint.textContent = '';
  }
}
function viajeRecalcDif() {
  const kg  = Number($('#f-kg')?.value||0);
  const kgd = Number($('#f-kgd')?.value||0);
  const el  = $('#f-dif');
  if (!el) return;
  if (!kg && !kgd) { el.textContent='—'; el.className='input bg-slate-50 font-semibold flex items-center text-slate-400'; return; }
  const dif = kg - kgd;
  el.textContent = (dif>=0?'':'+') + fmtN(Math.abs(dif)) + ' kg' + (dif>0?' menos':(dif<0?' más':''));
  el.className = 'input bg-slate-50 font-semibold flex items-center ' + (dif===0?'text-slate-500':(Math.abs(dif)>500?'text-red-600':'text-amber-700'));
}

// Atajo desde Viajes: abre el modal de entrega de cereal pre-cargado con
// los datos del viaje (cerealera destino, cantidad descargada, fecha, remito).
async function viajeEntregaCereal(viajeId) {
  const v = (state.cache.viajes||[]).find(x => x.id === viajeId);
  if (!v) return toast('Viaje no encontrado','error');
  if (!v.depositoDestinoId) return toast('Este viaje no tiene cerealera destino cargada','warn');
  await entregaCerealForm();
  // Pre-cargar con los datos del viaje
  setTimeout(() => {
    const productos = state.cache.productos || [];
    const prod = productos.find(p => (p.nombre||'').toLowerCase() === (v.producto||'').toLowerCase());
    if (prod) $('#ec-prod').value = prod.id;
    const cant = v.kgDescarga || v.cantidad || 0;
    if (cant) $('#ec-cant').value = prod?.unidad === 'tn' ? (cant / 1000) : cant;
    $('#ec-dest').value = v.depositoDestinoId;
    $('#ec-fec').value = String(v.fecha).slice(0, 10);
    $('#ec-rem').value = v.cartaPorte || '';
    $('#ec-obs').value = `Desde viaje ${v.ctg ? 'CTG ' + v.ctg : ''} · CP ${v.cartaPorte || ''}`.trim();
  }, 50);
}

// Atajo desde Viajes: abre el modal de liquidación de cereal pre-cargado.
async function viajeLiquidacion(viajeId) {
  const v = (state.cache.viajes||[]).find(x => x.id === viajeId);
  if (!v) return toast('Viaje no encontrado','error');
  await liqForm();
  setTimeout(() => {
    const productos = state.cache.productos || [];
    const prod = productos.find(p => (p.nombre||'').toLowerCase() === (v.producto||'').toLowerCase());
    if (prod) { const sel = $('#lq-prod'); if (sel && [...sel.options].some(o=>o.value===prod.id)) sel.value = prod.id; }
    const kg = v.kgDescarga || v.cantidad || 0;
    if (kg) { $('#lq-brut').value = kg; }

    $('#lq-obs').value = `Desde viaje ${v.ctg ? 'CTG ' + v.ctg : ''}`.trim();

      </div>

        <button class="btn btn-primary mb-3" onclick="ctgConsultarTodos()">🔁 Consultar todos en ARCA (automático)</button>

// Si ARCA no está configurado, ofrecemos ir a configurarlo en vez de fallar mudo.
function _arcaCheckOConfig() {
  if (state._arcaEstado?.configurado) return true;
  if (confirm('ARCA no está configurado para esta empresa.\n\n¿Querés ir a Configuración → ARCA para cargar el certificado ahora?')) {
    closeModal();
    state.configTab = 'arca';
    go('configuracion');
  }
  return false;
}
async function ctgConsultarUno(viajeId) {
  if (!_arcaCheckOConfig()) return;
  try {
    const r = await api('/api/empresas/'+state.companyId+'/arca/consultar-ctg', { method:'POST', body: JSON.stringify({ viajeIds: [viajeId] }) });
    const res = (r.data || [])[0];
    if (!res) return toast('Sin respuesta de ARCA','warn');
    _ctgAplicar(res);
    if (res.error)            toast('ARCA: ' + res.error, 'error');
    else if (res.kgRecibidos) toast(`CTG ${res.ctg}: ${fmtN(res.kgRecibidos)} kg recibidos`, 'success');
    else                      toast(`CTG ${res.ctg}: ${res.estadoDescripcion || 'consultado'} (ARCA no devolvió kg)`, 'warn');
  } catch (e) { toast(e.message,'error'); }
}
async function ctgConsultarTodos() {
  const viajes = state._ctgViajes || [];
  if (!viajes.length) return;
  if (!_arcaCheckOConfig()) return;
  try {
    toast('Consultando '+viajes.length+' CTG'+(viajes.length===1?'':'s')+' en ARCA…','info');
    const r = await api('/api/empresas/'+state.companyId+'/arca/consultar-ctg', { method:'POST', body: JSON.stringify({ viajeIds: viajes.map(v=>v.id) }) });
    const list = r.data || [];
    list.forEach(_ctgAplicar);
    const ok = list.filter(x => !x.error).length;
    const er = list.length - ok;
    toast(`Consulta terminada: ${ok} OK${er?` · ${er} con error (mirá el badge rojo)`:''}.`, er?'warn':'success');
  } catch (e) { toast(e.message,'error'); }
}
function _ctgAplicar(res) {
  const kgEl  = $('#ctg-kgd-'+res.viajeId);
  const estEl = $('#ctg-est-'+res.viajeId);
  if (res.error) {
    if (estEl) estEl.innerHTML = `<span class="badge badge-red text-[10px]" title="${esc(res.error)}">⚠ Error</span>`;
    return;
  }
  if (kgEl && res.kgRecibidos) kgEl.value = res.kgRecibidos;
  if (estEl) {
    const cls = (res.estado === 'AC' || /aceptad/i.test(res.estadoDescripcion||'')) ? 'badge-green'
              : (res.estado === 'RE' || /rechaz/i.test(res.estadoDescripcion||'')) ? 'badge-red'
              : 'badge-yellow';
    estEl.innerHTML = `<span class="badge ${cls} text-[10px]">${esc(res.estadoDescripcion || res.estado || 'OK')}</span>`;
  }
}
async function ctgGuardar(viajeId) {

// Sube el PDF y autopobla los campos de la factura usando el parser de ARCA.
async function viajeFacPagarCargarPDF(input) {
  const archivo = input?.files?.[0];
  if (!archivo) return;
  const msg = document.getElementById('vfp-pdf-msg');
  if (msg) msg.innerHTML = '<span class="text-blue-700">⏳ Leyendo PDF...</span>';
  try {
    const fd = new FormData();
    fd.append('archivo', archivo);
    const r = await fetch(API_BASE + '/api/admin/parse-factura-pdf', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + state.token, 'X-Company-Id': state.companyId },
      body: fd,
    });
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || 'Error ' + r.status);
    const d = j.data;
    const setVal = (id, v) => { const el = document.getElementById(id); if (el && v != null && v !== '') el.value = v; };
    setVal('vfp-tipo', d.tipoCmpLetra || 'A');
    setVal('vfp-pv',   d.puntoVenta || 1);
    setVal('vfp-nro',  d.numero || 1);
    if (d.fecha) setVal('vfp-fecha', d.fecha.slice(0, 10));
    if (d.total) setVal('vfp-total', d.total.toFixed(2));
    // Buscar proveedor por CUIT
    if (d.cuitEmisor) {
      const provs = state.cache.proveedores || [];
      const cuitNorm = String(d.cuitEmisor).replace(/[-.\s]/g, '');
      const match = provs.find(p => String(p.cuit || '').replace(/[-.\s]/g, '') === cuitNorm);
      if (match) setVal('vfp-prov', match.id);
    }
    if (msg) msg.innerHTML = `<span class="text-emerald-700">✅ Cargado: ${d.tipoCmpLetra||'?'} ${String(d.puntoVenta).padStart(4,'0')}-${String(d.numero).padStart(8,'0')} · ${d.razonSocialEmisor||''} · CAE ${d.cae||'?'}${d.fuente==='QR_ARCA'?' (fuente: QR)':' (fuente: texto del PDF)'}</span>`;
  } catch (e) {
    if (msg) msg.innerHTML = `<span class="text-red-700">❌ ${esc(e.message)}</span>`;
  } finally {
    input.value = '';
  }
}

async function viajeFacturarYPagarConfirmar() {
  const viajeId = state._viajeFacPagar?.viajeId;
  if (!viajeId) return toast('Falta viaje', 'error');
  const proveedorId = document.getElementById('vfp-prov').value || null; // OPCIONAL
  const tipo = document.getElementById('vfp-tipo').value;
  const pv = Number(document.getElementById('vfp-pv').value || 0);
  const nro = Number(document.getElementById('vfp-nro').value || 0);
  const fecha = document.getElementById('vfp-fecha').value;
  const total = Number(document.getElementById('vfp-total').value || 0);
  const obs = document.getElementById('vfp-obs').value || null;
  const pagarAhora = document.getElementById('vfp-pagar-ahora')?.checked;
  if (!pv || !nro) return toast('Faltan punto de venta o número de factura', 'warn');
  if (!total || total <= 0) return toast('El total tiene que ser mayor a 0', 'warn');
  if (pagarAhora && !proveedorId) return toast('Para pagar ahora hace falta elegir un proveedor (o crear uno nuevo)', 'warn');

  try {
    const v = (state.cache.viajes || []).find(x => x.id === viajeId);
    const desc = `Flete viaje ${fmtDate(v?.fecha || new Date())} · ${v?.origen||''} → ${v?.destino||''}${v?.cantidad?' · '+fmtN(v.cantidad)+' kg':''}`;
    const aplIva = (tipo === 'A') ? 21 : 0;
    const neto = aplIva ? +(total / (1 + aplIva/100)).toFixed(2) : total;

    // Paso 1: crear factura de compra (proveedor puede ser null)
    const facBody = {
      tipo, puntoVenta: pv, numero: nro,
      fecha: new Date(fecha).toISOString(),
      proveedorId, condicionCompra: pagarAhora ? 'Contado' : 'Cta cte 30 días',
      observaciones: 'Flete viaje ' + viajeId + (obs ? ' · ' + obs : ''),
      items: [{ productoId: null, descripcion: desc, cantidad: 1, precioUnit: neto, alicuotaIva: aplIva }],
    };
    const facRsp = await api('/api/facturas-compra', { method: 'POST', body: JSON.stringify(facBody) });
    const facturaId = facRsp.data?.id;
    if (!facturaId) throw new Error('No se obtuvo el ID de la factura creada');

    // Paso 2: vincular factura al viaje (estado pasa a "facturado" automáticamente por el derive del backend)
    await api('/api/viajes/' + viajeId, { method: 'PUT', body: JSON.stringify({ facturaCompraId: facturaId }) });

    // Paso 3: si pagarAhora == true, pagar la factura
    if (pagarAhora) {
      const pendRsp = await api(`/api/ctas-ctes/pendientes?tipo=proveedor&contactoId=${encodeURIComponent(proveedorId)}`);
      const pend = (pendRsp.data || []).filter(c => Math.abs(Number(c.haber||0) - total) < 0.01)
        .sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
      if (!pend.length) throw new Error('Se creó la factura pero no encontré el comprobante recién generado para pagarlo. Pagalo a mano desde Cuentas a Pagar.');
      const ctaCteId = pend[0].id;

      const metodo = document.getElementById('vfp-metodo').value;
      const pagoBody = {
        proveedorId,
        comprobantes: [{ ctaCteId, importeAplicado: total }],
        metodo, monto: total,
        fecha: new Date(fecha).toISOString(),
        observaciones: 'Pago flete viaje ' + viajeId + (obs ? ' · ' + obs : ''),
      };
      if (metodo === 'efectivo')      pagoBody.cajaOrigen    = document.getElementById('vfp-caja')?.value || null;
      if (metodo === 'cheque')        pagoBody.chequeId      = document.getElementById('vfp-cheque')?.value || null;
      if (metodo === 'transferencia') pagoBody.bancoCuentaId = document.getElementById('vfp-banco')?.value || null;
      if (metodo === 'efectivo'      && !pagoBody.cajaOrigen)    throw new Error('Elegí la caja de efectivo');
      if (metodo === 'cheque'        && !pagoBody.chequeId)      throw new Error('Elegí el cheque a entregar');
      if (metodo === 'transferencia' && !pagoBody.bancoCuentaId) throw new Error('Elegí la cuenta bancaria');
      await api('/api/pagos-proveedores', { method: 'POST', body: JSON.stringify(pagoBody) });

      // Marcar viaje como pagado
      await api('/api/viajes/' + viajeId, { method: 'PUT', body: JSON.stringify({ estado: 'pagado' }) });
    }

    closeModal();
    toast(pagarAhora
      ? '✅ Flete facturado y pagado por ' + fmt$(total)
      : '✅ Flete facturado (pendiente de pago) por ' + fmt$(total),
      'success');
    delete state.cache.viajes; pages.viajes();
  } catch (e) {
    toast(e.message || 'Error al facturar/pagar', 'error');
  }
}

// Emoji por producto (default 🌾 para todo lo demás).
function _emojiProducto(p) {
  const x = String(p || '').toLowerCase();
  if (x.includes('maíz') || x.includes('maiz')) return '🌽';
  if (x.includes('girasol'))                    return '🌻';
  if (x.includes('soja'))                       return '🫘';
  if (x.includes('trigo') || x.includes('sorgo') || x.includes('cebada') || x.includes('avena')) return '🌾';
  return '🌾';
}

function solicitarCamionEnviar() {
  const get = (id) => ($('#'+id)?.value || '').trim();
  const fmtMonto = (v) => '$ ' + Number(v).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const prod = get('sc-prod');
  const ori  = get('sc-ori');
  const des  = get('sc-des');
  const dis  = get('sc-dis');
  const tar  = get('sc-tar');
  const fec  = get('sc-fec');
  const cant = get('sc-cant');
  const cupo = get('sc-cupo');
  const tipo = get('sc-tipo');
  const extra= get('sc-extra');

  // Si no completó nada, avisamos.
  if (![prod,ori,des,dis,tar,fec,cant,cupo,tipo,extra].some(v=>v)) {
    return toast('Completá al menos un campo','warn');
  }

  const lineas = [];
  // 🔴 Necesito camiones para Maíz 🌽
  if (prod) lineas.push(`🔴 Necesito camiones para *${prod}* ${_emojiProducto(prod)}`);
  // 📍 Zona Juan Llerena → Rosario
  if (ori && des)      lineas.push(`📍 ${ori} → ${des}`);
  else if (ori)        lineas.push(`📍 Origen: ${ori}`);
  else if (des)        lineas.push(`📍 Destino: ${des}`);
  if (dis)             lineas.push(`📏 Distancia: ${dis} km`);
  if (tar)             lineas.push(`💲 Tarifa ${fmtMonto(tar)} / ton`);
  if (fec)             lineas.push(`📅 Fecha de carga: ${fmtDate(fec)}`);
  if (cant)            lineas.push(`🔢 Cantidad: ${cant} camion${cant=='1'?'':'es'}`);
  if (cupo)            lineas.push(`📆 Fecha de cupo: ${fmtDate(cupo)}`);
  if (tipo)            lineas.push(`🚛 Camión: ${tipo}`);
  if (extra)           lineas.push(`ℹ️ ${extra}`);

  const empresa = nombreEmpresaActiva();
  const mensaje = lineas.join('\n') + `\n\n— Solicitado por *${empresa}* (vía AgroCore). Gracias!`;
  const s = state.settings || {};
  openWhatsApp(s.logisticaTelefono, mensaje);
  closeModal();
}
