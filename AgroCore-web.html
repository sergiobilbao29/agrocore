      desc:'Configuración → Importación suma 3 importadores adaptados a los formatos reales del cliente: (1) TRANSFERENCIAS bancarias — lee la hoja "Todas" y crea automáticamente la cuenta bancaria por cada banco que aparezca + un movimiento de transferencia saliente por fila; (2) CUENTAS CORRIENTES saldos pendientes — lee la hoja "Resumen" con su header en fila 3, levanta los saldos como cuentas corrientes "libres" con vencimiento, las marcadas Pagado quedan saldadas; (3) STOCK DE HACIENDA — una hoja por Renspa/campo, crea el campo si no existe y carga el stock real por categoría (especie + categoría), si ya hay datos los actualiza.' },
    { tag:'Fix', color:'bg-amber-100 text-amber-800 border-amber-300', fecha:'10/06/2026',
      titulo:'🐛 Logos del login no cargaban en instalaciones nuevas',
      desc:'En instalaciones limpias el repositorio web/ es un submódulo de git y no se bajaba con el clone inicial. El script Update-AgroCore.ps1 ahora ejecuta automáticamente git submodule update --init --recursive después de cada pull, así los logos, manual y landing siempre quedan sincronizados. Se agregó el archivo .gitmodules al repositorio principal para que git sepa dónde buscar el contenido del submódulo.' },
    { tag:'Nuevo', color:'bg-green-100 text-green-800 border-green-300', fecha:'08/06/2026',
      titulo:'🗑️ Eliminar usuarios, empresas y roles desde el panel',
      desc:'Botón 🗑️ en Administración → Usuarios, Empresas y Roles. Permisos: Usuarios solo el Super Admin; Empresas el Super Admin o el Administrador de esa empresa; Roles el Super Admin o cualquier Administrador. El Super Admin además puede borrar los roles "de sistema" (contable, operaciones, lectura) — útil para limpiar el sistema y dejar solo los roles que el cliente necesita. El rol "Administrador" nunca se borra (es el rol base de admin de empresa). Todas las eliminaciones piden DOBLE confirmación: advertencia + tipear el nombre exacto. Salvaguardas: (a) no te podés borrar a vos mismo, (b) no se puede borrar al último Super Admin activo, (c) no podés borrar la única empresa a la que tenés acceso si no sos Super Admin, (d) si hay datos asociados (movimientos, facturas, usuarios usando el rol) se rechaza por defecto. Para casos delicados hay opción de "forzar": movimientos quedan sin autor, empresa se borra en cascada, usuarios con ese rol pasan a "Lectura".' },
    { tag:'Nuevo', color:'bg-indigo-100 text-indigo-800 border-indigo-300', fecha:'08/06/2026',
      titulo:'🚀 Asistente "Preparar para entrega al cliente"',
      desc:'Nuevo botón en Configuración → Sistema. Analiza la base y muestra checkboxes para limpiar todo lo "demo" antes de entregar al cliente: usuarios seed (Admin, Super), roles de sistema sin usuarios asignados, empresas cuyo nombre tiene "demo/prueba/test", y te avisa si tu Super Admin todavía tiene la contraseña por defecto. Vos marcás qué borrar, tipeás PREPARAR para confirmar, y se ejecuta todo en una sola pasada. Al final muestra un resumen con éxitos y errores. Recomendado: hacer un Backup antes por las dudas.' },
    { tag:'Seguridad', color:'bg-rose-100 text-rose-800 border-rose-300', fecha:'08/06/2026',
      titulo:'🙈 El login oculta solo los hints de usuarios de prueba',
      desc:'La pantalla de login mostraba siempre "Usuarios de prueba: Admin/admin123, Super/super123" — útil en demo, peligroso en producción. Ahora el hint solo aparece si esos usuarios existen realmente en la base. Al implementar en un cliente, en cuanto borres esos usuarios del sistema (Administración → Usuarios → 🗑️) el hint desaparece automáticamente de la pantalla de login — no hay que tocar ningún archivo ni configuración. Si querés verificar antes de entregar al cliente, abrí el login en una pestaña incógnito.' },
    { tag:'Seguridad', color:'bg-rose-100 text-rose-800 border-rose-300', fecha:'08/06/2026',
      titulo:'🔒 Sesión más estricta — cerrar navegador = cerrar sesión',
      desc:'Por defecto la sesión ahora muere cuando cerrás el navegador: si dejás el equipo abierto, otra persona NO entra automáticamente con tu usuario. El sistema también desloguea sólo a los 30 minutos sin actividad (mouse / teclado / clicks). Si querés el comportamiento anterior (sesión persistente entre arranques), tildá "Recordarme en este equipo" en el login. Solo hay que loguearse una vez con el tilde puesto y queda fijo para los próximos arranques en esa PC.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'08/06/2026',
      titulo:'♻️ Restaurar backup desde archivo .sql',
      desc:'Configuración → Sistema → "Restaurar backup desde archivo". Subís un archivo .sql generado por AgroCore (o por pg_dump compatible) y el sistema lo aplica con psql sobre la base. La operación corre dentro de una transacción: si algo falla a mitad de camino se hace ROLLBACK automático y la base queda intacta. Requiere tipear RESTAURAR para confirmar y solo lo puede ejecutar un Super Admin. Soporta archivos de hasta 500 MB. Aviso claro de que la operación PISA toda la información cargada y se recomienda recargar o re-loguear cuando termina para refrescar los datos en pantalla.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'08/06/2026',
      titulo:'📋 3 plantillas para consolidar gastos del cliente',
      desc:'Se sumaron 3 plantillas Excel en Configuración → Importación: Gastos administrativos (Oficina/Damian/etc. → Control de Efectivo por caja), Gastos propios (chanchito Luciano/Lucas/etc. con clasificación empresa/propio → Efectivo), y Gastos de empleados (movimientos de planilla con tipo ganancia/gasto, categoría, horas y valor hora). Pensadas para reemplazar los Excel históricos del cliente que tienen muchas hojas mezcladas con totales — el operador consolida en la planilla plana y el sistema carga todo al lugar correcto.' },
    { tag:'Fix',    color:'bg-amber-100 text-amber-800 border-amber-300', fecha:'08/06/2026',
      titulo:'🐛 Backup: arreglado el "parámetro de URI no válido: schema"',
      desc:'El backup fallaba con código 1 porque pg_dump no acepta el parámetro ?schema=public que Prisma agrega al final del DATABASE_URL. El sistema ahora corta el URL en el "?" antes de pasárselo a pg_dump. Lo mismo aplica al restore: usa la versión limpia del URL.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'08/06/2026',
      titulo:'📥 Importación directa desde Excel del cliente (sin re-armar)',
      desc:'Configuración → Importación arriba aparece "Importación directa desde los Excel del cliente" con 5 importadores adaptados: CONTROL DE CHEQUES (3 hojas: físicos/echeq tercero/echeq emitidos), CREDITOS BANCARIOS (una hoja por banco = un crédito con sus cuotas), Cartas de Porte (se cargan como Viajes con CTG), Control efectivo (DIARI0/OFICINA/LUCAS/LUCIANO → cajas), CERDOS ventas. Estos importadores leen el archivo TAL COMO viene de planillas administrativas, sin necesidad de re-armar la información en una plantilla. Para datos nuevos o archivos muy desestructurados (gastos por persona con totales mezclados), siguen las plantillas estándar abajo.' },
    { tag:'Fix',    color:'bg-amber-100 text-amber-800 border-amber-300', fecha:'08/06/2026',
      titulo:'🐛 Backup: diagnóstico real cuando falla',
      desc:'Cuando el backup falla, el sistema ahora muestra un modal con (1) el error EXACTO devuelto por el backend, (2) la lista completa de paths donde buscó pg_dump, y (3) pasos numerados para resolverlo (agregar la carpeta bin al PATH, configurar PGBIN en el .env, etc.). Antes mostraba un toast genérico que no ayudaba a diagnosticar.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'08/06/2026',
      titulo:'📦 Instalador .exe + actualizaciones automáticas + versionado',
      desc:'Se generó la base de un instalador único .exe (con Inno Setup) que instala Node, PostgreSQL, AgroCore, crea la base, configura el .env y deja el sistema funcionando en 5 minutos en una PC limpia. Para actualizar el sistema instalado, hay un script Update-AgroCore.ps1 (accesible desde menú Inicio → AgroCore → Actualizar) que hace backup automático, pullea la última versión, aplica migraciones y reinicia. El sistema ahora muestra su versión actual en el sidebar (debajo del logo) y en Configuración → Sistema hay un botón "Verificar actualizaciones" que consulta GitHub.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'08/06/2026',
      titulo:'🔗 Enlaces externos configurables en el Inicio',
      desc:'Nuevo panel "🔗 Enlaces externos" en el Inicio, debajo de los Accesos rápidos. Cada usuario agrega los sitios que más usa (ARCA, AFIP, BCR, su banco, el portal del contador, etc.) para tenerlos a un clic. Botón ⚙️ Personalizar abre un modal con sugeridos pre-cargados (AFIP, BCR Rosario, Banco Nación, SENASA) y permite agregar cualquier URL con su icono y nombre. Se guardan por usuario y se sincronizan entre dispositivos.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'08/06/2026',
      titulo:'📲 Instalar AgroCore como app en escritorio o celular (PWA)',
      desc:'Si el navegador detecta que AgroCore se puede instalar como PWA, aparece una card verde en el Inicio con un botón "⬇️ Instalar app". La app queda como un acceso directo nativo en el escritorio (PC) o pantalla de inicio (celular), abre sin barra de navegador, y funciona en modo offline. Si tu navegador no expone el prompt automático, el modal te explica los pasos manuales para Safari (iPhone), Chrome (Android) o Chrome/Edge (PC).' },
    { tag:'Fix',    color:'bg-amber-100 text-amber-800 border-amber-300', fecha:'08/06/2026',
      titulo:'🐛 Backup completo: ahora detecta pg_dump y devuelve error claro',
      desc:'El backup descargaba un archivo vacío cuando pg_dump no estaba en el PATH del sistema (caso típico en Windows). Ahora el sistema busca pg_dump en las rutas de instalación habituales de PostgreSQL (C:\\Program Files\\PostgreSQL\\<ver>\\bin) y, si no lo encuentra, devuelve un error claro con instrucciones en lugar de un archivo vacío. Además, valida el exit code del proceso antes de mandar el archivo — si pg_dump falla a la mitad, vas a recibir un JSON con el error real, no un .sql roto.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'06/06/2026',
      titulo:'📋 Control de stock con planilla de conteo físico',
      desc:'En Stock aparece un botón "📋 Control de stock" que exporta una planilla Excel con el stock actual del sistema por producto y depósito, más una columna vacía "conteo" para llenar con el conteo físico. Al volver a subir el archivo, el sistema genera automáticamente los movimientos de ajuste con motivo "control_stock", firmados con tu usuario y la fecha. Si la columna de conteo queda vacía en una fila, esa fila no se ajusta. Reporta cuántos ajustes hizo, cuántas filas no tenían cambios y cuántas quedaron sin cargar. Respeta el filtro de categoría activo en la pantalla — exportás solo lo que querés contar.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'06/06/2026',
      titulo:'📥 Importación masiva de datos por Excel — 10 plantillas',
      desc:'Configuración → tab Importación con 10 plantillas: Clientes, Proveedores, Productos, Cheques, Arrendamientos, Empleados, Cuentas bancarias, Saldos iniciales de clientes y proveedores, Stock inicial. Cada plantilla tiene encabezado con campos esperados, una fila de ejemplo y una hoja de instrucciones. Descargás la plantilla, la pasás al cliente para que la llene con sus datos, la subís de vuelta y el sistema importa fila por fila con reporte de éxitos y errores (con detalle de qué fila falló y por qué). Pensado para acelerar el alta inicial cuando se onboardea un cliente nuevo.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'06/06/2026',
      titulo:'🛠️ Tab Sistema: backup completo y limpieza de empresa',
      desc:'Configuración → tab Sistema (solo Super Admin) con dos operaciones críticas: (1) <b>Descargar backup completo</b> — genera un archivo .sql con TODA la base (todas las empresas, usuarios, movimientos), restaurable en cualquier PostgreSQL. (2) <b>Limpiar movimientos de empresa</b> — borra todos los movimientos contables, y opcionalmente también stock, cuentas bancarias/cajas, producción (campos/lotes/campañas) y empleados, dejando intactos los catálogos compartidos. Requiere tipear "BORRAR" para confirmar. Útil para preparar una empresa de cero después de probar el sistema con datos demo.' },
    { tag:'Mejora', color:'bg-blue-100 text-blue-800 border-blue-300',    fecha:'05/06/2026',
      titulo:'📂 Menú reorganizado por proceso administrativo + buscador + secciones plegables',
      desc:'El menú lateral se reagrupó siguiendo el flujo real del negocio: TABLERO (vistas rápidas) → VENTAS → COMPRAS → TESORERÍA (bancos, cheques, efectivo, créditos, arrendamientos) → PRODUCCIÓN → STOCK Y DEPÓSITOS → LOGÍSTICA → RRHH → ADMINISTRACIÓN. Cada sección ahora es plegable haciendo clic en el nombre (▾/▸), con contador de módulos. Arriba un buscador para saltar a cualquier módulo tipeando "cheq" o "viaje". El estado de plegado y la empresa activa quedan guardados por usuario. Además el bloque de arriba del menú se compactó para aprovechar el espacio.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'05/06/2026',
      titulo:'⚡ Accesos directos del Inicio configurables por usuario',
      desc:'En el Inicio, arriba de los "Accesos rápidos", aparece el botón ⚙️ Personalizar. Cada usuario elige qué módulos ve pinneados en su panel (Facturación, Cheques, Empleados, lo que más use), con un modal agrupado por sección y un máximo de 12. La selección se guarda en la base con el usuario, así que la ves igual desde la PC de la oficina, el celular o cualquier dispositivo donde te logueés.' },
    { tag:'Mejora', color:'bg-blue-100 text-blue-800 border-blue-300',    fecha:'05/06/2026',
      titulo:'🔐 Roles y permisos: grilla agrupada por proceso administrativo',
      desc:'La pantalla de Roles y permisos ahora muestra la grilla agrupada por proceso (Ventas, Compras, Tesorería, Producción, Stock, Logística/RRHH, Administración), con la misma estructura del menú lateral. Se sumaron sub-permisos finos nuevos para Bancos (crear cuentas, cargar movimientos manuales, eliminar movimientos), labor avanzada (modificar precios y %) y los demás módulos creados últimamente. Si no marcás ninguno en un grupo, sigue heredando del permiso del área — todo lo anterior sigue funcionando.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'05/06/2026',
      titulo:'🏛️ Módulo Bancos completo — cuentas, movimientos y conciliación automática',
      desc:'Nueva sección Finanzas → Bancos. Cargás cuentas bancarias (banco, sucursal, tipo cta cte / caja ahorro / USD, número, CBU, alias, titular, saldo de apertura) y todos los movimientos: depósitos, extracciones, transferencias entre cuentas propias, cheques cobrados o pagados, créditos acreditados, cuotas de crédito, comisiones, impuestos. Cada cuenta muestra su saldo en vivo y los totales por moneda (ARS y USD) arriba. Al entrar a una cuenta se ve el extracto con saldo corriente fila a fila y el usuario que cargó cada movimiento. Las transferencias entre cuentas propias generan automáticamente el movimiento espejo en la otra cuenta — si borrás uno, se borran los dos.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'05/06/2026',
      titulo:'🔗 Cheques y créditos se integran con Bancos automáticamente',
      desc:'Al marcar un cheque como depositado / cobrado (terceros) o pagado / cobrado (propio), un botón abre un modal donde elegís la cuenta bancaria — y el sistema genera solo el movimiento bancario asociado (ingreso o egreso) con el monto del cheque. Si después cambiás el estado o la cuenta, el movimiento se actualiza; si lo dejás en "en cartera", se elimina. Lo mismo pasa al marcar una cuota de crédito como pagada por transferencia o débito automático: si elegís la cuenta bancaria, queda registrado el egreso en el extracto. Trazabilidad completa sin doble carga.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'05/06/2026',
      titulo:'🌐 Depósitos compartidos entre empresas',
      desc:'En el formulario de Cerealeras / Depósitos hay un check nuevo "Compartido entre todas mis empresas". Si lo activás, el depósito es visible y usable desde cualquiera de las empresas que tengas asociadas — pensado para cerealeras o silos que uses con varias razones sociales del mismo grupo. Si lo dejás desactivado, sigue siendo privado a la empresa actual. En la lista aparece un badge "🌐 Compartido" para distinguir los dos casos.' },
    { tag:'Mejora', color:'bg-blue-100 text-blue-800 border-blue-300',    fecha:'05/06/2026',
      titulo:'👤 Trazabilidad: usuario que carga cada movimiento de stock',
      desc:'Cada movimiento de stock ahora guarda quién lo cargó. En la lista de Stock → Movimientos aparece una columna nueva "Cargado por" con el nombre del usuario. Se completa solo para movimientos manuales y para los automáticos generados por facturas, entregas a cerealera, liquidaciones y labores avanzadas — todos quedan firmados con el usuario que disparó la operación.' },
    { tag:'Mejora', color:'bg-blue-100 text-blue-800 border-blue-300',    fecha:'05/06/2026',
      titulo:'🔒 Labor avanzada: cobro por % bloqueado para roles operativos',
      desc:'En el formulario de Labor avanzada, los campos "Tipo precio", "Precio referencia" y "% Empleado" ahora solo se pueden editar si el rol del usuario tiene permiso de modificación (produccion:update o catalogos:update). Si el usuario solo tiene permiso de lectura/creación, los campos quedan deshabilitados y heredan los valores del catálogo de la labor + el porcentaje por defecto del empleado. Así el operario solo carga la labor (que campaña, hectáreas, fecha) y el sistema calcula automáticamente la ganancia del empleado sin que pueda manipular el % cobrado.' },
    { tag:'Fix',    color:'bg-amber-100 text-amber-800 border-amber-300', fecha:'05/06/2026',
      titulo:'🐛 Fixes: liquidación de cereal, query depósitos en Prisma 6',
      desc:'Tres fixes importantes: la liquidación de cereal tiraba error al guardar (faltaba el campo "detalle" en cuenta corriente — corregido para que use detalle + debe/haber). El listado de Cerealeras y Liquidaciones daba "Argument companyId is missing" en Prisma 6 cuando se incluían depósitos compartidos — la query ahora usa la sintaxis explícita { equals: null } que requiere Prisma 6. La sección Bancos no aparecía si el cliente Prisma no se había regenerado — fix definitivo aplicado.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'04/06/2026',
      titulo:'🎯 Estado de situación — pagos y cobros futuros consolidados',
      desc:'Nueva sección Finanzas → Estado de situación: un dashboard cronológico que une lo que vas a cobrar y lo que tenés que pagar en los próximos 30 / 90 / 180 / 365 días. Suma cheques a depositar/pagar, cuentas corrientes con vencimiento, cuotas de créditos bancarios, liquidaciones de cereal a cobrar y arrendamientos a pagar. Muestra cards por mes con + ingresos / - egresos / saldo neto, y cada evento individual con su urgencia (rojo si vence en menos de 7 días, ámbar dentro de 30, gris el resto). Saldo neto general arriba para saber de un vistazo si vas a quedar positivo o negativo.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'04/06/2026',
      titulo:'🏦 Créditos bancarios con plan de cuotas automático',
      desc:'Nueva sección Finanzas → Créditos bancarios. Cargás el préstamo (banco, monto, tasa anual TNA, cantidad de cuotas y periodicidad mensual/bimestral/trimestral/semestral) y el sistema genera automáticamente todo el plan de cuotas con sistema francés (cuota total constante). Cada cuota tiene su capital, interés, total y fecha de vencimiento. Botón "Marcar pagada" por cuota con medio de pago. Card de "Cuotas a vencer en los próximos 30 días" arriba para que no se te escape ninguna. Las cuotas pendientes alimentan el Estado de situación.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'04/06/2026',
      titulo:'🏭 Cerealeras y depósitos — cereal en planta sin perder trazabilidad',
      desc:'Nueva sección Stock → Cerealeras / Depósitos. Cargás las cerealeras donde dejás el cereal (con CUIT, contacto, costo de estadía $/tn por mes, secada $/tn) y los depósitos propios. El botón "📤 Entregar cereal" mueve el stock del campo a la cerealera elegida: el cereal sigue siendo tuyo, solo cambia de ubicación. Stock por depósito visible en cualquier momento. Después, cuando decidís vender, vas a la nueva sección Liquidaciones.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'04/06/2026',
      titulo:'🧾 Liquidaciones de cereal — cuando vendés lo que tenés en la cerealera',
      desc:'Nueva sección Stock → Liquidaciones cereal. Cargás kilos brutos, % merma (humedad/calidad), precio por tonelada, descuentos (flete, secada, paritarios, IIBB) e impuestos (IVA, retenciones de ganancias). El sistema calcula el neto a cobrar, descuenta el cereal del depósito de la cerealera y genera el movimiento en Cuenta Corriente del cliente comprador. La fecha estimada de cobro entra al Estado de situación.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'04/06/2026',
      titulo:'👷 Empleados propios vs externos + cobro por porcentaje de labor',
      desc:'En la ficha del empleado ahora marcás si es 👤 Propio (en relación de dependencia) o 🔧 Externo (contratista, fasón). Si activás "Cobra % por labor", cargás el porcentaje por defecto. Cuando ese empleado realiza una labor, el sistema calcula automáticamente la ganancia (precio referencia × hectáreas × %) y la suma a su planilla del mes con categoría "labor". Pensado especialmente para fasoneros, contratistas de siembra y cosecha que cobran un % del ingreso.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'04/06/2026',
      titulo:'🛠️ Labores con insumos consumidos del stock + empleado responsable',
      desc:'En Insumos y labores se sumaron dos formas de cargar labores: "Labor" (con empleado responsable + insumos consumidos que descuentan stock real) y "Labor avanzada" (lo mismo + precio referencia por hectárea + % cobro empleado para calcular y registrar la ganancia automáticamente). Los insumos elegidos del catálogo descuentan del stock con un movimiento de egreso trazable, así no hay que cargarlo en dos lugares.' },
    { tag:'Mejora', color:'bg-blue-100 text-blue-800 border-blue-300',    fecha:'04/06/2026',
      titulo:'🔐 Roles con permisos finos opt-in (labor simple vs avanzada, etc.)',
      desc:'En Roles y permisos se agregaron sub-permisos opt-in: podés decidir si un rol puede cargar labor simple pero no avanzada, marcar cuotas de crédito como pagadas pero no crear el crédito, cargar liquidaciones de cereal pero no entregas, etc. Si no marcás ningún sub-permiso en un grupo, hereda el permiso del área (lo viejo sigue funcionando). Si marcás al menos uno, solo esos quedan habilitados — útil para empleados de campo con acceso restringido.' },
    { tag:'Nuevo',  color:'bg-green-100 text-green-800 border-green-300', fecha:'28/05/2026',
      titulo:'📥 Cargar facturas emitidas directamente en ARCA',
      desc:'En Facturación se agregó el botón "📥 Cargar factura ARCA" para registrar manualmente facturas que ya se emitieron en el portal de ARCA (por ejemplo, el contador emite y avisa después). Pide el CAE real de 14 dígitos y su vencimiento, deja la factura marcada con badge "ARCA ext." y la descuenta del stock + suma a Cuenta Corriente como cualquier otra. No se reenvía a ARCA.' },
    { tag:'Mejora', color:'bg-blue-100 text-blue-800 border-blue-300',    fecha:'28/05/2026',
      titulo:'🧪 ARCA: toggle Homologación / Producción + WSFE listo para Factura Electrónica',

// Caja simple para que el admin pueda compartir el sistema con empleados.
// Muestra la URL actual (la que esta usando el admin para entrar) + QR.
// Cualquier URL sirve: localhost (LAN), Dev Tunnels publica, IP de la red, etc.
function renderShareBox() {
  const cont = $('#home-share-body');
  if (!cont) return;
  const url = window.location.origin + '/app';
  const esLocal = /^(localhost|127\.0\.0\.1)/.test(window.location.hostname);
  const esLan   = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\.)/.test(window.location.hostname);
  const esPublica = !esLocal && !esLan;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=2&data=${encodeURIComponent(url)}`;
  const tipo = esPublica
    ? `<span class="badge badge-green">URL pública</span> Funciona desde cualquier red (oficina, casa, celular con datos).`
    : esLan
      ? `<span class="badge badge-blue">Red local</span> Solo funciona desde la misma red WiFi/LAN. Para acceso desde fuera, levantá <b>ACCESO-INTERNET.bat</b>.`
      : `<span class="badge badge-yellow">Localhost</span> Esta URL solo funciona en esta misma PC. Compartila desde otra PC de la red, o levantá <b>ACCESO-INTERNET.bat</b> para acceso público.`;
  cont.innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
      <div class="md:col-span-2">
        <p class="text-sm text-slate-700 mb-2">Esta es la URL por la que estás entrando vos. Compartila con tus empleados así también acceden:</p>
        <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg p-3">
          <div class="flex-1 min-w-0 font-mono text-sm text-slate-800 truncate" title="${esc(url)}">${esc(url)}</div>
          <button class="btn btn-secondary text-xs whitespace-nowrap" onclick="navigator.clipboard.writeText('${esc(url)}').then(() => toast('URL copiada','success'))">📋 Copiar</button>
        </div>
        <div class="text-xs text-slate-600 mt-3">${tipo}</div>
        <div class="text-[11px] text-slate-500 mt-2">Cada empleado entra con su propio usuario y contraseña (creados en <button class="text-green-700 underline" onclick="go('usuarios')">Usuarios</button>).</div>

// =========================================================
// PWA: instalar como app en escritorio / celular
// El navegador dispara "beforeinstallprompt" cuando la web cumple los criterios
// de PWA. Guardamos el evento y se lo damos al usuario cuando hace clic en
// "Instalar". Si no se disparó (ya está instalada, o navegador no soportado),
// mostramos instrucciones manuales según el dispositivo.
// =========================================================
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  state._pwaDeferredPrompt = e;
  state._pwaInstallable = true;
  // Si el usuario ya está en Inicio, mostramos la card sin recargar
  const card = document.getElementById('install-pwa-card');
  if (card) card.classList.remove('hidden');
});
window.addEventListener('appinstalled', () => {
  state._pwaInstallable = false;
  state._pwaDeferredPrompt = null;
  const card = document.getElementById('install-pwa-card');
  if (card) card.classList.add('hidden');
  toast('AgroCore instalado en tu dispositivo 📲', 'success');
});
async function installPwaPrompt() {
  const e = state._pwaDeferredPrompt;
  if (e) {
    try {
      e.prompt();
      const choice = await e.userChoice;
      if (choice?.outcome === 'accepted') {
        toast('Instalando AgroCore…', 'info');
      }
      state._pwaDeferredPrompt = null;
    } catch (err) {
      toast('No se pudo instalar: ' + err.message, 'error');
    }
    return;
  }
  // No hay prompt — detectamos plataforma y damos instrucciones manuales
  const ua = navigator.userAgent;
  let instrucciones = '';
  if (/iPhone|iPad|iPod/i.test(ua)) {
    instrucciones = `<ol class="list-decimal ml-5 space-y-2 text-sm">
      <li>Tocá el botón <b>"Compartir"</b> abajo en Safari (el ícono de cuadrado con flecha arriba).</li>
      <li>Bajá y tocá <b>"Agregar a inicio"</b>.</li>
      <li>Confirmá el nombre y tocá <b>"Agregar"</b>.</li>
    </ol>`;
  } else if (/Android/i.test(ua)) {
    instrucciones = `<ol class="list-decimal ml-5 space-y-2 text-sm">
      <li>Tocá los tres puntos arriba a la derecha de Chrome.</li>
      <li>Tocá <b>"Instalar app"</b> o <b>"Agregar a pantalla de inicio"</b>.</li>
      <li>Confirmá.</li>
    </ol>`;
  } else {
    instrucciones = `<ol class="list-decimal ml-5 space-y-2 text-sm">
      <li>En Chrome o Edge: clic en el ícono de instalación a la derecha de la barra de URL (un monitor con flecha).</li>
      <li>Si no aparece: menú (⋮) → <b>"Instalar AgroCore"</b>.</li>
      <li>Una vez instalada, queda como app independiente con icono en el escritorio y en el menú Inicio.</li>
    </ol>`;
  }
  openModal({
    title:'📲 Instalar AgroCore como app', size:'max-w-md',
    body: `<p class="text-sm text-slate-600 mb-3">Tu navegador no me deja abrirlo automáticamente. Seguí estos pasos para instalarla manualmente:</p>${instrucciones}<p class="text-xs text-slate-500 mt-3">Una vez instalada, AgroCore abre con un clic, sin barra de navegador, y queda funcionando aunque pierdas internet (modo offline).</p>`,
    footer: `<button class="btn btn-primary" onclick="closeModal()">Entendido</button>`,
  });
}

// Carga noticias del agro desde el backend (cache 30 min, fuentes RSS reales).
// Cada noticia se renderiza con el titulo como link al medio original.
async function loadNoticiasAgro() {
  const lista = $('#noticias-lista');
  const fuentesEl = $('#noticias-fuentes');
  if (!lista) return;
  try {
    const r = await fetch(API_BASE + '/api/noticias-agro');
    const info = await r.json();
    const items = info.items || [];
    if (!items.length) {
      lista.innerHTML = '<li class="p-4 text-sm text-slate-400 italic">No hay noticias disponibles en este momento. Volvé a intentar en unos minutos.</li>';
      if (fuentesEl) fuentesEl.textContent = 'sin datos';
      return;
    }
    if (fuentesEl) {
      const ts = info.actualizado ? new Date(info.actualizado).toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' }) : '—';
      fuentesEl.textContent = `actualizado ${ts}`;
    }
    const fmtFec = (iso) => {
      if (!iso) return '';
      const d = new Date(iso);
      const ahora = new Date();
      const diffMin = Math.floor((ahora - d) / 60000);
      if (diffMin < 60) return `hace ${Math.max(diffMin,1)} min`;
      const diffH = Math.floor(diffMin / 60);
      if (diffH < 24) return `hace ${diffH} h`;
      const diffD = Math.floor(diffH / 24);
      if (diffD < 7) return `hace ${diffD} d`;
      return d.toLocaleDateString('es-AR', { day:'numeric', month:'short' });
    };
    lista.innerHTML = items.slice(0, 10).map(n => `
      <li class="p-4 hover:bg-slate-50 transition">
        <div class="flex items-center gap-2 text-[10px] text-slate-500 uppercase">
          <span class="font-semibold text-green-700">${esc(n.fuente)}</span>
          <span>·</span>
          <span>${esc(fmtFec(n.fecha))}</span>
        </div>
        <a href="${esc(n.link)}" target="_blank" rel="noopener noreferrer"
           class="block font-medium text-slate-800 mt-1 hover:text-green-700 hover:underline">
          ${esc(n.titulo)} <span class="text-[10px] text-slate-400">↗</span>
        </a>
        ${n.resumen ? `<p class="text-xs text-slate-600 mt-1">${esc(n.resumen)}</p>` : ''}
      </li>`).join('');
  } catch (e) {
    lista.innerHTML = `<li class="p-4 text-sm text-red-500">No se pudieron cargar las noticias: ${esc(e.message)}</li>`;
    if (fuentesEl) fuentesEl.textContent = 'error';
  }
}

pages.dashboard = async function() {
  setHeader('Dashboard', 'Análisis operativo y financiero');
  if (!can('dashboard:read')) { $('#page-body').innerHTML = stubPage('dashboard','Dashboard'); return; }
  destroyCharts();

  const tabsHtml = DASH_TABS.map(t => `
    <button class="dash-tab ${state.dashTab===t.id?'active':''}" onclick="dashSwitchTab('${t.id}')" type="button" title="${esc(t.label)} · ${esc(t.sub)}">
      <span class="dash-tab-ico">${t.icon}</span>
      <span class="dash-tab-text">
        <span class="dash-tab-label">${esc(t.label)}</span>
        <span class="dash-tab-sub">${esc(t.sub)}</span>
      </span>
      <span class="dash-tab-check">✓</span>
    </button>`).join('');

  $('#page-body').innerHTML = `
    <style>
      .dash-hint{font-size:11px;color:#64748b;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
      .dash-hint b{color:#334155;}
      .dash-tabs{
        display:grid; gap:10px; margin-bottom:16px;
        grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));
      }
      .dash-tab{
        display:flex; align-items:center; gap:10px;
        padding:12px 14px; border-radius:12px; cursor:pointer;
        background:#fff; border:1.5px solid #e2e8f0; text-align:left;
        transition:all .18s cubic-bezier(.4,0,.2,1); position:relative; overflow:hidden;
        font-family:inherit;
      }
      .dash-tab:hover{
        transform:translateY(-2px);
        border-color:var(--company-color, #15803d);
        box-shadow:0 6px 16px rgba(15,23,42,.08), 0 2px 4px rgba(15,23,42,.05);
      }
      .dash-tab:hover .dash-tab-ico{ transform:scale(1.12) rotate(-4deg); }
      .dash-tab-ico{
        font-size:28px; line-height:1; flex-shrink:0;
        transition:transform .2s ease;
        filter:drop-shadow(0 1px 2px rgba(0,0,0,.15));
      }
      .dash-tab-text{ display:flex; flex-direction:column; min-width:0; flex:1; }
      .dash-tab-label{ font-weight:700; font-size:13.5px; color:#0f172a; line-height:1.2; }
      .dash-tab-sub{ font-size:10.5px; color:#64748b; margin-top:2px; line-height:1.2; }
      .dash-tab-check{
        position:absolute; top:6px; right:8px; font-size:11px;
        color:#fff; background:rgba(255,255,255,.28);
        width:18px; height:18px; border-radius:50%;
        display:flex; align-items:center; justify-content:center;
        opacity:0; transform:scale(.5); transition:all .2s ease;
      }
      .dash-tab.active{
        background:linear-gradient(135deg, var(--company-color,#15803d) 0%, var(--company-color,#15803d) 70%, color-mix(in srgb, var(--company-color,#15803d) 70%, black) 100%);
        border-color:var(--company-color, #15803d);
        box-shadow:0 8px 20px rgba(21,128,61,.30), 0 3px 6px rgba(15,23,42,.12);
        transform:translateY(-1px);
      }
      .dash-tab.active .dash-tab-label{ color:#fff; }
      .dash-tab.active .dash-tab-sub{ color:rgba(255,255,255,.82); }
      .dash-tab.active .dash-tab-ico{ filter:drop-shadow(0 1px 3px rgba(0,0,0,.35)); }
      .dash-tab.active .dash-tab-check{ opacity:1; transform:scale(1); background:rgba(255,255,255,.22); }
      @media (max-width:767px){
        .dash-tabs{ grid-template-columns:repeat(2, 1fr); gap:8px; }
        .dash-tab{ padding:10px; }
        .dash-tab-ico{ font-size:22px; }
        .dash-tab-label{ font-size:12px; }
        .dash-tab-sub{ display:none; }
      }
    </style>
    <div class="dash-hint">
      <span style="font-size:14px">👇</span>
      <span>Cliqueá cualquier solapa para cambiar el tipo de análisis</span>
    </div>
    <div class="dash-tabs">${tabsHtml}</div>
    <div id="dash-content"><div class="text-slate-500 text-sm">Cargando datos…</div></div>`;

  // Delegamos al renderer del tab
  const render = {
    resumen:   dashResumen,
    finanzas:  dashFinanzas,
    stockAnal: dashStockAnal,
    produccion: dashProduccion,
    patrimonio: dashPatrimonio,
  }[state.dashTab] || dashResumen;
  try { await render(); }
  catch (e) {
    console.error(e);
    $('#dash-content').innerHTML = `<div class="text-red-600 bg-red-50 border border-red-200 rounded p-4 text-sm">Error: ${esc(e.message)}</div>`;
  }
};

/* ==== TAB: Resumen general (el dashboard original) ==== */
async function dashResumen() {
  const target = $('#dash-content');

  let stockG=0, stockH=0, camps=[], prods=[], flujo=[], cheques=[], arr=[], ccs=[];
  try {
    const s = await api('/api/stock-actual');
    for (const p of (s.data||[])) {
      if (/cereal|grano/i.test(p.categoria)) stockG += Number(p.existencia||0);
      if (/hacienda|animal/i.test(p.categoria)) stockH += Number(p.existencia||0);
    }
    prods = s.data || [];
  } catch {}
  try { camps = (await api('/api/campanas')).data || []; } catch {}
  try { flujo = (await api('/api/flujo-caja')).data || []; } catch {}
  try { cheques = (await api('/api/cheques')).data || []; } catch {}
  try { arr = (await api('/api/arrendamientos')).data || []; } catch {}
  try { ccs = (await api('/api/ctas-ctes')).data || []; } catch {}

  const hoy = new Date();
  const hasEnCurso = camps.filter(c=>c.estado==='En curso' || c.estado==='activa').length;

  // Agrupar flujo por mes (últimos 6 meses)
  const meses = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth()-i, 1);
    meses.push({ key: d.toISOString().slice(0,7), label: d.toLocaleDateString('es-AR',{month:'short', year:'2-digit'}) });
  }
  const ingXMes = meses.map(m => flujo.filter(f => (f.fecha||'').slice(0,7)===m.key && Number(f.monto)>0).reduce((a,f)=>a+Number(f.monto),0));
  const egrXMes = meses.map(m => flujo.filter(f => (f.fecha||'').slice(0,7)===m.key && Number(f.monto)<0).reduce((a,f)=>a+Math.abs(Number(f.monto)),0));
  const ingresosTotales = ingXMes.reduce((a,b)=>a+b,0);
  const egresosTotales = egrXMes.reduce((a,b)=>a+b,0);
  const flujoNeto = ingresosTotales - egresosTotales;

  // Categorías de egresos (doughnut)
  const egrPorCat = {};
  flujo.filter(f => Number(f.monto)<0).forEach(f => {
    const c = f.categoria || 'Sin categoría';
    egrPorCat[c] = (egrPorCat[c]||0) + Math.abs(Number(f.monto));
  });
  const catLabels = Object.keys(egrPorCat);
  const catValues = Object.values(egrPorCat);
  const catColors = ['#dc2626','#ea580c','#d97706','#ca8a04','#65a30d','#16a34a','#0d9488','#0284c7','#7c3aed','#c026d3'];

  // Cheques pendientes (en cartera o depositados, sin cobrar/rechazar todavía)
  const estadosPendientes = ['en cartera', 'emitido', 'depositado'];
  const chequesPend = cheques.filter(c => estadosPendientes.includes((c.estado||'').toLowerCase()) && c.fechaPago);
  // Vencidos: ya pasó la fecha y siguen sin cobrar
  const chequesVencidos = chequesPend.filter(c => new Date(c.fechaPago) < hoy).length;
  // A vencer en los próximos 15 días: alerta proactiva
  const hoy15 = new Date(hoy.getTime() + 15 * 24 * 60 * 60 * 1000);
  const chequesAVencer15 = chequesPend.filter(c => {
    const f = new Date(c.fechaPago);
    return f >= hoy && f <= hoy15;
  }).length;
  const arrPendientes = arr.filter(a => !a.pagado).length;
  const saldoPorCobrar = ccs.filter(c => c.tipo==='cliente').reduce((a,c)=>a+Number(c.saldo||0),0);
  const bajoStock = prods.filter(p => p.bajoMinimo).length;

  target.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Campañas activas</div><div class="text-2xl font-bold text-green-700 mt-1">${hasEnCurso}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Stock granos</div><div class="text-xl font-bold mt-1">${fmtKg(stockG)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Stock hacienda</div><div class="text-xl font-bold mt-1">${fmtN(stockH)} cab.</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Cuentas por cobrar</div><div class="text-xl font-bold mt-1 text-amber-600">${fmt$(saldoPorCobrar)}</div></div>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Ingresos 6m</div><div class="text-xl font-bold mt-1 text-emerald-600">${fmt$(ingresosTotales)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Egresos 6m</div><div class="text-xl font-bold mt-1 text-red-600">${fmt$(egresosTotales)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Flujo neto 6m</div><div class="text-xl font-bold mt-1 ${flujoNeto>=0?'text-emerald-700':'text-red-700'}">${fmt$(flujoNeto)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Productos bajo mínimo</div><div class="text-2xl font-bold mt-1 ${bajoStock>0?'text-amber-600':'text-emerald-600'}">${bajoStock}</div></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
      <div class="kpi lg:col-span-2">
        <h3 class="font-semibold text-slate-800 mb-2">Ingresos vs Egresos (últimos 6 meses)</h3>
        <div style="position:relative;height:240px"><canvas id="chart-flujo"></canvas></div>
      </div>
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-2">Egresos por categoría</h3>
        <div style="position:relative;height:240px">${catLabels.length?'<canvas id="chart-cat"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Sin datos de egresos</div>'}</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="kpi">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold">⚠️ Alertas</h3>
        </div>
        <ul class="divide-y divide-slate-100">
          ${chequesVencidos>0 ? `<li class="py-2 flex justify-between items-center"><span>🔴 Cheques vencidos sin cobrar</span><span class="flex items-center gap-2"><b class="text-red-600">${chequesVencidos}</b><button class="btn btn-ghost text-xs text-green-700" onclick="go('cheques')">Ir →</button></span></li>`:''}
          ${chequesAVencer15>0 ? `<li class="py-2 flex justify-between items-center"><span>⏰ Cheques a vencer en 15 días</span><span class="flex items-center gap-2"><b class="text-amber-600">${chequesAVencer15}</b><button class="btn btn-ghost text-xs text-green-700" onclick="go('cheques')">Ir →</button></span></li>`:''}
          ${arrPendientes>0 ? `<li class="py-2 flex justify-between items-center"><span>🟡 Arrendamientos sin pagar</span><span class="flex items-center gap-2"><b class="text-amber-600">${arrPendientes}</b><button class="btn btn-ghost text-xs text-green-700" onclick="go('arrendamientos')">Ir →</button></span></li>`:''}
          ${bajoStock>0 ? `<li class="py-2 flex justify-between items-center"><span>📦 Productos bajo mínimo</span><span class="flex items-center gap-2"><b class="text-amber-600">${bajoStock}</b><button class="btn btn-ghost text-xs text-green-700" onclick="go('stock')">Ir →</button></span></li>`:''}
          ${saldoPorCobrar>0 ? `<li class="py-2 flex justify-between items-center"><span>💰 Saldo por cobrar (clientes)</span><span class="flex items-center gap-2"><b class="text-amber-600">${fmt$(saldoPorCobrar)}</b><button class="btn btn-ghost text-xs text-green-700" onclick="go('ctasCtes')">Ir →</button></span></li>`:''}
          ${(chequesVencidos===0 && chequesAVencer15===0 && arrPendientes===0 && bajoStock===0 && saldoPorCobrar===0)?'<li class="py-4 text-slate-400 text-sm text-center">Sin alertas. Todo en orden 👍</li>':''}
        </ul>
      </div>
      <div class="kpi">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold">📋 Actividad reciente</h3>
        </div>
        <div id="dash-actividad"><div class="text-slate-400 text-sm">Cargando...</div></div>
      </div>
    </div>`;

  // Actividad reciente: combina los últimos movimientos de distintas fuentes
  (async () => {
    const acts = [];
    try {
      const movs = (await api('/api/movimientos')).data || [];
      movs.slice(0, 5).forEach(m => acts.push({
        fecha: m.fecha || m.createdAt, icon: m.tipo==='ingreso'?'⬆️':'⬇️',
        text: `<b>${m.tipo==='ingreso'?'Entrada':'Salida'} de stock</b> — ${esc(m.producto?.nombre||'—')} · ${fmtN(m.cantidad)} ${esc(m.producto?.unidad||'')}`,
        onclick: "go('movimientos')"
      }));
    } catch {}
    try {
      const fs = (await api('/api/facturas-venta')).data || [];
      fs.slice(0, 3).forEach(f => acts.push({
        fecha: f.fecha || f.createdAt, icon:'🧮',
        text: `<b>Factura de venta</b> ${esc(f.tipoCbte||'')} ${esc(f.numero||'')} · ${fmt$(f.total)}`,
        onclick: "go('facturacion')"
      }));
    } catch {}
    try {
      const cs = (await api('/api/facturas-compra')).data || [];
      cs.slice(0, 3).forEach(f => acts.push({
        fecha: f.fecha || f.createdAt, icon:'🧾',
        text: `<b>Factura de compra</b> de ${esc(f.proveedor?.razonSocial||'—')} · ${fmt$(f.total)}`,
        onclick: "go('compras')"
      }));
    } catch {}
    try {
      const fc = (await api('/api/flujo-caja')).data || [];
      fc.slice(0, 3).forEach(m => acts.push({
        fecha: m.fecha || m.createdAt, icon: Number(m.monto||0)>=0?'💵':'💸',
        text: `<b>${Number(m.monto||0)>=0?'Ingreso':'Egreso'} de caja</b> — ${esc(m.concepto||'')} · ${fmt$(m.monto)}`,
        onclick: "go('flujoCaja')"
      }));
    } catch {}
    acts.sort((a,b) => new Date(b.fecha||0) - new Date(a.fecha||0));
    const top = acts.slice(0, 10);
    const cont = $('#dash-actividad');
    if (!cont) return;
    cont.innerHTML = top.length === 0
      ? '<div class="text-slate-400 text-sm text-center py-6">Sin actividad todavía. Cargá algunos movimientos para verlos acá.</div>'
      : `<ul class="divide-y divide-slate-100">${top.map(a => `
          <li class="py-2 flex items-start gap-2 cursor-pointer hover:bg-slate-50 px-2 rounded" onclick="${a.onclick}">
            <span class="text-lg">${a.icon}</span>
            <div class="flex-1 min-w-0">
              <div class="text-sm">${a.text}</div>
              <div class="text-[11px] text-slate-500">${a.fecha?new Date(a.fecha).toLocaleString('es-AR',{dateStyle:'short',timeStyle:'short'}):'—'}</div>
            </div>
          </li>`).join('')}</ul>`;
  })();

  // Charts
  if (window.Chart) {
    state.charts.flujo = new Chart($('#chart-flujo').getContext('2d'), {
      type: 'bar',
      data: {
        labels: meses.map(m => m.label),
        datasets: [
          { label: 'Ingresos', backgroundColor: '#16a34a', data: ingXMes },
          { label: 'Egresos',  backgroundColor: '#dc2626', data: egrXMes },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom' } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => '$'+v.toLocaleString('es-AR') } } }
      }
    });
    if (catLabels.length) {
      state.charts.cat = new Chart($('#chart-cat').getContext('2d'), {
        type: 'doughnut',
        data: { labels: catLabels, datasets: [{ data: catValues, backgroundColor: catColors.slice(0, catLabels.length) }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
      });
    }
  }
}

/* ==== TAB: Finanzas (ingresos vs egresos detallado + categorías ingreso/egreso) ==== */
async function dashFinanzas() {
  const target = $('#dash-content');
  let flujo=[], ccs=[];
  try { flujo = (await api('/api/flujo-caja')).data || []; } catch {}
  try { ccs = (await api('/api/ctas-ctes')).data || []; } catch {}

  const hoy = new Date();
  const meses = [];
  for (let i=11;i>=0;i--) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth()-i, 1);
    meses.push({ key: d.toISOString().slice(0,7), label: d.toLocaleDateString('es-AR',{month:'short', year:'2-digit'}) });
  }
  const ing = meses.map(m => flujo.filter(f => (f.fecha||'').slice(0,7)===m.key && Number(f.monto)>0).reduce((a,f)=>a+Number(f.monto),0));
  const egr = meses.map(m => flujo.filter(f => (f.fecha||'').slice(0,7)===m.key && Number(f.monto)<0).reduce((a,f)=>a+Math.abs(Number(f.monto)),0));
  const net = meses.map((_,i)=>ing[i]-egr[i]);
  // saldo acumulado
  const acc = []; let a2=0; net.forEach(n => { a2+=n; acc.push(a2); });

  const ingresosT = ing.reduce((a,b)=>a+b,0);
  const egresosT  = egr.reduce((a,b)=>a+b,0);
  const margen = ingresosT - egresosT;
  const margenPct = ingresosT ? Math.round((margen / ingresosT) * 100) : 0;

  // Categorías ingreso/egreso
  const catIng = {}, catEgr = {};
  flujo.forEach(f => {
    const c = f.categoria || 'Sin categoría';
    if (Number(f.monto)>0) catIng[c] = (catIng[c]||0)+Number(f.monto);
    else                    catEgr[c] = (catEgr[c]||0)+Math.abs(Number(f.monto));
  });
  const catColors = ['#16a34a','#0d9488','#0284c7','#7c3aed','#c026d3','#ea580c','#dc2626','#d97706','#ca8a04','#65a30d'];

  const saldoCli = ccs.filter(c=>c.tipo==='cliente').reduce((a,c)=>a+Number(c.saldo||0),0);
  const saldoProv = ccs.filter(c=>c.tipo==='proveedor').reduce((a,c)=>a+Number(c.saldo||0),0);

  target.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Ingresos 12m</div><div class="text-xl font-bold mt-1 text-emerald-600">${fmt$(ingresosT)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Egresos 12m</div><div class="text-xl font-bold mt-1 text-red-600">${fmt$(egresosT)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Margen neto</div><div class="text-xl font-bold mt-1 ${margen>=0?'text-emerald-700':'text-red-700'}">${fmt$(margen)}<span class="text-[11px] ml-1 opacity-75">(${margenPct}%)</span></div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Saldo neto clientes/prov.</div><div class="text-xl font-bold mt-1 ${(saldoCli-saldoProv)>=0?'text-emerald-700':'text-red-700'}">${fmt$(saldoCli - saldoProv)}</div></div>
    </div>

    <div class="kpi mb-4">
      <h3 class="font-semibold text-slate-800 mb-2">Ingresos vs Egresos por mes (últimos 12)</h3>
      <div style="position:relative;height:280px"><canvas id="chart-fin-bars"></canvas></div>
    </div>

    <div class="kpi mb-4">
      <h3 class="font-semibold text-slate-800 mb-2">Flujo neto acumulado</h3>
      <div style="position:relative;height:220px"><canvas id="chart-fin-acum"></canvas></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-2">🟢 Ingresos por categoría</h3>
        <div style="position:relative;height:240px">${Object.keys(catIng).length?'<canvas id="chart-fin-ing"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Sin datos</div>'}</div>
      </div>
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-2">🔴 Egresos por categoría</h3>
        <div style="position:relative;height:240px">${Object.keys(catEgr).length?'<canvas id="chart-fin-egr"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Sin datos</div>'}</div>
      </div>
    </div>`;

  if (!window.Chart) return;
  state.charts.finBars = new Chart($('#chart-fin-bars').getContext('2d'), {
    type: 'bar',
    data: { labels: meses.map(m=>m.label), datasets: [
      { label: 'Ingresos', backgroundColor: '#16a34a', data: ing },
      { label: 'Egresos',  backgroundColor: '#dc2626', data: egr },
      { label: 'Neto',     type:'line', borderColor:'#0f172a', backgroundColor:'transparent', data: net, tension:0.3, yAxisID:'y' },
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom' } },
      scales:{ y:{ beginAtZero:true, ticks:{ callback:v => '$'+v.toLocaleString('es-AR') } } } }
  });
  state.charts.finAcum = new Chart($('#chart-fin-acum').getContext('2d'), {
    type:'line',
    data:{ labels: meses.map(m=>m.label), datasets:[{ label:'Saldo acumulado', data: acc,
      borderColor:'#14532d', backgroundColor:'rgba(22,163,74,0.2)', fill:true, tension:0.3 }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
      scales:{ y:{ ticks:{ callback:v => '$'+v.toLocaleString('es-AR') } } } }
  });
  if (Object.keys(catIng).length) {
    state.charts.finIng = new Chart($('#chart-fin-ing').getContext('2d'), {
      type:'doughnut',
      data:{ labels: Object.keys(catIng), datasets:[{ data: Object.values(catIng), backgroundColor: catColors }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:11} } } } }
    });
  }
  if (Object.keys(catEgr).length) {

  const porCultivo = {}, haPorCultivo = {};
  camps.forEach(c => {
    const k = c.cultivo || 'Sin cultivo';
    porCultivo[k] = (porCultivo[k]||0) + 1;
    haPorCultivo[k] = (haPorCultivo[k]||0) + Number(c.hectareas||0);
  });
  const porEstado = {};
  camps.forEach(c => {
    const k = c.estado || 'planificada';
    porEstado[k] = (porEstado[k]||0) + 1;
  });
  const totalHa = camps.reduce((a,c)=>a+Number(c.hectareas||0),0);
  const haCampos = campos.reduce((a,c)=>a+Number(c.hectareas||0),0);

  const cosechadas = camps.filter(c => c.estado === 'cosechada' && c.rindeReal);
  const rindePromedio = cosechadas.length ? cosechadas.reduce((a,c)=>a+Number(c.rindeReal||0),0) / cosechadas.length : 0;

      <div class="kpi"><div class="text-xs text-slate-500">Ha en campañas</div><div class="text-xl font-bold mt-1">${fmtN(totalHa)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Rinde real promedio</div><div class="text-xl font-bold mt-1 text-emerald-700">${fmtN(rindePromedio)} kg/ha</div></div>

        <h3 class="font-semibold text-slate-800 mb-2">Hectáreas por cultivo</h3>
        <div style="position:relative;height:280px">${Object.keys(haPorCultivo).length?'<canvas id="chart-prod-cul"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Sin campañas</div>'}</div>
      </div>
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-2">Campañas por estado</h3>
        <div style="position:relative;height:280px">${Object.keys(porEstado).length?'<canvas id="chart-prod-est"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Sin campañas</div>'}</div>

    <div class="kpi">
      <h3 class="font-semibold text-slate-800 mb-3">Rindes por cultivo (real vs estimado)</h3>
      <div style="position:relative;height:280px">${cosechadas.length?'<canvas id="chart-prod-rnd"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Necesitás campañas cosechadas con rinde real cargado</div>'}</div>
    </div>

    <div class="text-xs text-slate-500 mt-3 text-center">Superficie total de campos: <b>${fmtN(haCampos)} ha</b> · en campañas: <b>${fmtN(totalHa)} ha</b></div>`;

  if (!window.Chart) return;
  const palette = ['#15803d','#65a30d','#ca8a04','#ea580c','#dc2626','#7c3aed','#0284c7','#0d9488'];
  if (Object.keys(haPorCultivo).length) {
    state.charts.prodCul = new Chart($('#chart-prod-cul').getContext('2d'), {
      type:'bar',
      data:{ labels: Object.keys(haPorCultivo), datasets:[{ label:'Hectáreas', data: Object.values(haPorCultivo), backgroundColor: palette }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
        scales:{ y:{ beginAtZero:true, ticks:{ callback:v => v+' ha' } } } }
    });
  }
  if (Object.keys(porEstado).length) {
    state.charts.prodEst = new Chart($('#chart-prod-est').getContext('2d'), {
      type:'doughnut',
      data:{ labels: Object.keys(porEstado), datasets:[{ data: Object.values(porEstado), backgroundColor: ['#3b82f6','#16a34a','#ca8a04','#6b7280','#ef4444'] }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } } }
    });
  }
  if (cosechadas.length) {
    // Agrupar por cultivo
    const byCul = {};
    cosechadas.forEach(c => {
      const k = c.cultivo || 'Sin cultivo';
      if (!byCul[k]) byCul[k] = { est: [], real: [] };
      if (c.rindeEstimado) byCul[k].est.push(Number(c.rindeEstimado));
      byCul[k].real.push(Number(c.rindeReal));
    });
    const labels = Object.keys(byCul);
    const est = labels.map(k => byCul[k].est.length ? byCul[k].est.reduce((a,b)=>a+b,0)/byCul[k].est.length : 0);
    const real = labels.map(k => byCul[k].real.reduce((a,b)=>a+b,0)/byCul[k].real.length);
    state.charts.prodRnd = new Chart($('#chart-prod-rnd').getContext('2d'), {
      type:'bar',
      data:{ labels, datasets:[
        { label:'Rinde estimado', backgroundColor:'#94a3b8', data: est },

      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom' } },
        scales:{ y:{ beginAtZero:true, ticks:{ callback:v => v+' kg/ha' } } } }
    });
  }
}

/* ==== TAB: Patrimonio (evolución mensual del saldo + distribución) ==== */
async function dashPatrimonio() {
  const target = $('#dash-content');
  let flujo=[], ccs=[], prods=[], cheques=[], arr=[];
  try { flujo = (await api('/api/flujo-caja')).data || []; } catch {}
  try { ccs = (await api('/api/ctas-ctes')).data || []; } catch {}
  try { prods = (await api('/api/stock-actual')).data || []; } catch {}
  try { cheques = (await api('/api/cheques')).data || []; } catch {}
  try { arr = (await api('/api/arrendamientos')).data || []; } catch {}

  // Activos
  const saldoCaja = flujo.reduce((a,f)=>a + Number(f.monto||0), 0);
  const valorStock = prods.reduce((a,p)=>a + Number(p.existencia||0) * Number(p.precioReferencia||0), 0);
  const porCobrar = ccs.filter(c=>c.contactoTipo==='cliente').reduce((a,c)=>a+(Number(c.debe||0)-Number(c.haber||0)),0);
  const chqEnCartera = cheques.filter(c=>c.tipo==='terceros' && ['en cartera','depositado'].includes((c.estado||'').toLowerCase())).reduce((a,c)=>a+Number(c.monto||0),0);
  // Pasivos
  const porPagar = ccs.filter(c=>c.contactoTipo==='proveedor').reduce((a,c)=>a+(Number(c.debe||0)-Number(c.haber||0)),0);
  const chqEmitidos = cheques.filter(c=>c.tipo==='propio' && ['emitido','depositado'].includes((c.estado||'').toLowerCase())).reduce((a,c)=>a+Number(c.monto||0),0);
  const arrPendiente = arr.filter(a=>!a.pagado).reduce((a,x)=>a + Number(x.hectareas||0)*Number(x.importeHa||0), 0);

  const activosT = saldoCaja + valorStock + porCobrar + chqEnCartera;
  const pasivosT = porPagar + chqEmitidos + arrPendiente;
  const neto = activosT - pasivosT;

  // Evolución mensual del patrimonio (simplificado: saldo de caja acumulado mes a mes)
  const hoy = new Date();
  const meses = [];
  for (let i=11;i>=0;i--) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth()-i, 1);
    meses.push({ key: d.toISOString().slice(0,7), label: d.toLocaleDateString('es-AR',{month:'short', year:'2-digit'}) });
  }
  const acumMeses = meses.map(m => flujo.filter(f => (f.fecha||'').slice(0,7) <= m.key).reduce((a,f)=>a + Number(f.monto||0), 0));

  target.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
      <div class="kpi" style="background:linear-gradient(135deg,#dcfce7 0%,#f0fdf4 100%)"><div class="text-xs text-slate-500">Activos totales</div><div class="text-2xl font-bold mt-1 text-emerald-700">${fmt$(activosT)}</div></div>
      <div class="kpi" style="background:linear-gradient(135deg,#fee2e2 0%,#fef2f2 100%)"><div class="text-xs text-slate-500">Pasivos totales</div><div class="text-2xl font-bold mt-1 text-red-700">${fmt$(pasivosT)}</div></div>
      <div class="kpi" style="background:linear-gradient(135deg,${neto>=0?'#dbeafe 0%,#eff6ff':'#fef3c7 0%,#fffbeb'} 100%)"><div class="text-xs text-slate-500">Patrimonio neto</div><div class="text-2xl font-bold mt-1 ${neto>=0?'text-blue-700':'text-amber-700'}">${fmt$(neto)}</div></div>
    </div>

    <div class="kpi mb-4">
      <h3 class="font-semibold text-slate-800 mb-2">📈 Evolución del saldo de caja (12 meses)</h3>
      <div style="position:relative;height:260px"><canvas id="chart-pat-evo"></canvas></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-3">🟢 Composición de activos</h3>
        <ul class="divide-y divide-slate-100 text-sm">
          <li class="py-2 flex justify-between"><span>💵 Saldo de caja</span><b>${fmt$(saldoCaja)}</b></li>
          <li class="py-2 flex justify-between"><span>📦 Valor en stock</span><b>${fmt$(valorStock)}</b></li>
          <li class="py-2 flex justify-between"><span>💰 Por cobrar (clientes)</span><b>${fmt$(porCobrar)}</b></li>
          <li class="py-2 flex justify-between"><span>💳 Cheques en cartera</span><b>${fmt$(chqEnCartera)}</b></li>
          <li class="py-2 flex justify-between font-semibold border-t"><span>Total activos</span><b class="text-emerald-700">${fmt$(activosT)}</b></li>
        </ul>
        <div style="position:relative;height:180px;margin-top:12px">${activosT>0?'<canvas id="chart-pat-act"></canvas>':''}</div>
      </div>
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-3">🔴 Composición de pasivos</h3>
        <ul class="divide-y divide-slate-100 text-sm">
          <li class="py-2 flex justify-between"><span>🧾 Por pagar (proveedores)</span><b>${fmt$(porPagar)}</b></li>
          <li class="py-2 flex justify-between"><span>💳 Cheques emitidos</span><b>${fmt$(chqEmitidos)}</b></li>
          <li class="py-2 flex justify-between"><span>🏞️ Arrendamientos pendientes</span><b>${fmt$(arrPendiente)}</b></li>
          <li class="py-2 flex justify-between font-semibold border-t"><span>Total pasivos</span><b class="text-red-700">${fmt$(pasivosT)}</b></li>
        </ul>
        <div style="position:relative;height:180px;margin-top:12px">${pasivosT>0?'<canvas id="chart-pat-pas"></canvas>':''}</div>
      </div>
    </div>
    <div class="text-[11px] text-slate-400 text-center mt-3">* El "valor en stock" se calcula con los precios de referencia cargados. Si no los cargaste, queda en $0.</div>`;

  if (!window.Chart) return;
  state.charts.patEvo = new Chart($('#chart-pat-evo').getContext('2d'), {
    type:'line',
    data:{ labels: meses.map(m=>m.label), datasets:[{
      label:'Saldo acumulado de caja', data: acumMeses,
      borderColor:'#14532d', backgroundColor:'rgba(22,163,74,0.2)', fill:true, tension:0.3, pointRadius:3
    }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
      scales:{ y:{ ticks:{ callback:v => '$'+v.toLocaleString('es-AR') } } } }
  });
  if (activosT > 0) {
    state.charts.patAct = new Chart($('#chart-pat-act').getContext('2d'), {
      type:'doughnut',
      data:{ labels:['Caja','Stock','Por cobrar','Cheques cartera'],
        datasets:[{ data:[saldoCaja, valorStock, porCobrar, chqEnCartera], backgroundColor:['#16a34a','#0d9488','#ca8a04','#7c3aed'] }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:10} } } } }
    });
  }
  if (pasivosT > 0) {
    state.charts.patPas = new Chart($('#chart-pat-pas').getContext('2d'), {
      type:'doughnut',
      data:{ labels:['Por pagar','Cheques emitidos','Arrendamientos'],
        datasets:[{ data:[porPagar, chqEmitidos, arrPendiente], backgroundColor:['#dc2626','#ea580c','#c026d3'] }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:10} } } } }
    });
  }
}

/* ----- RESUMEN MULTI-EMPRESA ----- */
// Vista global a través de TODAS las empresas a las que el usuario tiene acceso.
// Mantiene la separación por empresa (no mezcla datos) pero suma totales arriba
// para tener "el todo" de un vistazo. Permite filtrar qué empresas incluir.
pages.resumenGlobal = async function() {
  setHeader('Resumen multi-empresa', 'Vista consolidada de cheques, efectivo y flujo · seleccioná qué empresas incluir');
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando resumen...</div>`;
  let rsp;
  try { rsp = await api('/api/resumen-multiempresa'); }
  catch (e) { return toast(e.message, 'error'); }
  const data = rsp.data || { porEmpresa: [], totales: {} };
  const todasLasEmpresas = data.porEmpresa || [];

  // Restaurar seleccion previa de empresas del localStorage. Por defecto: todas.
  const STORAGE_KEY = 'ac.resumenEmpresas';
  let seleccionadas;
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (Array.isArray(saved)) {
      // Solo dejamos los IDs que todavia existen entre las empresas del usuario
      seleccionadas = new Set(saved.filter(id => todasLasEmpresas.some(e => e.companyId === id)));
    }
  } catch {}
  if (!seleccionadas || seleccionadas.size === 0) {
    seleccionadas = new Set(todasLasEmpresas.map(e => e.companyId));
  }

  // Render se redibuja cada vez que el usuario marca/desmarca una empresa.
  const render = () => {
    const porEmp = todasLasEmpresas.filter(e => seleccionadas.has(e.companyId));
    // Calculo los totales DEL SUBCONJUNTO seleccionado (no usamos data.totales).
    const t = porEmp.reduce((acc, e) => {
      acc.cheques.enCartera     += e.cheques.enCartera;
      acc.cheques.montoEnCartera+= e.cheques.montoEnCartera;
      acc.cheques.aVencer15     += e.cheques.aVencer15;
      acc.cheques.montoAVencer15+= e.cheques.montoAVencer15;
      acc.cheques.vencidos      += e.cheques.vencidos;
      acc.cheques.montoVencidos += e.cheques.montoVencidos;
      acc.efectivo.saldo        += e.efectivo.saldo;
      acc.flujoCaja.saldoActual += e.flujoCaja.saldoActual;
      return acc;
    }, {

      </div>`;
  };

  window.resumenToggleEmpresa = (id, marcada) => {
    if (marcada) seleccionadas.add(id);
    else seleccionadas.delete(id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(seleccionadas)));
    render();
  };
  window.resumenToggleAll = (marcadaTodos) => {
    seleccionadas = new Set(marcadaTodos ? todasLasEmpresas.map(e => e.companyId) : []);

    render();
  };

// Helper: cambia a la empresa elegida (si hace falta) y navega al modulo solicitado.
// Usa la funcion existente switchCompany que se encarga del cambio completo.
async function cambiarEmpresaYIr(companyId, modulo) {
  if (state.companyId === companyId) return go(modulo);
  state.currentPage = modulo;
  await switchCompany(companyId);
}

                ${c.telefono?`<div class="text-[11px] text-slate-500">${esc(c.telefono)}</div>`:''}

async function clienteSave(id) {
  const data = {
    razonSocial: $('#f-rs').value.trim(),
    nombreFantasia: $('#f-nf').value.trim() || null,
    cuit: $('#f-cuit').value.trim() || null,
    condIVA: $('#f-iva').value || null,
    email: $('#f-em').value.trim() || null,
    telefono: $('#f-tel').value.trim() || null,
    direccion: $('#f-dir').value.trim() || null,
    localidad: $('#f-loc').value || null,
    provincia: $('#f-prov').value || null,
    pais: $('#f-pais')?.value || null,
  };
  if (!data.razonSocial) return toast('Razón social requerida','warn');
  try {
    await api('/api/clientes' + (id?'/'+id:''), { method: id?'PUT':'POST', body: JSON.stringify(data) });
    toast(id?'Cliente actualizado':'Cliente creado','success');
    closeModal(); delete state.cache.clientes; pages.clientes();
  } catch (e) { toast(e.message,'error'); }
}
async function clienteDel(id) {
  if (!confirm('¿Borrar este cliente?')) return;
  try { await api('/api/clientes/'+id, { method:'DELETE' }); toast('Cliente borrado','success'); delete state.cache.clientes; pages.clientes(); }
  catch (e) { toast(e.message,'error'); }
}

// === CONTROL DE STOCK (planilla de conteo físico) ===
// Exporta un Excel con productos × depósitos y una columna vacía "conteo" para
// que el usuario haga el conteo físico. Después lo re-sube y el sistema genera
// los movimientos de ajuste con motivo "control_stock", firmados con su usuario.
function stockControlMenu() {
  const cat = state.stockFilter?.cat || '';
  openModal({
    title:'📋 Control de stock', size:'max-w-lg',
    body: `
      <div class="bg-blue-50 border border-blue-200 text-blue-900 text-sm rounded-lg p-3 mb-3">
        Hacé el conteo físico del depósito en 3 pasos:
        <ol class="list-decimal ml-5 mt-1 space-y-0.5 text-xs">
          <li>Descargá la planilla Excel con el stock actual del sistema.</li>
          <li>Imprimila o llenala digitalmente: completá la columna <b>conteo</b> con la cantidad real encontrada.</li>
          <li>Subila al sistema — se generan automáticamente los ajustes de stock con tu usuario y la fecha actual.</li>
        </ol>
      </div>
      <div class="text-xs text-slate-500 mb-2">${cat?`Filtro activo: <b>${esc(cat)}</b> · solo se exportan esa categoría.`:'Se exporta el stock completo (sin filtro de categoría).'}</div>
      <div class="flex flex-col gap-2 mt-3">
        <button class="btn btn-primary" onclick="stockControlDescargar()">📥 Descargar planilla actual</button>
        <button class="btn btn-secondary" onclick="$('#stock-control-file').click()">📤 Subir planilla con conteo</button>
        <input type="file" id="stock-control-file" accept=".xlsx,.xls" class="hidden" onchange="stockControlSubir(this)"/>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`,
  });
}
async function stockControlDescargar() {
  const cat = state.stockFilter?.cat || '';
  try {
    const url = '/api/admin/control-stock/exportar' + (cat ? '?categoria=' + encodeURIComponent(cat) : '');
    const r = await fetch(url, { headers: { 'Authorization': 'Bearer '+state.token, 'X-Company-Id': state.companyId } });
    if (!r.ok) throw new Error(await r.text());
    const blob = await r.blob();
    const stamp = new Date().toISOString().slice(0,10);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'control-stock-'+stamp+'.xlsx';
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
    toast('Planilla descargada', 'success');
  } catch (e) { toast(e.message, 'error'); }
}
async function stockControlSubir(inp) {
  const f = inp.files?.[0];
  if (!f) return;
  inp.value = '';
  if (!can('stock:update')) return toast('Necesitás permiso de modificación de stock para aplicar ajustes.', 'warn');
  toast('Procesando conteo…', 'info');
  const fd = new FormData();
  fd.append('archivo', f);
  try {
    const r = await fetch('/api/admin/control-stock/importar', {
      method:'POST',
      headers: { 'Authorization': 'Bearer '+state.token, 'X-Company-Id': state.companyId },
      body: fd,
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Error al procesar');
    const detallesErrores = data.errores?.length
      ? `<div class="mt-3 max-h-48 overflow-y-auto bg-red-50 border border-red-200 rounded p-3">
           <div class="text-xs font-semibold text-red-900 mb-1">Errores (${data.errores.length}):</div>
           ${data.errores.map(e => `<div class="text-[11px] text-red-700">• Fila ${e.fila}: ${esc(e.error)}</div>`).join('')}
         </div>` : '';
    closeModal();
    openModal({
      title:'✅ Control de stock procesado', size:'max-w-lg',
      body: `
        <div class="grid grid-cols-3 gap-3 mb-3">
          <div class="kpi"><div class="text-xs text-slate-500">🔧 Ajustes</div><div class="text-2xl font-bold text-amber-700">${data.ajustes || 0}</div></div>
          <div class="kpi"><div class="text-xs text-slate-500">✓ Sin cambio</div><div class="text-2xl font-bold text-green-700">${data.sinCambio || 0}</div></div>
          <div class="kpi"><div class="text-xs text-slate-500">— Sin conteo</div><div class="text-2xl font-bold text-slate-500">${data.sinConteo || 0}</div></div>
        </div>
        <p class="text-xs text-slate-500">Cada ajuste generó un movimiento con motivo <code>control_stock</code> firmado con tu usuario y la fecha de hoy.</p>
        ${detallesErrores}`,
      footer: `<button class="btn btn-primary" onclick="closeModal(); pages.stock()">Listo</button>`,
    });
  } catch (e) { toast(e.message, 'error'); }
}

pages.movimientos = async function() {
  setHeader('Movimientos', 'Entradas y salidas de stock');

  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let rows=[], prods=[];
  try {
    const [r, p] = await Promise.all([api('/api/movimientos'), api('/api/productos')]);
    rows = r.data||[]; prods = p.data||[]; state.cache.productos = prods;
  } catch (e) { return toast(e.message,'error'); }
  state.movFilter = state.movFilter || { q:'', cat:'', tipo:'', motivo:'', desde:'', hasta:'' };
  const cats = [...new Set(prods.map(p=>p.categoria).filter(Boolean))].sort();

    const f = state.movFilter;
    const q = (f.q||'').toLowerCase();
    const filtered = rows.filter(m => {
      if (f.tipo && m.tipo !== f.tipo) return false;
      if (f.cat) {
        const p = prods.find(x=>x.id===m.productoId);
        if (!p || p.categoria !== f.cat) return false;
      }
      if (f.motivo && m.motivo !== f.motivo) return false;
      if (f.desde && (m.fecha||'') < f.desde) return false;
      if (f.hasta && (m.fecha||'') > f.hasta+'T23:59:59') return false;

      }
      return true;
    });

    const salidas  = filtered.filter(m=>m.tipo==='egreso' ).reduce((a,m)=>a+Number(m.cantidad||0),0);
