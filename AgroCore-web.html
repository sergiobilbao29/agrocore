/* ---------- FICHA / PLANILLA DEL EMPLEADO ---------- */
const EMP_MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function empMesLabel(p){ if(!p) return ''; const [y,m]=String(p).split('-'); return `${EMP_MESES[Number(m)-1]||m} ${y}`; }
function empPeriodoHoy(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function empCatLabel(c){ return ({sueldo:'Sueldo',horas:'Horas',adelanto:'Adelanto',compra:'Compra personal',premio:'Premio / bono',descuento:'Descuento',otro:'Otro'})[c]||'Otro'; }

// Abre la ficha de un empleado: trae sus movimientos y liquidaciones y la dibuja.
// push=true cuando es una navegación real (clic en un empleado): empuja una
// entrada al historial del navegador para que el botón Atrás vuelva a la nómina.
// push=false para los re-render internos (después de guardar) y para el popstate.
async function empleAbrir(id, push=true) {
  state.empFichaId = id;
  if (push) {
    history.pushState({ page:'empleados', empFichaId:id }, '', '#/empleados');
  }
  setHeader('Planilla de empleado', 'Gastos, ganancias y liquidación de sueldo');
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando planilla…</div>`;
  let emp, movs=[], liqs=[];
  try {
    if (!state.cache.empleados) await crudList('empleados');
    emp = (state.cache.empleados||[]).find(x=>x.id===id);
    if (!emp) { await crudList('empleados'); emp=(state.cache.empleados||[]).find(x=>x.id===id); }
    if (!emp) { toast('Empleado no encontrado','error'); return pages.empleados(); }
    movs = (await api('/api/empleados/'+id+'/movimientos')).data || [];
    liqs = (await api('/api/empleados/'+id+'/liquidaciones')).data || [];
  } catch (e) { return toast(e.message,'error'); }
  state.empFicha = { emp, movs, liqs };
  // Al abrir la ficha (navegación real) arrancamos en el mes más reciente con
  // datos; en los re-render internos respetamos el mes que el usuario eligió.
  if (push) {
    const periodos = [...movs.map(m=>m.periodo), ...liqs.map(l=>l.periodo), empPeriodoHoy()].filter(Boolean);
    state.empMes = periodos.sort().reverse()[0];
  }
  empFichaRender();
}
function empleVolver(){ history.back(); }
function empSetMes(p){ state.empMes = p || empPeriodoHoy(); empFichaRender(); }

function empFichaRender() {
  if (!state.empFicha) return;
  const { emp, movs, liqs } = state.empFicha;
  const empId = emp.id;

  if (!state.empMes) state.empMes = empPeriodoHoy();
  const mes = state.empMes;

  const movsMes = movs.filter(m=>m.periodo===mes)
                      .sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const liq = liqs.find(l=>l.periodo===mes) || null;

  // Sueldo base automático del mes (salvo que ya haya un movimiento "sueldo").
  const haySueldoMov = movsMes.some(m=>m.categoria==='sueldo');
  const sueldoBase = (!haySueldoMov && Number(emp.sueldo||0)>0) ? Number(emp.sueldo) : 0;

  const gananciasMov = movsMes.filter(m=>m.tipo==='ganancia').reduce((a,m)=>a+Number(m.monto||0),0);
  const gastos       = movsMes.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+Number(m.monto||0),0);
  const ganancias    = gananciasMov + sueldoBase;
  const neto         = ganancias - gastos;

  const canC = can('rrhh:create')||can('finanzas:create');
  const canU = can('rrhh:update')||can('finanzas:update');
  const canD = can('rrhh:delete')||can('finanzas:delete');

  const iniciales = `${(emp.apellido||'?').slice(0,1)}${(emp.nombre||'?').slice(0,1)}`.toUpperCase();

  // --- Filas de la planilla del mes ---
  let filas = '';
  if (sueldoBase>0) {
    filas += `<tr class="bg-emerald-50/60">
      <td class="px-3 py-2 text-slate-400 text-xs whitespace-nowrap">—</td>
      <td class="px-3 py-2"><span class="badge badge-green">Ganancia</span></td>
      <td class="px-3 py-2 text-slate-600">Sueldo</td>
      <td class="px-3 py-2 font-semibold text-slate-800">Sueldo base <span class="text-[11px] text-slate-400 font-normal">(automático)</span></td>
      <td class="px-3 py-2 text-right whitespace-nowrap text-emerald-600 font-semibold">+${fmt$(sueldoBase)}</td>
      <td class="px-3 py-2 text-right text-[11px] text-slate-400">de la ficha</td>
    </tr>`;
  }
  filas += movsMes.map(m=>{
    const esGan = m.tipo==='ganancia';
    const montoCell = esGan
      ? `<span class="text-emerald-600 font-semibold">+${fmt$(m.monto)}</span>`
      : `<span class="text-red-600 font-semibold">-${fmt$(m.monto)}</span>`;
    const detHoras = (m.categoria==='horas' && m.horas)
      ? `<span class="text-[11px] text-slate-400 font-normal"> · ${m.horas} h × ${fmt$(m.valorHora||0)}</span>` : '';
    return `<tr class="hover:bg-slate-50">
      <td class="px-3 py-2 whitespace-nowrap text-slate-600">${m.fecha?fmtDate(m.fecha):'—'}</td>
      <td class="px-3 py-2">${esGan?'<span class="badge badge-green">Ganancia</span>':'<span class="badge badge-red">Gasto</span>'}</td>
      <td class="px-3 py-2 text-slate-600">${esc(empCatLabel(m.categoria))}</td>
      <td class="px-3 py-2 font-semibold text-slate-800">${esc(m.concepto||'')}${detHoras}${m.observaciones?`<br><span class="text-[11px] text-slate-400 font-normal">${esc(m.observaciones)}</span>`:''}</td>
      <td class="px-3 py-2 text-right whitespace-nowrap">${montoCell}</td>
      <td class="px-3 py-2 text-right whitespace-nowrap">
        ${canU?`<button class="btn btn-ghost text-xs" onclick='empMovForm(${JSON.stringify(m.id)})'>✏️</button>`:''}
        ${canD?`<button class="btn btn-ghost text-xs text-red-600" onclick='empMovDel(${JSON.stringify(m.id)})'>🗑️</button>`:''}
      </td>
    </tr>`;
  }).join('');
  if (!filas) filas = `<tr><td colspan="6" class="text-center text-slate-400 py-8">Sin movimientos en ${empMesLabel(mes)}. Agregá adelantos, horas, compras…</td></tr>`;

  // --- Caja de liquidación del mes seleccionado ---
  let cajaLiq;
  if (liq) {
    const detalle = liq.medioPago==='efectivo' ? `Efectivo · caja ${esc(liq.caja||'—')}`
      : liq.medioPago==='cheque' ? `Cheque propio N° ${esc(liq.nroCheque||'—')}${liq.banco?` · ${esc(liq.banco)}`:''}`
      : `Transferencia${liq.banco?` · ${esc(liq.banco)}`:''}${liq.referencia?` · ${esc(liq.referencia)}`:''}`;
    cajaLiq = `<div class="kpi" style="background:linear-gradient(135deg,#047857,#065f46);border:none;">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <div class="text-xs uppercase tracking-wider" style="color:#a7f3d0">✅ Sueldo liquidado · ${empMesLabel(mes)}</div>
          <div class="text-2xl font-extrabold text-white mt-0.5">${fmt$(liq.neto)}</div>
          <div class="text-xs mt-1" style="color:#d1fae5">${detalle} · ${liq.fecha?fmtDate(liq.fecha):''}</div>
        </div>
        ${canD?`<button class="btn btn-secondary text-xs" onclick='empLiqAnular(${JSON.stringify(liq.id)})'>Anular liquidación</button>`:''}
      </div>
    </div>`;
  } else {
    cajaLiq = `<div class="kpi">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <div class="text-xs text-slate-500">Neto a liquidar · ${empMesLabel(mes)}</div>
          <div class="text-2xl font-extrabold mt-0.5 ${neto>=0?'text-emerald-700':'text-red-600'}">${fmt$(neto)}</div>
          <div class="text-xs text-slate-400 mt-1">Ganancias ${fmt$(ganancias)} − Gastos ${fmt$(gastos)}</div>
        </div>
        ${canC?`<button class="btn btn-primary" onclick='empLiqForm(${JSON.stringify(mes)})'>💵 Liquidar sueldo</button>`:''}
      </div>
    </div>`;
  }

  // --- Historial de liquidaciones ---
  const histLiq = liqs.slice().sort((a,b)=>b.periodo.localeCompare(a.periodo));
  const histHtml = histLiq.length ? `
    <div class="mt-6">
      <h3 class="font-semibold text-slate-800 mb-2">Historial de liquidaciones</h3>
      <div class="overflow-x-auto border border-slate-200 rounded-lg">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 text-slate-600"><tr>
            <th class="text-left px-3 py-2">Mes</th>
            <th class="text-left px-3 py-2">Fecha pago</th>
            <th class="text-left px-3 py-2">Medio</th>
            <th class="text-right px-3 py-2">Ganancias</th>
            <th class="text-right px-3 py-2">Gastos</th>
            <th class="text-right px-3 py-2">Neto pagado</th>
            <th class="px-3 py-2"></th>
          </tr></thead>
          <tbody class="divide-y divide-slate-200">
            ${histLiq.map(l=>`<tr class="hover:bg-slate-50 cursor-pointer" onclick='empSetMes(${JSON.stringify(l.periodo)})'>
              <td class="px-3 py-2 font-semibold text-slate-800">${empMesLabel(l.periodo)}</td>
              <td class="px-3 py-2 text-slate-600">${l.fecha?fmtDate(l.fecha):'—'}</td>
              <td class="px-3 py-2 text-slate-600 capitalize">${esc(l.medioPago||'')}</td>
              <td class="px-3 py-2 text-right text-emerald-700">${fmt$(l.totalGanancias)}</td>
              <td class="px-3 py-2 text-right text-red-600">${fmt$(l.totalGastos)}</td>
              <td class="px-3 py-2 text-right font-bold text-slate-800">${fmt$(l.neto)}</td>
              <td class="px-3 py-2 text-right">${canD?`<button class="btn btn-ghost text-xs text-red-600" onclick='event.stopPropagation();empLiqAnular(${JSON.stringify(l.id)})'>Anular</button>`:''}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>` : '';

  // --- Resumen anual (año del mes seleccionado) ---
  const anio = String(mes).slice(0,4);
  const liqsAnio = liqs.filter(l=>String(l.periodo).startsWith(anio+'-'));
  const totalLiqAnio   = liqsAnio.reduce((a,l)=>a+Number(l.neto||0),0);
  const totalGanAnio   = liqsAnio.reduce((a,l)=>a+Number(l.totalGanancias||0),0);
  const totalGastoAnio = liqsAnio.reduce((a,l)=>a+Number(l.totalGastos||0),0);
  const promedioAnio   = liqsAnio.length ? totalLiqAnio/liqsAnio.length : 0;
  const resumenAnioHtml = `
    <div class="mt-6">
      <h3 class="font-semibold text-slate-800 mb-2">Resumen anual ${anio}</h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
        <div class="kpi"><div class="text-xs text-slate-500">Total liquidado ${anio}</div><div class="text-xl font-bold mt-1 text-emerald-700">${fmt$(totalLiqAnio)}</div></div>
        <div class="kpi"><div class="text-xs text-slate-500">Meses liquidados</div><div class="text-xl font-bold mt-1">${liqsAnio.length} / 12</div></div>
        <div class="kpi"><div class="text-xs text-slate-500">Promedio mensual</div><div class="text-xl font-bold mt-1">${fmt$(promedioAnio)}</div></div>
        <div class="kpi"><div class="text-xs text-slate-500">Ganancias / Gastos del año</div><div class="text-sm font-bold mt-1.5"><span class="text-emerald-700">${fmt$(totalGanAnio)}</span> <span class="text-slate-400">/</span> <span class="text-red-600">${fmt$(totalGastoAnio)}</span></div></div>
      </div>
      <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
        ${Array.from({length:12},(_,i)=>{
          const p = anio+'-'+String(i+1).padStart(2,'0');
          const l = liqsAnio.find(x=>x.periodo===p);
          return `<button class="kpi text-left ${p===mes?'ring-2 ring-green-600':''}" style="cursor:pointer" onclick='empSetMes(${JSON.stringify(p)})'>
            <div class="text-xs text-slate-500">${EMP_MESES[i].slice(0,3)}</div>
            <div class="text-sm font-bold mt-0.5 ${l?'text-emerald-700':'text-slate-300'}">${l?fmt$(l.neto):'—'}</div>
          </button>`;
        }).join('')}
      </div>
    </div>`;

  $('#page-body').innerHTML = `
    <button class="btn btn-ghost text-sm mb-3" onclick="empleVolver()">← Volver a la nómina</button>

    <div class="kpi mb-4">
      <div class="flex items-center gap-4 flex-wrap">
        ${emp.fotoUrl
          ? `<img src="${esc(emp.fotoUrl)}" class="w-16 h-16 rounded-full object-cover border border-slate-200"/>`
          : `<div class="w-16 h-16 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600 text-xl">${esc(iniciales)}</div>`}
        <div class="flex-1 min-w-[180px]">
          <div class="text-lg font-bold text-slate-800">${esc(emp.apellido)}, ${esc(emp.nombre)}</div>
          <div class="text-sm text-slate-500">${esc(emp.puesto||'Sin puesto')}${emp.dni?` · DNI ${esc(emp.dni)}`:''}</div>
        </div>
        <div class="text-right">
          <div class="text-xs text-slate-500">Sueldo base</div>
          <div class="text-lg font-bold text-slate-800">${emp.sueldo?fmt$(emp.sueldo):'— sin cargar —'}</div>
        </div>
        ${canU?`<button class="btn btn-secondary text-xs" onclick='empleForm(${JSON.stringify(empId)})'>Editar datos</button>`:''}
      </div>
    </div>

    <div class="flex items-end gap-3 flex-wrap mb-3">
      <div>
        <label class="label">Mes / año</label>
        <input type="month" class="input" value="${mes}" onchange="empSetMes(this.value)"/>
      </div>
      <div class="text-xs text-slate-400 pb-2">${empMesLabel(mes)}</div>
      <div class="flex-1"></div>
      <button class="btn btn-secondary" onclick="empExportXLSX()" title="Descargar la planilla del mes en Excel">📊 Excel</button>
      <button class="btn btn-secondary" onclick="empReciboPDF()" title="Recibo imprimible para entregar al empleado">🖨️ Recibo PDF</button>
      ${canC?`<button class="btn btn-primary" onclick="empMovForm()">+ Agregar movimiento</button>`:''}
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Ganancias del mes</div><div class="text-xl font-bold mt-1 text-emerald-700">${fmt$(ganancias)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Gastos del mes</div><div class="text-xl font-bold mt-1 text-red-600">${fmt$(gastos)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Neto</div><div class="text-xl font-bold mt-1 ${neto>=0?'text-slate-800':'text-red-600'}">${fmt$(neto)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Estado</div><div class="mt-1.5">${liq?'<span class="badge badge-green">Liquidado</span>':'<span class="badge badge-gray">Pendiente</span>'}</div></div>
    </div>

    <div class="overflow-x-auto border border-slate-200 rounded-lg mb-4">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-50 text-slate-600"><tr>
          <th class="text-left px-3 py-2">Fecha</th>
          <th class="text-left px-3 py-2">Tipo</th>
          <th class="text-left px-3 py-2">Categoría</th>
          <th class="text-left px-3 py-2">Concepto</th>
          <th class="text-right px-3 py-2">Monto</th>
          <th class="px-3 py-2"></th>
        </tr></thead>
        <tbody class="divide-y divide-slate-200">${filas}</tbody>
      </table>
    </div>

    ${cajaLiq}
    ${liq?`<p class="text-xs text-slate-400 mt-2">La liquidación es una foto del momento en que se hizo. Si cargás más movimientos en este mes, anulá y volvé a liquidar para reflejarlos.</p>`:''}
    ${resumenAnioHtml}
    ${histHtml}`;
}

// Opciones de categoría según el tipo de movimiento.
function empMovCatOptions(tipo, sel){
  const opts = tipo==='gasto'
    ? [['adelanto','Adelanto de dinero'],['compra','Compra / cosa personal'],['descuento','Descuento'],['otro','Otro gasto']]
    : [['horas','Horas trabajadas'],['sueldo','Sueldo'],['premio','Premio / bono'],['otro','Otro ingreso']];
  return opts.map(([v,l])=>`<option value="${v}" ${v===sel?'selected':''}>${l}</option>`).join('');
}

function empMovForm(movId=null){
  const movs = (state.empFicha&&state.empFicha.movs)||[];
  const it = movId ? (movs.find(m=>m.id===movId)||{}) : {};
  const tipo = it.tipo || 'gasto';
  const cat  = it.categoria || (tipo==='gasto'?'adelanto':'horas');
  let fechaStr;
  if (it.fecha) fechaStr = new Date(it.fecha).toISOString().slice(0,10);
  else {
    const hoy = new Date().toISOString().slice(0,10);
    fechaStr = (hoy.slice(0,7)===state.empMes) ? hoy : (state.empMes+'-01');
  }
  openModal({
    title: movId?'Editar movimiento':'Agregar movimiento a la planilla',
    body: `
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Fecha *</label><input id="m-fecha" class="input" type="date" value="${fechaStr}"/></div>
        <div><label class="label">Tipo *</label>
          <select id="m-tipo" class="input" onchange="empMovTipoChange()">
            <option value="ganancia" ${tipo==='ganancia'?'selected':''}>Ganancia (le suma al sueldo)</option>
            <option value="gasto" ${tipo==='gasto'?'selected':''}>Gasto (le resta al sueldo)</option>
          </select>
        </div>
        <div><label class="label">Categoría *</label>
          <select id="m-cat" class="input" onchange="empMovCatChange()">${empMovCatOptions(tipo,cat)}</select>
        </div>
        <div id="m-monto-wrap"><label class="label">Monto *</label><input id="m-monto" class="input" type="number" step="0.01" min="0" value="${it.monto||''}"/></div>
        <div id="m-horas-wrap" class="col-span-2 grid grid-cols-3 gap-3" style="display:none">
          <div><label class="label">Horas *</label><input id="m-horas" class="input" type="number" step="0.5" min="0" value="${it.horas||''}" oninput="empMovCalcHoras()"/></div>
          <div><label class="label">Valor por hora *</label><input id="m-vh" class="input" type="number" step="0.01" min="0" value="${it.valorHora||''}" oninput="empMovCalcHoras()"/></div>
          <div><label class="label">Total</label><div id="m-montoCalc" class="input bg-slate-50 font-semibold flex items-center">${fmt$((it.horas||0)*(it.valorHora||0))}</div></div>
        </div>
        <div class="col-span-2"><label class="label">Concepto *</label><input id="m-con" class="input" value="${esc(it.concepto||'')}" placeholder="Ej: adelanto quincena, horas extra cosecha, zapatillas…"/></div>
        <div class="col-span-2"><label class="label">Observaciones</label><textarea id="m-obs" class="input" rows="2">${esc(it.observaciones||'')}</textarea></div>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick='empMovSave(${JSON.stringify(movId)})'>${movId?'Guardar':'Agregar'}</button>`
  });
  empMovCatChange();
}
function empMovTipoChange(){
  const tipo=$('#m-tipo').value;
  $('#m-cat').innerHTML = empMovCatOptions(tipo,'');
  empMovCatChange();
}
function empMovCatChange(){
  const esHoras = $('#m-cat').value==='horas';
  $('#m-horas-wrap').style.display = esHoras?'grid':'none';
  $('#m-monto-wrap').style.display = esHoras?'none':'';
  if (esHoras) empMovCalcHoras();
}
function empMovCalcHoras(){
  const h=Number($('#m-horas').value||0), v=Number($('#m-vh').value||0);
  const t=h*v;
  $('#m-monto').value = t||'';
  if($('#m-montoCalc')) $('#m-montoCalc').textContent = fmt$(t);
}
async function empMovSave(movId){
  const empId = state.empFichaId;
  const tipo = $('#m-tipo').value;
  const cat  = $('#m-cat').value;
  const data = {
    fecha: $('#m-fecha').value,
    tipo,
    categoria: cat||null,
    concepto: $('#m-con').value.trim(),
    monto: Number($('#m-monto').value||0),
    horas: cat==='horas' ? Number($('#m-horas').value||0) : null,
    valorHora: cat==='horas' ? Number($('#m-vh').value||0) : null,
    observaciones: $('#m-obs').value.trim()||null,
  };
  if (!data.fecha)    return toast('Fecha requerida','warn');
  if (!data.concepto) return toast('Concepto requerido','warn');
  if (!data.monto || data.monto<=0) return toast('Ingresá un monto mayor a cero','warn');
  try {
    await api('/api/empleados/'+empId+'/movimientos'+(movId?'/'+movId:''),
      {method:movId?'PUT':'POST',body:JSON.stringify(data)});
    toast(movId?'Actualizado':'Agregado','success'); closeModal();
    state.empMes = (data.fecha||'').slice(0,7) || state.empMes;
    await empleAbrir(empId);
  } catch (e) { toast(e.message,'error'); }
}
async function empMovDel(movId){
  if(!confirm('¿Borrar este movimiento de la planilla?')) return;
  const empId=state.empFichaId;
  try{
    await api('/api/empleados/'+empId+'/movimientos/'+movId,{method:'DELETE'});
    toast('Borrado','success'); await empleAbrir(empId);
  }catch(e){ toast(e.message,'error'); }
}

function empLiqForm(periodo){
  const {emp,movs}=state.empFicha;
  const movsMes=movs.filter(m=>m.periodo===periodo);
  const haySueldoMov=movsMes.some(m=>m.categoria==='sueldo');
  const sueldoBase=(!haySueldoMov&&Number(emp.sueldo||0)>0)?Number(emp.sueldo):0;
  const ganMov=movsMes.filter(m=>m.tipo==='ganancia').reduce((a,m)=>a+Number(m.monto||0),0);
  const gastos=movsMes.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+Number(m.monto||0),0);
  const ganancias=ganMov+sueldoBase;
  const neto=ganancias-gastos;
  const hoy=new Date().toISOString().slice(0,10);
  openModal({
    title:'Liquidar sueldo · '+empMesLabel(periodo),
    body:`
      <div class="kpi mb-3" style="background:linear-gradient(135deg,#047857,#065f46);border:none;">
        <div class="text-xs uppercase tracking-wider" style="color:#a7f3d0">Neto a pagar</div>
        <div class="text-3xl font-extrabold text-white mt-0.5">${fmt$(neto)}</div>
        <div class="text-xs mt-1" style="color:#d1fae5">Ganancias ${fmt$(ganancias)}${sueldoBase>0?` (incluye sueldo base ${fmt$(sueldoBase)})`:''} − Gastos ${fmt$(gastos)}</div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Fecha de pago *</label><input id="lq-fecha" class="input" type="date" value="${hoy}"/></div>
        <div><label class="label">Medio de pago *</label>
          <select id="lq-medio" class="input" onchange="empLiqMedioChange()">
            <option value="efectivo">Efectivo en caja</option>
            <option value="cheque">Cheque propio</option>
            <option value="transferencia">Transferencia bancaria</option>
          </select>
        </div>
        <div id="lq-caja-wrap"><label class="label">Caja *</label>${catSelect('lq-caja','Caja','',{placeholder:'— Elegir caja —'})}</div>
        <div id="lq-banco-wrap"><label class="label">Banco</label><input id="lq-banco" class="input" placeholder="Ej: Banco Nación"/></div>
        <div id="lq-cheque-wrap"><label class="label">N° de cheque *</label><input id="lq-cheque" class="input"/></div>
        <div id="lq-ref-wrap"><label class="label">N° operación / comprobante</label><input id="lq-ref" class="input"/></div>
        <div class="col-span-2"><label class="label">Observaciones</label><textarea id="lq-obs" class="input" rows="2"></textarea></div>
      </div>
      <p id="lq-hint" class="text-xs text-slate-500 mt-2"></p>
      ${neto<=0?`<p class="text-xs text-amber-600 mt-1">El neto no es positivo: se registrará la liquidación pero no se generará ningún pago en efectivo ni cheque.</p>`:''}`,
    footer:`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick='empLiqSave(${JSON.stringify(periodo)})'>Confirmar liquidación</button>`
  });
  empLiqMedioChange();
}
function empLiqMedioChange(){
  const medio=$('#lq-medio').value;
  const show=(id,v)=>{ const el=$('#'+id); if(el) el.style.display=v?'':'none'; };
  show('lq-caja-wrap',   medio==='efectivo');
  show('lq-banco-wrap',  medio!=='efectivo');
  show('lq-cheque-wrap', medio==='cheque');
  show('lq-ref-wrap',    medio==='transferencia');
  $('#lq-hint').textContent = medio==='efectivo'
    ? 'Se va a registrar un egreso por el neto en la caja elegida de Control de Efectivo.'
    : medio==='cheque'
    ? 'Se va a generar un cheque propio en cartera a nombre del empleado.'
    : 'Sólo queda registrada la transferencia; no afecta otros módulos.';
}
async function empLiqSave(periodo){
  const empId=state.empFichaId;
  const medio=$('#lq-medio').value;
  const data={
    periodo,
    fecha:$('#lq-fecha').value,
    medioPago:medio,
    caja: medio==='efectivo' ? ($('#lq-caja').value||null) : null,
    banco: medio!=='efectivo' ? ($('#lq-banco').value.trim()||null) : null,
    nroCheque: medio==='cheque' ? ($('#lq-cheque').value.trim()||null) : null,
    referencia: medio==='transferencia' ? ($('#lq-ref').value.trim()||null) : null,
    observaciones: $('#lq-obs').value.trim()||null,
  };
  if(!data.fecha) return toast('Fecha de pago requerida','warn');
  if(medio==='efectivo'&&!data.caja) return toast('Elegí la caja de la que sale el pago','warn');
  if(medio==='cheque'&&!data.nroCheque) return toast('Ingresá el número de cheque','warn');
  try{
    await api('/api/empleados/'+empId+'/liquidaciones',{method:'POST',body:JSON.stringify(data)});
    toast('Sueldo liquidado','success'); closeModal();
    delete state.cache.efectivo; delete state.cache.cheques;
    state.empMes=periodo;
    await empleAbrir(empId);
  }catch(e){ toast(e.message,'error'); }
}
async function empLiqAnular(liqId){
  if(!confirm('¿Anular esta liquidación? Se borrará el pago generado en efectivo/cheque y el mes quedará sin liquidar.')) return;
  const empId=state.empFichaId;
  try{
    await api('/api/empleados/'+empId+'/liquidaciones/'+liqId,{method:'DELETE'});
    toast('Liquidación anulada','success');
    delete state.cache.efectivo; delete state.cache.cheques;
    await empleAbrir(empId);
  }catch(e){ toast(e.message,'error'); }
}

// Junta los datos de la planilla del mes seleccionado (reutilizado por Excel y PDF).
function _empPlanillaMes(){
  const {emp,movs,liqs}=state.empFicha;
  const mes=state.empMes;
  const movsMes=movs.filter(m=>m.periodo===mes).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const liq=liqs.find(l=>l.periodo===mes)||null;
  const haySueldoMov=movsMes.some(m=>m.categoria==='sueldo');
  const sueldoBase=(!haySueldoMov&&Number(emp.sueldo||0)>0)?Number(emp.sueldo):0;
  const totGan=movsMes.filter(m=>m.tipo==='ganancia').reduce((a,m)=>a+Number(m.monto||0),0)+sueldoBase;
  const totGasto=movsMes.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+Number(m.monto||0),0);
  const empresa=(state.user?.companies||[]).find(c=>c.id===state.companyId);
  return {
    emp, mes, movsMes, liq, sueldoBase, totGan, totGasto, neto: totGan-totGasto,
    nombreEmpresa: empresa?.name || 'AgroCore',
    cuitEmpresa: empresa?.cuit||'',
  };
}

// Exporta la planilla del mes a un archivo Excel (.xlsx).
function empExportXLSX(){
  if (typeof XLSX==='undefined'){ toast('Esperá un momento, todavía se está cargando la librería de Excel…','warn'); return; }
  if (!state.empFicha) return;
  const d=_empPlanillaMes();
  const aoa=[
    [d.nombreEmpresa],
    ['Planilla de empleado'],
    [`Empleado: ${d.emp.apellido}, ${d.emp.nombre}`],
    [`Período: ${empMesLabel(d.mes)}`],
    [],
    ['Fecha','Tipo','Categoría','Concepto','Horas','Valor hora','Monto','Observaciones'],
  ];
  if (d.sueldoBase>0) aoa.push(['','Ganancia','Sueldo','Sueldo base','','',d.sueldoBase,'Automático (sueldo de la ficha)']);
  d.movsMes.forEach(m=>aoa.push([
    m.fecha?fmtDate(m.fecha):'',
    m.tipo==='ganancia'?'Ganancia':'Gasto',
    empCatLabel(m.categoria),
    m.concepto||'',
    m.horas||'',
    m.valorHora||'',
    Number(m.monto||0),
    m.observaciones||'',
  ]));
  aoa.push([]);
  aoa.push(['','','','','','Total ganancias',d.totGan,'']);
  aoa.push(['','','','','','Total gastos',d.totGasto,'']);
  aoa.push(['','','','','','Neto del mes',d.neto,'']);
  if (d.liq) aoa.push(['','','','','','Liquidado',d.liq.neto,`${d.liq.medioPago} · ${d.liq.fecha?fmtDate(d.liq.fecha):''}`]);
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:11},{wch:10},{wch:16},{wch:34},{wch:8},{wch:12},{wch:14},{wch:34}];
  ws['!merges']=[
    {s:{r:0,c:0},e:{r:0,c:7}},
    {s:{r:1,c:0},e:{r:1,c:7}},
    {s:{r:2,c:0},e:{r:2,c:7}},
    {s:{r:3,c:0},e:{r:3,c:7}},
  ];
  for (let r=6;r<aoa.length;r++){
    const ref=XLSX.utils.encode_cell({r,c:6});
    if (ws[ref]&&typeof ws[ref].v==='number') ws[ref].z='#,##0.00';
  }
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,('Planilla '+d.mes).slice(0,31));
  const fn=`Planilla_${d.emp.apellido}_${d.emp.nombre}_${d.mes}.xlsx`.replace(/\s+/g,'_');
  XLSX.writeFile(wb,fn);
  toast('Excel descargado: '+fn,'success');
}

// Genera un recibo de liquidación de sueldo en PDF, listo para imprimir y
// entregar al empleado.
function empReciboPDF(){
  const jsPDFCtor=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
  if (typeof jsPDFCtor==='undefined'){ toast('Esperá un momento, todavía se está cargando la librería de PDF…','warn'); return; }
  if (!state.empFicha) return;
  const d=_empPlanillaMes();
  const fmtMoney=(n)=>'$ '+Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const doc=new jsPDFCtor({orientation:'portrait',unit:'pt',format:'a4'});
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  let y=40;

  doc.setFont('helvetica','bold'); doc.setFontSize(15);
  doc.text(d.nombreEmpresa, pageW/2, y, {align:'center'}); y+=17;
  if (d.cuitEmpresa){ doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.text('CUIT: '+d.cuitEmpresa, pageW/2, y, {align:'center'}); y+=14; }
  doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('RECIBO DE LIQUIDACIÓN DE SUELDO', pageW/2, y, {align:'center'}); y+=16;
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text('Período: '+empMesLabel(d.mes), pageW/2, y, {align:'center'}); y+=18;

  // Caja con datos del empleado
  doc.setDrawColor(210); doc.setFillColor(247,248,250);
  doc.roundedRect(40,y,pageW-80,62,3,3,'FD');
  doc.setFontSize(9); doc.setTextColor(0,0,0);
  const cX=52, c2X=pageW/2+8;
  const par=(label,val,x,yy)=>{ doc.setFont('helvetica','bold'); doc.text(label,x,yy);
    doc.setFont('helvetica','normal'); doc.text(String(val||'—'),x+62,yy); };
  par('Empleado:', `${d.emp.apellido}, ${d.emp.nombre}`, cX, y+17);
  par('DNI:', d.emp.dni, cX, y+34);
  par('Puesto:', d.emp.puesto, cX, y+51);
  par('CUIL:', d.emp.cuil, c2X, y+17);
  par('Ingreso:', d.emp.fechaIngreso?fmtDate(d.emp.fechaIngreso):'—', c2X, y+34);
  par('Sueldo base:', fmtMoney(d.emp.sueldo||0), c2X, y+51);
  y+=62+18;

  // Tabla de conceptos: haberes (ganancias) y descuentos (gastos)
  const body=[];
  if (d.sueldoBase>0) body.push(['—','Sueldo base',fmtMoney(d.sueldoBase),'']);
  d.movsMes.forEach(m=>{
    const det=empCatLabel(m.categoria)+' — '+(m.concepto||'');
    if (m.tipo==='ganancia') body.push([m.fecha?fmtDate(m.fecha):'',det,fmtMoney(m.monto),'']);
    else body.push([m.fecha?fmtDate(m.fecha):'',det,'',fmtMoney(m.monto)]);
  });
  if (!body.length) body.push(['','Sin movimientos cargados en el mes','','']);
  doc.autoTable({
    head:[['Fecha','Detalle','Haberes','Descuentos']],
    body,
    foot:[['','TOTALES',fmtMoney(d.totGan),fmtMoney(d.totGasto)]],
    startY:y,
    styles:{fontSize:9,cellPadding:4,overflow:'linebreak'},
    headStyles:{fillColor:[21,128,61],textColor:[255,255,255],halign:'center'},
    footStyles:{fillColor:[240,253,244],textColor:[20,83,45],fontStyle:'bold'},
    columnStyles:{0:{cellWidth:64},2:{halign:'right',cellWidth:90},3:{halign:'right',cellWidth:90}},
  });
  let yy=doc.lastAutoTable.finalY+18;
  if (yy>pageH-170){ doc.addPage(); yy=50; }

  // Neto a cobrar
  doc.setFillColor(4,120,87);
  doc.rect(40,yy,pageW-80,34,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('NETO A COBRAR', 54, yy+22);
  doc.text(fmtMoney(d.neto), pageW-54, yy+22, {align:'right'});
  doc.setTextColor(0,0,0); yy+=48;

  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  if (d.liq){
    const medio = d.liq.medioPago==='efectivo' ? ('Efectivo · caja '+(d.liq.caja||'—'))
      : d.liq.medioPago==='cheque' ? ('Cheque propio N° '+(d.liq.nroCheque||'—')+(d.liq.banco?' · '+d.liq.banco:''))
      : ('Transferencia bancaria'+(d.liq.banco?' · '+d.liq.banco:'')+(d.liq.referencia?' · '+d.liq.referencia:''));
    doc.text('Forma de pago: '+medio, 40, yy); yy+=14;
    doc.text('Fecha de pago: '+(d.liq.fecha?fmtDate(d.liq.fecha):'—'), 40, yy); yy+=14;
  } else {
    doc.setTextColor(180,83,9);
    doc.text('Liquidación no confirmada — documento de detalle, no válido como comprobante de pago.', 40, yy);
    doc.setTextColor(0,0,0); yy+=14;
  }

  // Firmas
  const sy=Math.max(yy+56, pageH-110);
  doc.setDrawColor(120);
  doc.line(70,sy,260,sy);
  doc.line(pageW-260,sy,pageW-70,sy);
  doc.setFontSize(8); doc.setTextColor(90);
  doc.text('Firma y aclaración — Empleador', 165, sy+12, {align:'center'});
  doc.text('Firma y aclaración — Empleado (Recibí conforme)', pageW-165, sy+12, {align:'center'});
  doc.setTextColor(120);
  doc.text('Documento generado por AgroCore · '+fmtDate(new Date()), pageW/2, pageH-30, {align:'center'});

  const fn=`Recibo_${d.emp.apellido}_${d.emp.nombre}_${d.mes}.pdf`.replace(/\s+/g,'_');
  doc.save(fn);
  toast('Recibo PDF descargado: '+fn,'success');
}

/* ---------- INSUMOS Y LABORES (por campaña / lote) ---------- */
pages.insumos = async function() {
  setHeader('Insumos y labores', 'Aplicaciones por lote y campaña');
  if (!can('produccion:read')) { $('#page-body').innerHTML = stubPage('insumos','Insumos y labores'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let campanas=[], lotes=[], insumosCat=[], laboresCat=[], aplics=[], campos=[];
  try {
    campanas = (await api('/api/campanas')).data || [];
    lotes = (await api('/api/lotes')).data || [];
    campos = (await api('/api/campos').catch(()=>({data:[]}))).data || [];
    const cats = (await api('/api/catalogos')).data || [];
    insumosCat = cats.filter(c => ['Herbicida','Insecticida','Fungicida','Fertilizante','Semilla','Coadyuvante','Insumo'].includes(c.tipo));
    laboresCat = cats.filter(c => c.tipo === 'Labor');
    aplics = (await api('/api/aplicaciones').catch(()=>({data:[]}))).data || [];
  } catch (e) { return toast(e.message,'error'); }
  state.cache.campanas = campanas; state.cache.lotes = lotes;
  state.cache.insumosCat = insumosCat; state.cache.laboresCat = laboresCat;
  state.cache.aplicaciones = aplics;

  state.insFilter = state.insFilter || { campana:'', insumo:'', labor:'', campoId:'' };
  const f = state.insFilter;

  // Items únicos (de aplicaciones cargadas) para los filtros
  const insumosUsados = [...new Set(aplics.filter(a=>a.tipo==='insumo').map(a=>(a.item||'').trim()).filter(Boolean))].sort();
  const laboresUsadas = [...new Set(aplics.filter(a=>a.tipo==='labor' ).map(a=>(a.item||'').trim()).filter(Boolean))].sort();

  // Filtramos aplicaciones por los criterios activos
  const aplicsFiltradas = aplics.filter(a => {
    if (f.insumo && a.tipo === 'insumo' && (a.item||'').trim() !== f.insumo) return false;
    if (f.labor  && a.tipo === 'labor'  && (a.item||'').trim() !== f.labor)  return false;
    // Si filtra por insumo, esconder labores; si filtra por labor, esconder insumos
    if (f.insumo && !f.labor && a.tipo !== 'insumo') return false;
    if (f.labor  && !f.insumo && a.tipo !== 'labor') return false;
    if (f.campoId) {
      const camp = campanas.find(c => c.id === a.campanaId);
      const lote = camp ? lotes.find(l => l.id === camp.loteId) : null;
      if (!lote || lote.campoId !== f.campoId) return false;
    }
    return true;
  });
  const idsCampanasFiltradas = new Set(aplicsFiltradas.map(a=>a.campanaId));

  // Lista final de campañas a mostrar
  let campanasFiltradas;
  if (f.campana) {
    campanasFiltradas = campanas.filter(c => c.id === f.campana);
  } else if (f.insumo || f.labor || f.campoId) {
    campanasFiltradas = campanas.filter(c => idsCampanasFiltradas.has(c.id));
  } else {
    campanasFiltradas = campanas;
  }

  // Totales consolidados (cuando el filtro es por insumo o labor)
  const haDeApp = (a) => {
    if (a.hectareasAplicadas != null) return Number(a.hectareasAplicadas);
    const camp = campanas.find(c => c.id === a.campanaId);
    const lote = camp ? lotes.find(l => l.id === camp.loteId) : null;
    return Number(lote?.hectareas || 0);
  };
  // Si filtra por insumo: total unidades + total costo
  const totUnid = aplicsFiltradas.filter(a=>a.tipo==='insumo').reduce((acc,a)=> acc + Number(a.unidadHa||0) * haDeApp(a), 0);
  const totCosto = aplicsFiltradas.reduce((acc,a)=> acc + Number(a.costoHa||0) * haDeApp(a), 0);
  const totHa = aplicsFiltradas.reduce((acc,a)=> acc + haDeApp(a), 0);

  // Banner de totales cuando hay filtro activo de insumo o labor
  const filtroActivo = !!(f.insumo || f.labor || f.campoId);
  const labelFiltro = f.insumo ? `Insumo "${f.insumo}"` : f.labor ? `Labor "${f.labor}"` : f.campoId ? `Campo "${esc(campos.find(c=>c.id===f.campoId)?.nombre||'')}"` : '';
  const bannerTotales = filtroActivo ? `
    <div class="mb-4 rounded-xl overflow-hidden" style="background:linear-gradient(135deg,#14532d 0%,#166534 55%,#15803d 100%);box-shadow:0 6px 20px -8px rgba(20,83,45,.45)">
      <div class="p-5">
        <div class="text-xs font-bold uppercase tracking-wider mb-2" style="color:#bbf7d0">📊 Consolidado del filtro</div>
        <div class="text-lg font-bold text-white mb-3">${labelFiltro}</div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <div class="rounded-lg p-3" style="background:rgba(255,255,255,.12)">
            <div class="text-[11px]" style="color:#bbf7d0">Aplicaciones</div>
            <div class="text-2xl font-bold text-white">${aplicsFiltradas.length}</div>
          </div>
          <div class="rounded-lg p-3" style="background:rgba(255,255,255,.12)">
            <div class="text-[11px]" style="color:#bbf7d0">Hectáreas (suma)</div>
            <div class="text-2xl font-bold text-white">${fmtN(totHa)}</div>
          </div>
          ${f.insumo ? `
            <div class="rounded-lg p-3" style="background:rgba(255,255,255,.12)">
              <div class="text-[11px]" style="color:#bbf7d0">Total consumido</div>
              <div class="text-2xl font-bold text-white">${fmtN(totUnid)}</div>
              <div class="text-[10px] mt-0.5" style="color:#dcfce7">unidades del insumo (suma de unid/ha × ha)</div>
            </div>` : ''}
          <div class="rounded-lg p-3" style="background:rgba(255,255,255,.12)">
            <div class="text-[11px]" style="color:#bbf7d0">Costo total</div>
            <div class="text-2xl font-bold text-white">u$s ${fmtN(totCosto)}</div>
          </div>
        </div>
      </div>
    </div>` : '';

  $('#page-body').innerHTML = `
    <div class="kpi mb-3">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-2 items-end">
        <div class="md:col-span-3">
          <label class="label">Campaña</label>
          <select id="ins-filtro" class="input">
            <option value="">Todas</option>
            ${campanas.map(c => `<option value="${c.id}" ${c.id===f.campana?'selected':''}>${esc(c.cultivo||'')} ${c.lote?.nombre?'— '+esc(c.lote.nombre):''}</option>`).join('')}
          </select>
        </div>
        <div class="md:col-span-3">
          <label class="label">Campo</label>
          <select id="ins-campo" class="input">
            <option value="">Todos</option>
            ${campos.map(c => `<option value="${esc(c.id)}" ${c.id===f.campoId?'selected':''}>${esc(c.nombre)}</option>`).join('')}
          </select>
        </div>
        <div class="md:col-span-3">
          <label class="label">Insumo</label>
          <select id="ins-insumo" class="input">
            <option value="">Todos</option>
            ${insumosUsados.map(i => `<option value="${esc(i)}" ${i===f.insumo?'selected':''}>${esc(i)}</option>`).join('')}
          </select>
        </div>
        <div class="md:col-span-3">
          <label class="label">Labor</label>
          <select id="ins-labor" class="input">
            <option value="">Todas</option>
            ${laboresUsadas.map(l => `<option value="${esc(l)}" ${l===f.labor?'selected':''}>${esc(l)}</option>`).join('')}
          </select>
        </div>
      </div>
      ${filtroActivo ? `<div class="mt-2 flex gap-2">
        <button class="btn btn-secondary text-xs" onclick="insumosFiltrosLimpiar()">✕ Limpiar filtros</button>
        <button class="btn btn-secondary text-xs" onclick="insumosExportarExcel()">📥 Exportar Excel</button>
      </div>` : `<div class="mt-2"><button class="btn btn-secondary text-xs" onclick="insumosExportarExcel()">📥 Exportar Excel</button></div>`}
    </div>

    ${bannerTotales}

    <div class="mb-4 flex items-center justify-end flex-wrap gap-2">
      <button class="btn btn-primary" onclick="aplicForm('insumo')">+ Insumo</button>

      ${can('produccion:labor_avanzada:create')||can('produccion:create')?`<button class="btn btn-secondary" onclick="laborForm(true)" title="Labor con cálculo de % para el empleado. La ganancia se suma a su planilla del mes automáticamente.">🛠️ Labor avanzada</button>`:''}

    <div id="ins-list" class="space-y-4">
      ${campanasFiltradas.length === 0
        ? '<div class="stub-card">' + (filtroActivo ? 'No hay aplicaciones que coincidan con los filtros' : 'No hay campañas cargadas. Creá una primero en Campañas.') + '</div>'
        : campanasFiltradas.map(c => {

            const haLote = Number(c.lote?.hectareas || 0);
            // Cada aplicación tiene su propia cantidad de hectáreas; si está vacío (legacy) usamos el total del lote
            const haDe = (a) => Number(a.hectareasAplicadas ?? haLote);

                </div>
                ${insumosC.length === 0
                  ? '<div class="text-xs text-slate-400 italic py-2">Sin insumos cargados</div>'

                       <tbody>${insumosC.map(a => {
                         const ha = haDe(a);
                         const total = Number(a.costoHa||0) * ha;
                         const isParcial = a.hectareasAplicadas != null && Number(a.hectareasAplicadas) < haLote;
                         return `
                         <tr class="table-row">
                           <td><b>${esc(a.item)}</b></td>
                           <td><span class="badge badge-blue">${esc(a.subtipo||'')}</span></td>
                           <td class="text-right">${fmtN(a.unidadHa||0)}</td>
                           <td class="text-right">${fmtN(a.precioUnit||0)}</td>
                           <td class="text-right">${fmtN(a.costoHa||0)}</td>

function insumosExportarExcel() {
  const aplics = state.cache.aplicaciones || [];
  const campanas = state.cache.campanas || [];
  const lotes = state.cache.lotes || [];
  const f = state.insFilter || {};
  const filt = aplics.filter(a => {
    if (f.insumo && a.tipo === 'insumo' && (a.item||'').trim() !== f.insumo) return false;
    if (f.labor  && a.tipo === 'labor'  && (a.item||'').trim() !== f.labor)  return false;
    if (f.insumo && !f.labor && a.tipo !== 'insumo') return false;
    if (f.labor  && !f.insumo && a.tipo !== 'labor') return false;
    if (f.campana && a.campanaId !== f.campana) return false;
    if (f.campoId) {
      const camp = campanas.find(c => c.id === a.campanaId);
      const lote = camp ? lotes.find(l => l.id === camp.loteId) : null;
      if (!lote || lote.campoId !== f.campoId) return false;
    }
    return true;
  });
  if (filt.length === 0) { toast('No hay aplicaciones que exportar con los filtros actuales', 'warn'); return; }
  const aoa = [['Fecha','Tipo','Item','Subtipo','Campaña','Cultivo','Lote','Campo','Ha aplicadas','Unid/ha','u$s/unid','u$s/ha','Costo total','Observaciones']];
  for (const a of filt) {
    const camp = campanas.find(c => c.id === a.campanaId);
    const lote = camp ? lotes.find(l => l.id === camp.loteId) : null;
    const haDe = a.hectareasAplicadas != null ? Number(a.hectareasAplicadas) : Number(lote?.hectareas || 0);
    const costoTotal = Number(a.costoHa || 0) * haDe;
    aoa.push([
      a.fecha ? String(a.fecha).slice(0,10) : '',
      a.tipo === 'insumo' ? 'Insumo' : 'Labor',
      a.item || '', a.subtipo || '',
      camp?.id ? `${camp.cultivo || ''} ${camp.estado ? '· '+camp.estado : ''}` : '',
      camp?.cultivo || '',
      lote?.nombre || '',
      lote?.campo?.nombre || '',
      haDe,
      a.unidadHa || 0, a.precioUnit || 0, a.costoHa || 0, costoTotal,
      a.observaciones || '',
    ]);
  }
  if (typeof XLSX !== 'undefined' && XLSX.utils) {
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = aoa[0].map(() => ({ wch: 16 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Insumos-Labores');
    XLSX.writeFile(wb, `insumos-labores-${new Date().toISOString().slice(0,10)}.xlsx`);
  } else {
    const csv = aoa.map(r => r.map(c => {
      const s = String(c == null ? '' : c);
      return /[",\n;]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(';')).join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `insumos-labores-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
  toast(`Se exportaron ${filt.length} filas`, 'success');
}

async function aplicSave(tipo) {
  const data = {
    campanaId: $('#f-camp').value,
    tipo,
    item: $('#f-item').value.trim(),
    subtipo: tipo==='insumo' ? $('#f-sub')?.value || null : null,
    unidadHa: tipo==='insumo' && $('#f-uha')?.value ? Number($('#f-uha').value) : null,
    precioUnit: tipo==='insumo' && $('#f-pu')?.value ? Number($('#f-pu').value) : null,

    hectareasAplicadas: $('#f-ha-apl')?.value ? Number($('#f-ha-apl').value) : null,
    fecha: $('#f-fec').value || null,
    observaciones: $('#f-obs').value.trim() || null,
  };
  if (!data.campanaId) return toast('Campaña requerida','warn');

            <div class="p-2 bg-white rounded"><div class="text-slate-500">Base de cálculo</div><div id="la-r-base" class="font-bold">$ 0,00</div></div>
            <div class="p-2 bg-white rounded"><div class="text-slate-500">Ganancia empleado</div><div id="la-r-gan" class="font-bold text-green-700">$ 0,00</div></div>
            <div class="p-2 bg-white rounded"><div class="text-slate-500">Aparecerá en planilla</div><div id="la-r-mes" class="font-bold">—</div></div>
          </div>
        </div>

  openModal({
    title: avanzada ? '🛠️ Cargar labor avanzada' : 'Cargar labor', size:'max-w-4xl',
    body: `
      <div class="grid grid-cols-3 gap-3 mb-3">
        <div class="col-span-2"><label class="label">Campaña *</label>
          <select id="la-camp" class="input">
            ${campanas.map(c=>`<option value="${c.id}" data-ha="${Number(c.lote?.hectareas||0)}">${esc(c.cultivo||'')} — ${esc(c.lote?.nombre||'')} (${fmtN(c.lote?.hectareas||0)} ha)</option>`).join('')}
          </select>
        </div>
        <div><label class="label">Fecha *</label><input id="la-fec" type="date" class="input" value="${new Date().toISOString().slice(0,10)}"/></div>

function laPickEmpleado() {
  const sel = $('#la-emp');
  const opt = sel.options[sel.selectedIndex];
  const cobra = opt?.dataset?.cobra === '1';
  const pd = opt?.dataset?.pd;
  if (cobra && pd) $('#la-pct').value = pd;
  if (!cobra) $('#la-pct').value = '';
  laRecalc();
}
// Cuando el usuario elige una labor del catálogo (datalist), buscamos el ítem
// en state.cache.laboresCat por nombre y precargamos precio + tipo en el form.
// Sigue siendo editable — son sugerencias del catálogo, no obligatorias.
function laPickLabor() {
  const nombre = ($('#la-tipo')?.value || '').trim().toLowerCase();
  if (!nombre) return;
  const cat = (state.cache.laboresCat || []).find(c => (c.nombre||'').trim().toLowerCase() === nombre);
  if (!cat) return;
  // Sólo precargamos si los campos existen (modo avanzada) y no fueron editados manualmente.
  const prEl = $('#la-pr'); const tpEl = $('#la-tp');
  if (prEl && cat.precioReferencia != null && !prEl.dataset.manual) {
    prEl.value = cat.precioReferencia;
  }
  if (tpEl && cat.tipoPrecio && !tpEl.dataset.manual) {
    tpEl.value = cat.tipoPrecio;
  }
  // Autopopulate de insumos típicos del catálogo. Cantidad del catálogo es POR HECTÁREA
  // y la multiplicamos por las hectáreas aplicadas. Sólo si la tabla de insumos
  // está vacía o todas las filas están en blanco (no pisamos lo que el usuario cargó).
  const insTabla = $('#la-ins');
  const insumosDefault = Array.isArray(cat.insumosDefault) ? cat.insumosDefault : [];
  if (insTabla && insumosDefault.length > 0) {
    const filas = insTabla.querySelectorAll('tr[data-la]');
    const todasVacias = Array.from(filas).every(tr => {
      const sel = tr.querySelector('[data-laf="productoId"]');
      const cant = tr.querySelector('[data-laf="cantidad"]');
      return (!sel || !sel.value) && (!cant || !Number(cant.value));
    });
    if (filas.length === 0 || todasVacias) {
      // Limpiar filas vacías existentes
      filas.forEach(tr => tr.remove());
      const ha = Number($('#la-ha')?.value || 0) || 1;
      const productos = state.cache.productos || [];
      for (const ins of insumosDefault) {
        const prod = productos.find(p => p.id === ins.productoId);
        laAddIns({
          productoId: ins.productoId,
          cantidad: Number((ins.cantidad * ha).toFixed(4)),
          precioUnit: prod?.precioReferencia || 0,
        });
        // Seleccionar el producto en el select recién creado
        const lastRow = insTabla.lastElementChild;
        const sel = lastRow?.querySelector('[data-laf="productoId"]');
        if (sel) sel.value = ins.productoId;
      }
      toast(`Se cargaron ${insumosDefault.length} insumo(s) típico(s) de la labor`, 'success');
    }
  }
  // Marcamos como "tocados por catálogo" pero siguen libres para editar
  setTimeout(() => {
    if (prEl) prEl.oninput = () => { prEl.dataset.manual = '1'; laRecalc(); };
    if (tpEl) tpEl.onchange = () => { tpEl.dataset.manual = '1'; laRecalc(); };
  }, 0);
  laRecalc();
}
function laAddIns(ins = { productoId:'', cantidad:0, precioUnit:0 }) {
  const productos = state.cache.productos || [];
  const opts = productos.map(p => `<option value="${p.id}" data-prec="${p.precioReferencia||''}" data-uni="${esc(p.unidad||'')}">${esc(p.nombre)} (${esc(p.unidad||'')})</option>`).join('');
  const row = `<tr data-la>
    <td><select class="input text-sm" data-laf="productoId" onchange="laPickInsumo(this)"><option value="">— Elegí producto —</option>${opts}</select></td>
    <td><input class="input text-sm w-24 text-right" type="number" step="0.01" data-laf="cantidad" value="${ins.cantidad||0}" oninput="laRecalc()"/></td>
    <td><input class="input text-sm w-28 text-right" type="number" step="0.01" data-laf="precioUnit" value="${ins.precioUnit||0}" oninput="laRecalc()"/></td>
    <td class="text-right text-xs text-slate-500" data-lat>$ 0,00</td>
    <td><button class="btn btn-ghost text-red-600" onclick="this.closest('tr').remove(); laRecalc()">×</button></td>
  </tr>`;
  $('#la-ins').insertAdjacentHTML('beforeend', row);
}
function laPickInsumo(sel) {
  const tr = sel.closest('tr');
  const opt = sel.options[sel.selectedIndex];
  if (!opt || !opt.value) return;
  const prec = opt.dataset.prec;
  const pu = tr.querySelector('[data-laf="precioUnit"]');
  if (pu && !pu.value) pu.value = prec || 0;
  laRecalc();
}
function laRecalc() {
  const ha = Number($('#la-ha').value || 0);
  // Bloque % cobro existe solo en modo avanzada; chequeamos antes de tocarlo.
  const prEl = $('#la-pr'); const pctEl = $('#la-pct'); const tpEl = $('#la-tp');
  if (prEl && pctEl) {
    const pr = Number(prEl.value || 0);
    const pct = Number(pctEl.value || 0);
    const tp = tpEl ? tpEl.value : 'por_hectarea';
    const base = tp === 'por_hectarea' ? (ha * pr) : pr;
    const gan = base * (pct / 100);
    const baseEl = $('#la-r-base'); if (baseEl) baseEl.textContent = fmt$(base);
    const ganEl  = $('#la-r-gan');  if (ganEl)  ganEl.textContent = fmt$(gan);
    const fec = $('#la-fec').value;
    if (fec) {
      const d = new Date(fec);
      const mesEl = $('#la-r-mes'); if (mesEl) mesEl.textContent = d.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
    }
  }
  // Totales por insumo (siempre)
  $$('#la-ins tr[data-la]').forEach(tr => {
    const c = Number(tr.querySelector('[data-laf="cantidad"]').value || 0);
    const p = Number(tr.querySelector('[data-laf="precioUnit"]').value || 0);
    tr.querySelector('[data-lat]').textContent = fmt$(c * p);
  });
}
async function laborSave() {
  const camp = $('#la-camp').value;
  const tipo = $('#la-tipo').value.trim();
  const ha = Number($('#la-ha').value || 0);
  if (!camp) return toast('Falta la campaña','warn');
  if (!tipo) return toast('Falta el tipo de labor','warn');
  if (!ha) return toast('Faltan las hectáreas aplicadas','warn');
  const insumos = $$('#la-ins tr[data-la]').map(tr => ({
    productoId: tr.querySelector('[data-laf="productoId"]').value,
    cantidad: Number(tr.querySelector('[data-laf="cantidad"]').value || 0),
    precioUnit: Number(tr.querySelector('[data-laf="precioUnit"]').value || 0),
  })).filter(i => i.productoId && i.cantidad > 0);
  const empId = $('#la-emp').value || null;
  // Modo avanzada: se envían precio referencia + % (los inputs existen)
  const avanzada = $('#la-mode').value === 'avanzada';
  const pr = avanzada && $('#la-pr')?.value ? Number($('#la-pr').value) : null;
  const pct = avanzada && $('#la-pct')?.value ? Number($('#la-pct').value) : null;
  const tp = $('#la-tp')?.value || 'por_hectarea';
  const data = {
    campanaId: camp,
    tipo,
    fecha: new Date($('#la-fec').value).toISOString(),
    hectareasAplicadas: ha,
    observaciones: $('#la-obs').value.trim() || null,
    empleadoId: empId,
    precioReferencia: pr,
    tipoPrecio: pr != null ? tp : null,
    porcentajeEmpleado: pct,
    insumos,
  };
  try {
    await api('/api/labores-avanzada', { method:'POST', body: JSON.stringify(data) });
    toast('Labor cargada' + (insumos.length?` · ${insumos.length} insumo${insumos.length===1?'':'s'} descontado${insumos.length===1?'':'s'} del stock`:''),'success');
    closeModal();
    delete state.cache.stockMap;
    pages.insumos();
  } catch (e) { toast(e.message,'error'); }
}

function catInsumoAdd() {
  state.catInsumosDef = state.catInsumosDef || [];
  state.catInsumosDef.push({ productoId: '', cantidad: 0, unidad: '' });

}
function catInsumoDel(idx) {
  if (!state.catInsumosDef) return;
  state.catInsumosDef.splice(idx, 1);
  catInsumosRender();
}
function catInsumoSet(idx, campo, valor) {
  if (!state.catInsumosDef || !state.catInsumosDef[idx]) return;
  state.catInsumosDef[idx][campo] = valor;

async function catSave(id) {
  const descEl = $('#f-desc');
  const descVal = descEl ? (descEl.tagName === 'SELECT' ? descEl.value : descEl.value.trim()) : null;
  const tipo = $('#f-tipo').value;
  const data = {
    tipo,
    codigo: $('#f-cod').value.trim()||null,
    nombre: $('#f-nom').value.trim(),
    descripcion: descVal || null,
    activo: $('#f-act').checked,
  };
  // Catálogo de Labor: precio sugerido + tipo (opcional). Para otros tipos no aplica.
  if (tipo === 'Labor') {
    const tp = $('#f-tpprecio')?.value || '';
    const pr = $('#f-precio')?.value;
    data.tipoPrecio = tp || null;
    data.precioReferencia = (pr !== '' && pr != null) ? Number(pr) : null;
    // Insumos típicos: limpiar entradas sin productoId o cantidad <= 0
    const insumos = (state.catInsumosDef || [])
      .filter(x => x.productoId && Number(x.cantidad) > 0)
      .map(x => ({
        productoId: x.productoId,
        cantidad: Number(x.cantidad),
        unidad: (x.unidad || '').trim() || null,
      }));
    data.insumosDefault = insumos.length ? insumos : null;
  } else {
    data.tipoPrecio = null;
    data.precioReferencia = null;
    data.insumosDefault = null;
  }
  if (!data.nombre) return toast('Nombre requerido','warn');
  try { await api('/api/catalogos'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(data)});
    toast(id?'Actualizado':'Creado','success'); closeModal(); await preloadCatalogos(); pages.catalogos();
  } catch (e) { toast(e.message,'error'); }
}
async function catDel(id) {
  if (!confirm('¿Eliminar este ítem del catálogo?')) return;
  try { await api('/api/catalogos/'+id,{method:'DELETE'});
    toast('Eliminado','success'); await preloadCatalogos(); pages.catalogos();

async function arrSave(id) {
  const data = {
    propietario: $('#f-prop').value.trim(),
    campoId: $('#f-campo').value || null,
    hectareas: Number($('#f-ha').value || 0),
    importeHa: $('#f-imp').value ? Number($('#f-imp').value) : null,

// ============================================================
// MOVIMIENTOS DIARIOS — centro unificado de carga
// Cualquier ingreso/egreso del día con cualquier método y categoría.
// Internamente despacha al modelo correcto (Efectivo / BancoMovimiento / Cheque)
// pero acá el usuario tiene UNA sola ventanilla.
// ============================================================
pages.movDiarios = async function() {
  setHeader('Movimientos diarios', 'Cargá cualquier gasto o ingreso del día con cualquier método de pago');
  if (!can('finanzas:read')) { $('#page-body').innerHTML = stubPage('movDiarios','Movimientos diarios'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;

  // Cargamos efectivo + banco-movimientos del último mes para mostrar listado unificado
  const hoy = new Date();
  const haceUnMes = new Date(hoy.getTime() - 30*24*60*60*1000).toISOString().slice(0,10);
  let efRows = [], bancoMovs = [];
  try {
    const [efRsp, bmRsp, chRsp, cbRsp, catRsp] = await Promise.all([
      api('/api/efectivo').catch(() => ({ data: [] })),
      api('/api/banco-movimientos').catch(() => ({ data: [] })),
      api('/api/cheques').catch(() => ({ data: [] })),
      api('/api/banco-cuentas').catch(() => ({ data: [] })),
      api('/api/catalogos').catch(() => ({ data: [] })),
    ]);
    efRows = efRsp.data || [];
    bancoMovs = bmRsp.data || [];
    const cajasCat  = (catRsp.data || []).filter(c => c.tipo === 'Caja' && c.activo !== false).map(c => c.nombre);
    const cajasHist = efRows.map(e => (e.caja || '').trim()).filter(Boolean);
    state.cache.efectivoCajas = [...new Set([...cajasCat, ...cajasHist])].sort();
    state.cache.cheques = chRsp.data || [];
    state.cache.bancoCuentas = cbRsp.data || [];
    state.cache.catalogos = catRsp.data || [];
  } catch (e) { return toast(e.message, 'error'); }

  // Normalizar los movimientos en una sola lista
  const cuentasMap = new Map((state.cache.bancoCuentas || []).map(c => [c.id, c]));
  const filas = [];
  for (const e of efRows) {
    if (e.tipo === 'transferencia') continue; // las transferencias entre cajas no son gastos/ingresos
    filas.push({
      id: 'EF-' + e.id,
      fecha: e.fecha,
      tipo: e.tipo, // ingreso/egreso
      concepto: e.concepto,
      categoria: extraerCategoria(e.observaciones),
      clasificacion: e.clasificacion || 'empresa',
      monto: Number(e.monto || 0),
      metodo: 'efectivo',
      origen: e.caja || '(sin caja)',
      observaciones: e.observaciones || '',
    });
  }
  for (const m of bancoMovs) {
    if (m.tipo !== 'transferencia_in' && m.tipo !== 'transferencia_out') continue;
    const c = cuentasMap.get(m.cuentaId);
    filas.push({
      id: 'BM-' + m.id,
      fecha: m.fecha,
      tipo: m.tipo === 'transferencia_in' ? 'ingreso' : 'egreso',
      concepto: m.concepto,
      categoria: extraerCategoria(m.observaciones),
      clasificacion: 'empresa',
      monto: Number(m.monto || 0),
      metodo: 'transferencia',
      origen: c ? (c.banco + (c.numero ? ' · '+c.numero : '')) : 'Banco',
      observaciones: m.observaciones || '',
    });
  }
  filas.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

  // KPIs del mes
  const mesActual = hoy.toISOString().slice(0,7);
  const filasMes = filas.filter(f => (f.fecha||'').slice(0,7) === mesActual);
  const ingresosMes = filasMes.filter(f => f.tipo === 'ingreso').reduce((a,f) => a + f.monto, 0);
  const egresosMes  = filasMes.filter(f => f.tipo === 'egreso').reduce((a,f) => a + f.monto, 0);
  const netoMes = ingresosMes - egresosMes;

  // Categorías existentes para filtro
  const categoriasUnicas = [...new Set(filas.map(f => f.categoria).filter(Boolean))].sort();

  state.movDiariosFilter = state.movDiariosFilter || { q:'', tipo:'', metodo:'', categoria:'', clasif:'', desde:'', hasta:'' };

  const render = () => {
    const f = state.movDiariosFilter;

    const filtered = filas.filter(r => {
      if (f.tipo && r.tipo !== f.tipo) return false;
      if (f.metodo && r.metodo !== f.metodo) return false;
      if (f.categoria && r.categoria !== f.categoria) return false;
      if (f.clasif && r.clasificacion !== f.clasif) return false;
      if (f.desde && (r.fecha || '').slice(0,10) < f.desde) return false;
      if (f.hasta && (r.fecha || '').slice(0,10) > f.hasta) return false;
      if (q && ![r.concepto, r.categoria, r.origen, r.observaciones].some(x => (x||'').toLowerCase().includes(q))) return false;
      return true;
    });
    const sumF = filtered.reduce((a,r) => a + (r.tipo==='ingreso' ? r.monto : -r.monto), 0);
    const cant = filtered.length;
    $('#md-tabla').innerHTML = filtered.length === 0
      ? '<div class="text-center text-slate-400 py-8">' + (filas.length ? 'Sin coincidencias con los filtros' : 'Sin movimientos cargados. Usá "+ Nuevo movimiento" arriba.') + '</div>'

          </tbody>
          <tfoot>
            <tr class="font-bold bg-slate-50">
              <td colspan="6">Total filtrado (${cant} movimiento${cant===1?'':'s'})</td>
              <td class="text-right ${sumF >= 0 ? 'text-emerald-700' : 'text-red-700'}">${sumF >= 0 ? '+' : ''}${fmt$(sumF)}</td>
            </tr>
          </tfoot>
        </table>`;
  };

  $('#page-body').innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">

      <div class="kpi"><div class="text-xs text-slate-500">⬆️ Ingresos</div><div class="text-xl font-bold mt-1 text-emerald-700">${fmt$(ingresosMes)}</div></div>

    <div class="mb-4">

// Parsea la categoría desde un campo de observaciones que pudimos haber serializado
// como "Categoría: X · Otro: Y · ..."
function extraerCategoria(obs) {
  if (!obs) return null;
  const m = String(obs).match(/Categor[ií]a:\s*([^·\n]+)/i);
  if (!m) return null;
  return m[1].trim();
}

    det.innerHTML = cheques.length

}
async function movDiariosGuardar() {
  const tipo = document.querySelector('input[name="md-tipo"]:checked')?.value || 'egreso';
  const fecha = document.getElementById('md-fecha').value;
  const concepto = document.getElementById('md-concepto').value.trim();
  const monto = Number(document.getElementById('md-monto').value || 0);
  const categoria = document.getElementById('md-cat').value.trim() || null;
  const clasificacion = document.getElementById('md-clasif-sel').value;
  const contraparte = document.getElementById('md-contrap').value.trim() || null;
  const observaciones = document.getElementById('md-obs').value.trim() || null;
  const metodo = document.getElementById('md-met').value;
  if (!concepto) return toast('Falta el concepto', 'warn');
  if (!monto || monto <= 0) return toast('El monto debe ser mayor a 0', 'warn');
  if (!fecha) return toast('Falta la fecha', 'warn');
  const body = {
    fecha: new Date(fecha).toISOString(),
    tipo, concepto, monto, categoria, clasificacion, contraparte, observaciones, metodo,
  };
  if (metodo === 'efectivo')      body.caja          = document.getElementById('md-caja')?.value?.trim() || null;
  if (metodo === 'transferencia') body.bancoCuentaId = document.getElementById('md-banco')?.value || null;
  if (metodo === 'cheque')        body.chequeId      = document.getElementById('md-cheque')?.value || null;
  if (metodo === 'efectivo'      && !body.caja)          return toast('Elegí la caja', 'warn');
  if (metodo === 'transferencia' && !body.bancoCuentaId) return toast('Elegí la cuenta bancaria', 'warn');
  if (metodo === 'cheque'        && !body.chequeId)      return toast('Elegí el cheque', 'warn');
  try {
    await api('/api/movimientos-diarios', { method:'POST', body: JSON.stringify(body) });
    toast('✅ Movimiento registrado', 'success');
    closeModal();
    pages.movDiarios();
  } catch (e) { toast(e.message || 'Error al registrar', 'error'); }
}

pages.efectivo = async function() {
  setHeader('Control de efectivo', 'Cajas físicas, transferencias entre ellas y gastos por caja');
  if (!can('finanzas:read')) { $('#page-body').innerHTML = stubPage('efectivo','Control de efectivo'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let rows=[];
  try { rows = await crudList('efectivo'); } catch (e) { return toast(e.message,'error'); }

  state.efFilter = state.efFilter || { caja:'', tipo:'', clasif:'', desde:'', hasta:'' };
  const ef = state.efFilter;

  // Cajas: las del catálogo + las que aparezcan en movimientos
  const cajasSet = new Set(catByTipo('Caja').map(c=>c.nombre));
  let huboSinCaja = false;
  rows.forEach(r => {
    if (r.tipo==='transferencia') { if(r.caja)cajasSet.add(r.caja); if(r.cajaDestino)cajasSet.add(r.cajaDestino); }
    else { if(r.caja)cajasSet.add(r.caja); else huboSinCaja=true; }
  });
  if (huboSinCaja) cajasSet.add('Sin caja');
  const cajas = Array.from(cajasSet).sort((a,b)=>a.localeCompare(b,'es'));

  // Saldo y desglose por caja (sobre TODOS los movimientos, no los filtrados)
  const info = {};
  cajas.forEach(c => info[c] = { saldo:0, ingEmpresa:0, ingPropio:0, gastoEmpresa:0, gastoPropio:0, transfIn:0, transfOut:0 });
  rows.forEach(r => {
    const m = Number(r.monto||0);
    if (r.tipo==='ingreso') {
      const c = r.caja||'Sin caja';
      if (info[c]) { info[c].saldo+=m; if(r.clasificacion==='propio')info[c].ingPropio+=m; else info[c].ingEmpresa+=m; }
    } else if (r.tipo==='egreso') {
      const c = r.caja||'Sin caja';
      if (info[c]) { info[c].saldo-=m; if(r.clasificacion==='propio')info[c].gastoPropio+=m; else info[c].gastoEmpresa+=m; }
    } else if (r.tipo==='transferencia') {
      if (r.caja && info[r.caja]) { info[r.caja].saldo-=m; info[r.caja].transfOut+=m; }
      if (r.cajaDestino && info[r.cajaDestino]) { info[r.cajaDestino].saldo+=m; info[r.cajaDestino].transfIn+=m; }
    }
  });
  const sum = (f)=>cajas.reduce((a,c)=>a+f(info[c]),0);
  const totalGeneral    = sum(i=>i.saldo);
  const totIngEmpresa   = sum(i=>i.ingEmpresa);
  const totIngPropio    = sum(i=>i.ingPropio);
  const totGastoEmpresa = sum(i=>i.gastoEmpresa);
  const totGastoPropio  = sum(i=>i.gastoPropio);

  const desde = ef.desde ? new Date(ef.desde+'T00:00:00').getTime() : null;
  const hasta = ef.hasta ? new Date(ef.hasta+'T23:59:59').getTime() : null;
  const movs = rows.filter(r => {
    if (ef.tipo && r.tipo!==ef.tipo) return false;
    if (ef.clasif && r.clasificacion!==ef.clasif) return false;
    if (ef.caja) {
      if (r.tipo==='transferencia') { if (r.caja!==ef.caja && r.cajaDestino!==ef.caja) return false; }
      else if ((r.caja||'Sin caja')!==ef.caja) return false;
    }
    if (desde || hasta) {
      const t = r.fecha ? new Date(r.fecha).getTime() : 0;
      if (desde && t<desde) return false;
      if (hasta && t>hasta) return false;
    }
    return true;
  });
  const hayFiltro = !!(ef.caja||ef.tipo||ef.clasif||ef.desde||ef.hasta);

  $('#page-body').innerHTML = `

      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <div class="text-xs uppercase tracking-wider" style="color:#a7f3d0">💰 Caja general · total en efectivo de la empresa</div>
          <div class="text-3xl font-extrabold text-white mt-1">${fmt$(totalGeneral)}</div>
          <div class="text-xs mt-1" style="color:#d1fae5">Suma de todas las cajas, sin importar quién la tenga</div>
        </div>
        <div class="text-right text-xs" style="color:#d1fae5">
          <div>${cajas.length} caja${cajas.length===1?'':'s'}</div>
          <div>${rows.length} movimiento${rows.length===1?'':'s'}</div>
        </div>
      </div>
    </div>

    ${cajas.length===0 ? `

              ${(i.transfIn||i.transfOut)?`<span class="text-blue-600">⇄ +${fmt$(i.transfIn)} / -${fmt$(i.transfOut)}</span>`:''}

function efTipoChange() {
  const tipo = $('#f-tipo').value;
  if (tipo==='transferencia') {
    $('#f-cajadest-wrap').style.display = '';
    $('#f-clasif-wrap').style.display = 'none';
    $('#f-caja-lbl').textContent = 'Caja origen *';
    $('#f-hint').textContent = 'La plata sale de la caja origen y entra a la caja destino. El total general de la empresa no cambia.';
  } else {
    $('#f-cajadest-wrap').style.display = 'none';
    $('#f-clasif-wrap').style.display = '';
    $('#f-caja-lbl').textContent = 'Caja *';
    $('#f-hint').textContent = tipo==='ingreso'
      ? 'Entra plata a la caja elegida. Marcá si es un ingreso de la empresa o propio.'

async function efSave(id) {
  const tipo = $('#f-tipo').value;
  const data = {
    fecha: $('#f-fecha').value,
    tipo,
    concepto: $('#f-con').value.trim(),
    monto: Number($('#f-mon').value || 0),
    caja: $('#f-caja').value || null,
    cajaDestino: tipo==='transferencia' ? ($('#f-cajadest').value || null) : null,
    clasificacion: tipo==='transferencia' ? null : ($('#f-clasif').value || null),
    observaciones: $('#f-obs').value.trim() || null,
  };
  if (!data.fecha)    return toast('Fecha requerida','warn');
  if (!data.concepto) return toast('Concepto requerido','warn');
  if (!data.monto || data.monto<=0) return toast('Ingresá un monto mayor a cero','warn');
  if (!data.caja)     return toast(tipo==='transferencia'?'Elegí la caja origen':'Elegí la caja','warn');
  if (tipo==='transferencia') {
    if (!data.cajaDestino) return toast('Elegí la caja destino','warn');
    if (data.caja===data.cajaDestino) return toast('La caja origen y destino deben ser distintas','warn');
  }
  try { await api('/api/efectivo'+(id?'/'+id:''),{method:id?'PUT':'POST',body:JSON.stringify(data)});
    toast(id?'Actualizado':'Creado','success'); closeModal(); delete state.cache.efectivo; pages.efectivo();
  } catch (e) { toast(e.message,'error'); }
}
async function efDel(id) {
  if (!confirm('¿Eliminar este movimiento de efectivo?')) return;
  try { await api('/api/efectivo/'+id,{method:'DELETE'});
    toast('Eliminado','success'); delete state.cache.efectivo; pages.efectivo();
  } catch (e) { toast(e.message,'error'); }
}

 * (depósito propio, cerealera externa, otro). Cuando es cerealera,
 * el cereal sigue siendo del cliente pero está físicamente en la planta.

pages.cerealeras = async function() {
  setHeader('Cerealeras y depósitos', 'Ubicaciones físicas donde está almacenado tu cereal y otros productos');
  if (!can('stock:read')) { $('#page-body').innerHTML = stubPage('cerealeras','Cerealeras'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let depos = [], stockDep = [];
  try {
    const [d, s] = await Promise.all([api('/api/depositos'), api('/api/stock-por-deposito')]);
    depos = d.data || []; stockDep = s.data || [];
  } catch (e) { return toast(e.message, 'error'); }
  state.cache.depositos = depos;
  // KPIs por tipo
  const totalCerealeras = depos.filter(d => d.tipo === 'cerealera' && d.activo).length;
  const totalDepositos  = depos.filter(d => d.tipo === 'campo' && d.activo).length;
  // Stock total en cerealeras: para cada producto sumamos lo que está en depósitos cerealera
  const stockEnCerealeras = stockDep.reduce((acc, p) => {
    const tn = p.depositos.filter(d => d.tipo === 'cerealera').reduce((a, d) => a + d.existencia, 0);
    if (tn > 0) acc.push({ producto: p.nombre, unidad: p.unidad, cantidad: tn });
    return acc;
  }, []);

  $('#page-body').innerHTML = `
    <div class="mb-4 flex items-center justify-between flex-wrap gap-2">
      <div class="text-sm text-slate-600">${depos.length} depósito${depos.length===1?'':'s'} registrado${depos.length===1?'':'s'}</div>
      <div class="flex gap-2 flex-wrap">
        ${can('stock:deposito:create')?`<button class="btn btn-secondary" onclick="depoForm()">+ Nuevo depósito</button>`:''}
        ${can('stock:entrega_cerealera:create')?`<button class="btn btn-primary" onclick="entregaCerealForm()">📤 Entregar cereal</button>`:''}
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Cerealeras activas</div><div class="text-2xl font-bold mt-1">${totalCerealeras}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Depósitos propios</div><div class="text-2xl font-bold mt-1">${totalDepositos}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Productos en cerealera</div><div class="text-2xl font-bold mt-1">${stockEnCerealeras.length}</div></div>
    </div>
    <div class="kpi mb-4">
      <h3 class="text-sm font-bold text-slate-700 mb-3">🏭 Depósitos registrados</h3>
      <table class="data">
        <thead><tr><th>Nombre</th><th>Tipo</th><th>CUIT</th><th>Contacto</th><th>Localidad</th><th class="text-center">Estado</th><th></th></tr></thead>
        <tbody>
          ${depos.map(d => `
            <tr class="table-row">
              <td class="font-medium">${esc(d.nombre)}${d.compartido?` <span class="badge badge-blue text-[10px]" title="Compartido entre todas tus empresas">🌐 Compartido</span>`:''}</td>
              <td>${d.tipo==='cerealera'?'<span class="badge badge-yellow">🏭 Cerealera</span>':d.tipo==='campo'?'<span class="badge badge-green">🌾 Campo</span>':'<span class="badge badge-gray">📦 Otro</span>'}</td>
              <td class="font-mono text-xs">${esc(d.cuit||'—')}</td>
              <td>${esc(d.contacto||'—')}${d.telefono?` · ${esc(d.telefono)}`:''}</td>
              <td>${esc(d.localidad||'—')}</td>
              <td class="text-center">${d.activo?'<span class="badge badge-green">Activo</span>':'<span class="badge badge-gray">Inactivo</span>'}</td>
              <td class="text-right whitespace-nowrap">
                ${can('stock:update')?`<button class="btn btn-ghost text-xs" onclick='depoForm(${JSON.stringify(d.id)})'>✏️</button>`:''}
                ${can('stock:delete')?`<button class="btn btn-ghost text-xs text-red-600" onclick='depoDel(${JSON.stringify(d.id)})'>🗑️</button>`:''}
              </td>
            </tr>`).join('') || `<tr><td colspan="7" class="text-center text-slate-400 py-8">Sin depósitos. Cargá la primera cerealera o silo propio.</td></tr>`}
        </tbody>
      </table>
    </div>
    ${stockEnCerealeras.length ? `
      <div class="kpi">
        <h3 class="text-sm font-bold text-slate-700 mb-3">📦 Stock en cerealeras</h3>
        <table class="data">
          <thead><tr><th>Producto</th><th class="text-right">Cantidad</th><th>Unidad</th></tr></thead>
          <tbody>
            ${stockEnCerealeras.map(s => `<tr class="table-row"><td>${esc(s.producto)}</td><td class="text-right font-bold">${fmtN(s.cantidad)}</td><td class="text-slate-500">${esc(s.unidad||'')}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}`;
};

function liqAddConc(c = { tipo:'descuento', concepto:'', importe:0 }) {
  const row = `<tr data-lc>
    <td><select class="input text-sm" data-lcf="tipo" onchange="liqRecalc()"><option value="descuento" ${c.tipo==='descuento'?'selected':''}>Descuento</option><option value="impuesto" ${c.tipo==='impuesto'?'selected':''}>Impuesto</option></select></td>
    <td><input class="input text-sm" data-lcf="concepto" value="${esc(c.concepto||'')}" placeholder="Flete, Secada, Paritarios, IIBB..."/></td>
    <td><input class="input text-sm w-32 text-right" type="number" step="0.01" data-lcf="importe" value="${c.importe||0}" oninput="liqRecalc()"/></td>
    <td><button class="btn btn-ghost text-red-600" onclick="this.closest('tr').remove(); liqRecalc()">×</button></td>
  </tr>`;
  $('#lq-conc').insertAdjacentHTML('beforeend', row);
}
function liqRecalc() {
  const brut = Number($('#lq-brut').value||0);
  const merma = Number($('#lq-merma').value||0);
  const prec = Number($('#lq-prec').value||0);
  const neto = brut * (1 - merma/100);
  const bruto = (neto / 1000) * prec;
  let totalDesc = 0, totalImp = 0;
  $$('#lq-conc tr[data-lc]').forEach(tr => {
    const tipo = tr.querySelector('[data-lcf="tipo"]').value;
    const imp = Number(tr.querySelector('[data-lcf="importe"]').value||0);
    if (tipo === 'descuento') totalDesc += imp;
    else totalImp += imp;
  });
  $('#lq-net').value = fmtN(neto);
  $('#lq-r-bruto').textContent = fmt$(bruto);
  $('#lq-r-desc').textContent = '- ' + fmt$(totalDesc);
  $('#lq-r-imp').textContent = '- ' + fmt$(totalImp);
  $('#lq-r-neto').textContent = fmt$(bruto - totalDesc - totalImp);
}
async function liqSave() {

// Dibuja el gráfico de saldo acumulado usando una librería liviana inline (SVG).
// No depende de Chart.js para no agregar peso. Hace un sparkline simple.
function flujoDibujarChart(serie) {
  const canvas = document.getElementById('flujo-chart');
  if (!canvas) return;
  const W = canvas.offsetWidth || 800, H = 80;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if (!serie.length) return;
  const minS = Math.min(0, ...serie.map(p => p.saldo));
  const maxS = Math.max(0, ...serie.map(p => p.saldo));
  const rango = maxS - minS || 1;
  const padL = 60, padR = 10, padT = 8, padB = 18;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const xAt = (i) => padL + (innerW * i / Math.max(1, serie.length - 1));
  const yAt = (v) => padT + innerH * (1 - (v - minS) / rango);
  // Línea de cero
  if (minS < 0 && maxS > 0) {
    const y0 = yAt(0);
    ctx.strokeStyle = '#94a3b8';
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(padL, y0); ctx.lineTo(W-padR, y0); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#64748b'; ctx.font = '10px sans-serif';
    ctx.fillText('$0', 4, y0+3);
  }
  // Fill area: verde positivo, rojo negativo
  for (let i = 0; i < serie.length - 1; i++) {
    const x1 = xAt(i), x2 = xAt(i+1);
    const y1 = yAt(serie[i].saldo), y2 = yAt(serie[i+1].saldo);
    const y0 = (minS < 0 && maxS > 0) ? yAt(0) : (serie[i].saldo >= 0 ? H-padB : padT);
    ctx.fillStyle = serie[i].saldo >= 0 ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
    ctx.beginPath();
    ctx.moveTo(x1, y0); ctx.lineTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x2, y0); ctx.closePath();
    ctx.fill();
  }
  // Línea principal
  ctx.strokeStyle = '#16a34a'; ctx.lineWidth = 2;
  ctx.beginPath();
  serie.forEach((p, i) => {
    const x = xAt(i), y = yAt(p.saldo);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  // Etiquetas de inicio y fin
  ctx.fillStyle = '#0f172a'; ctx.font = '10px sans-serif';
  const fmtCorto = (n) => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'k' : n.toFixed(0);
  ctx.fillText(`$${fmtCorto(serie[0].saldo)}`, padL, padT+10);
  const ultimo = serie[serie.length-1];
  ctx.fillText(`$${fmtCorto(ultimo.saldo)}`, W-padR-50, yAt(ultimo.saldo)-4);
  // Eje X: fecha inicio y fecha fin
  ctx.fillStyle = '#64748b';
  ctx.fillText(serie[0].fecha, padL, H-4);
  ctx.fillText(ultimo.fecha, W-padR-60, H-4);
}

  state.flujoEmpresas = ids;
