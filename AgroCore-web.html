async function flujoExportar() {
  try {
    const empParam = state.flujoEmpresas.join(',');
    const qs = `dias=${state.flujoDias}` + (empParam ? `&empresas=${encodeURIComponent(empParam)}` : '');
    const r = await fetch(API_BASE + '/api/flujo-proyectado/export?' + qs, {
      headers: { 'Authorization': 'Bearer ' + state.token },
    });
    if (!r.ok) { toast('No se pudo exportar', 'error'); return; }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Estado-de-situacion-${new Date().toISOString().slice(0,10)}.xlsx`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('Exportado ✅', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

        <div><label class="label">Nro de cuenta</label><input id="bc-nro" class="input" value="${esc(c.numero||'')}"/></div>

        <div><label class="label">Alias</label><input id="bc-alias" class="input" value="${esc(c.alias||'')}"/></div>
        <div class="col-span-3"><label class="label">Titular</label><input id="bc-tit" class="input" value="${esc(c.titular||'')}"/></div>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-3 p-3 bg-amber-50 rounded-lg border border-amber-200">
        <div class="col-span-2 text-xs text-amber-800 font-medium">💰 Saldo de apertura — solo al cargar la cuenta por primera vez</div>
        <div><label class="label">Saldo inicial</label><input id="bc-sini" type="number" step="0.01" class="input" value="${c.saldoInicial||0}"/></div>
        <div><label class="label">Fecha del saldo inicial</label><input id="bc-fini" type="date" class="input" value="${c.fechaInicial?String(c.fechaInicial).slice(0,10):''}"/></div>
      </div>
      <div><label class="label">Observaciones</label><textarea id="bc-obs" class="input" rows="2">${esc(c.observaciones||'')}</textarea></div>
      <div class="mt-3 flex items-center gap-2">
        <input id="bc-act" type="checkbox" ${c.activo!==false?'checked':''}/>
        <label for="bc-act">Cuenta activa</label>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick="bcoCuentaSave(${id?JSON.stringify(id):'null'})">💾 Guardar</button>`
  });
}
async function bcoCuentaSave(id) {
  const data = {
    banco: $('#bc-banco').value.trim(),
    sucursal: $('#bc-suc').value.trim()||null,
    tipo: $('#bc-tipo').value,
    moneda: $('#bc-mon').value,
    numero: $('#bc-nro').value.trim()||null,
    cbu: $('#bc-cbu').value.trim()||null,
    alias: $('#bc-alias').value.trim()||null,
    titular: $('#bc-tit').value.trim()||null,
    saldoInicial: Number($('#bc-sini').value)||0,
    fechaInicial: $('#bc-fini').value ? new Date($('#bc-fini').value).toISOString() : null,
    observaciones: $('#bc-obs').value.trim()||null,
    activo: $('#bc-act').checked,
  };
  if (!data.banco) return toast('Falta el banco','warn');
  try {
    if (id) await api('/api/banco-cuentas/'+id, { method:'PUT', body: JSON.stringify(data) });
    else    await api('/api/banco-cuentas',     { method:'POST', body: JSON.stringify(data) });
    toast('Guardado','success'); closeModal(); pages.bancos();
  } catch (e) { toast(e.message,'error'); }
}

// Vista detalle de una cuenta: muestra sus movimientos y permite cargar nuevos
async function bcoVerMovs(cuentaId) {
  state.bancoCuentaId = cuentaId;
  const c = (state.cache.bancoCuentas||[]).find(x => x.id === cuentaId);
  if (!c) return toast('Cuenta no encontrada','error');
  setHeader(`🏛️ ${c.banco}`, `Saldo actual: ${c.moneda==='USD'?'US$ '+fmtN(c.saldo):fmt$(c.saldo)}${c.numero?' · Cta '+c.numero:''}`);
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando movimientos…</div>`;
  let movs = [];
  try { movs = (await api('/api/banco-cuentas/'+cuentaId+'/movimientos')).data || []; } catch (e) { return toast(e.message,'error'); }
  // Recalculamos saldo corriente fila a fila (de más viejo a más nuevo)
  let running = Number(c.saldoInicial || 0);
  const movsAsc = [...movs].sort((a,b) => new Date(a.fecha) - new Date(b.fecha) || a.createdAt.localeCompare(b.createdAt));
  movsAsc.forEach(m => {
    const t = BANCO_TIPOS[m.tipo] || { sign:0 };
    running += t.sign * Number(m.monto || 0);
    m._saldoCorrido = running;
  });
  // Mostramos de más nuevo a más viejo
  movs.sort((a,b) => new Date(b.fecha) - new Date(a.fecha) || b.createdAt.localeCompare(a.createdAt));
  $('#page-body').innerHTML = `
    <div class="mb-4 flex items-center justify-between flex-wrap gap-2">
      <button class="btn btn-secondary" onclick="pages.bancos()">← Volver a Bancos</button>
      <div class="flex gap-2">
        ${can('finanzas:create')?`<button class="btn btn-primary" onclick="bcoMovForm()">+ Nuevo movimiento</button>`:''}
      </div>
    </div>
    <div class="kpi p-0 overflow-hidden">
      <table class="data">
        <thead><tr><th>Fecha</th><th>Tipo</th><th>Concepto</th><th>Contraparte</th><th>Ref.</th><th class="text-right">Monto</th><th class="text-right">Saldo</th><th>Cargado por</th><th></th></tr></thead>
        <tbody>
          ${movs.map(m => {
            const t = BANCO_TIPOS[m.tipo] || { lbl:m.tipo, sign:0, icon:'•' };
            const cls = t.sign > 0 ? 'text-green-700' : t.sign < 0 ? 'text-red-700' : 'text-slate-600';
            const signo = t.sign > 0 ? '+' : t.sign < 0 ? '−' : '';
            return `<tr class="table-row">
              <td>${fmtDate(m.fecha)}</td>
              <td><span class="text-xs">${t.icon} ${esc(t.lbl)}</span></td>
              <td>${esc(m.concepto)}</td>
              <td class="text-xs text-slate-500">${esc(m.contraparte||'—')}</td>
              <td class="font-mono text-[11px]">${esc(m.referencia||'')}</td>
              <td class="text-right font-semibold ${cls}">${signo} ${fmt$(m.monto)}</td>
              <td class="text-right text-xs">${fmt$(m._saldoCorrido)}</td>
              <td class="text-xs text-slate-500">${m.user?esc((m.user.alias||m.user.nombre+' '+(m.user.apellido||''))):'—'}</td>
              <td class="text-right">${can('finanzas:delete')?`<button class="btn btn-ghost text-xs text-red-600" onclick='bcoMovDel(${JSON.stringify(m.id)})'>🗑️</button>`:''}</td>
            </tr>`;
          }).join('') || `<tr><td colspan="9" class="text-center text-slate-400 py-8">Sin movimientos en esta cuenta. Cargá el primero.</td></tr>`}
        </tbody>
      </table>
    </div>`;
}

function bcoMovForm() {
  const cuentas = state.cache.bancoCuentas || [];
  const cuentaActual = state.bancoCuentaId;
  openModal({
    title:'+ Nuevo movimiento bancario', size:'max-w-2xl',
    body: `
      <div class="grid grid-cols-3 gap-3 mb-3">
        <div class="col-span-2"><label class="label">Cuenta *</label>
          <select id="bm-cta" class="input">
            ${cuentas.filter(c=>c.activo).map(c => `<option value="${c.id}" ${c.id===cuentaActual?'selected':''}>🏛️ ${esc(c.banco)}${c.alias?' · '+esc(c.alias):''}</option>`).join('')}
          </select>
        </div>
        <div><label class="label">Fecha *</label><input id="bm-fec" type="date" class="input" value="${new Date().toISOString().slice(0,10)}"/></div>
        <div><label class="label">Tipo *</label>
          <select id="bm-tipo" class="input" onchange="bcoMovToggleTransfer()">
            ${Object.entries(BANCO_TIPOS).map(([k,v]) => `<option value="${k}">${v.icon} ${v.lbl}</option>`).join('')}
          </select>
        </div>
        <div class="col-span-2"><label class="label">Concepto *</label><input id="bm-conc" class="input" placeholder="Descripción del movimiento"/></div>
        <div><label class="label">Monto *</label><input id="bm-monto" type="number" step="0.01" class="input"/></div>
        <div class="col-span-2"><label class="label">Contraparte</label><input id="bm-contra" class="input" placeholder="Nombre del tercero / banco"/></div>
        <div class="col-span-3" id="bm-transfer-wrap" style="display:none">
          <label class="label">Cuenta destino (transferencia interna)</label>
          <select id="bm-cta2" class="input">
            <option value="">— Si es a un tercero, dejar vacío —</option>
            ${cuentas.filter(c=>c.activo).map(c => `<option value="${c.id}">🏛️ ${esc(c.banco)}${c.alias?' · '+esc(c.alias):''}</option>`).join('')}
          </select>
          <div class="text-[11px] text-slate-500 mt-1">Si elegís una cuenta destino, se crea automáticamente el movimiento espejo (entrada en la otra cuenta).</div>
        </div>
        <div class="col-span-3"><label class="label">Referencia</label><input id="bm-ref" class="input" placeholder="Nro de operación, recibo, etc."/></div>
        <div class="col-span-3"><label class="label">Observaciones</label><textarea id="bm-obs" class="input" rows="2"></textarea></div>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick="bcoMovSave()">💾 Guardar</button>`
  });
}
function bcoMovToggleTransfer() {
  const t = $('#bm-tipo').value;
  $('#bm-transfer-wrap').style.display = (t === 'transferencia_in' || t === 'transferencia_out') ? '' : 'none';
}
async function bcoMovSave() {
  const data = {
    cuentaId: $('#bm-cta').value,
    fecha: new Date($('#bm-fec').value).toISOString(),
    tipo: $('#bm-tipo').value,
    concepto: $('#bm-conc').value.trim(),
    monto: Number($('#bm-monto').value)||0,
    contraparte: $('#bm-contra').value.trim()||null,
    referencia: $('#bm-ref').value.trim()||null,
    cuentaContraId: $('#bm-cta2')?.value || null,
    observaciones: $('#bm-obs').value.trim()||null,
  };
  if (!data.concepto) return toast('Falta el concepto','warn');
  if (!data.monto || data.monto <= 0) return toast('Monto debe ser positivo','warn');
  try {
    await api('/api/banco-movimientos', { method:'POST', body: JSON.stringify(data) });
    toast('Movimiento registrado','success');
    closeModal();
    if (state.bancoCuentaId) bcoVerMovs(state.bancoCuentaId);
    else pages.bancos();
  } catch (e) { toast(e.message,'error'); }
}
async function bcoMovDel(id) {
  if (!confirm('¿Eliminar este movimiento? Si era una transferencia interna, también se borra el espejo en la otra cuenta.')) return;
  try {
    await api('/api/banco-movimientos/'+id, { method:'DELETE' });
    toast('Eliminado','success');
    if (state.bancoCuentaId) bcoVerMovs(state.bancoCuentaId);
    else pages.bancos();
  } catch (e) { toast(e.message,'error'); }
}

// Antes de mostrar el login, consultar el backend para saber si los usuarios
// de prueba (Admin/admin123, Super/super123) todavia existen. Si NO existen,
// no mostrar el hint — asi cuando alguien hace una implementacion en cliente,
// solo tiene que borrar esos usuarios y el hint desaparece automaticamente.
async function loadLoginDemoHint() {
  try {
    const r = await fetch(API_BASE + '/api/system/demo-status', { cache: 'no-store' });
    if (!r.ok) return;
    const data = await r.json();
    const hint = document.getElementById('login-demo-hint');
    if (!hint) return;
    if (data.demoAdmin) document.getElementById('login-demo-admin')?.classList.remove('hidden');
    if (data.demoSuper) document.getElementById('login-demo-super')?.classList.remove('hidden');
    if (data.anyDemo)   hint.classList.remove('hidden');
  } catch {} // si falla, simplemente no mostrar el hint
}

window.addEventListener('DOMContentLoaded', () => {
  loadLoginDemoHint();
  boot().catch(err => {
    console.error('Boot error:', err);
    logout(true);
  });
});
</script>
