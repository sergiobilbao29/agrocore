/* ==== TAB: Producción (campañas por cultivo/estado, ha, rindes) ==== */
async function dashProduccion() {
  const target = $('#dash-content');
  let camps = [], campos = [];
  try { camps = (await api('/api/campanas')).data || []; } catch {}
  try { campos = (await api('/api/campos')).data || []; } catch {}

  const porCultivo = {}, haPorCultivo = {};
  camps.forEach(c => {
    const k = c.cultivo || 'Sin cultivo';
    porCultivo[k] = (porCultivo[k]||0) + 1;
    haPorCultivo[k] = (haPorCultivo[k]||0) + Number(c.hectareas||0);
  });
  const porEstado = {};
  camps.forEach(c => {
    const k = c.estado || 'planificada';
    porEstado[k] = (porEstado[k]||0) + 1;
  });
  const totalHa = camps.reduce((a,c)=>a+Number(c.hectareas||0),0);
  const haCampos = campos.reduce((a,c)=>a+Number(c.hectareas||0),0);

  const cosechadas = camps.filter(c => c.estado === 'cosechada' && c.rindeReal);
  const rindePromedio = cosechadas.length ? cosechadas.reduce((a,c)=>a+Number(c.rindeReal||0),0) / cosechadas.length : 0;

  target.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Campos</div><div class="text-2xl font-bold mt-1">${campos.length}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Campañas totales</div><div class="text-2xl font-bold mt-1">${camps.length}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Ha en campañas</div><div class="text-xl font-bold mt-1">${fmtN(totalHa)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Rinde real promedio</div><div class="text-xl font-bold mt-1 text-emerald-700">${fmtN(rindePromedio)} kg/ha</div></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-2">Hectáreas por cultivo</h3>
        <div style="position:relative;height:280px">${Object.keys(haPorCultivo).length?'<canvas id="chart-prod-cul"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Sin campañas</div>'}</div>
      </div>
      <div class="kpi">
        <h3 class="font-semibold text-slate-800 mb-2">Campañas por estado</h3>
        <div style="position:relative;height:280px">${Object.keys(porEstado).length?'<canvas id="chart-prod-est"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Sin campañas</div>'}</div>
      </div>
    </div>

    <div class="kpi">
      <h3 class="font-semibold text-slate-800 mb-3">Rindes por cultivo (real vs estimado)</h3>
      <div style="position:relative;height:280px">${cosechadas.length?'<canvas id="chart-prod-rnd"></canvas>':'<div class="text-slate-400 text-sm text-center pt-16">Necesitás campañas cosechadas con rinde real cargado</div>'}</div>
    </div>

    <div class="text-xs text-slate-500 mt-3 text-center">Superficie total de campos: <b>${fmtN(haCampos)} ha</b> · en campañas: <b>${fmtN(totalHa)} ha</b></div>`;

  if (!window.Chart) return;
  const palette = ['#15803d','#65a30d','#ca8a04','#ea580c','#dc2626','#7c3aed','#0284c7','#0d9488'];
  if (Object.keys(haPorCultivo).length) {
    state.charts.prodCul = new Chart($('#chart-prod-cul').getContext('2d'), {
      type:'bar',
      data:{ labels: Object.keys(haPorCultivo), datasets:[{ label:'Hectáreas', data: Object.values(haPorCultivo), backgroundColor: palette }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
        scales:{ y:{ beginAtZero:true, ticks:{ callback:v => v+' ha' } } } }
    });
  }
  if (Object.keys(porEstado).length) {
    state.charts.prodEst = new Chart($('#chart-prod-est').getContext('2d'), {
      type:'doughnut',
      data:{ labels: Object.keys(porEstado), datasets:[{ data: Object.values(porEstado), backgroundColor: ['#3b82f6','#16a34a','#ca8a04','#6b7280','#ef4444'] }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } } }
    });
  }
  if (cosechadas.length) {
    // Agrupar por cultivo
    const byCul = {};
    cosechadas.forEach(c => {
      const k = c.cultivo || 'Sin cultivo';
      if (!byCul[k]) byCul[k] = { est: [], real: [] };
      if (c.rindeEstimado) byCul[k].est.push(Number(c.rindeEstimado));
      byCul[k].real.push(Number(c.rindeReal));
    });
    const labels = Object.keys(byCul);
    const est = labels.map(k => byCul[k].est.length ? byCul[k].est.reduce((a,b)=>a+b,0)/byCul[k].est.length : 0);
    const real = labels.map(k => byCul[k].real.reduce((a,b)=>a+b,0)/byCul[k].real.length);
    state.charts.prodRnd = new Chart($('#chart-prod-rnd').getContext('2d'), {
      type:'bar',
      data:{ labels, datasets:[
        { label:'Rinde estimado', backgroundColor:'#94a3b8', data: est },
        { label:'Rinde real',     backgroundColor:'#16a34a', data: real },
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom' } },
        scales:{ y:{ beginAtZero:true, ticks:{ callback:v => v+' kg/ha' } } } }
    });
  }
}

/* ==== TAB: Patrimonio (evolución mensual del saldo + distribución) ==== */
async function dashPatrimonio() {
  const target = $('#dash-content');
  let flujo=[], ccs=[], prods=[], cheques=[], arr=[];
  try { flujo = (await api('/api/flujo-caja')).data || []; } catch {}
  try { ccs = (await api('/api/ctas-ctes')).data || []; } catch {}
  try { prods = (await api('/api/stock-actual')).data || []; } catch {}
  try { cheques = (await api('/api/cheques')).data || []; } catch {}
  try { arr = (await api('/api/arrendamientos')).data || []; } catch {}

  // Activos
  const saldoCaja = flujo.reduce((a,f)=>a + Number(f.monto||0), 0);
  const valorStock = prods.reduce((a,p)=>a + Number(p.existencia||0) * Number(p.precioReferencia||0), 0);
  const porCobrar = ccs.filter(c=>c.contactoTipo==='cliente').reduce((a,c)=>a+(Number(c.debe||0)-Number(c.haber||0)),0);
  const chqEnCartera = cheques.filter(c=>c.tipo==='terceros' && ['en cartera','depositado'].includes((c.estado||'').toLowerCase())).reduce((a,c)=>a+Number(c.monto||0),0);
  // Pasivos
  const porPagar = ccs.filter(c=>c.contactoTipo==='proveedor').reduce((a,c)=>a+(Number(c.debe||0)-Number(c.haber||0)),0);
  const chqEmitidos = cheques.filter(c=>c.tipo==='propio' && ['emitido','depositado'].includes((c.estado||'').toLowerCase())).reduce((a,c)=>a+Number(c.monto||0),0);
  const arrPendiente = arr.filter(a=>!a.pagado).reduce((a,x)=>a + Number(x.hectareas||0)*Number(x.importeHa||0), 0);

  const activosT = saldoCaja + valorStock + porCobrar + chqEnCartera;
  const pasivosT = porPagar + chqEmitidos + arrPendiente;
  const neto = activosT - pasivosT;

  // Evolución mensual del patrimonio (simplificado: saldo de caja acumulado mes a mes)
  const hoy = new Date();
  const meses = [];
  for (let i=11;i>=0;i--) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth()-i, 1);
    meses.push({ key: d.toISOString().slice(0,7), label: d.toLocaleDateString('es-AR',{month:'short', year:'2-digit'}) });
  }
  const acumMeses = meses.map(m => flujo.filter(f => (f.fecha||'').slice(0,7) <= m.key).reduce((a,f)=>a + Number(f.monto||0), 0));

  target.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
      <div class="kpi" style="background:linear-gradient(135deg,#dcfce7 0%,#f0fdf4 100%)"><div class="text-xs text-slate-500">Activos totales</div><div class="text-2xl font-bold mt-1 text-emerald-700">${fmt$(activosT)}</div></div>
      <div class="kpi" style="background:linear-gradient(135deg,#fee2e2 0%,#fef2f2 100%)"><div class="text-xs text-slate-500">Pasivos totales</div><div class="text-2xl font-bold mt-1 text-red-700">${fmt$(pasivosT)}</div></div>

/* ------------ CRUD helper ------------ */
async function crudList(resource, cacheKey) {
  const r = await api('/api/' + resource);
  state.cache[cacheKey || resource] = r.data || [];
  return state.cache[cacheKey || resource];
}

/* ----- RESUMEN MULTI-EMPRESA ----- */
// Vista global a través de TODAS las empresas a las que el usuario tiene acceso.
// Mantiene la separación por empresa (no mezcla datos) pero suma totales arriba
// para tener "el todo" de un vistazo. Permite filtrar qué empresas incluir.
pages.resumenGlobal = async function() {
  setHeader('Resumen multi-empresa', 'Vista consolidada de cheques, efectivo y flujo · seleccioná qué empresas incluir');
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando resumen...</div>`;
  let rsp, stockRsp;
  try { rsp = await api('/api/resumen-multiempresa'); }
  catch (e) { return toast(e.message, 'error'); }
  // Stock multi-empresa: lo cargamos en paralelo (no rompe si falla)
  try { stockRsp = await api('/api/resumen-multiempresa/stock'); }
  catch (e) { stockRsp = { data: { filas: [], empresas: [], depositos: [], productos: [] } }; }
  const data = rsp.data || { porEmpresa: [], totales: {} };
  const stockData = stockRsp?.data || { filas: [], empresas: [], depositos: [], productos: [] };
  const todasLasEmpresas = data.porEmpresa || [];

  // Restaurar seleccion previa de empresas del localStorage. Por defecto: todas.
  const STORAGE_KEY = 'ac.resumenEmpresas';
  const CAJA_KEY = 'ac.resumenCajaFilter';
  let seleccionadas;
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (Array.isArray(saved)) {
      // Solo dejamos los IDs que todavia existen entre las empresas del usuario
      seleccionadas = new Set(saved.filter(id => todasLasEmpresas.some(e => e.companyId === id)));
    }
  } catch {}
  if (!seleccionadas || seleccionadas.size === 0) {
    seleccionadas = new Set(todasLasEmpresas.map(e => e.companyId));
  }
  // Filtro de cajas: ahora MULTI-SELECT (Set de nombres). Se carga del localStorage.
  let cajasFiltro = (() => {
    try {
      const v = localStorage.getItem(CAJA_KEY);
      if (!v) return new Set();
      // Soportar el formato viejo (string único) y el nuevo (JSON array)
      if (v.startsWith('[')) return new Set(JSON.parse(v));
      return v ? new Set([v]) : new Set();
    } catch { return new Set(); }
  })();
  // Filtro de empresas EN EL RECUADRO de Cajas por empresa (independiente del filtro global)
  const CAJA_EMP_KEY = 'ac.resumenCajaEmpresas';
  let cajaEmpresasFiltro = (() => {
    try { return new Set(JSON.parse(localStorage.getItem(CAJA_EMP_KEY) || '[]')); } catch { return new Set(); }
  })();
  // Filtros del recuadro de stock multi-empresa (ahora MULTI cada uno: Sets)
  const STOCK_KEY = 'ac.resumenStockFilter';
  let stockFiltro = (() => {
    try {
      const raw = JSON.parse(localStorage.getItem(STOCK_KEY) || '{}');
      return {
        productos:  new Set(Array.isArray(raw.productos)  ? raw.productos  : (raw.producto  ? [raw.producto]  : [])),
        empresas:   new Set(Array.isArray(raw.empresas)   ? raw.empresas   : (raw.empresaId ? [raw.empresaId] : [])),
        depositos:  new Set(Array.isArray(raw.depositos)  ? raw.depositos  : (raw.depositoId? [raw.depositoId]: [])),
      };
    } catch { return { productos: new Set(), empresas: new Set(), depositos: new Set() }; }
  })();
  function saveStockFiltro() {
    localStorage.setItem(STOCK_KEY, JSON.stringify({
      productos: [...stockFiltro.productos],
      empresas:  [...stockFiltro.empresas],
      depositos: [...stockFiltro.depositos],
    }));
  }
  // Helper de chips para filtros multi-select.
  // - Si hay > 8 opciones, agrega un buscador arriba que filtra los chips visibles.
  // - Los seleccionados SIEMPRE se muestran (no se ocultan por filtro de búsqueda).
  // - Click delegado para evitar problemas de escapado de comillas en data-attributes.
  function chipsHTML(items, selectedSet, fnName) {
    if (!items || items.length === 0) return '<div class="text-xs text-slate-400 italic">Sin opciones</div>';
    const total = items.length;
    const showSearch = total > 8;
    const searchId = 'mp-' + fnName.replace(/[^a-z0-9]/gi, '') + '-' + (Math.random() * 1e6 | 0);
    // Sort: seleccionados primero, después alfabético
    const sorted = items.slice().sort((a, b) => {
      const av = (typeof a === 'string') ? a : a.value;
      const bv = (typeof b === 'string') ? b : b.value;
      const al = (typeof a === 'string') ? a : a.label;
      const bl = (typeof b === 'string') ? b : b.label;
      const asel = selectedSet.has(av) ? 0 : 1;
      const bsel = selectedSet.has(bv) ? 0 : 1;
      if (asel !== bsel) return asel - bsel;
      return String(al).localeCompare(String(bl), 'es');
    });
    let html = '';
    if (showSearch) {
      html += `<input type="text" data-mpsearch="${searchId}" class="input text-xs mb-2 py-1" placeholder="🔍 Buscar entre ${total} opciones..." oninput="resumenChipsFiltrar('${searchId}', this.value)"/>`;
    }
    html += `<div class="flex flex-wrap gap-1.5" data-mpchips="${searchId}">`;
    html += sorted.map(item => {
      const value = (typeof item === 'string') ? item : item.value;
      const label = (typeof item === 'string') ? item : item.label;
      const isSel = selectedSet.has(value);
      const cls = isSel
        ? 'bg-emerald-600 text-white border-emerald-700 font-semibold shadow-sm'
        : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50';
      const labelLc = String(label).toLowerCase();
      return `<button type="button" class="resumen-chip text-xs px-3 py-1 rounded-full border-2 transition ${cls}" data-fn="${esc(fnName)}" data-value="${esc(value)}" data-llc="${esc(labelLc)}" data-sel="${isSel?'1':'0'}">${esc(label)}${isSel?' ✓':''}</button>`;
    }).join(' ');
    html += '</div>';
    return html;
  }

      acc.cheques.montoVencidos += e.cheques.montoVencidos;
      acc.efectivo.saldo        += e.efectivo.saldo;
      acc.flujoCaja.saldoActual += e.flujoCaja.saldoActual;
      return acc;
    }, {

        <div class="px-5 pt-4 pb-1 flex items-center justify-between flex-wrap gap-2">
          <div class="text-xs font-bold uppercase tracking-wider" style="color:#bbf7d0">
            🌐 Resumen consolidado
          </div>
          <div class="text-xs font-semibold px-2.5 py-1 rounded-full" style="background:rgba(255,255,255,.15);color:#dcfce7">
            ${porEmp.length} de ${todasLasEmpresas.length} empresa${todasLasEmpresas.length===1?'':'s'} incluida${porEmp.length===1?'':'s'}
          </div>
        </div>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 p-5 pt-3">

            <div class="text-xs mt-1.5" style="color:#dcfce7">${fmt$(t.cheques.montoEnCartera)}</div>
          </div>
          <div class="rounded-lg p-3" style="background:rgba(251,191,36,.18)">

      <div class="kpi p-0 overflow-hidden">
        <div class="px-4 py-3 bg-slate-50 border-b">

                  <td class="text-right ${e.efectivo.saldo<0?'text-red-600':''}">${fmt$(e.efectivo.saldo)}</td>
                  <td class="text-right ${e.flujoCaja.saldoActual<0?'text-red-600':''}">${fmt$(e.flujoCaja.saldoActual)}</td>
                  <td class="text-right">

                  </td>

          </tbody>
          <tfoot>

              <td>TOTAL (seleccionadas)</td>

      </div>

      ${(() => {

        // Aplanamos: [{empresaId, empresaName, color, caja, ingresos, egresos, saldo, ...}]

        const filasMostradas = filas.filter(f => {

          if (fEmps.size  > 0 && !fEmps.has(f.companyId)) return false;
          if (fDeps.size  > 0) {
            const k = f.depositoId || 'sin';
            if (!fDeps.has(k)) return false;
          }
          return true;
        });

        const totalConsolidado = filas.reduce((acc, f) => acc + Number(f.existencia || 0), 0);
        const unidadConsolidada = (filas[0] && filas.every(f => f.unidad === filas[0].unidad)) ? filas[0].unidad : '';
        const filtroActivo = (fProds.size + fEmps.size + fDeps.size) > 0;
        const labelFiltro = [
          fProds.size > 0 ? `Producto${fProds.size>1?'s':''}: ${[...fProds].map(esc).join(', ')}` : null,
          fEmps.size  > 0 ? `Empresa${fEmps.size>1?'s':''}: ${[...fEmps].map(id => esc(empresasUnicasStock.get(id)?.name || id)).join(', ')}` : null,
          fDeps.size  > 0 ? `Depósito${fDeps.size>1?'s':''}: ${[...fDeps].map(k => esc(depositosUnicos.get(k)?.nombre || k)).join(', ')}` : null,
        ].filter(Boolean).join(' · ');

        // Items para chips
        const itemsProductos = productosUnicos;
        const itemsEmpresas  = [...empresasUnicasStock.values()].map(e => ({ value: e.id, label: e.name }));
        const itemsDepositos = [...depositosUnicos.values()].map(d => ({ value: d.key, label: d.nombre + (d.compartido?' 🌐':'') }));

        return `
        <div class="kpi p-0 overflow-hidden mt-4">
          <div class="px-4 py-3 bg-slate-50 border-b">
            <div class="flex flex-wrap items-start justify-between gap-3 mb-3">
              <div>
                <h3 class="font-semibold text-slate-800">📦 Stock por empresa y depósito</h3>
                <div class="text-xs text-slate-500">Tildá uno o varios chips para filtrar. Sin filtros muestra el total consolidado.</div>
              </div>
              ${filtroActivo ? `<button class="btn btn-secondary text-xs" onclick="resumenStockLimpiar()">✕ Limpiar filtros</button>` : ''}
            </div>
            <div class="space-y-2">
              <div>
                <div class="text-[11px] uppercase tracking-wider font-semibold text-slate-600 mb-1">Producto${fProds.size>0?` (${fProds.size})`:''}</div>
                <div class="flex flex-wrap gap-1.5">${chipsHTML(itemsProductos, fProds, 'resumenToggleStockProducto')}</div>
              </div>
              <div>
                <div class="text-[11px] uppercase tracking-wider font-semibold text-slate-600 mb-1">Empresa${fEmps.size>0?` (${fEmps.size})`:''}</div>
                <div class="flex flex-wrap gap-1.5">${chipsHTML(itemsEmpresas, fEmps, 'resumenToggleStockEmpresa')}</div>
              </div>
              <div>
                <div class="text-[11px] uppercase tracking-wider font-semibold text-slate-600 mb-1">Depósito${fDeps.size>0?` (${fDeps.size})`:''}</div>
                <div class="flex flex-wrap gap-1.5">${chipsHTML(itemsDepositos, fDeps, 'resumenToggleStockDeposito')}</div>
              </div>
            </div>
          </div>

          ${(fProds.size > 0 && filas.length > 0) ? `
            <div class="mx-4 mt-4 p-4 rounded-xl" style="background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 100%);color:#fff">
              <div class="flex items-center justify-between flex-wrap gap-2">
                <div>
                  <div class="text-xs uppercase tracking-wider font-bold" style="color:#bfdbfe">Consolidado producto</div>
                  <div class="text-lg font-extrabold mt-0.5">${[...fProds].map(esc).join(', ')}</div>
                  <div class="text-xs mt-1" style="color:#dbeafe">${labelFiltro}</div>
                </div>
                <div class="text-right">
                  <div class="text-3xl font-extrabold">${fmtN(totalConsolidado)} ${esc(unidadConsolidada)}</div>
                  <div class="text-xs mt-1" style="color:#dbeafe">Sumando ${filas.length} ubicación${filas.length===1?'':'es'}</div>
                </div>
              </div>
            </div>` : ''}

          <table class="data">
            <thead>
              <tr>
                <th>Empresa</th>
                <th>Producto</th>
                <th>Categoría</th>
                <th>Depósito</th>
                <th class="text-right">Existencia</th>
                <th>Unidad</th>
              </tr>
            </thead>
            <tbody>
              ${filas.length === 0
                ? `<tr><td colspan="6" class="text-center text-slate-400 py-6">${filtroActivo ? 'No hay stock que coincida con los filtros' : 'Sin existencias cargadas'}</td></tr>`
                : filas.map(f => `
                  <tr class="table-row">
                    <td>
                      <div class="flex items-center gap-2">
                        ${f.companyColor ? `<span class="w-3 h-3 rounded-full" style="background:${esc(f.companyColor)}"></span>` : ''}
                        <span>${esc(f.companyName)}</span>
                      </div>
                    </td>
                    <td><b>${esc(f.productoNombre)}</b></td>
                    <td>${f.productoCategoria?`<span class="badge badge-blue text-[10px]">${esc(f.productoCategoria)}</span>`:'—'}</td>
                    <td class="text-xs">${esc(f.depositoNombre)}${f.depositoCompartido?' 🌐':''}</td>
                    <td class="text-right font-semibold ${Number(f.existencia)<=0?'text-red-600':'text-emerald-700'}">${fmtN(f.existencia)}</td>
                    <td class="text-xs text-slate-600">${esc(f.unidad||'—')}</td>
                  </tr>`).join('')
              }
            </tbody>
          </table>
        </div>`;
      })()}

      <div class="mt-3 text-xs text-slate-500">
        💡 Tu selección se guarda automáticamente para la próxima vez que entres. Esta vista <b>no mezcla</b> datos entre empresas: cada cheque, efectivo y flujo sigue asignado a la empresa donde se cargó. Solo agrupa los totales para que puedas verlos en conjunto.
      </div>`;

  };

  // Wrappers expuestos al onclick/onchange de los checkboxes.
  window.resumenToggleEmpresa = (id, marcada) => {
    if (marcada) seleccionadas.add(id);
    else seleccionadas.delete(id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(seleccionadas)));
    render();
  };
  window.resumenToggleAll = (marcadaTodos) => {
    seleccionadas = new Set(marcadaTodos ? todasLasEmpresas.map(e => e.companyId) : []);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(seleccionadas)));
    render();
  };
  // Filtrado de los chips por término de búsqueda (mantiene visibles los seleccionados)
  window.resumenChipsFiltrar = (groupId, q) => {
    const wrap = document.querySelector(`[data-mpchips="${groupId}"]`);
    if (!wrap) return;
    const qLc = (q || '').toLowerCase().trim();
    wrap.querySelectorAll('button.resumen-chip').forEach(btn => {
      const labelLc = btn.dataset.llc || '';
      const isSel   = btn.dataset.sel === '1';
      // Seleccionados siempre visibles
      if (isSel || !qLc || labelLc.includes(qLc)) {
        btn.style.display = '';
      } else {
        btn.style.display = 'none';
      }
    });
  };
  // Toggle de un elemento en un Set (helper interno)
  function toggleInSet(set, value) {
    if (set.has(value)) set.delete(value); else set.add(value);
  }
  // Cajas por empresa
  window.resumenToggleCaja = (nombre) => {
    toggleInSet(cajasFiltro, nombre);
    localStorage.setItem(CAJA_KEY, JSON.stringify([...cajasFiltro]));
    render();
  };
  window.resumenToggleCajaEmpresa = (empresaId) => {
    toggleInSet(cajaEmpresasFiltro, empresaId);
    localStorage.setItem(CAJA_EMP_KEY, JSON.stringify([...cajaEmpresasFiltro]));
    render();
  };
  window.resumenLimpiarCajasFiltros = () => {
    cajasFiltro = new Set();
    cajaEmpresasFiltro = new Set();
    localStorage.removeItem(CAJA_KEY);
    localStorage.removeItem(CAJA_EMP_KEY);
    render();
  };
  // Stock multi-empresa
  window.resumenToggleStockProducto = (nombre) => { toggleInSet(stockFiltro.productos, nombre); saveStockFiltro(); render(); };
  window.resumenToggleStockEmpresa  = (id)     => { toggleInSet(stockFiltro.empresas,  id);     saveStockFiltro(); render(); };
  window.resumenToggleStockDeposito = (key)    => { toggleInSet(stockFiltro.depositos, key);    saveStockFiltro(); render(); };
  window.resumenStockLimpiar = () => {
    stockFiltro.productos.clear();
    stockFiltro.empresas.clear();
    stockFiltro.depositos.clear();
    localStorage.removeItem(STOCK_KEY);
    render();
  };

  $('#page-body').innerHTML = `<div id="resumen-body"></div>`;
  // Listener delegado para los chips de los filtros multi-select.
  // Se enchufa una sola vez al body (el render rehace el HTML interior pero el listener
  // sigue ahí porque está en el contenedor padre).
  const bodyEl = document.getElementById('resumen-body');
  if (bodyEl && !bodyEl._chipsBound) {
    bodyEl.addEventListener('click', (ev) => {
      const btn = ev.target.closest('.resumen-chip');
      if (!btn) return;
      const fn = btn.dataset.fn;
      const val = btn.dataset.value;
      if (fn && typeof window[fn] === 'function') {
        window[fn](val);
      }
    });
    bodyEl._chipsBound = true;
  }
  render();
};

// Helper: cambia a la empresa elegida (si hace falta) y navega al modulo solicitado.
// Usa la funcion existente switchCompany que se encarga del cambio completo.
async function cambiarEmpresaYIr(companyId, modulo) {
  if (state.companyId === companyId) return go(modulo);
  state.currentPage = modulo;
  await switchCompany(companyId);
}

pages.clientes = async function() {

  try { rows = await crudList('clientes'); } catch (e) { return toast(e.message,'error'); }
  try { ccs = (await api('/api/ctas-ctes')).data || []; } catch {}
  const saldoDe = clienteId => ccs.filter(c => c.contactoTipo==='cliente' && c.contactoId===clienteId).reduce((a,c)=>a+(Number(c.debe||0)-Number(c.haber||0)), 0);

  state.clienteFilter = state.clienteFilter || { q:'', iva:'' };

  const render = () => {
    const q = (state.clienteFilter.q||'').toLowerCase();
    const iva = state.clienteFilter.iva || '';
    const filtered = rows.filter(c => {
      if (iva && normalizeCondIVA(c.condIVA) !== normalizeCondIVA(iva)) return false;
      if (!q) return true;
      return [c.razonSocial, c.nombreFantasia, c.cuit, c.email, c.localidad]
        .some(v => (v||'').toLowerCase().includes(q));
    });
    $('#clientes-table').innerHTML = `
      <table class="data">
        <thead><tr>
          <th>Razón social</th><th>CUIT</th><th>Cond. IVA</th><th>Contacto</th>
          <th>Localidad</th><th class="text-right">Saldo</th><th></th>
        </tr></thead>
        <tbody>
          ${filtered.map(c => {
            const saldo = saldoDe(c.id);
            return `<tr class="table-row">
              <td><b>${esc(c.razonSocial)}</b>${c.nombreFantasia?`<div class="text-[11px] text-slate-500">${esc(c.nombreFantasia)}</div>`:''}</td>
              <td class="font-mono text-xs">${esc(c.cuit||'—')}</td>
              <td>${c.condIVA?`<span class="badge badge-blue">${esc(normalizeCondIVA(c.condIVA))}</span>`:'—'}</td>
              <td>
                ${c.email?`<div class="text-xs">${esc(c.email)}</div>`:''}
                ${c.telefono?`<div class="text-[11px] text-slate-500">${esc(c.telefono)}</div>`:''}
                ${(!c.email && !c.telefono)?'—':''}
              </td>
              <td>${esc(c.localidad||'—')}</td>
              <td class="text-right ${saldo>0?'text-amber-600 font-semibold':''}">${saldo?fmt$(saldo):'—'}</td>
              <td class="text-right whitespace-nowrap">
                ${can('contactos:update') ? `<button class="btn btn-ghost text-xs" onclick='clienteForm(${JSON.stringify(c.id)})'>✏️</button>` : ''}
                ${can('contactos:delete') ? `<button class="btn btn-ghost text-xs text-red-600" onclick='clienteDel(${JSON.stringify(c.id)})'>🗑️</button>` : ''}
              </td>
            </tr>`;}).join('') || `<tr><td colspan="7" class="text-center text-slate-400 py-8">${rows.length?'Sin coincidencias':'Aún no hay clientes'}</td></tr>`}
        </tbody>
      </table>`;
  };

  $('#page-body').innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Clientes</div><div class="text-2xl font-bold mt-1">${rows.length}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Activos</div><div class="text-2xl font-bold mt-1 text-emerald-600">${activos}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Saldo a cobrar</div><div class="text-xl font-bold mt-1 ${totalSaldo>0?'text-amber-600':'text-slate-700'}">${fmt$(totalSaldo)}</div></div>
    </div>
    <div class="kpi mb-3">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-2 items-end">
        <div class="md:col-span-6">
          <label class="label">Buscar (nombre, CUIT, email, localidad)</label>
          <input id="cli-q" class="input" placeholder="Escribí para filtrar..." value="${esc(state.clienteFilter.q||'')}"/>
        </div>
        <div class="md:col-span-3">
          <label class="label">Condición IVA</label>
          <select id="cli-iva" class="input">
            <option value="">Todas</option>
            ${catByTipo('Condición IVA').map(v=>`<option ${v.nombre===state.clienteFilter.iva?'selected':''}>${esc(v.nombre)}</option>`).join('')}
          </select>

        <div class="md:col-span-3 flex gap-2">

    <div class="kpi p-0 overflow-hidden"><div id="clientes-table"></div></div>`;

  $('#cli-iva').onchange = e => { state.clienteFilter.iva = e.target.value; render(); };

async function clienteSave(id) {
  const data = {
    razonSocial: $('#f-rs').value.trim(),
    nombreFantasia: $('#f-nf').value.trim() || null,
    cuit: $('#f-cuit').value.trim() || null,
    condIVA: $('#f-iva').value || null,
    email: $('#f-em').value.trim() || null,
    telefono: $('#f-tel').value.trim() || null,
    direccion: $('#f-dir').value.trim() || null,
    localidad: $('#f-loc').value || null,
    provincia: $('#f-prov').value || null,
    pais: $('#f-pais')?.value || null,
  };
  if (!data.razonSocial) return toast('Razón social requerida','warn');
  try {
    await api('/api/clientes' + (id?'/'+id:''), { method: id?'PUT':'POST', body: JSON.stringify(data) });
    toast(id?'Cliente actualizado':'Cliente creado','success');
    closeModal(); delete state.cache.clientes; pages.clientes();
  } catch (e) { toast(e.message,'error'); }
}
async function clienteDel(id) {
  if (!confirm('¿Borrar este cliente?')) return;
  try { await api('/api/clientes/'+id, { method:'DELETE' }); toast('Cliente borrado','success'); delete state.cache.clientes; pages.clientes(); }
  catch (e) { toast(e.message,'error'); }
}

/* ----- PROVEEDORES ----- */
pages.proveedores = async function() {
  setHeader('Proveedores', 'Contactos de compras');
  if (!can('contactos:read')) { $('#page-body').innerHTML = stubPage('proveedores','Proveedores'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let rows=[], ccs=[];
  try { rows = await crudList('proveedores'); } catch (e) { return toast(e.message,'error'); }
  try { ccs = (await api('/api/ctas-ctes')).data || []; } catch {}
  const saldoDe = provId => ccs.filter(c => c.contactoTipo==='proveedor' && c.contactoId===provId).reduce((a,c)=>a+(Number(c.debe||0)-Number(c.haber||0)), 0);

  state.provFilter = state.provFilter || { q:'', rubro:'' };
  const activos = rows.filter(r => r.activo !== false).length;
  const totalSaldo = rows.reduce((a,r)=>a+saldoDe(r.id),0);
  const rubros = Array.from(new Set(rows.map(r => r.rubro).filter(Boolean))).sort();

  const render = () => {
    const q = (state.provFilter.q||'').toLowerCase();
    const rubro = state.provFilter.rubro || '';
    const filtered = rows.filter(p => {
      if (rubro && p.rubro !== rubro) return false;
      if (!q) return true;
      return [p.razonSocial, p.cuit, p.email, p.localidad, p.rubro]
        .some(v => (v||'').toLowerCase().includes(q));
    });
    $('#prov-table').innerHTML = `
      <table class="data">
        <thead><tr>
          <th>Razón social</th><th>CUIT</th><th>Rubro</th><th>Contacto</th>
          <th>Localidad</th><th class="text-right">Saldo</th><th></th>
        </tr></thead>
        <tbody>
          ${filtered.map(p => {
            const s = saldoDe(p.id);
            return `<tr class="table-row">
              <td><b>${esc(p.razonSocial)}</b></td>
              <td class="font-mono text-xs">${esc(p.cuit||'—')}</td>
              <td>${p.rubro?`<span class="badge badge-blue">${esc(p.rubro)}</span>`:'—'}</td>
              <td>
                ${p.email?`<div class="text-xs">${esc(p.email)}</div>`:''}
                ${p.telefono?`<div class="text-[11px] text-slate-500">${esc(p.telefono)}</div>`:''}
                ${(!p.email && !p.telefono)?'—':''}
              </td>
              <td>${esc(p.localidad||'—')}</td>
              <td class="text-right ${s>0?'text-red-600 font-semibold':''}">${s?fmt$(s):'—'}</td>
              <td class="text-right whitespace-nowrap">
                ${can('contactos:update') ? `<button class="btn btn-ghost text-xs" onclick='provForm(${JSON.stringify(p.id)})'>✏️</button>`:''}
                ${can('contactos:delete') ? `<button class="btn btn-ghost text-xs text-red-600" onclick='provDel(${JSON.stringify(p.id)})'>🗑️</button>`:''}
              </td>
            </tr>`;}).join('') || `<tr><td colspan="7" class="text-center text-slate-400 py-8">${rows.length?'Sin coincidencias':'Aún no hay proveedores'}</td></tr>`}
        </tbody>
      </table>`;
  };

  $('#page-body').innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Proveedores</div><div class="text-2xl font-bold mt-1">${rows.length}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Activos</div><div class="text-2xl font-bold mt-1 text-emerald-600">${activos}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Saldo a pagar</div><div class="text-xl font-bold mt-1 ${totalSaldo>0?'text-red-600':'text-slate-700'}">${fmt$(totalSaldo)}</div></div>
    </div>
    <div class="kpi mb-3">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-2 items-end">
        <div class="md:col-span-6">
          <label class="label">Buscar (nombre, CUIT, email, localidad)</label>
          <input id="prov-q" class="input" placeholder="Escribí para filtrar..." value="${esc(state.provFilter.q||'')}"/>
        </div>
        <div class="md:col-span-3">
          <label class="label">Rubro</label>
          <select id="prov-rubro" class="input">
            <option value="">Todos</option>
            ${rubros.map(r=>`<option ${r===state.provFilter.rubro?'selected':''}>${esc(r)}</option>`).join('')}
          </select>
        </div>
        <div class="md:col-span-3 flex gap-2">
          <button class="btn btn-secondary flex-1" onclick="provFiltrosLimpiar()">Limpiar</button>
          ${can('contactos:create') ? `<button class="btn btn-primary flex-1" onclick="provForm()">+ Nuevo</button>` : ''}
        </div>
      </div>
    </div>
    <div class="kpi p-0 overflow-hidden"><div id="prov-table"></div></div>`;
  $('#prov-q').oninput  = e => { state.provFilter.q = e.target.value; render(); };
  $('#prov-rubro').onchange = e => { state.provFilter.rubro = e.target.value; render(); };
  render();
};
function provFiltrosLimpiar() {
  state.provFilter = { q:'', rubro:'' };
  pages.proveedores();
}
function provForm(id=null) {
  const it = id ? (state.cache.proveedores||[]).find(x=>x.id===id) || {} : {};
  openModal({
    title: id?'Editar proveedor':'Nuevo proveedor',
    body: `
      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2"><label class="label">Razón social *</label><input id="f-rs" class="input" value="${esc(it.razonSocial||'')}" /></div>
        <div><label class="label">CUIT</label><input id="f-cuit" class="input" value="${esc(it.cuit||'')}" /></div>
        <div><label class="label">Rubro</label><input id="f-rub" class="input" value="${esc(it.rubro||'')}" /></div>
        <div><label class="label">Email</label><input id="f-em" class="input" value="${esc(it.email||'')}" /></div>
        <div><label class="label">Teléfono</label><input id="f-tel" class="input" value="${esc(it.telefono||'')}" /></div>
        <div class="col-span-2"><label class="label">Dirección</label><input id="f-dir" class="input" value="${esc(it.direccion||'')}" placeholder="Calle y número"/></div>
        <div class="col-span-2"><label class="label">País</label>${catSelect('f-pais', 'País', it.pais||'Argentina', { placeholder:'— Elegir país —' })}</div>
        <div><label class="label">Provincia</label>${catSelect('f-prov', 'Provincia', it.provincia||'', { placeholder:'— Elegir provincia —', parent: it.pais||'Argentina', parentSelect:'f-pais' })}</div>
        <div><label class="label">Localidad</label>${catSelect('f-loc', 'Ciudad', it.localidad||'', { placeholder:'— Elegir ciudad —', parent: it.provincia||'', parentSelect:'f-prov' })}</div>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick='provSave(${JSON.stringify(id)})'>${id?'Guardar':'Crear'}</button>`
  });
}
async function provSave(id) {
  const data = {
    razonSocial: $('#f-rs').value.trim(),
    cuit: $('#f-cuit').value.trim()||null, rubro: $('#f-rub').value.trim()||null,
    email: $('#f-em').value.trim()||null, telefono: $('#f-tel').value.trim()||null,
    direccion: $('#f-dir').value.trim()||null,
    localidad: $('#f-loc')?.value||null,
    provincia: $('#f-prov')?.value||null,
    pais: $('#f-pais')?.value||null,
  };
  if (!data.razonSocial) return toast('Razón social requerida','warn');
  try { await api('/api/proveedores'+(id?'/'+id:''), { method: id?'PUT':'POST', body: JSON.stringify(data) });
    toast(id?'Actualizado':'Creado','success'); closeModal(); delete state.cache.proveedores; pages.proveedores();
  } catch (e) { toast(e.message,'error'); }
}
async function provDel(id) {
  if (!confirm('¿Borrar este proveedor?')) return;
  try { await api('/api/proveedores/'+id,{method:'DELETE'}); toast('Borrado','success'); delete state.cache.proveedores; pages.proveedores(); }
  catch (e) { toast(e.message,'error'); }
}

/* ----- STOCK ----- */
pages.stock = async function() {
  setHeader('Stock', 'Productos y existencias');
  if (!can('stock:read')) { $('#page-body').innerHTML = stubPage('stock','Stock'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  state.stockFilter = state.stockFilter || { q:'', cat:'', estado:'', depositoId:'' };
  const depFilter = state.stockFilter.depositoId || '';
  let rows=[], depositos=[];
  try {
    const url = '/api/stock-actual' + (depFilter ? '?depositoId=' + encodeURIComponent(depFilter) : '');
    const r = await api(url); rows = r.data || [];
  } catch (e) { return toast(e.message,'error'); }
  try { const p = await api('/api/productos'); state.cache.productos = p.data || []; } catch {}
  try { const d = await api('/api/depositos'); depositos = d.data || []; state.cache.depositos = depositos; } catch {}

  const cats = [...new Set(rows.map(r=>r.categoria).filter(Boolean))].sort();
  const bajoMin = rows.filter(p => p.bajoMinimo).length;
  const totalSKU = rows.length;

  const render = () => {
    const q = (state.stockFilter.q||'').toLowerCase();
    const cat = state.stockFilter.cat || '';
    const estado = state.stockFilter.estado || '';
    const filtered = rows.filter(p => {
      if (cat && p.categoria !== cat) return false;
      if (estado === 'bajo' && !p.bajoMinimo) return false;
      if (estado === 'ok'   &&  p.bajoMinimo) return false;
      if (!q) return true;
      return [p.nombre, p.categoria, p.codigo, p.ubicacion].some(v => (v||'').toLowerCase().includes(q));
    });
    $('#stock-table').innerHTML = `
      <table class="data">
        <thead><tr>
          <th>Producto</th><th>Categoría</th><th>Ubicación</th>
          <th class="text-right">Existencia</th><th>Unidad</th>
          <th class="text-right">Mínimo</th><th>Estado</th><th></th>
        </tr></thead>
        <tbody>
          ${filtered.map(p => `
            <tr class="table-row">
              <td><b>${esc(p.nombre)}</b>${p.codigo?`<div class="text-[11px] text-slate-500 font-mono">${esc(p.codigo)}</div>`:''}</td>
              <td><span class="badge badge-blue">${esc(p.categoria)}</span></td>
              <td class="text-xs">${esc(p.ubicacion||'—')}</td>
              <td class="text-right font-semibold ${Number(p.existencia)<=0?'text-red-600':(p.bajoMinimo?'text-amber-600':'text-emerald-700')}">${fmtN(p.existencia)}</td>
              <td>${esc(p.unidad)}</td>
              <td class="text-right">${fmtN(p.stockMinimo)}</td>
              <td>${p.bajoMinimo?'<span class="badge badge-red">Bajo mínimo</span>':'<span class="badge badge-green">OK</span>'}</td>
              <td class="text-right whitespace-nowrap">
                ${can('stock:create')?`<button class="btn btn-ghost text-xs text-emerald-700" title="Nueva entrada" onclick='movEntrada(${JSON.stringify(p.id)})'>⬆️</button>`:''}
                ${can('stock:create')?`<button class="btn btn-ghost text-xs text-red-600" title="Nueva salida" onclick='movSalida(${JSON.stringify(p.id)})'>⬇️</button>`:''}
                ${can('stock:update')?`<button class="btn btn-ghost text-xs" title="Editar" onclick='prodForm(${JSON.stringify(p.id)})'>✏️</button>`:''}
              </td>
            </tr>`).join('') || `<tr><td colspan="8" class="text-center text-slate-400 py-8">${rows.length?'Sin coincidencias':'Aún no hay productos'}</td></tr>`}
        </tbody>
      </table>`;
  };

  $('#page-body').innerHTML = `
    <div class="mb-4 flex items-center justify-end gap-2 flex-wrap">
      <button class="btn btn-secondary text-sm" onclick="go('reporteMargen')">💹 Reporte de margen</button>
      <button class="btn btn-secondary text-sm" onclick="go('movimientos')">🔁 Ir a Movimientos</button>
      ${can('stock:read')?`<button class="btn btn-secondary text-sm" onclick="stockControlMenu()" title="Exportar planilla para conteo físico e importar el conteo">📋 Control de stock</button>`:''}
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">Total SKU</div><div class="text-2xl font-bold mt-1">${totalSKU}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Bajo mínimo</div><div class="text-2xl font-bold mt-1 ${bajoMin>0?'text-amber-600':'text-emerald-600'}">${bajoMin}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Categorías</div><div class="text-2xl font-bold mt-1">${cats.length}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Sin stock</div><div class="text-2xl font-bold mt-1 ${rows.filter(p=>Number(p.existencia)<=0).length>0?'text-red-600':'text-emerald-600'}">${rows.filter(p=>Number(p.existencia)<=0).length}</div></div>
    </div>
    <div class="kpi mb-3">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-2 items-end">
        <div class="md:col-span-4">
          <label class="label">Buscar producto</label>
          <input id="st-q" class="input" placeholder="Nombre, código o ubicación..." value="${esc(state.stockFilter.q||'')}"/>
        </div>
        <div class="md:col-span-3">
          <label class="label">Depósito</label>
          <select id="st-dep" class="input">
            <option value="">— Todos (consolidado) —</option>
            ${depositos.map(d => `<option value="${esc(d.id)}" ${d.id===depFilter?'selected':''}>${esc(d.nombre)}${d.compartido?' 🌐':''}${d.tipo?' · '+esc(d.tipo):''}</option>`).join('')}
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="label">Categoría</label>
          <select id="st-cat" class="input">
            <option value="">Todas</option>
            ${cats.map(c=>`<option ${c===state.stockFilter.cat?'selected':''}>${esc(c)}</option>`).join('')}
          </select>
        </div>
        <div class="md:col-span-1">
          <label class="label">Estado</label>
          <select id="st-estado" class="input">
            <option value="">Todos</option>
            <option value="bajo" ${state.stockFilter.estado==='bajo'?'selected':''}>Bajo</option>
            <option value="ok"   ${state.stockFilter.estado==='ok'  ?'selected':''}>OK</option>
          </select>
        </div>
        <div class="md:col-span-2 flex gap-2">
          <button class="btn btn-secondary flex-1" onclick="stockFiltrosLimpiar()">Limpiar</button>
          ${can('stock:create') ? `<button class="btn btn-primary flex-1" onclick="prodForm()">+ Nuevo</button>` : ''}
        </div>
      </div>
      ${depFilter ? `<div class="text-xs text-blue-700 mt-2">📍 Mostrando existencias <b>solo del depósito seleccionado</b>. Quitá el filtro para ver el consolidado de todos los depósitos.</div>` : `<div class="text-xs text-slate-500 mt-2">💡 Sin filtro de depósito, ves la <b>existencia total consolidada</b> (suma de todos los depósitos).</div>`}
    </div>
    <div class="kpi p-0 overflow-hidden"><div id="stock-table"></div></div>`;
  $('#st-q').oninput   = e => { state.stockFilter.q = e.target.value; render(); };
  $('#st-cat').onchange = e => { state.stockFilter.cat = e.target.value; render(); };
  $('#st-estado').onchange = e => { state.stockFilter.estado = e.target.value; render(); };
  $('#st-dep').onchange = e => { state.stockFilter.depositoId = e.target.value; pages.stock(); }; // recarga con el filtro de back
  render();
};
function stockFiltrosLimpiar() { state.stockFilter = { q:'', cat:'', estado:'', depositoId:'' }; pages.stock(); }

// === CONTROL DE STOCK (planilla de conteo físico) ===
// Exporta un Excel con productos × depósitos y una columna vacía "conteo" para
// que el usuario haga el conteo físico. Después lo re-sube y el sistema genera
// los movimientos de ajuste con motivo "control_stock", firmados con su usuario.
function stockControlMenu() {
  const cat = state.stockFilter?.cat || '';
  openModal({
    title:'📋 Control de stock', size:'max-w-lg',
    body: `
      <div class="bg-blue-50 border border-blue-200 text-blue-900 text-sm rounded-lg p-3 mb-3">
        Hacé el conteo físico del depósito en 3 pasos:
        <ol class="list-decimal ml-5 mt-1 space-y-0.5 text-xs">
          <li>Descargá la planilla Excel con el stock actual del sistema.</li>
          <li>Imprimila o llenala digitalmente: completá la columna <b>conteo</b> con la cantidad real encontrada.</li>
          <li>Subila al sistema — se generan automáticamente los ajustes de stock con tu usuario y la fecha actual.</li>
        </ol>
      </div>
      <div class="text-xs text-slate-500 mb-2">${cat?`Filtro activo: <b>${esc(cat)}</b> · solo se exportan esa categoría.`:'Se exporta el stock completo (sin filtro de categoría).'}</div>
      <div class="flex flex-col gap-2 mt-3">
        <button class="btn btn-primary" onclick="stockControlDescargar()">📥 Descargar planilla actual</button>
        <button class="btn btn-secondary" onclick="$('#stock-control-file').click()">📤 Subir planilla con conteo</button>
        <input type="file" id="stock-control-file" accept=".xlsx,.xls" class="hidden" onchange="stockControlSubir(this)"/>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`,
  });
}
async function stockControlDescargar() {
  const cat = state.stockFilter?.cat || '';
  try {
    const url = '/api/admin/control-stock/exportar' + (cat ? '?categoria=' + encodeURIComponent(cat) : '');
    const r = await fetch(url, { headers: { 'Authorization': 'Bearer '+state.token, 'X-Company-Id': state.companyId } });
    if (!r.ok) throw new Error(await r.text());
    const blob = await r.blob();
    const stamp = new Date().toISOString().slice(0,10);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'control-stock-'+stamp+'.xlsx';
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
    toast('Planilla descargada', 'success');
  } catch (e) { toast(e.message, 'error'); }
}
async function stockControlSubir(inp) {
  const f = inp.files?.[0];
  if (!f) return;
  inp.value = '';
  if (!can('stock:update')) return toast('Necesitás permiso de modificación de stock para aplicar ajustes.', 'warn');
  toast('Procesando conteo…', 'info');
  const fd = new FormData();
  fd.append('archivo', f);
  try {
    const r = await fetch('/api/admin/control-stock/importar', {
      method:'POST',
      headers: { 'Authorization': 'Bearer '+state.token, 'X-Company-Id': state.companyId },
      body: fd,
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Error al procesar');
    const detallesErrores = data.errores?.length
      ? `<div class="mt-3 max-h-48 overflow-y-auto bg-red-50 border border-red-200 rounded p-3">
           <div class="text-xs font-semibold text-red-900 mb-1">Errores (${data.errores.length}):</div>
           ${data.errores.map(e => `<div class="text-[11px] text-red-700">• Fila ${e.fila}: ${esc(e.error)}</div>`).join('')}
         </div>` : '';
    closeModal();
    openModal({
      title:'✅ Control de stock procesado', size:'max-w-lg',
      body: `
        <div class="grid grid-cols-3 gap-3 mb-3">
          <div class="kpi"><div class="text-xs text-slate-500">🔧 Ajustes</div><div class="text-2xl font-bold text-amber-700">${data.ajustes || 0}</div></div>
          <div class="kpi"><div class="text-xs text-slate-500">✓ Sin cambio</div><div class="text-2xl font-bold text-green-700">${data.sinCambio || 0}</div></div>
          <div class="kpi"><div class="text-xs text-slate-500">— Sin conteo</div><div class="text-2xl font-bold text-slate-500">${data.sinConteo || 0}</div></div>
        </div>
        <p class="text-xs text-slate-500">Cada ajuste generó un movimiento con motivo <code>control_stock</code> firmado con tu usuario y la fecha de hoy.</p>
        ${detallesErrores}`,
      footer: `<button class="btn btn-primary" onclick="closeModal(); pages.stock()">Listo</button>`,
    });
  } catch (e) { toast(e.message, 'error'); }
}

function movSalida(prodId) { movForm(prodId, 'salida'); }

        </div>
        <div><label class="label">Unidad *</label>${catSelect('f-u', 'Unidad de medida', it.unidad||'kg', { placeholder:'kg / L / u / …' })}</div>

    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick='prodSave(${JSON.stringify(id)})'>${id?'Guardar':'Crear'}</button>`

async function prodSave(id) {
  const data = {
    nombre: $('#f-nom').value.trim(),
    categoria: $('#f-cat').value,
    unidad: $('#f-u').value.trim(),
    stockMinimo: Number($('#f-min').value||0),
    precioReferencia: $('#f-pr').value ? Number($('#f-pr').value) : null,
    observaciones: $('#f-obs').value.trim()||null,

  if (!data.nombre) return toast('Nombre requerido','warn');
  try { await api('/api/productos'+(id?'/'+id:''), { method:id?'PUT':'POST', body: JSON.stringify(data) });
    toast(id?'Actualizado':'Creado','success'); closeModal(); delete state.cache.productos; pages.stock();
  } catch (e) { toast(e.message,'error'); }
}

/* ----- MOVIMIENTOS ----- */
pages.movimientos = async function() {
  setHeader('Movimientos', 'Entradas y salidas de stock');
  if (!can('stock:read')) { $('#page-body').innerHTML = stubPage('movimientos','Movimientos'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let rows=[], prods=[], depositos=[];
  try {
    const [r, p, d] = await Promise.all([api('/api/movimientos'), api('/api/productos'), api('/api/depositos')]);
    rows = r.data||[]; prods = p.data||[]; state.cache.productos = prods;
    depositos = d.data || []; state.cache.depositos = depositos;
  } catch (e) { return toast(e.message,'error'); }
  state.movFilter = state.movFilter || { q:'', cat:'', tipo:'', motivo:'', desde:'', hasta:'', depositoId:'' };
  const cats = [...new Set(prods.map(p=>p.categoria).filter(Boolean))].sort();
  const motivos = [...new Set(rows.map(m=>m.motivo).filter(Boolean))].sort();
  // Set de depósitos compartidos (companyId null) para saber cuándo mostrar la empresa
  const depCompartidosIds = new Set(depositos.filter(d => d.compartido).map(d => d.id));

  const render = () => {
    const f = state.movFilter;
    const q = (f.q||'').toLowerCase();
    const filtered = rows.filter(m => {
      if (f.tipo && m.tipo !== f.tipo) return false;
      if (f.cat) {
        const p = prods.find(x=>x.id===m.productoId);
        if (!p || p.categoria !== f.cat) return false;
      }
      if (f.motivo && m.motivo !== f.motivo) return false;
      if (f.desde && (m.fecha||'') < f.desde) return false;
      if (f.hasta && (m.fecha||'') > f.hasta+'T23:59:59') return false;
      if (f.depositoId) {
        // 'sin' = movimientos sin depósito; ID = movimientos de ese depósito
        if (f.depositoId === 'sin' && m.depositoId) return false;
        if (f.depositoId !== 'sin' && m.depositoId !== f.depositoId) return false;
      }
      if (q) {
        return [m.producto?.nombre, m.motivo, m.referencia].some(v => (v||'').toLowerCase().includes(q));
      }
      return true;
    });
    const entradas = filtered.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+Number(m.cantidad||0),0);
    const salidas  = filtered.filter(m=>m.tipo==='egreso' ).reduce((a,m)=>a+Number(m.cantidad||0),0);
    const totalE = filtered.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+Number(m.total||0),0);
    const totalS = filtered.filter(m=>m.tipo==='egreso' ).reduce((a,m)=>a+Number(m.total||0),0);

    $('#mov-kpis').innerHTML = `
      <div class="kpi"><div class="text-xs text-slate-500">⬆️ Entradas</div><div class="text-2xl font-bold mt-1 text-emerald-600">${filtered.filter(m=>m.tipo==='ingreso').length}</div><div class="text-[11px] text-slate-500">${fmtN(entradas)} u · ${fmt$(totalE)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">⬇️ Salidas</div><div class="text-2xl font-bold mt-1 text-red-600">${filtered.filter(m=>m.tipo==='egreso').length}</div><div class="text-[11px] text-slate-500">${fmtN(salidas)} u · ${fmt$(totalS)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Δ Neto (u)</div><div class="text-2xl font-bold mt-1 ${(entradas-salidas)>=0?'text-emerald-700':'text-red-700'}">${fmtN(entradas-salidas)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">Movimientos</div><div class="text-2xl font-bold mt-1">${filtered.length}</div></div>`;

    // Si filtran por un depósito compartido, mostrar columna Empresa
    const filtroEsCompartido = f.depositoId && depCompartidosIds.has(f.depositoId);
    const empresasMap = (state.user?.companies || []).reduce((acc,c)=>{acc[c.id]=c.name; return acc;}, {});
    $('#mov-table').innerHTML = `
      <table class="data">
        <thead><tr>
          <th>Fecha</th><th>Producto</th><th>Depósito</th>${filtroEsCompartido?'<th>Empresa</th>':''}<th>Tipo</th><th>Motivo</th>
          <th class="text-right">Cantidad</th><th class="text-right">Precio</th>
          <th class="text-right">Total</th><th>Referencia</th><th>Cargado por</th>
        </tr></thead>
        <tbody>
          ${filtered.map(m => {
            const p = prods.find(x=>x.id===m.productoId);
            const esIng = m.tipo==='ingreso';
            const ref = m.referencia || '';
            let refCell;
            if (ref.startsWith('VTA-')) {
              const id = ref.slice(4);
              refCell = `<button class="btn btn-ghost text-xs text-blue-700" title="Ver factura de venta origen" onclick='factVer(${JSON.stringify(id)})'>📄 Venta</button>`;
            } else if (ref.startsWith('CPR-')) {
              const id = ref.slice(4);
              refCell = `<button class="btn btn-ghost text-xs text-blue-700" title="Ver factura de compra origen" onclick='compVer(${JSON.stringify(id)})'>📄 Compra</button>`;
            } else {
              refCell = `<span class="text-xs text-slate-500">${esc(ref || '—')}</span>`;
            }
            const usrCell = m.user
              ? `<span class="text-xs text-slate-600" title="${esc(m.user.alias||'')}">${esc(m.user.nombre || '')}${m.user.apellido?' '+esc(m.user.apellido[0])+'.':''}</span>`
              : '<span class="text-xs text-slate-400">auto</span>';
            const depCell = m.deposito
              ? `<span class="text-xs text-slate-600">${esc(m.deposito.nombre)}${depCompartidosIds.has(m.depositoId)?' 🌐':''}</span>`
              : '<span class="text-xs text-slate-400">—</span>';
            const empCell = filtroEsCompartido
              ? `<td><span class="text-xs text-slate-700">${esc(empresasMap[m.companyId] || '—')}</span></td>`
              : '';
            return `<tr class="table-row">
              <td class="whitespace-nowrap">${fmtDate(m.fecha)}</td>
              <td>${esc(m.producto?.nombre || p?.nombre || '—')}${p?.categoria?` <span class="badge badge-blue text-[10px] ml-1">${esc(p.categoria)}</span>`:''}</td>
              <td>${depCell}</td>
              ${empCell}
              <td>${esIng?'<span class="badge badge-green">Ingreso</span>':'<span class="badge badge-red">Egreso</span>'}</td>
              <td>${esc(m.motivo||'—')}</td>
              <td class="text-right font-semibold ${esIng?'text-emerald-700':'text-red-700'}">${esIng?'+':'-'}${fmtN(m.cantidad)} ${esc(m.producto?.unidad||p?.unidad||'')}</td>
              <td class="text-right text-xs">${m.precio?fmt$(m.precio):'—'}</td>
              <td class="text-right font-semibold">${m.total?fmt$(m.total):'—'}</td>
              <td>${refCell}</td>
              <td>${usrCell}</td>
            </tr>`;
          }).join('') || `<tr><td colspan="${filtroEsCompartido?11:10}" class="text-center text-slate-400 py-8">${rows.length?'Sin coincidencias con los filtros':'Sin movimientos'}</td></tr>`}
        </tbody>
      </table>`;
  };

  $('#page-body').innerHTML = `
    <div id="mov-kpis" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4"></div>
    <div class="kpi mb-3">
      <div class="grid grid-cols-1 md:grid-cols-7 gap-2 items-end">
        <div><label class="label">Categoría</label>
          <select id="mv-cat" class="input"><option value="">Todas</option>${cats.map(c=>`<option ${c===state.movFilter.cat?'selected':''}>${esc(c)}</option>`).join('')}</select>
        </div>
        <div><label class="label">Depósito</label>
          <select id="mv-deposito" class="input">
            <option value="">Todos</option>
            <option value="sin" ${state.movFilter.depositoId==='sin'?'selected':''}>(sin depósito)</option>
            ${depositos.map(d => `<option value="${esc(d.id)}" ${d.id===state.movFilter.depositoId?'selected':''}>${esc(d.nombre)}${d.compartido?' 🌐':''}</option>`).join('')}
          </select>
        </div>
        <div><label class="label">Tipo</label>
          <select id="mv-tipo" class="input">
            <option value="">Todos</option>
            <option value="ingreso" ${state.movFilter.tipo==='ingreso'?'selected':''}>Ingreso</option>
            <option value="egreso"  ${state.movFilter.tipo==='egreso'?'selected':''}>Egreso</option>
          </select>
        </div>
        <div><label class="label">Motivo</label>
          <select id="mv-motivo" class="input"><option value="">Todos</option>${motivos.map(m=>`<option ${m===state.movFilter.motivo?'selected':''}>${esc(m)}</option>`).join('')}</select>
        </div>
        <div><label class="label">Desde</label><input id="mv-desde" type="date" class="input" value="${state.movFilter.desde}"/></div>
        <div><label class="label">Hasta</label><input id="mv-hasta" type="date" class="input" value="${state.movFilter.hasta}"/></div>
        <div class="flex gap-2">
          <button class="btn btn-secondary flex-1" onclick="movFiltrosLimpiar()">Limpiar</button>
          ${can('stock:create') ? `<button class="btn btn-primary flex-1" onclick="movForm()">+ Nuevo</button>` : ''}
        </div>
      </div>
      <div class="mt-2"><input id="mv-q" class="input" placeholder="Buscar por producto, motivo o referencia..." value="${esc(state.movFilter.q||'')}"/></div>
    </div>
    <div class="kpi p-0 overflow-hidden"><div id="mov-table"></div></div>`;

  ['q','cat','deposito','tipo','motivo','desde','hasta'].forEach(k => {
    const el = $('#mv-'+k);
    if (!el) return;
    const evt = (el.tagName==='SELECT' || el.type==='date') ? 'change' : 'input';
    const stateKey = k === 'deposito' ? 'depositoId' : k;
    el.addEventListener(evt, e => { state.movFilter[stateKey] = e.target.value; render(); });
  });
  render();
};
function movFiltrosLimpiar() { state.movFilter = { q:'', cat:'', tipo:'', motivo:'', desde:'', hasta:'', depositoId:'' }; pages.movimientos(); }

/* ----- REPORTE DE MARGEN (compras vs ventas por producto) ----- */
pages.reporteMargen = async function() {
  setHeader('Reporte de margen', 'Rentabilidad por producto: compras vs ventas');
  if (!can('stock:read')) { $('#page-body').innerHTML = stubPage('reporteMargen','Reporte de margen'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Calculando...</div>`;
  let movs = [], prods = [], stockData = [];
  try {
    const [m, p, s] = await Promise.all([
      api('/api/movimientos'),
      api('/api/productos'),
      api('/api/stock-actual'),
    ]);
    movs = m.data||[]; prods = p.data||[]; stockData = s.data||[];
  } catch (e) { return toast(e.message,'error'); }
  state.cache.productos = prods;

  // Agrupamos movimientos por producto. Diferenciamos:
  // - "compra" (motivo=compra) -> costo
  // - "venta"  (motivo=venta)  -> ingreso
  // - otros motivos (cosecha, ajuste, aplicacion, etc.) los ignoramos para margen
  // porque no tienen contraparte de costo/ingreso real.
  const stockById = {}; stockData.forEach(p => stockById[p.id] = p);
  const agrup = {};
  for (const m of movs) {
    if (m.motivo !== 'compra' && m.motivo !== 'venta') continue;
    const pid = m.productoId;
    if (!agrup[pid]) agrup[pid] = { compradoCant:0, compradoTotal:0, vendidoCant:0, vendidoTotal:0 };
    const cant = Number(m.cantidad||0), tot = Number(m.total||0);
    if (m.motivo === 'compra') { agrup[pid].compradoCant += cant; agrup[pid].compradoTotal += tot; }
    else if (m.motivo === 'venta') { agrup[pid].vendidoCant += cant; agrup[pid].vendidoTotal += tot; }
  }

  // Construir filas con todos los productos (asi se ve el catalogo entero, aunque algunos no tengan ni compras ni ventas).
  const filas = prods.map(p => {
    const a = agrup[p.id] || { compradoCant:0, compradoTotal:0, vendidoCant:0, vendidoTotal:0 };
    const costoUnit = a.compradoCant > 0 ? a.compradoTotal / a.compradoCant : 0;
    const precioVtaUnit = a.vendidoCant > 0 ? a.vendidoTotal / a.vendidoCant : 0;
    const margenUnit = costoUnit > 0 && precioVtaUnit > 0 ? precioVtaUnit - costoUnit : null;
    const margenPct = costoUnit > 0 && precioVtaUnit > 0 ? ((precioVtaUnit - costoUnit) / costoUnit) * 100 : null;
    const margenTotal = margenUnit != null ? margenUnit * a.vendidoCant : null; // ganancia/perdida sobre lo vendido
    const stock = stockById[p.id]?.existencia ?? 0;
    return { ...p, ...a, costoUnit, precioVtaUnit, margenUnit, margenPct, margenTotal, stock };
  });

  // KPIs globales
  const totGanancia = filas.reduce((s,f) => s + (f.margenTotal||0), 0);
  const totVendido  = filas.reduce((s,f) => s + (f.vendidoTotal||0), 0);
  const totComprado = filas.reduce((s,f) => s + (f.compradoTotal||0), 0);
  const margenGlobalPct = totComprado > 0 ? (totGanancia / totComprado) * 100 : 0;
  const conMargen = filas.filter(f => f.margenUnit != null);

  state.margenSort = state.margenSort || 'margenPct'; // por defecto ordenamos por % margen
  state.margenFilter = state.margenFilter || { q:'', cat:'', soloVendidos:false };
  const cats = [...new Set(prods.map(p=>p.categoria).filter(Boolean))].sort();

  const render = () => {
    const f = state.margenFilter;
    const q = (f.q||'').toLowerCase();
    let filtered = filas.filter(p => {
      if (f.cat && p.categoria !== f.cat) return false;
      if (f.soloVendidos && p.vendidoCant === 0) return false;
      if (q && !(p.nombre||'').toLowerCase().includes(q) && !(p.categoria||'').toLowerCase().includes(q)) return false;
      return true;
    });
    // Ordenar
    const key = state.margenSort;
    filtered.sort((a,b) => {
      const va = a[key] ?? -Infinity, vb = b[key] ?? -Infinity;
      if (key === 'nombre') return String(va||'').localeCompare(String(vb||''));
      return Number(vb) - Number(va);
    });
    const fmtPct = v => v == null ? '<span class="text-slate-400">—</span>'
      : `<span class="${v>=0?'text-emerald-700':'text-red-700'} font-semibold">${v>=0?'+':''}${v.toFixed(1)}%</span>`;
    const fmtSigned = v => v == null ? '<span class="text-slate-400">—</span>'
      : `<span class="${v>=0?'text-emerald-700':'text-red-700'} font-semibold">${v>=0?'+':''}${fmt$(v)}</span>`;
    $('#mg-table').innerHTML = `
      <table class="data">
        <thead><tr>
          <th onclick="margenOrdenar('nombre')" class="cursor-pointer">Producto</th>
          <th>Categoría</th>
          <th class="text-right">Stock</th>
          <th class="text-right" onclick="margenOrdenar('compradoCant')" class="cursor-pointer">Comprado</th>
          <th class="text-right">Costo prom.</th>
          <th class="text-right" onclick="margenOrdenar('vendidoCant')" class="cursor-pointer">Vendido</th>
          <th class="text-right">Precio prom.</th>
          <th class="text-right" onclick="margenOrdenar('margenUnit')" class="cursor-pointer">Margen u.</th>
          <th class="text-right" onclick="margenOrdenar('margenPct')" class="cursor-pointer">Margen %</th>
          <th class="text-right" onclick="margenOrdenar('margenTotal')" class="cursor-pointer">Ganancia</th>
        </tr></thead>
        <tbody>
          ${filtered.map(p => `<tr class="table-row">
            <td class="font-medium">${esc(p.nombre)}</td>
            <td>${p.categoria?`<span class="badge badge-blue">${esc(p.categoria)}</span>`:'—'}</td>
            <td class="text-right ${p.stock<=0?'text-red-600':p.stock<p.stockMinimo?'text-amber-600':'text-slate-700'}">${fmtN(p.stock)} ${esc(p.unidad||'')}</td>
            <td class="text-right">${p.compradoCant>0?`${fmtN(p.compradoCant)} ${esc(p.unidad||'')}<div class="text-[10px] text-slate-500">${fmt$(p.compradoTotal)}</div>`:'<span class="text-slate-400">—</span>'}</td>
            <td class="text-right">${p.compradoCant>0?fmt$(p.costoUnit):'<span class="text-slate-400">—</span>'}</td>
            <td class="text-right">${p.vendidoCant>0?`${fmtN(p.vendidoCant)} ${esc(p.unidad||'')}<div class="text-[10px] text-slate-500">${fmt$(p.vendidoTotal)}</div>`:'<span class="text-slate-400">—</span>'}</td>
            <td class="text-right">${p.vendidoCant>0?fmt$(p.precioVtaUnit):'<span class="text-slate-400">—</span>'}</td>
            <td class="text-right">${p.margenUnit!=null?fmtSigned(p.margenUnit):'<span class="text-slate-400">—</span>'}</td>
            <td class="text-right">${fmtPct(p.margenPct)}</td>
            <td class="text-right">${p.margenTotal!=null?fmtSigned(p.margenTotal):'<span class="text-slate-400">—</span>'}</td>
          </tr>`).join('') || `<tr><td colspan="10" class="text-center text-slate-400 py-8">Sin productos para mostrar.</td></tr>`}
        </tbody>
      </table>`;
  };

  $('#page-body').innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="kpi"><div class="text-xs text-slate-500">💰 Total comprado</div><div class="text-2xl font-bold mt-1">${fmt$(totComprado)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">💵 Total vendido</div><div class="text-2xl font-bold mt-1 text-emerald-600">${fmt$(totVendido)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">📈 Ganancia</div><div class="text-2xl font-bold mt-1 ${totGanancia>=0?'text-emerald-700':'text-red-700'}">${totGanancia>=0?'+':''}${fmt$(totGanancia)}</div></div>
      <div class="kpi"><div class="text-xs text-slate-500">% Margen global</div><div class="text-2xl font-bold mt-1 ${margenGlobalPct>=0?'text-emerald-700':'text-red-700'}">${margenGlobalPct>=0?'+':''}${margenGlobalPct.toFixed(1)}%</div></div>
    </div>
    <div class="kpi mb-3">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-2 items-end">
        <div class="md:col-span-2"><label class="label">Buscar producto</label><input id="mg-q" class="input" placeholder="Nombre o categoria..." value="${esc(state.margenFilter.q)}"/></div>
        <div><label class="label">Categoría</label>
          <select id="mg-cat" class="input"><option value="">Todas</option>${cats.map(c=>`<option ${c===state.margenFilter.cat?'selected':''}>${esc(c)}</option>`).join('')}</select>
        </div>
        <div class="flex items-end gap-2">
          <label class="flex items-center gap-2 text-sm flex-1"><input type="checkbox" id="mg-vend" ${state.margenFilter.soloVendidos?'checked':''}/> Solo con ventas</label>
          <button class="btn btn-secondary" onclick="margenLimpiar()">Limpiar</button>
        </div>
      </div>
      <div class="mt-2 text-xs text-slate-500">📌 ${conMargen.length} de ${filas.length} productos tienen margen calculable (necesitan tener al menos 1 compra y 1 venta). Tocá los headers para ordenar.</div>
    </div>
    <div class="kpi p-0 overflow-hidden"><div id="mg-table"></div></div>`;

  $('#mg-q').addEventListener('input',  e => { state.margenFilter.q = e.target.value; render(); });
  $('#mg-cat').addEventListener('change', e => { state.margenFilter.cat = e.target.value; render(); });
  $('#mg-vend').addEventListener('change', e => { state.margenFilter.soloVendidos = e.target.checked; render(); });
  render();
};
function margenOrdenar(campo) { state.margenSort = campo; pages.reporteMargen(); }
function margenLimpiar() { state.margenFilter = { q:'', cat:'', soloVendidos:false }; pages.reporteMargen(); }
function movForm(prodIdPreset=null, tipoPreset=null) {

        <div><label class="label">Tipo *</label>
          <select id="f-tipo" class="input">
            <option value="ingreso" ${tipoPreset==='entrada'||tipoPreset==='ingreso'?'selected':''}>Ingreso</option>
            <option value="egreso"  ${tipoPreset==='salida' ||tipoPreset==='egreso' ?'selected':''}>Egreso</option>

        <div><label class="label">Precio unitario</label><input id="f-pu" type="number" step="0.01" class="input" /></div>
        <div class="col-span-2"><label class="label">Referencia</label><input id="f-ref" class="input" placeholder="remito / factura / …"/></div>
      </div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" onclick="movSave()">Crear</button>`
  });
}
async function movSave() {
  const precio = $('#f-pu').value ? Number($('#f-pu').value) : null;
  const cant = Number($('#f-cant').value||0);
  const data = {
    fecha: new Date($('#f-fecha').value).toISOString(),
    tipo: $('#f-tipo').value,
    productoId: $('#f-prod').value,
    motivo: $('#f-mot').value.trim(),
    cantidad: cant,
    precio,
    total: precio != null ? precio * cant : null,
    referencia: $('#f-ref').value.trim()||null,
  };
  if (!data.productoId || !data.motivo || !data.cantidad) return toast('Completá los campos requeridos','warn');
  try { await api('/api/movimientos',{method:'POST',body:JSON.stringify(data)});
    toast('Movimiento creado','success'); closeModal(); pages.movimientos();
  } catch (e) { toast(e.message,'error'); }
}

/* ----- CAMPOS ----- */
pages.campos = async function() {
  setHeader('Campos y lotes', 'Superficie productiva');
  if (!can('produccion:read')) { $('#page-body').innerHTML = stubPage('campos','Campos'); return; }
  $('#page-body').innerHTML = `<div class="text-slate-500 text-sm">Cargando…</div>`;
  let campos=[], lotes=[];
  try {

function empPickLogo(inp) {
  const f = inp.files && inp.files[0];
  if (!f) return;
  if (f.size > 2 * 1024 * 1024) return toast('Logo muy grande (máx 2 MB)','warn');
  const r = new FileReader();
  r.onload = e => {
    $('#f-logoUrl').value = e.target.result;
    $('#f-logo-preview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover"/>`;
  };
  r.readAsDataURL(f);
}

// Permiso para borrar empresa: Super Admin, o Admin (role.key === 'admin') de esa empresa.
function puedeBorrarEmpresa(e) {
  if (state.user?.superAdmin) return true;
  const mem = (state.user?.companies || []).find(c => c.id === e.id);
  return !!mem && (mem.role?.key === 'admin' || (mem.role?.permissions || []).includes('*:*'));
}

async function empEliminar(id, nombre) {
  // Doble confirmación: aviso + tipear el nombre
  if (!confirm(`¿Eliminar la empresa "${nombre}"?\n\nEsto es PERMANENTE. Si la empresa tiene datos (clientes, facturas, movimientos…) el sistema te va a avisar y te dará la opción de cancelar.\n\nSi solo querés ocultarla temporalmente, mejor editala y desmarcá "Activo".`)) return;
  const confirma = prompt(`Para confirmar, escribí el nombre de la empresa:\n\n${nombre}`);
  if (!confirma || confirma.trim().toLowerCase() !== nombre.trim().toLowerCase()) {
    return toast('Confirmación incorrecta. No se eliminó nada.', 'warn');
  }
  try {
    await api('/api/empresas/' + id, { method: 'DELETE' });
    toast(`Empresa "${nombre}" eliminada`, 'success');
    delete state.cache.empresas;
    try { const me = await api('/api/auth/me'); state.user = me.user; renderCompanySelector(); } catch{}
    pages.empresas();
  } catch (e) {
    const msg = e?.message || String(e);
    if (/datos asociados|tieneRelacionados/i.test(msg)) {
      const force = confirm(
        `${msg}\n\n` +
        `¿Forzar el borrado de TODA la empresa?\n\n` +
        `⚠️ ATENCIÓN: esto borra absolutamente todo lo cargado en esta empresa (clientes, facturas, cheques, cuentas corrientes, movimientos, bancos, campos, lotes, empleados, viajes, hacienda, todo). Operación IRREVERSIBLE.\n\n` +
        `Si tenés dudas, cancelá y hacé un Backup primero (Configuración → Sistema).`
      );
      if (!force) return;
      try {
        await api('/api/empresas/' + id + '?force=1', { method: 'DELETE' });
        toast(`Empresa "${nombre}" eliminada con todos sus datos`, 'success');
        delete state.cache.empresas;
        try { const me = await api('/api/auth/me'); state.user = me.user; renderCompanySelector(); } catch{}
        pages.empresas();
      } catch (e2) {
        toast(e2.message || 'Error al forzar el borrado', 'error');
      }
    } else {
      toast(msg, 'error');
    }
  }
}

/* ---- ARCA: acciones ---- */
function _arcaReadFile(f) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(String(r.result || ''));
    r.onerror = () => reject(r.error || new Error('No se pudo leer el archivo'));
    r.readAsText(f);
  });
}
function _downloadText(filename, content) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
async function arcaGenerar() {
  const nombre = ($('#arca-nombre')?.value || '').trim();
  const cuit   = ($('#arca-cuitGen')?.value || '').replace(/\D/g, '');
  if (!nombre)                        return toast('Ingresá el nombre / razón social','warn');
  if (!/^\d{10,11}$/.test(cuit))      return toast('CUIT inválido (11 dígitos sin guiones)','warn');
  try {
    toast('Generando archivos (puede tardar unos segundos)…','info');
    const r = await api('/api/empresas/'+state.companyId+'/arca/generar', { method:'POST', body: JSON.stringify({ nombre, cuit }) });
    const d = r.data || {};
    if (!d.privadaKey || !d.solicitudCsr) throw new Error('Respuesta vacía');
    _downloadText('privada.key',  d.privadaKey);
    _downloadText('solicitud.csr', d.solicitudCsr);
    toast('Archivos generados y descargados.','success');
  } catch(e) { toast(e.message,'error'); }
}
async function arcaGuardar() {
  const cuitRaw  = ($('#arca-cuit')?.value || '').replace(/\D/g, '');
  if (cuitRaw && !/^\d{10,11}$/.test(cuitRaw)) return toast('CUIT inválido','warn');
  const certFile = $('#arca-cert')?.files?.[0];
  const keyFile  = $('#arca-key')?.files?.[0];
  const body = {};
  if (cuitRaw)  body.cuit = cuitRaw;
  if (certFile) body.certCrt    = await _arcaReadFile(certFile);
  if (keyFile)  body.privadaKey = await _arcaReadFile(keyFile);
  if (!body.cuit && !body.certCrt && !body.privadaKey)
    return toast('No hay nada para guardar — completá al menos un campo','warn');
  try {
    await api('/api/empresas/'+state.companyId+'/arca/config', { method:'PUT', body: JSON.stringify(body) });
    toast('Configuración ARCA guardada','success');
    pages.configuracion();
  } catch(e) { toast(e.message,'error'); }
}
async function arcaProbar() {
  try {
    toast('Probando conexión con AFIP…','info');
    const r = await api('/api/empresas/'+state.companyId+'/arca/probar', { method:'POST', body: JSON.stringify({}) });
    if (r.ok) toast(r.mensaje || 'Conexión OK','success');
    else toast(r.mensaje || 'Hubo problemas con la conexión a AFIP.','warn');
  } catch(e) { toast(e.message,'error'); }
}
async function arcaCambiarModo(nuevoModo) {
  try {
    await api('/api/empresas/'+state.companyId+'/arca/config', { method:'PUT', body: JSON.stringify({ modo: nuevoModo }) });

    pages.configuracion();

}

// Descarga una plantilla MODELO (con headers y un par de filas de ejemplo) para
// las "Planillas Especiales". El backend genera el Excel en /api/admin/importar-cliente/plantilla/:tipo
async function importClienteModeloDescargar(tipo) {
  try {
    const r = await fetch(API_BASE + '/api/admin/importar-cliente/plantilla/' + encodeURIComponent(tipo), {
      headers: { 'Authorization': 'Bearer ' + state.token, 'X-Company-Id': state.companyId },
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.error || ('Error ' + r.status));
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'plantilla-modelo-' + tipo + '.xlsx';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('Plantilla modelo descargada', 'success');
  } catch (e) {
    toast(e.message || 'No pude generar la plantilla', 'error');
  }
}
